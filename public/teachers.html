<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .teacher-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .tc-card { background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:box-shadow 0.15s,transform 0.15s; }
    .tc-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
    .tc-banner { height:72px; background:linear-gradient(135deg,#990000,#FF0000); position:relative; }
    .tc-avatar { position:absolute; bottom:-28px; left:20px; width:56px; height:56px; border-radius:50%; border:3px solid white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; color:white; }
    .tc-body { padding:36px 20px 16px; }
    .tc-name { font-family:'Playfair Display',serif; font-size:17px; font-weight:900; color:var(--text); }
    .tc-meta { font-size:12px; color:var(--muted); margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
    .tc-tag { background:#FFF0F0; color:#CC0000; border-radius:100px; padding:3px 10px; font-size:11px; font-weight:600; display:inline-block; margin:2px; }
    .tc-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Teachers</div>
    <div class="topbar-right"><button class="btn btn-primary" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Teacher</button></div>
  </div>
  <div class="page-content">
    <div class="teacher-grid" id="teacherGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="teacherModal">
  <div class="modal" style="width:440px">
    <div class="modal-header">
      <div class="modal-title" id="teacherModalTitle">Add Teacher</div>
      <button class="modal-close" onclick="closeModal('teacherModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editTeacherId">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="tFirst" placeholder="Sarah"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="tLast" placeholder="Thompson"></div>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <div style="display:flex;align-items:center">
          <span style="padding:10px 14px;background:var(--crimson-soft);border:1.5px solid var(--border);border-right:none;border-radius:8px 0 0 8px;font-size:14px;color:var(--crimson-dark);font-weight:700">+998</span>
          <input type="tel" id="tPhone" placeholder="90 123 45 67" oninput="fmtPhone(this)" style="border-radius:0 8px 8px 0;border-left:none">
        </div>
      </div>
      <div class="form-group">
        <label>Password <span id="tPwLabel" style="font-weight:400;text-transform:none;letter-spacing:0">*</span></label>
        <input type="password" id="tPassword" placeholder="Set a password for this teacher">
        <div id="tPwHint" style="font-size:12px;color:var(--muted);margin-top:5px;display:none">Leave blank to keep existing password.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('teacherModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeacher()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('teachers');
  renderSidebar('teachers');
  let teachers = [];

  async function load() { teachers = await apiGet('/api/teachers'); renderTeachers(); }

  function renderTeachers() {
    const grid = document.getElementById('teacherGrid');
    if (!teachers.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🎓</div><p>No teachers found.</p></div>'; return; }
    const filtered = teachers;
    grid.innerHTML = filtered.map(t => {
      const name = t.firstName+' '+t.lastName;
      const col  = avatarColor(name);
      const specs = (t.specs||'').split(',').map(s=>s.trim()).filter(Boolean);
      const levels= (t.levels||'').split(',').map(s=>s.trim()).filter(Boolean);
      return `<div class="tc-card">
        <div class="tc-banner"><div class="tc-avatar" style="background:${col}">${initials(name)}</div></div>
        <div class="tc-body">
          <div class="tc-name">${name}</div>
          <div class="tc-meta">
            ${t.phone?`<span>📞 ${t.phone}</span>`:''}
            ${t.rate?`<span>💰 $${t.rate}/hr</span>`:''}
          </div>
          ${specs.length?`<div style="margin-top:10px">${specs.map(s=>`<span class="tc-tag">${s}</span>`).join('')}</div>`:''}
          ${levels.length?`<div style="margin-top:6px">${levels.map(l=>`<span class="tc-tag" style="background:#FFF0F0;color:#990000">${l}</span>`).join('')}</div>`:''}
          ${t.bio?`<div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">${t.bio}</div>`:''}
        </div>
        <div class="tc-footer">
          <button class="btn btn-ghost btn-sm" onclick="editTeacher('${t.id}')">${IC.edit} Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTeacher('${t.id}')">${IC.trash}</button>
        </div>
      </div>`;
    }).join('');
  }

  function fmtPhone(input) {
    let v=input.value.replace(/\D/g,'').slice(0,9),o='';
    if(v.length>0)o+=v.slice(0,2);if(v.length>2)o+=' '+v.slice(2,5);if(v.length>5)o+=' '+v.slice(5,7);if(v.length>7)o+=' '+v.slice(7,9);
    input.value=o;
  }

  function openAdd() { clearForm(); document.getElementById('teacherModalTitle').textContent='Add Teacher'; openModal('teacherModal'); }

  function editTeacher(id) {
    const t=teachers.find(t=>t.id===id); if(!t) return;
    clearForm();
    document.getElementById('editTeacherId').value=id;
    document.getElementById('tFirst').value=t.firstName;
    document.getElementById('tLast').value=t.lastName;
    document.getElementById('tPhone').value=t.phone||'';
    document.getElementById('tPwHint').style.display='block';
    document.getElementById('tPwLabel').textContent='(optional)';
    document.getElementById('teacherModalTitle').textContent='Edit Teacher';
    openModal('teacherModal');
  }

  async function saveTeacher() {
    const first=document.getElementById('tFirst').value.trim();
    const last =document.getElementById('tLast').value.trim();
    const phone=document.getElementById('tPhone').value.trim();
    const pass =document.getElementById('tPassword').value;
    if(!first||!last){showToast('Name required.','error');return;}
    if(!phone){showToast('Phone required.','error');return;}
    const id=document.getElementById('editTeacherId').value;
    if(!id&&!pass){showToast('Password required.','error');return;}
    const data={firstName:first,lastName:last,phone,status:'Active'};
    if(pass)data.password=pass;
    try {
      if(id){await apiPut('/api/teachers/'+id,data);logActivity(`Updated teacher: ${first} ${last}`,'');}
      else{data.id=genId();await apiPost('/api/teachers',data);logActivity(`Added teacher: ${first} ${last}`,'green');}
      closeModal('teacherModal'); await load(); showToast(id?'Teacher updated!':'Teacher added!');
    } catch(e){showToast('Error: '+e.message,'error');console.error(e);}
  }

  async function deleteTeacher(id) {
    const t=teachers.find(t=>t.id===id);
    if(!confirm(`Delete ${t?.firstName} ${t?.lastName}?`))return;
    await apiDelete('/api/teachers/'+id);
    logActivity(`Removed teacher: ${t?.firstName} ${t?.lastName}`,'red');
    await load(); showToast('Teacher deleted.','error');
  }

  function clearForm() {
    ['editTeacherId','tFirst','tLast','tPhone','tPassword'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tPwHint').style.display='none';
    document.getElementById('tPwLabel').textContent='*';
  }

  load();
</script>
</body>
</html>
