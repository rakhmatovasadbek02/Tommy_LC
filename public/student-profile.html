<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .profile-layout { display:grid; grid-template-columns:300px 1fr; gap:24px; align-items:start; }
    @media(max-width:768px){ .profile-layout{grid-template-columns:1fr} }
    @media(max-width:640px){
      .profile-tabs { overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; }
      .profile-tab  { white-space:nowrap; flex-shrink:0; padding:10px 14px; }
      .pay-tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .pay-tbl { min-width:540px; }
      .section-header { flex-wrap:wrap; gap:8px; }
      .feed-add { flex-direction:column; }
    }

    /* Left card */
    .profile-card { background:white; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .profile-info { padding:24px; }
    .profile-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }

    /* Profile card v2 */
    .pc2-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .pc2-avatar { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:22px; color:white; flex-shrink:0; }
    .pc2-actions { display:flex; gap:8px; }
    .pc2-icon-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border); background:white; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); transition:all 0.15s; flex-shrink:0; }
    .pc2-icon-btn:hover { border-color:var(--crimson); color:var(--crimson); background:var(--crimson-soft); }
    .pc2-icon-btn.danger:hover { border-color:#dc2626; color:#dc2626; background:#fef2f2; }
    .pc2-name-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .pc2-name { font-size:19px; font-weight:800; color:var(--text); }
    .pc2-id { font-size:12px; color:var(--muted); margin-top:2px; }
    .pc2-balance-row { display:flex; align-items:center; gap:10px; margin-top:16px; }
    .pc2-balance-pill { padding:8px 16px; border-radius:999px; font-weight:800; font-size:15px; color:white; white-space:nowrap; }
    .pc2-balance-pill.pos { background:#16a34a; }
    .pc2-balance-pill.neg { background:#dc2626; }
    .pc2-balance-pill.zero { background:#9ca3af; }
    .pc2-balance-label { font-size:13px; color:var(--muted); }
    .pc2-meta { display:flex; flex-direction:column; gap:12px; margin-top:18px; }
    .pc2-meta-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
    .pc2-link { color:#2563eb; font-weight:700; text-decoration:none; font-size:14px; }
    .pc2-link:hover { text-decoration:underline; }
    .pc2-link:empty::before { content:'—'; color:var(--text); font-weight:600; }
    .profile-meta-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; }
    .profile-meta-label { color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .profile-meta-value { font-weight:600; color:var(--text); text-align:right; }
    .pc2-added { font-size:13px; color:var(--muted); }
    .pc2-bottom-actions { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }
    .pc2-bottom-actions > .btn, .pc2-pay-wrap { flex:1; min-width:120px; }
    .pc2-pay-wrap { position:relative; display:flex; }
    .pc2-pay-wrap .btn { flex:1; border-radius:8px 0 0 8px; }
    .pc2-pay-arrow { width:36px; border:1.5px solid var(--crimson); border-left:none; background:var(--crimson); color:white; border-radius:0 8px 8px 0; cursor:pointer; font-size:11px; }
    .pc2-pay-dropdown { position:absolute; top:calc(100% + 4px); right:0; left:0; background:white; border:1px solid var(--border); border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:50; display:none; overflow:hidden; }
    .pc2-pay-dropdown.open { display:block; }
    .pc2-pay-dropdown div { padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .pc2-pay-dropdown div:hover { background:#f9fafb; }

    /* Right panel */
    .profile-main { display:flex; flex-direction:column; gap:20px; }
    .profile-tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:0; }
    .profile-tab { padding:10px 18px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; background:none; border-left:none; border-right:none; border-top:none; }
    .profile-tab:hover { color:var(--text); }
    .profile-tab.active { color:var(--crimson); border-bottom-color:var(--crimson); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Groups tab */
    .group-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .group-row:last-child { border-bottom:none; }
    .group-badge { background:#F1F5F9; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; }
    .group-detail { flex:1; min-width:0; }
    .group-detail-name { font-weight:700; font-size:14px; }
    .group-detail-sub { font-size:12px; color:var(--muted); margin-top:2px; display:flex; gap:12px; flex-wrap:wrap; }

    /* Comments / Calls */
    .feed-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
    .feed-item:last-child { border-bottom:none; }
    .feed-avatar { width:32px; height:32px; border-radius:50%; background:var(--crimson-soft); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--crimson); flex-shrink:0; }
    .feed-body { flex:1; min-width:0; }
    .feed-actor { font-size:12px; font-weight:700; color:var(--text); }
    .feed-time  { font-size:11px; color:var(--muted); margin-left:6px; }
    .feed-text  { font-size:13px; color:var(--text); margin-top:3px; line-height:1.5; }
    .feed-add { display:flex; gap:10px; margin-top:16px; }
    .feed-add textarea { flex:1; resize:none; height:70px; }

    /* Payments table */
    .pay-tbl { width:100%; border-collapse:collapse; }
    .pay-tbl th { text-align:left; padding:12px 16px; font-size:12px; font-weight:700; color:var(--muted); border-bottom:2px solid var(--border); white-space:nowrap; }
    .pay-tbl td { padding:14px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .pay-tbl tbody tr:last-child td { border-bottom:none; }
    .pay-tbl tbody tr:hover { background:#fafafa; }
    .pay-date { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; }
    .type-badge-sys { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; background:#e5e7eb; color:#6b7280; }
    .type-badge-pay { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; background:#dcfce7; color:#16a34a; }
    .pay-amount-neg { font-size:20px; font-weight:800; color:var(--text); white-space:nowrap; }
    .pay-amount-pos { font-size:20px; font-weight:800; color:#16a34a; white-space:nowrap; }
    .pay-amount-unit { font-size:13px; font-weight:600; color:var(--muted); margin-left:3px; }
    .pay-grp-badge { display:inline-block; background:#f1f5f9; border-radius:6px; padding:3px 9px; font-size:12px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .pay-comment-detail { font-size:12px; color:var(--muted); margin-top:2px; }
    .pay-more-btn { display:inline-block; margin-top:4px; padding:3px 12px; border:1px solid var(--border); border-radius:20px; font-size:11px; cursor:pointer; background:white; color:var(--muted); font-family:inherit; }
    .pay-more-btn:hover { border-color:var(--crimson); color:var(--crimson); }
    .pay-creator-name { font-size:12px; font-weight:600; color:var(--text); }
    .pay-creator-time { font-size:11px; color:var(--muted); margin-top:2px; }
    .pay-print-wrap { position:relative; display:inline-flex; }
    .pay-print-btn { display:flex; align-items:center; gap:6px; padding:7px 13px; border:1.5px solid #0ea5e9; border-radius:8px 0 0 8px; background:white; color:#0ea5e9; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .pay-print-btn:hover { background:#e0f2fe; }
    .pay-print-arr { padding:7px 8px; border:1.5px solid #0ea5e9; border-left:none; border-radius:0 8px 8px 0; background:white; color:#0ea5e9; cursor:pointer; }
    .pay-print-arr:hover { background:#e0f2fe; }
    .pay-dropdown { position:absolute; top:calc(100% + 4px); right:0; background:white; border:1px solid var(--border); border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12); min-width:130px; z-index:100; display:none; overflow:hidden; }
    .pay-dropdown.open { display:block; }
    .pay-dropdown-item { display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    .pay-dropdown-item:hover { background:#f9fafb; }
    .pay-dropdown-item.edit { color:#d97706; }
    .pay-dropdown-item.remove { color:#dc2626; }

    /* Payment modal */
    .pay-types { display:flex; gap:8px; flex-wrap:wrap; }
    .pay-type-btn { padding:7px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; cursor:pointer; background:white; font-weight:600; transition:all 0.15s; }
    .pay-type-btn.selected { border-color:var(--crimson); background:var(--crimson-soft); color:var(--crimson); }

    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-title { font-size:14px; font-weight:700; color:var(--text); }
    .empty-feed { text-align:center; padding:32px; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="students.html" style="display:flex;align-items:center;color:var(--muted);text-decoration:none;gap:6px;font-size:13px;font-weight:600">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Students
      </a>
      <span style="color:var(--border)">/</span>
      <div class="page-title" id="pageTitle" style="font-size:18px">Profile</div>
    </div>
    <div class="topbar-right" id="topbarActions"></div>
  </div>
  <div class="page-content">
    <div class="profile-layout" id="profileLayout" style="display:none">

      <!-- LEFT: info card -->
      <div>
        <div class="profile-card">
          <div class="profile-info">
            <div class="pc2-top">
              <div class="pc2-avatar" id="profAvatar"></div>
              <div class="pc2-actions">
                <button class="pc2-icon-btn" onclick="openEditModal()" title="Edit profile">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="pc2-icon-btn" onclick="switchTabByName('comments')" title="Comments">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                </button>
                <button class="pc2-icon-btn danger" onclick="openArchiveModal()" title="Archive student">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
              </div>
            </div>
            <div class="pc2-name-row">
              <div class="pc2-name" id="profName"></div>
              <div id="profStatusBadge"></div>
            </div>
            <div class="pc2-id" id="profIdLine"></div>

            <div class="pc2-balance-row">
              <span class="pc2-balance-pill" id="profBalance"></span>
              <span class="pc2-balance-label">balance</span>
            </div>

            <div class="pc2-meta">
              <div>
                <div class="pc2-meta-label">Phone</div>
                <a class="pc2-link" id="profPhone"></a>
              </div>
              <div id="profParentRow">
                <div class="pc2-meta-label">Parent phone</div>
                <a class="pc2-link" id="profParentPhone"></a>
              </div>
              <div class="profile-meta-row">
                <span class="profile-meta-label">Level</span>
                <span class="profile-meta-value" id="profLevel"></span>
              </div>
              <div class="profile-meta-row">
                <span class="profile-meta-label">Test result</span>
                <span class="profile-meta-value" id="profExam"></span>
              </div>
            </div>

            <hr class="profile-divider">
            <div class="pc2-added">Added at: <strong id="profCreated"></strong></div>

            <div class="pc2-bottom-actions">
              <button class="btn btn-outline" onclick="switchTabByName('groups')">Add to group</button>
              <div class="pc2-pay-wrap">
                <button class="btn btn-primary" onclick="openPayModal('add')">Add payment</button>
                <button class="pc2-pay-arrow" onclick="togglePayDropdown(event)">▾</button>
                <div class="pc2-pay-dropdown" id="pc2PayDropdown">
                  <div onclick="openPayModal('add')">+ Add payment</div>
                  <div onclick="openPayModal('subtract')">− Subtract balance</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: tabs -->
      <div class="profile-main">
        <div class="card" style="padding:0;overflow:hidden">
          <div class="profile-tabs" style="padding:0 20px">
            <button class="profile-tab active" onclick="switchTab('groups',this)">Groups</button>
            <button class="profile-tab" onclick="switchTab('comments',this)">Comments</button>
            <button class="profile-tab" onclick="switchTab('invoices',this)">Payments</button>
          </div>
          <div style="padding:20px">

            <!-- GROUPS -->
            <div class="tab-panel active" id="tab-groups">
              <div id="groupsList"><div class="empty-feed">No groups.</div></div>
            </div>

            <!-- COMMENTS -->
            <div class="tab-panel" id="tab-comments">
              <div id="commentsList"></div>
              <div class="feed-add">
                <textarea id="commentInput" placeholder="Add a comment…"></textarea>
                <button class="btn btn-primary" style="align-self:flex-end" onclick="addComment()">Post</button>
              </div>
            </div>

            <!-- INVOICES -->
            <div class="tab-panel" id="tab-invoices">
              <div style="display:flex;gap:8px;margin-bottom:14px">
                <button class="btn btn-primary" style="flex:1" onclick="openPayModal('add')">+ Add</button>
                <button class="btn btn-outline" style="flex:1;color:var(--crimson);border-color:var(--crimson)" onclick="openPayModal('subtract')">− Subtract</button>
              </div>
              <div id="invoicesList"></div>
            </div>

          </div>
        </div>
      </div>

    </div>
    <div id="loadingMsg" style="text-align:center;padding:60px;color:var(--muted)">Loading…</div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="width:min(560px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Edit Student</div>
      <button class="modal-close" onclick="closeModal('editModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="eFirst"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="eLast"></div>
      </div>
      <div class="form-group">
        <label>Phone Numbers</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👤 Student</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="ePhone" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px;font-size:13px;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👨 Parent</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="eParent" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px;font-size:13px;background:white;min-width:0">
            </div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Level</label>
          <select id="eLevel">
            <option value="">— Select —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
          </select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="eStatus"><option>Active</option><option>Trial</option><option>Lead</option><option>Inactive</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Test Result</label><input type="text" id="eExam" placeholder="Score or notes"></div>
        <div class="form-group"><label>Exam Date</label><input type="date" id="eExamDate"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title" id="payModalTitle">Add Payment</div>
      <button class="modal-close" onclick="closeModal('payModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Amount *</label>
        <input type="number" id="payAmount" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Payment type</label>
        <div class="pay-types" id="payTypes">
          <button class="pay-type-btn selected" data-type="Cash" onclick="selectPayType(this,'Cash')">💵 Cash</button>
          <button class="pay-type-btn" data-type="Card" onclick="selectPayType(this,'Card')">💳 Card</button>
          <button class="pay-type-btn" data-type="Transfer" onclick="selectPayType(this,'Transfer')">🏦 Transfer</button>
        </div>
        <input type="hidden" id="payType" value="Cash">
      </div>
      <div class="form-group">
        <label>Group</label>
        <select id="payGroup"><option value="">— No group —</option></select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="payDesc" placeholder="Monthly payment…">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="payNotes" style="height:60px" placeholder="Optional…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('payModal')">Cancel</button>
      <button class="btn btn-primary" id="paySubmitBtn" onclick="submitPayment()">Add Payment</button>
    </div>
  </div>
</div>

<!-- Archive Modal -->
<div class="modal-overlay" id="archiveModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title">Archive Student</div>
      <button class="modal-close" onclick="closeModal('archiveModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p style="margin:0 0 12px;color:var(--muted)" id="archiveStudentName"></p>
      <div class="form-group">
        <label>Reason for archiving *</label>
        <textarea id="archiveReason" style="height:80px" placeholder="e.g. Finished course, moved abroad…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('archiveModal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmArchive()">Archive</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('students');
  renderSidebar('students');

  const params = new URLSearchParams(location.search);
  const STUDENT_ID = params.get('id');
  if (!STUDENT_ID) location.replace('students.html');

  let student = null, studentGroups = [];

  function fmtPhone(input) {
    let v = input.value.replace(/\D/g,'').slice(0,9), o='';
    if(v.length>0) o+=v.slice(0,2);
    if(v.length>2) o+=' '+v.slice(2,5);
    if(v.length>5) o+=' '+v.slice(5,7);
    if(v.length>7) o+=' '+v.slice(7,9);
    input.value = o;
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
  }

  function fmtDateTime(d) {
    if (!d) return '';
    return new Date(d).toLocaleString('en-GB', {
      timeZone:'Asia/Tashkent', day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit', hour12:false
    });
  }

  const SBADGE = { Active:'badge-green', Trial:'badge-gold', Lead:'badge-blue', Inactive:'badge-grey' };
  const SCHED = { odd:'Mon / Wed / Fri', even:'Tue / Thu / Sat', daily:'Daily' };

  async function loadProfile() {
    try {
      const [s, grps, cmts, invs] = await Promise.all([
        apiGet('/api/students/'+STUDENT_ID),
        apiGet('/api/students/'+STUDENT_ID+'/groups'),
        apiGet('/api/students/'+STUDENT_ID+'/comments'),
        apiGet('/api/students/'+STUDENT_ID+'/invoices'),
      ]);
      student = s;
      studentGroups = grps;

      const name = s.firstName+' '+s.lastName;
      document.title = name+' — TommyLC CRM';
      document.getElementById('pageTitle').textContent = name;
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('profileLayout').style.display = '';

      // Avatar
      const col = avatarColor(name);
      const av = document.getElementById('profAvatar');
      av.textContent = initials(name);
      av.style.background = col;

      document.getElementById('profName').textContent = name;
      document.getElementById('profStatusBadge').innerHTML = `<span class="badge ${SBADGE[s.status]||'badge-grey'}">${s.status}</span>`;
      document.getElementById('profIdLine').textContent = `(id: ${s.id})`;

      const bal = Number(s.balance||0);
      const balEl = document.getElementById('profBalance');
      balEl.textContent = `${bal.toLocaleString('uz-UZ').replace(/\s/g,' ')} UZS`;
      balEl.className = 'pc2-balance-pill ' + (bal > 0 ? 'pos' : bal < 0 ? 'neg' : 'zero');

      const phoneEl = document.getElementById('profPhone');
      if (s.phone) { phoneEl.textContent = '+998 '+s.phone; phoneEl.href = 'tel:+998'+s.phone.replace(/\s/g,''); }
      else { phoneEl.textContent = '—'; phoneEl.removeAttribute('href'); }

      const parentEl = document.getElementById('profParentPhone');
      if (s.phoneParent) { parentEl.textContent = '+998 '+s.phoneParent; parentEl.href = 'tel:+998'+s.phoneParent.replace(/\s/g,''); }
      document.getElementById('profParentRow').style.display = s.phoneParent ? '' : 'none';
      document.getElementById('profLevel').textContent   = s.level   || '—';
      document.getElementById('profExam').textContent    = s.exam    || '—';
      document.getElementById('profCreated').textContent = fmtDate(s.createdAt);

      _invoices = invs;
      renderGroups(grps);
      renderComments(cmts);
      renderInvoices(invs);

    } catch(e) { document.getElementById('loadingMsg').textContent = 'Failed to load student.'; }
  }

  function renderGroups(grps) {
    const el = document.getElementById('groupsList');
    if (!grps.length) { el.innerHTML='<div class="empty-feed">Not enrolled in any group.</div>'; return; }
    el.innerHTML = grps.map(g => `
      <div class="group-row">
        <a href="group.html?id=${g.id}" style="text-decoration:none"><div class="group-badge">${g.name}</div></a>
        <div class="group-detail">
          <div class="group-detail-name">${g.level||''} ${g.time?'('+g.time+')':''}</div>
          <div class="group-detail-sub">
            ${g.teacher?`<span>👤 ${g.teacher}</span>`:''}
            ${g.room?`<span>🏫 ${g.room}</span>`:''}
            ${g.schedType?`<span>📅 ${SCHED[g.schedType]||g.schedType}</span>`:''}
            ${g.startDate?`<span>📆 From ${fmtDate(g.startDate)}</span>`:''}
          </div>
        </div>
        ${g.price?`<span style="font-weight:700;color:var(--text);white-space:nowrap">${Number(g.price).toLocaleString()} <span style="font-size:11px;color:var(--muted)">/ mo</span></span>`:''}
      </div>`).join('');
  }

  function renderComments(cmts) {
    const el = document.getElementById('commentsList');
    if (!cmts.length) { el.innerHTML='<div class="empty-feed">No comments yet.</div>'; return; }
    el.innerHTML = cmts.map(c => `
      <div class="feed-item">
        <div class="feed-avatar">${(c.actor||'?').charAt(0).toUpperCase()}</div>
        <div class="feed-body">
          <span class="feed-actor">${c.actor||'Unknown'}</span>
          <span class="feed-time">${fmtDateTime(c.created_at)}</span>
          <div class="feed-text">${c.text}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteComment(${c.id})">${IC.trash}</button>
      </div>`).join('');
  }

  function renderInvoices(invs) {
    const el = document.getElementById('invoicesList');
    if (!invs.length) { el.innerHTML='<div class="empty-feed">No payments recorded.</div>'; return; }
    const isSystem = i => i.paymentType === 'Auto' || (i.desc||'').toLowerCase().startsWith('activation');
    el.innerHTML = `<div class="pay-tbl-wrap"><table class="pay-tbl">
      <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Comment</th><th>Creator</th><th></th></tr></thead>
      <tbody>${invs.map(i => {
        const sys = isSystem(i);
        const grp = studentGroups.find(g => g.id === i.groupId);
        const grpName = grp ? grp.name : (i.groupId ? i.groupId : '');

        // Amount
        const amt = Number(i.total);
        const amtFmt = amt.toLocaleString('uz-UZ').replace(/\s/g, ' ');
        const amtHtml = sys
          ? `<span class="pay-amount-neg">−${amtFmt}<span class="pay-amount-unit">UZS</span></span>`
          : `<span class="pay-amount-pos">+${amtFmt}<span class="pay-amount-unit">UZS</span></span>`;

        // Comment
        let commentHtml = grpName ? `<div class="pay-grp-badge">${grpName}</div>` : '';
        if (sys) {
          const lesMatch = (i.desc||'').match(/(\d+)\s*of\s*(\d+)/i);
          if (lesMatch) commentHtml += `<div class="pay-comment-detail">${lesMatch[1]} les.</div>`;
          commentHtml += `<button class="pay-more-btn" onclick="event.stopPropagation();toggleMore(this,'${i.id}')">more</button>
            <div id="more-${i.id}" style="display:none;font-size:12px;color:var(--muted);margin-top:4px">${i.desc||''}</div>`;
        } else {
          if (i.paymentType && i.paymentType !== 'Auto') commentHtml += `<div class="pay-comment-detail">${i.paymentType}</div>`;
        }

        // Creator
        const creatorHtml = sys
          ? `<div class="pay-creator-time">${fmtDateTime(i.createdAt)}</div>`
          : `${i.creator ? `<div class="pay-creator-name">${i.creator}</div>` : ''}
             <div class="pay-creator-time">${fmtDateTime(i.createdAt)}</div>`;

        return `<tr>
          <td><div class="pay-date">${fmtDate(i.createdAt)}</div></td>
          <td>${sys ? '<span class="type-badge-sys">system</span>' : '<span class="type-badge-pay">payment</span>'}</td>
          <td>${amtHtml}</td>
          <td>${commentHtml}</td>
          <td>${creatorHtml}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="editInvoice('${i.id}')">${IC.edit}</button>
            <button class="btn btn-danger btn-sm" onclick="removeInvoice('${i.id}')">${IC.trash}</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  }

  function toggleMore(btn, id) {
    const el = document.getElementById('more-'+id);
    if (!el) return;
    const open = el.style.display !== 'none';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? 'more' : 'less';
  }

  function toggleInvDropdown(id) {
    document.querySelectorAll('.pay-dropdown').forEach(d => { if (d.id !== 'dd-'+id) d.classList.remove('open'); });
    document.getElementById('dd-'+id)?.classList.toggle('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.pay-print-wrap')) {
      document.querySelectorAll('.pay-dropdown').forEach(d => d.classList.remove('open'));
    }
  });

  function printInvoice(id) { window.print(); }

  function editInvoice(id) {
    const i = _invoices?.find(x => x.id === id);
    if (!i) return;
    toggleInvDropdown(id);
    openPayModal();
    document.getElementById('payAmount').value = i.total;
    document.getElementById('payType').value = i.paymentType || 'Cash';
    document.querySelectorAll('.pay-type-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.type === (i.paymentType||'Cash'));
    });
    document.getElementById('payDesc').value = i.desc || '';
    document.getElementById('payGroup').value = i.groupId || '';
  }

  async function removeInvoice(id) {
    if (!confirm('Remove this payment?')) return;
    await apiDelete('/api/invoices/'+id);
    logActivity(`Removed invoice for ${student?.firstName} ${student?.lastName}`, 'red');
    loadProfile();
    showToast('Removed.');
  }

  let _invoices = [];

  function switchTab(name, btn) {
    document.querySelectorAll('.profile-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
  }

  function switchTabByName(name) {
    const btn = [...document.querySelectorAll('.profile-tab')].find(t => t.getAttribute('onclick')?.includes(`'${name}'`));
    if (btn) switchTab(name, btn);
  }

  function togglePayDropdown(e) {
    e.stopPropagation();
    document.getElementById('pc2PayDropdown').classList.toggle('open');
  }
  document.addEventListener('click', () => document.getElementById('pc2PayDropdown')?.classList.remove('open'));

  async function addComment() {
    const text = document.getElementById('commentInput').value.trim();
    if (!text) return;
    const session = getSession();
    await apiPost('/api/students/'+STUDENT_ID+'/comments', { text, actor: session?.name||'Unknown' });
    document.getElementById('commentInput').value = '';
    const cmts = await apiGet('/api/students/'+STUDENT_ID+'/comments');
    renderComments(cmts);
    showToast('Comment added.');
  }

  async function deleteComment(id) {
    if (!confirm('Delete this comment?')) return;
    await apiDelete('/api/students/comments/'+id);
    const cmts = await apiGet('/api/students/'+STUDENT_ID+'/comments');
    renderComments(cmts);
  }

  function openEditModal() {
    if (!student) return;
    document.getElementById('eFirst').value    = student.firstName;
    document.getElementById('eLast').value     = student.lastName;
    document.getElementById('ePhone').value    = student.phone||'';
    document.getElementById('eParent').value   = student.phoneParent||'';
    document.getElementById('eLevel').value    = student.level||'';
    document.getElementById('eStatus').value   = student.status||'Active';
    document.getElementById('eExam').value     = student.exam||'';
    document.getElementById('eExamDate').value = student.examDate ? student.examDate.split('T')[0] : '';
    openModal('editModal');
  }

  async function saveEdit() {
    const first = document.getElementById('eFirst').value.trim();
    const last  = document.getElementById('eLast').value.trim();
    if (!first||!last) { showToast('Name required.','error'); return; }
    const data = {
      firstName: first, lastName: last,
      phone:       document.getElementById('ePhone').value.trim()||null,
      phoneParent: document.getElementById('eParent').value.trim()||null,
      level:       document.getElementById('eLevel').value,
      status:      document.getElementById('eStatus').value,
      exam:        document.getElementById('eExam').value.trim(),
      examDate:    document.getElementById('eExamDate').value||null,
    };
    await apiPut('/api/students/'+STUDENT_ID, data);
    logActivity(`Updated student: ${first} ${last}`, '');
    closeModal('editModal');
    showToast('Saved!');
    loadProfile();
  }

  let _payMode = 'add';
  function openPayModal(mode = 'add') {
    _payMode = mode;
    const isSubtract = mode === 'subtract';
    document.getElementById('payModalTitle').textContent = isSubtract ? 'Subtract Balance' : 'Add Payment';
    document.getElementById('paySubmitBtn').textContent  = isSubtract ? 'Subtract' : 'Add Payment';
    document.getElementById('payAmount').value = '';
    document.getElementById('payDesc').value = '';
    document.getElementById('payNotes').value = '';
    document.getElementById('payType').value = 'Cash';
    document.querySelectorAll('.pay-type-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
    const sel = document.getElementById('payGroup');
    sel.innerHTML = '<option value="">— No group —</option>' +
      studentGroups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
    openModal('payModal');
  }

  function selectPayType(btn, type) {
    document.querySelectorAll('.pay-type-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('payType').value = type;
  }

  async function submitPayment() {
    const raw = Number(document.getElementById('payAmount').value);
    if (!raw || raw <= 0) { showToast('Enter a valid amount.','error'); return; }
    const amount = _payMode === 'subtract' ? -raw : raw;
    const session = getSession();
    const data = {
      amount,
      paymentType: document.getElementById('payType').value,
      groupId:     document.getElementById('payGroup').value||null,
      desc:        document.getElementById('payDesc').value.trim()||'Payment',
      notes:       document.getElementById('payNotes').value.trim(),
      creator:     session?.name || null,
    };
    await apiPost('/api/students/'+STUDENT_ID+'/payment', data);
    logActivity(`Payment ${amount.toLocaleString()} for ${student?.firstName} ${student?.lastName}`, 'green');
    closeModal('payModal');
    showToast('Payment added!');
    loadProfile();
  }

  function openArchiveModal() {
    document.getElementById('archiveStudentName').textContent =
      student ? `${student.firstName} ${student.lastName}` : '';
    document.getElementById('archiveReason').value = '';
    openModal('archiveModal');
  }

  async function confirmArchive() {
    const reason = document.getElementById('archiveReason').value.trim();
    if (!reason) { showToast('Please enter a reason.', 'error'); return; }
    await apiDelete('/api/students/' + STUDENT_ID, { reason });
    logActivity(`Archived student: ${student?.firstName} ${student?.lastName} — ${reason}`, 'red');
    closeModal('archiveModal');
    showToast('Student archived.');
    setTimeout(() => location.replace('students.html'), 800);
  }

  loadProfile();
</script>
</body>
</html>
