<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    .sum-card { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); border-top:3px solid var(--border); }
    .sum-card.green { border-top-color:var(--green); }
    .sum-card.red   { border-top-color:var(--crimson); }
    .sum-card.blue  { border-top-color:#1E88E5; }
    .sum-card.amber { border-top-color:var(--amber); }
    .sum-card-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .sum-card-val   { font-family:'Playfair Display',serif; font-size:24px; font-weight:900; color:var(--text); white-space:nowrap; }
    .sum-card.green .sum-card-val { color:var(--green); }
    .sum-card.red   .sum-card-val { color:var(--crimson); }
    .sum-card-sub   { font-size:12px; color:var(--muted); margin-top:6px; font-weight:600; }

    /* Revenue chart */
    .chart-card { background:white; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 22px 14px; margin-bottom:20px; }
    .chart-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .chart-title { font-size:13px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); }
    .chart-legend { display:flex; gap:14px; font-size:12px; font-weight:600; color:var(--muted); }
    .chart-legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:6px; vertical-align:-1px; }
    .chart-legend .lg-cash::before  { background:var(--green); }
    .chart-legend .lg-click::before { background:#1E88E5; }
    .chart-bars { display:flex; align-items:flex-end; gap:14px; height:140px; }
    .chart-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:4px; }
    .chart-val { font-size:11px; font-weight:700; color:var(--text); }
    .chart-stack { width:100%; max-width:54px; display:flex; flex-direction:column; justify-content:flex-end; border-radius:6px 6px 0 0; overflow:hidden; }
    .chart-seg-cash  { background:var(--green); }
    .chart-seg-click { background:#1E88E5; }
    .chart-month { font-size:11px; font-weight:700; color:var(--muted); margin-top:6px; }
    .chart-col.current .chart-month { color:var(--crimson); }

    .tab-row { display:flex; gap:0; margin-bottom:16px; background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .tab-btn { flex:1; padding:11px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.14s; font-family:'DM Sans',sans-serif; }
    .tab-btn:hover { background:var(--crimson-soft); color:var(--crimson); }
    .tab-btn.active { color:var(--crimson); border-bottom-color:var(--crimson); background:var(--crimson-soft); }

    /* Payment rows */
    .inv-row { display:grid; grid-template-columns:38px minmax(140px,1.4fr) 110px 92px minmax(130px,1fr) 150px auto; align-items:center; gap:14px; padding:12px 20px; border-bottom:1px solid var(--border); font-size:13px; transition:background 0.1s; }
    .inv-row:hover { background:var(--crimson-soft); }
    .inv-row:last-child { border-bottom:none; }
    .inv-name { font-weight:700; }
    .inv-name a { color:inherit; text-decoration:none; }
    .inv-name a:hover { color:var(--crimson); }
    .inv-meta { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
    .inv-meta a { color:inherit; text-decoration:none; }
    .month-chip { display:inline-block; background:var(--crimson-soft); color:var(--crimson); font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }
    .inv-when { font-size:11px; color:var(--muted); line-height:1.5; }
    .inv-amount { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; white-space:nowrap; text-align:right; }
    .inv-actions { display:flex; gap:6px; justify-content:flex-end; }
    .badge-cash  { background:#E8F5E9; color:#2E7D32; }
    .badge-click { background:#E3F2FD; color:#1565C0; }

    .list-foot { display:flex; justify-content:flex-end; align-items:baseline; gap:10px; padding:13px 20px; border-top:2px solid var(--border); background:#FCFAF8; border-radius:0 0 var(--radius) var(--radius); }
    .list-foot-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .list-foot-val { font-family:'Playfair Display',serif; font-size:18px; font-weight:900; }

    /* Debtor rows */
    .deb-row { display:grid; grid-template-columns:38px minmax(140px,1.4fr) minmax(120px,1fr) 150px auto; align-items:center; gap:14px; padding:12px 20px; border-bottom:1px solid var(--border); font-size:13px; }
    .deb-row:hover { background:var(--crimson-soft); }
    .deb-row:last-child { border-bottom:none; }
    .deb-amount { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; color:var(--crimson); white-space:nowrap; text-align:right; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }

    /* Head Admin view */
    .ha-summary-bar { display:flex; align-items:center; gap:0; background:white; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; padding:14px 20px; flex-wrap:wrap; gap:0; }
    .ha-stat { display:flex; flex-direction:column; gap:3px; padding:0 20px 0 0; }
    .ha-stat:first-child { padding-left:0; }
    .ha-stat-val { font-family:'Playfair Display',serif; font-size:22px; font-weight:900; color:var(--text); line-height:1; }
    .ha-stat-lbl { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
    .ha-divider { width:1px; height:36px; background:var(--border); margin:0 20px 0 0; flex-shrink:0; }

    .ha-row { display:grid; grid-template-columns:36px 1fr auto auto; align-items:center; gap:14px; padding:13px 20px; border-bottom:1px solid var(--border); transition:background .1s; }
    .ha-row:hover { background:var(--crimson-soft); }
    .ha-row:last-child { border-bottom:none; }
    .ha-row-info { min-width:0; }
    .ha-row-name { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ha-row-name a { color:var(--text); text-decoration:none; }
    .ha-row-name a:hover { color:var(--crimson); }
    .ha-row-grps { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
    .ha-grp-chip { display:inline-block; background:var(--crimson-soft); color:var(--crimson); font-size:11px; font-weight:600; padding:2px 9px; border-radius:99px; text-decoration:none; white-space:nowrap; }
    .ha-grp-chip:hover { background:#fcd5d5; }
    .ha-row-bal { text-align:right; padding-right:4px; }
    .ha-row-bal-val { font-family:'Playfair Display',serif; font-size:14px; font-weight:900; white-space:nowrap; }
    .ha-row-bal-lbl { font-size:10px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
    .ha-row-status { text-align:right; min-width:110px; }
    .ha-badge-paid   { display:inline-block; background:#dcfce7; color:#15803d; font-size:11px; font-weight:700; padding:4px 11px; border-radius:99px; }
    .ha-badge-unpaid { display:inline-block; background:#fee2e2; color:#dc2626; font-size:11px; font-weight:700; padding:4px 11px; border-radius:99px; }
    .ha-badge-amt { font-size:12px; font-weight:700; color:#15803d; margin-top:3px; }

    @media(max-width:680px){
      .ha-row { grid-template-columns:36px 1fr auto; }
      .ha-row-bal { display:none; }
      .ha-divider { display:none; }
      .ha-stat { padding:6px 12px 6px 0; }
    }

    @media(max-width:900px){
      .summary-row { grid-template-columns:repeat(2,1fr); gap:10px; }
      .inv-row { grid-template-columns:38px 1fr auto auto; }
      .inv-row > .month-chip, .inv-row > .inv-when { display:none; }
      .inv-row .badge { display:none; }
      .deb-row { grid-template-columns:38px 1fr auto auto; }
      .deb-row .deb-groups { display:none; }
      .chart-bars { gap:8px; }
    }
    @media(max-width:640px){
      .sum-card { padding:14px 16px; }
      .sum-card-val { font-size:17px !important; }
      .toolbar { flex-wrap:wrap; }
      .toolbar .search-bar { flex:1 1 100%; max-width:100%; }
      .toolbar select, .toolbar input[type=month] { flex:1; min-width:0; }
      .inv-row { grid-template-columns:36px 1fr auto; gap:8px; padding:10px 12px; }
      .inv-row > .inv-when, .inv-row > .inv-actions { display:none; }
      .inv-amount { font-size:13px; }
      .card { border-radius:10px; }
      .tab-row { overflow-x:auto; flex-wrap:nowrap; }
      .tab-btn { flex-shrink:0; padding:10px 12px; font-size:12px; }
    }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Finance</div>
    <div class="topbar-right">
      <button class="btn btn-outline" id="exportBtn" onclick="exportCSV()" title="Export filtered payments to CSV"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export</button>
<button class="btn btn-primary" id="newPaymentBtn" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Payment</button>
      <button class="btn btn-primary" id="addSpendingBtn" onclick="openSpending()" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Spending</button>
    </div>
  </div>
  <div class="page-content">

    <div class="summary-row" id="summaryRow"></div>

    <div class="chart-card" id="chartCard">
      <div class="chart-head">
        <div class="chart-title">Revenue — last 6 months</div>
        <div class="chart-legend"><span class="lg-cash">Cash</span><span class="lg-click">Click</span></div>
      </div>
      <div class="chart-bars" id="chartBars"></div>
    </div>

    <div class="tab-row" id="tabRow">
      <button class="tab-btn active" onclick="setTab('Paid',this)">Payments</button>
      <button class="tab-btn" onclick="setTab('unpaid',this)">Unpaid This Month</button>
      <button class="tab-btn" onclick="setTab('debtors',this)">Debtors</button>
      <button class="tab-btn" onclick="setTab('bymonth',this)">By Month</button>
      <button class="tab-btn" onclick="setTab('spendings',this)">Spendings</button>
    </div>

    <div class="toolbar" id="mainToolbar" style="margin-bottom:16px">
      <div class="search-bar"><span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search student, group, level…" oninput="render()">
      </div>
      <select id="filterLevel" class="pay-only" onchange="render()" style="width:auto;padding:9px 14px">
        <option value="">All Levels</option>
        <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
        <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
      </select>
      <select id="filterType" class="pay-only" onchange="render()" style="width:auto;padding:9px 14px">
        <option value="">All Types</option>
        <option>Cash</option><option>Click</option>
      </select>
      <input type="month" id="filterMonth" class="pay-only" onchange="render()" style="width:auto;padding:8px 12px" title="Filter by month covered">
      <select id="sortOrder" class="pay-only" onchange="render()" style="width:auto;padding:9px 14px">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="amount-desc">Highest amount</option>
        <option value="amount-asc">Lowest amount</option>
        <option value="name-asc">Student A→Z</option>
      </select>
      <span class="text-muted" id="invoiceCount" style="margin-left:auto"></span>
    </div>

    <div class="card">
      <div id="invoiceList"></div>
      <div class="list-foot" id="listFoot" style="display:none">
        <span class="list-foot-label" id="listFootLabel">Total</span>
        <span class="list-foot-val" id="listFootVal"></span>
      </div>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="width:520px">
    <div class="modal-header">
      <div class="modal-title" id="invModalTitle">New Payment</div>
      <button class="modal-close" onclick="closeModal('invoiceModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editInvId">

      <div class="form-row">
        <div class="form-group">
          <label>Student *</label>
          <select id="invStudent" onchange="onStudentChange()"><option value="">— Select —</option></select>
        </div>
        <div class="form-group">
          <label>Group</label>
          <select id="invGroup" onchange="onGroupChange()"><option value="">— Select —</option></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="invLevel">
            <option value="">— Select —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Month covered *</label>
          <input type="month" id="invMonth">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Amount (UZS) *</label>
          <input type="number" id="invTotal" placeholder="0" min="0" step="1000">
        </div>
        <div class="form-group">
          <label>Payment Type *</label>
          <div style="display:flex;gap:10px;margin-top:4px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;border:1.5px solid var(--crimson);background:var(--crimson-soft);border-radius:8px;padding:10px 12px;transition:all 0.14s" id="typeCash">
              <input type="radio" name="payType" value="Cash" checked onchange="onPayType()">
              <span style="font-size:18px">💵</span>
              <span style="font-weight:700;font-size:14px">Cash</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;transition:all 0.14s" id="typeClick">
              <input type="radio" name="payType" value="Click" onchange="onPayType()">
              <span style="font-size:18px">📱</span>
              <span style="font-weight:700;font-size:14px">Click</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group"><label>Notes</label><textarea id="invNotes" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()">Save Payment</button>
    </div>
  </div>
</div>

<!-- SPENDING MODAL -->
<div class="modal-overlay" id="spendingModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title" id="spendingModalTitle">Add Spending</div>
      <button class="modal-close" onclick="closeModal('spendingModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="spendingId">
      <div class="form-group">
        <label>Amount (UZS) *</label>
        <input type="number" id="spAmount" placeholder="e.g. 500000" min="0">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="spCategory">
          <option value="">— Select category —</option>
          <option>Rent</option><option>Salaries</option><option>Utilities</option>
          <option>Marketing</option><option>Equipment</option><option>Supplies</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="spDesc" placeholder="Optional note">
      </div>
      <div class="form-group">
        <label>Month *</label>
        <input type="month" id="spMonth">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('spendingModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSpending()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('payments');
  renderSidebar('payments');

  const FIN_MANAGE = canManageFinance();
  const sess = getSession();
  const myRoles = (sess?.roles || [sess?.title || '']).filter(Boolean);
  const VIEW_ONLY = !FIN_MANAGE && (myRoles.includes('Head Admin') || sess?.permissions?.includes('finance_view_only'));

  const LEVEL_COLORS = {
    'RoundUp':'#FB8C00','Beginner':'#43A047','Elementary':'#E53935',
    'Pre-Intermediate':'#1E88E5','Intermediate':'#F9A825','CEFR':'#8E24AA','IELTS':'#00897B'
  };
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const fmt     = n => Number(n||0).toLocaleString('uz-UZ') + ' UZS';
  const compact = n => n>=1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'')+'M' : n>=1e3 ? Math.round(n/1e3)+'K' : String(Math.round(n));
  const monthLabel = m => { if(!m) return '—'; const [y,mo]=m.split('-'); return MONTHS[Number(mo)-1]+' '+y; };

  let invoices=[], students=[], groups=[], spendings=[];
  let currentTab = 'Paid';

  async function load() {
    try {
      [invoices, students, groups, spendings] = await Promise.all([
        apiGet('/api/invoices'), apiGet('/api/students'), apiGet('/api/groups'), apiGet('/api/spendings').catch(()=>[])
      ]);
    } catch(e) {
      invoices=[]; students=[]; groups=[];
    }
    if (!FIN_MANAGE) document.getElementById('newPaymentBtn').style.display='none';
    if (VIEW_ONLY) {
      document.getElementById('summaryRow').style.display = 'none';
      document.getElementById('chartCard').style.display  = 'none';
      document.getElementById('tabRow').style.display     = 'none';
      document.getElementById('exportBtn').style.display  = 'none';
      document.getElementById('addSpendingBtn').style.display = 'none';
      document.getElementById('newPaymentBtn').style.display  = 'none';
      document.querySelector('.page-title').textContent   = 'Finance — Students';
      initHAView();
      return;
    }
    renderSummary();
    renderChart();
    render();
  }


  function paidInvoices() { return invoices.filter(i=>i.status==='Paid'); }

  function renderSummary() {
    const now = new Date();
    const paid = paidInvoices();
    const inMonth = (i, y, m) => { const d=new Date(i.createdAt); return d.getFullYear()===y && d.getMonth()===m; };
    const thisY = now.getFullYear(), thisM = now.getMonth();
    const lastD = new Date(thisY, thisM - 1, 1);
    const lastY = lastD.getFullYear(), lastM = lastD.getMonth();

    const monthInv   = paid.filter(i => inMonth(i, thisY, thisM));
    const lastMonInv = paid.filter(i => inMonth(i, lastY, lastM));
    const monthRev   = monthInv.reduce((s,i)=>s+Number(i.total||0),0);
    const lastMonRev = lastMonInv.reduce((s,i)=>s+Number(i.total||0),0);
    const monthCash  = monthInv.filter(i=>i.paymentType!=='Click').reduce((s,i)=>s+Number(i.total||0),0);
    const monthClick = monthRev - monthCash;
    const allRev     = paid.reduce((s,i)=>s+Number(i.total||0),0);

    let trendHtml = '';
    if (lastMonRev > 0) {
      const pct = Math.round((monthRev - lastMonRev) / lastMonRev * 100);
      const up = pct >= 0;
      trendHtml = `<span style="font-size:11px;font-weight:700;color:${up?'var(--green)':'var(--crimson)'}">${up?'▲':'▼'} ${Math.abs(pct)}% vs ${MONTHS[lastM]}</span>`;
    } else if (monthRev > 0) {
      trendHtml = `<span style="font-size:11px;color:var(--muted)">first data point</span>`;
    }

    const activeIds = new Set(students.filter(s=>s.status==='Active').map(s=>s.id));
    const expected  = groups.reduce((sum,g)=>sum + Math.abs(Number(g.price||0)) * (g.studentIds||[]).filter(id=>activeIds.has(id)).length, 0);
    const rate      = expected>0 ? Math.min(100, Math.round(monthRev/expected*100)) : null;

    const debtors   = students.filter(s=>Number(s.balance||0)<0);
    const totalDebt = debtors.reduce((s,st)=>s+Math.abs(Number(st.balance||0)),0);

    // Unpaid count for this month
    const curMonthStr = `${thisY}-${String(thisM+1).padStart(2,'0')}`;
    const paidStudentIds = new Set(paid.filter(i=>i.month===curMonthStr).map(i=>i.studentId));

        <div class="sum-card-sub">${rate===null ? 'no group pricing set' : rate + '% collected · <strong style="color:var(--crimson)">' + unpaidCount + ' unpaid</strong>'}</div>

        <div class="sum-card-label">Outstanding Debt</div>

  function switchToUnpaid() {
    const btn = [...document.querySelectorAll('.tab-btn')].find(b=>b.textContent.includes('Unpaid'));
    if (btn) setTab('unpaid', btn);
  }

  function renderChart() {
    const now = new Date();
    const buckets = [];
    for (let k=5; k>=0; k--) {
      const d = new Date(now.getFullYear(), now.getMonth()-k, 1);
      buckets.push({ y:d.getFullYear(), m:d.getMonth(), cash:0, click:0 });
    }
    paidInvoices().forEach(i => {
      const d = new Date(i.createdAt);
      const b = buckets.find(b=>b.y===d.getFullYear() && b.m===d.getMonth());
      if (b) { if (i.paymentType==='Click') b.click+=Number(i.total||0); else b.cash+=Number(i.total||0); }
    });
    const max = Math.max(...buckets.map(b=>b.cash+b.click), 1);

    document.getElementById('chartBars').innerHTML = buckets.map((b,idx) => {
      const total = b.cash + b.click;
      const hCash  = Math.round(b.cash  / max * 100);
      const hClick = Math.round(b.click / max * 100);
      const tooltip = total
        ? `💵 Cash: ${fmt(b.cash)}\n📱 Click: ${fmt(b.click)}\nTotal: ${fmt(total)}`
        : 'No payments';
      return `<div class="chart-col${idx===5?' current':''}" title="${tooltip}">
        <div class="chart-val" style="font-size:10px">${total ? compact(total) : ''}</div>
        <div class="chart-stack" style="height:${Math.max(hCash+hClick, total?3:0)}%;cursor:pointer" onclick="filterChartMonth(${b.y},${b.m})">
          ${b.click ? `<div class="chart-seg-click" style="flex:${b.click}"></div>` : ''}
          ${b.cash  ? `<div class="chart-seg-cash"  style="flex:${b.cash}"></div>`  : ''}
        </div>
        <div class="chart-month">${MONTHS[b.m]}<br><span style="font-size:9px;font-weight:500;opacity:.7">${total?compact(total):''}</span></div>
      </div>`;
    }).join('');
  }

  function filterChartMonth(y, m) {
    const val = `${y}-${String(m+1).padStart(2,'0')}`;
    const el = document.getElementById('filterMonth');
    el.value = el.value === val ? '' : val;
    // Switch to payments tab if on debtors
    if (currentTab === 'debtors') {
      const btn = document.querySelector('.tab-btn');
      if (btn) setTab('payments', btn);
    }
    render();
    document.getElementById('invoiceList')?.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const hideFilters = tab==='debtors' || tab==='unpaid' || tab==='bymonth' || tab==='spendings';
    document.querySelectorAll('.pay-only').forEach(el => el.style.display = hideFilters ? 'none' : '');
    document.getElementById('mainToolbar').style.display = (tab==='bymonth'||tab==='spendings') ? 'none' : '';
    const addBtn = document.getElementById('newPaymentBtn');
    if (addBtn) addBtn.style.display = tab==='spendings' ? 'none' : '';
    document.getElementById('addSpendingBtn').style.display = (tab==='spendings' && FIN_MANAGE) ? '' : 'none';
    render();
  }

  function render() {
    if (currentTab === 'debtors') renderDebtors();
    else if (currentTab === 'unpaid') renderUnpaid();
    else if (currentTab === 'bymonth') renderByMonth();
    else if (currentTab === 'spendings') renderSpendings();
    else renderInvoices();
  }

  function getFilteredInvoices() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fl = document.getElementById('filterLevel').value;
    const ft = document.getElementById('filterType').value;
    const fm = document.getElementById('filterMonth').value;
    const so = document.getElementById('sortOrder').value;
    let list = invoices.filter(i => {
      const stu  = students.find(s=>s.id===i.studentId);
      const name = stu ? (stu.firstName+' '+stu.lastName).toLowerCase() : '';
      const grp  = groups.find(g=>g.id===i.groupId);
      return i.status === 'Paid'
          && (!fl || i.level===fl)
          && (!ft || (i.paymentType||'Cash')===ft)
          && (!fm || i.month===fm)
          && (!q || name.includes(q) || (i.level||'').toLowerCase().includes(q) || (grp?.name||'').toLowerCase().includes(q));
    });
    if (so==='date-asc')     list.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    else if (so==='amount-desc') list.sort((a,b)=>Number(b.total||0)-Number(a.total||0));
    else if (so==='amount-asc')  list.sort((a,b)=>Number(a.total||0)-Number(b.total||0));
    else if (so==='name-asc') list.sort((a,b)=>{
      const na = (students.find(s=>s.id===a.studentId)?.firstName||'');
      const nb = (students.find(s=>s.id===b.studentId)?.firstName||'');
      return na.localeCompare(nb);
    });
    else list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); // date-desc default
    return list;
  }

  function renderUnpaid() {
    const now = new Date();
    const thisY = now.getFullYear(), thisM = now.getMonth();
    const curMonthStr = `${thisY}-${String(thisM+1).padStart(2,'0')}`;
    const activeIds = new Set(students.filter(s=>s.status==='Active').map(s=>s.id));
    const paidStudentIds = new Set(paidInvoices().filter(i=>i.month===curMonthStr).map(i=>i.studentId));
    const q = document.getElementById('searchInput').value.toLowerCase();

    // Build list: one row per student-group pair that hasn't paid
    const rows = [];
    groups.filter(g=>Number(g.price||0)>0).forEach(g => {
      (g.studentIds||[]).filter(id=>activeIds.has(id) && !paidStudentIds.has(id)).forEach(sid => {
        const stu = students.find(s=>s.id===sid);
        if (!stu) return;
        const name = stu.firstName+' '+stu.lastName;
        if (q && !name.toLowerCase().includes(q) && !(stu.phone||'').includes(q) && !g.name.toLowerCase().includes(q)) return;
        rows.push({ stu, group: g, amount: Math.abs(Number(g.price)) });
      });
    });

    rows.sort((a,b)=>a.stu.firstName.localeCompare(b.stu.firstName));
    document.getElementById('invoiceCount').textContent = `${rows.length} unpaid`;
    const el = document.getElementById('invoiceList');
    const foot = document.getElementById('listFoot');

    if (!rows.length) {
      el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><p>Everyone has paid for '+MONTHS[thisM]+' '+thisY+'.</p></div>';
      foot.style.display='none'; return;
    }

    el.innerHTML = rows.map(r => {
      const name = r.stu.firstName+' '+r.stu.lastName;
      const col  = LEVEL_COLORS[r.group.level] || '#666';
      return `<div class="deb-row">
        <div class="avatar" style="background:${avatarColor(name)};width:38px;height:38px;font-size:13px">${initials(name)}</div>
        <div>
          <div class="inv-name"><a href="student-profile.html?id=${r.stu.id}">${name}</a></div>
          <div class="inv-meta">${r.stu.phone||''}</div>
        </div>
        <div class="inv-meta">👥 ${r.group.name}${r.group.level?` <span style="color:${col};font-weight:700">${r.group.level}</span>`:''}</div>
        <div class="deb-amount" style="color:var(--text)">${fmt(r.amount)}</div>
        <div class="inv-actions">
          ${FIN_MANAGE?`<button class="btn btn-primary btn-sm" onclick="openAddFor('${r.stu.id}')">💰 Record</button>`:''}
          <a href="student-profile.html?id=${r.stu.id}" class="btn btn-outline btn-sm">Profile</a>
        </div>
      </div>`;
    }).join('');

    const total = rows.reduce((s,r)=>s+r.amount, 0);
    document.getElementById('listFootLabel').textContent = 'Expected';
    document.getElementById('listFootVal').textContent = fmt(total);
    document.getElementById('listFootVal').style.color = 'var(--amber)';
    foot.style.display='';

  function renderByMonth() {
    const el = document.getElementById('invoiceList');
    const foot = document.getElementById('listFoot');
    const paid = paidInvoices();
    const autoCharges = invoices.filter(i => i.paymentType === 'Auto' && i.status === 'Pending');

    if (!paid.length && !autoCharges.length) {
      el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><p>No payments recorded yet.</p></div>';
      foot.style.display='none'; return;
    }

    // Build monthly buckets — keyed by the invoice's month field (what month it covers)
    const bucketMap = {};
    const ensureBucket = k => { if (!bucketMap[k]) bucketMap[k] = { cash:0, click:0, count:0, charged:0, chargedCount:0 }; };

    paid.forEach(i => {
      // Use month-covered field if set, otherwise fall back to created date
      const key = i.month || (() => { const d=new Date(i.createdAt); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
      ensureBucket(key);
      if (i.paymentType==='Click') bucketMap[key].click += Number(i.total||0);
      else bucketMap[key].cash += Number(i.total||0);
      bucketMap[key].count++;
    });

    autoCharges.forEach(i => {
      const key = i.month || (() => { const d=new Date(i.createdAt); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
      ensureBucket(key);
      bucketMap[key].charged += Number(i.total||0);
      bucketMap[key].chargedCount++;
    });

    const keys = Object.keys(bucketMap).sort().reverse();
    const grandCollected = paid.reduce((s,i)=>s+Number(i.total||0),0);
    const grandCharged   = autoCharges.reduce((s,i)=>s+Number(i.total||0),0);

    el.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:var(--crimson);color:white">
        <th style="padding:10px 16px;text-align:left;font-weight:700">Month</th>
        <th style="padding:10px 16px;text-align:right;font-weight:700">Charged</th>
        <th style="padding:10px 16px;text-align:right;font-weight:700">Collected</th>
        <th style="padding:10px 16px;text-align:right;font-weight:700">Gap</th>
        <th style="padding:10px 16px;text-align:right;font-weight:700">Cash / Click</th>
        <th style="padding:10px 16px;text-align:right;font-weight:700">#</th>
      </tr></thead>
      <tbody>
      ${keys.map((k, idx) => {
        const b = bucketMap[k];
        const [y, m] = k.split('-');
        const label = MONTHS[Number(m)-1] + ' ' + y;
        const collected = b.cash + b.click;
        const gap = collected - b.charged;
        const gapColor = gap >= 0 ? 'var(--green)' : 'var(--crimson)';
        const gapSign = gap >= 0 ? '+' : '';
        return `<tr style="border-bottom:1px solid var(--border);${idx%2===0?'background:var(--surface)':'background:white'};cursor:pointer" onclick="filterChartMonth(${y},${Number(m)-1})">
          <td style="padding:10px 16px;font-weight:700">${label}</td>
          <td style="padding:10px 16px;text-align:right;color:var(--crimson);font-weight:600">${b.charged ? '−'+compact(b.charged) : '<span style="color:var(--muted)">—</span>'}</td>
          <td style="padding:10px 16px;text-align:right;color:var(--green);font-weight:700;font-family:'Playfair Display',serif">${collected ? fmt(collected) : '<span style="color:var(--muted)">—</span>'}</td>
          <td style="padding:10px 16px;text-align:right;font-weight:700;color:${gapColor}">${b.charged||collected ? gapSign+compact(gap) : '—'}</td>
          <td style="padding:10px 16px;text-align:right;color:var(--muted);font-size:12px">💵 ${compact(b.cash)} · 📱 ${compact(b.click)}</td>
          <td style="padding:10px 16px;text-align:right;color:var(--muted)">${b.count}</td>
        </tr>`;
      }).join('')}
      </tbody></table>`;
    el.style.overflowX = 'auto';

    document.getElementById('listFootLabel').textContent = 'Total Collected';
    document.getElementById('listFootVal').textContent = fmt(grandCollected);
    document.getElementById('listFootVal').style.color = 'var(--green)';
    foot.style.display='';
    document.getElementById('invoiceCount').textContent = `${keys.length} months · ${grandCharged ? fmt(grandCharged)+' charged' : 'no auto-charges'}`;
  }

    const debtors = students.filter(s => {
      const bal = Number(s.balance||0);
      if (bal >= 0) return false;
      const name = (s.firstName+' '+s.lastName).toLowerCase();
      return !q || name.includes(q) || (s.phone||'').includes(q);
    }).sort((a,b)=>Number(a.balance||0)-Number(b.balance||0));

    document.getElementById('invoiceCount').textContent = `${debtors.length} debtor${debtors.length!==1?'s':''}`;

    const el = document.getElementById('invoiceList');
    const foot = document.getElementById('listFoot');
    if (!debtors.length) {
      el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><p>No debtors — everyone is paid up.</p></div>';
      foot.style.display='none';
      return;
    }

    el.innerHTML = debtors.map(s => {
      const name = s.firstName+' '+s.lastName;
      const bal  = Number(s.balance||0);
      const myGroups = groups.filter(g=>(g.studentIds||[]).includes(s.id)).map(g=>g.name).join(', ');
      return `<div class="deb-row">
        <div class="avatar" style="background:${avatarColor(name)};width:38px;height:38px;font-size:13px">${initials(name)}</div>
        <div>
          <div class="inv-name"><a href="student-profile.html?id=${s.id}">${name}</a></div>
          <div class="inv-meta">${s.phone||''}</div>
        </div>
        <div class="deb-groups inv-meta">${myGroups ? '👥 '+myGroups : '<span style="color:var(--amber)">no group</span>'}</div>

          ${FIN_MANAGE?`<button class="btn btn-primary btn-sm" onclick="openAddFor('${s.id}')">💰 Record payment</button>`:''}

  function exportCSV() {
    const rows = currentTab==='debtors'
      ? [['Student','Phone','Groups','Debt (UZS)'],
         ...students.filter(s=>Number(s.balance||0)<0).map(s=>[
           s.firstName+' '+s.lastName, s.phone||'',
           groups.filter(g=>(g.studentIds||[]).includes(s.id)).map(g=>g.name).join('; '),
           Math.abs(Number(s.balance||0))
         ])]
      : [['Date','Student','Group','Level','Month','Type','Amount (UZS)','Recorded by','Notes'],
         ...getFilteredInvoices().map(i=>{
           const stu = students.find(s=>s.id===i.studentId);
           const grp = groups.find(g=>g.id===i.groupId);
           return [
             new Date(i.createdAt).toISOString().split('T')[0],
             stu ? stu.firstName+' '+stu.lastName : 'Unknown',
             grp?.name||'', i.level||'', i.month||'',
             i.paymentType||'Cash', Number(i.total||0), i.creator||'', (i.notes||'').replace(/\n/g,' ')
           ];
         })];
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (currentTab==='debtors'?'debtors':'payments')+'-'+new Date().toISOString().split('T')[0]+'.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function openAdd() {
    clearForm();
    populateStudentSelect();
    populateGroupSelect();
    const now = new Date();
    document.getElementById('invMonth').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    document.getElementById('invModalTitle').textContent = 'New Payment';
    openModal('invoiceModal');
  }

  function openAddFor(studentId) {
    openAdd();
    document.getElementById('invStudent').value = studentId;
    onStudentChange();
  }

  function onStudentChange() {
    const sid = document.getElementById('invStudent').value;
    if (!sid) return;
    const grp = groups.find(g=>(g.studentIds||[]).includes(sid));
    if (grp) {
      document.getElementById('invGroup').value = grp.id;
      document.getElementById('invLevel').value = grp.level || '';
      if (grp.price) document.getElementById('invTotal').value = Math.abs(Number(grp.price));
    }
  }

  function onGroupChange() {
    const gid = document.getElementById('invGroup').value;
    const grp = groups.find(g=>g.id===gid);
    if (grp) {
      if (grp.level) document.getElementById('invLevel').value = grp.level;
      if (grp.price) document.getElementById('invTotal').value = Math.abs(Number(grp.price));
    }
  }

  function onPayType() {
    const val = document.querySelector('input[name="payType"]:checked')?.value;
    document.getElementById('typeCash').style.borderColor  = val==='Cash'  ? 'var(--crimson)' : 'var(--border)';
    document.getElementById('typeCash').style.background   = val==='Cash'  ? 'var(--crimson-soft)' : '';
    document.getElementById('typeClick').style.borderColor = val==='Click' ? 'var(--crimson)' : 'var(--border)';
    document.getElementById('typeClick').style.background  = val==='Click' ? 'var(--crimson-soft)' : '';
  }

  function editInvoice(id) {
    const i = invoices.find(i=>i.id===id); if(!i) return;
    clearForm();
    populateStudentSelect();
    populateGroupSelect();
    document.getElementById('editInvId').value   = id;
    document.getElementById('invStudent').value  = i.studentId||'';
    document.getElementById('invGroup').value    = i.groupId||'';
    document.getElementById('invLevel').value    = i.level||'';
    document.getElementById('invMonth').value    = i.month||'';
    document.getElementById('invTotal').value    = i.total||'';
    document.getElementById('invNotes').value    = i.notes||'';
    const radio = document.querySelector(`input[name="payType"][value="${i.paymentType||'Cash'}"]`);
    if (radio) { radio.checked = true; onPayType(); }
    document.getElementById('invModalTitle').textContent = 'Edit Payment';
    openModal('invoiceModal');
  }

  async function saveInvoice() {
    const studentId = document.getElementById('invStudent').value;
    const month     = document.getElementById('invMonth').value;
    const total     = document.getElementById('invTotal').value;
    if (!studentId || !month || !total) { showToast('Student, month and amount are required.','error'); return; }
    const id = document.getElementById('editInvId').value;
    const level = document.getElementById('invLevel').value;
    const data = {
      studentId,
      groupId:     document.getElementById('invGroup').value||null,
      level:       level||null,
      month,
      total:       Number(total),
      status:      'Paid',
      paymentType: document.querySelector('input[name="payType"]:checked')?.value||'Cash',
      dueDate:     null,
      notes:       document.getElementById('invNotes').value.trim(),
      desc:        `${level||''}${month?' — '+month:''}`,
    };
    try {
      if (id) {
        await apiPut('/api/invoices/'+id, data);
        logActivity('Updated payment','');
      } else {
        data.id = genId();
        data.number = 'INV-'+Date.now().toString().slice(-6);
        data.creator = getSession()?.name || null;
        await apiPost('/api/invoices', data);
        logActivity('Created payment','green');
      }
      const prevTab = currentTab;
      closeModal('invoiceModal');
      await load();
      if (prevTab !== 'Paid') {
        const btn = [...document.querySelectorAll('.tab-btn')].find(b => {
          if (prevTab==='unpaid') return b.textContent.includes('Unpaid');
          if (prevTab==='debtors') return b.textContent.includes('Debtor');
          if (prevTab==='bymonth') return b.textContent.includes('Month');
          return false;
        });
        if (btn) setTab(prevTab, btn);
      }
      showToast(id?'Payment updated!':'Payment created!');
    } catch(e) { showToast('Error: '+e.message,'error'); }
  }

  async function deleteInvoice(id) {
    if (!confirm('Delete this payment?')) return;
    await apiDelete('/api/invoices/'+id);
    await load();
    showToast('Deleted.','error');
  }

  function clearForm() {
    ['editInvId','invStudent','invGroup','invLevel','invMonth','invTotal','invNotes'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
    const cash=document.querySelector('input[name="payType"][value="Cash"]');
    if(cash){cash.checked=true;onPayType();}
  }

  function populateStudentSelect() {
    const sel = document.getElementById('invStudent');
    sel.innerHTML = '<option value="">— Select student —</option>' +
      students.filter(s=>s.status==='Active'||s.status==='Trial').map(s=>
        `<option value="${s.id}">${s.firstName} ${s.lastName}</option>`
      ).join('');
  }

  function populateGroupSelect() {
    const sel = document.getElementById('invGroup');
    sel.innerHTML = '<option value="">— Select group —</option>' +
      groups.map(g=>`<option value="${g.id}">${g.name}${g.level?' · '+g.level:''}</option>`).join('');
  }

  /* ── Head Admin: student payment list ── */
  function renderStudentList() {
    const now = new Date();
    const curMonthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    const q       = (document.getElementById('haSearch')?.value||'').toLowerCase();
    const fGroup  = document.getElementById('haGroup')?.value||'';
    const fStatus = document.getElementById('haStatus')?.value||'';
    const fMonth  = document.getElementById('haMonth')?.value || curMonthStr;

    const paidIds = new Set(
      invoices.filter(i=>i.status==='Paid' && i.month===fMonth).map(i=>i.studentId)
    );

    let rows = students.filter(s=>s.status==='Active').map(s => {
      const name    = s.firstName+' '+s.lastName;
      const grps    = groups.filter(g=>(g.studentIds||[]).includes(s.id));
      const paid    = paidIds.has(s.id);
      const bal     = Number(s.balance||0);
      const paidAmt = invoices.filter(i=>i.studentId===s.id && i.month===fMonth && i.status==='Paid')
                              .reduce((sum,i)=>sum+Number(i.total||0),0);
      return { s, name, grps, paid, bal, paidAmt };
    });

    if (q) rows = rows.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.s.phone||'').includes(q) ||
      r.grps.some(g=>(g.name||'').toLowerCase().includes(q))
    );
    if (fGroup)            rows = rows.filter(r => r.grps.some(g=>g.id===fGroup));
    if (fStatus==='paid')   rows = rows.filter(r => r.paid);
    if (fStatus==='unpaid') rows = rows.filter(r => !r.paid);
    if (fStatus==='debt')   rows = rows.filter(r => r.bal<0);

    rows.sort((a,b) => {
      if (a.paid !== b.paid) return a.paid ? 1 : -1; // unpaid first
      return a.name.localeCompare(b.name);
    });

    // summary bar
    const allActive = students.filter(s=>s.status==='Active');
    const totalPaid   = allActive.filter(s=>paidIds.has(s.id)).length;
    const totalUnpaid = allActive.length - totalPaid;
    const totalCollected = invoices.filter(i=>i.status==='Paid'&&i.month===fMonth)
                                   .reduce((s,i)=>s+Number(i.total||0),0);
    const mLabel = MONTHS[Number(fMonth.split('-')[1])-1]+' '+fMonth.split('-')[0];

    const pct = allActive.length ? Math.round(totalPaid/allActive.length*100) : 0;

    document.getElementById('haSummaryBar').innerHTML = `
      <div class="ha-stat">
        <div class="ha-stat-val" style="color:#16a34a">${totalPaid}</div>
        <div class="ha-stat-lbl">Paid</div>
      </div>
      <div class="ha-divider"></div>
      <div class="ha-stat">
        <div class="ha-stat-val" style="color:#dc2626">${totalUnpaid}</div>
        <div class="ha-stat-lbl">Unpaid</div>
      </div>
      <div class="ha-divider"></div>
      <div class="ha-stat">
        <div class="ha-stat-val">${allActive.length}</div>
        <div class="ha-stat-lbl">Active Students</div>
      </div>
      <div class="ha-divider"></div>
      <div class="ha-stat" style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div>
            <div class="ha-stat-val" style="color:var(--crimson)">${compact(totalCollected)}</div>
            <div class="ha-stat-lbl">Collected · ${mLabel}</div>
          </div>
          <div style="flex:1;min-width:80px">
            <div style="display:flex;align-items:center;gap:6px">
              <div style="flex:1;height:6px;background:#fde8e8;border-radius:99px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#f87171,#c0392b);border-radius:99px;transition:width .5s"></div>
              </div>
              <span style="font-size:11px;font-weight:800;color:var(--crimson)">${pct}%</span>
            </div>
          </div>
        </div>
      </div>`;

    const el = document.getElementById('invoiceList');
    document.getElementById('listFoot').style.display = 'none';
    document.getElementById('invoiceCount').textContent = `${rows.length} student${rows.length!==1?'s':''}`;

    if (!rows.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎓</div><p>No students found.</p></div>';
      return;
    }

    el.innerHTML = rows.map(({s,name,grps,paid,bal,paidAmt}) => {
      const grpChips = grps.length
        ? grps.map(g=>`<a href="group.html?id=${g.id}" class="ha-grp-chip">${g.name}</a>`).join('')
        : `<span style="color:var(--muted);font-size:11px">No group</span>`;
      const balColor = bal<0 ? '#dc2626' : bal>0 ? '#16a34a' : 'var(--muted)';
      const balPrefix = bal<0 ? '−' : bal>0 ? '+' : '';
      return `<div class="ha-row">
        <div class="avatar" style="background:${avatarColor(name)};width:36px;height:36px;font-size:12px;flex-shrink:0">${initials(name)}</div>
        <div class="ha-row-info">
          <div class="ha-row-name"><a href="student-profile.html?id=${s.id}">${name}</a></div>
          <div class="ha-row-grps">${grpChips}</div>
        </div>
        <div class="ha-row-bal" style="color:${balColor}">
          <div class="ha-row-bal-val">${balPrefix}${fmt(Math.abs(bal))}</div>
          <div class="ha-row-bal-lbl">Balance</div>
        </div>
        <div class="ha-row-status">
          ${paid
            ? `<div class="ha-badge-paid">✓ Paid</div><div class="ha-badge-amt">${fmt(paidAmt)}</div>`
            : `<div class="ha-badge-unpaid">✗ Unpaid</div>`}
        </div>
      </div>`;
    }).join('');
  }

  function initHAView() {
    const now = new Date();
    const curMonthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    const bar = document.createElement('div');
    bar.id = 'haSummaryBar';
    bar.style.display = 'none';
    document.querySelector('.page-content').appendChild(bar);

    const toolbar = document.getElementById('mainToolbar');
    toolbar.innerHTML = `
      <div class="search-bar"><span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="haSearch" placeholder="Search by name or group…" oninput="renderStudentList()">
      </div>
      <select id="haGroup" onchange="renderStudentList()" style="width:auto;padding:9px 14px">
        <option value="">All Groups</option>
        ${groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
      </select>
      <select id="haStatus" onchange="renderStudentList()" style="width:auto;padding:9px 14px">
        <option value="">All Students</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
        <option value="debt">In Debt</option>
      </select>
      <input type="month" id="haMonth" value="${curMonthStr}" onchange="renderStudentList()" style="width:auto;padding:8px 12px">
      <span class="text-muted" id="invoiceCount" style="margin-left:auto;font-size:12px"></span>
    `;
    toolbar.style.display = '';
    renderStudentList();
  }

  /* ── Spendings ── */
  function renderSpendings() {
    const el = document.getElementById('invoiceList');
    document.getElementById('listFoot').style.display = 'none';
    if (!spendings.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">💸</div><p>No spendings recorded yet.</p></div>';
      return;
    }
    const total = spendings.reduce((s,x)=>s+Number(x.amount||0),0);
    document.getElementById('listFoot').style.display = '';
    document.getElementById('listFootLabel').textContent = 'Total Spendings';
    document.getElementById('listFootVal').textContent = fmt(total);
    const CATS = {};
    spendings.forEach(s => { const k=s.category||'Other'; CATS[k]=(CATS[k]||0)+Number(s.amount||0); });
    el.innerHTML = spendings.map(s => `
      <div class="inv-row" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="width:32px;height:32px;border-radius:8px;background:#fee2e2;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${s.category||'Other'}</div>
          <div style="font-size:12px;color:var(--muted)">${s.description||'—'} · ${s.month||'—'}</div>
        </div>
        <div style="font-weight:800;font-size:14px;color:#dc2626;white-space:nowrap">${fmt(s.amount)}</div>
        ${FIN_MANAGE ? `
        <button class="btn btn-ghost btn-sm" onclick="openSpending('${s.id}')">${IC.edit}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSpending('${s.id}')">${IC.trash}</button>` : ''}
      </div>`).join('');
  }

  function openSpending(id) {
    document.getElementById('spendingId').value = id||'';
    document.getElementById('spendingModalTitle').textContent = id ? 'Edit Spending' : 'Add Spending';
    if (id) {
      const s = spendings.find(x=>x.id===id);
      document.getElementById('spAmount').value = s.amount||'';
      document.getElementById('spCategory').value = s.category||'';
      document.getElementById('spDesc').value = s.description||'';
      document.getElementById('spMonth').value = s.month||'';
    } else {
      document.getElementById('spAmount').value='';
      document.getElementById('spCategory').value='';
      document.getElementById('spDesc').value='';
      document.getElementById('spMonth').value=new Date().toISOString().slice(0,7);
    }
    openModal('spendingModal');
  }

  async function saveSpending() {
    const id = document.getElementById('spendingId').value;
    const amount = Number(document.getElementById('spAmount').value);
    const category = document.getElementById('spCategory').value;
    const description = document.getElementById('spDesc').value.trim();
    const month = document.getElementById('spMonth').value;
    if (!amount || amount<=0) return showToast('Enter a valid amount.','error');
    if (!month) return showToast('Select a month.','error');
    try {
      if (id) {
        await apiPut('/api/spendings/'+id, {amount,category,description,month});
      } else {
        await apiPost('/api/spendings', {id:genId(),amount,category,description,month});
      }
      closeModal('spendingModal');
      await load();
      showToast(id?'Updated!':'Spending added!');
    } catch(e){ showToast(e.message||'Error.','error'); }
  }

  async function deleteSpending(id) {
    const s = spendings.find(x=>x.id===id);
    if (!confirm(`Delete spending of ${fmt(s?.amount||0)}?`)) return;
    try {
      await apiDelete('/api/spendings/'+id);
      await load();
      showToast('Deleted.','error');
    } catch(e){ showToast(e.message||'Error.','error'); }
  }

  load();
</script>
</body>
</html>
