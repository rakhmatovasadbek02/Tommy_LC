<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .summary-row { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .sum-card { background:white; border:1px solid var(--border); border-radius:var(--radius); padding:18px 22px; flex:1; min-width:130px; box-shadow:var(--shadow); border-top:3px solid var(--border); }
    .sum-card.green  { border-top-color:var(--green); }
    .sum-card.red    { border-top-color:var(--crimson); }
    .sum-card.amber  { border-top-color:var(--amber); }
    .sum-card-label  { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .sum-card-val    { font-family:'Playfair Display',serif; font-size:26px; font-weight:900; color:var(--text); }
    .sum-card.green .sum-card-val { color:var(--green); }
    .sum-card.red   .sum-card-val { color:var(--crimson); }
    .sum-card.amber .sum-card-val { color:var(--amber); }

    .inv-row { display:flex; align-items:center; gap:14px; padding:13px 20px; border-bottom:1px solid var(--border); font-size:13px; transition:background 0.1s; flex-wrap:wrap; }
    .inv-row:hover { background:var(--crimson-soft); }
    .inv-row:last-child { border-bottom:none; }

    .badge-cash  { background:#E8F5E9; color:#2E7D32; }
    .badge-click { background:#E3F2FD; color:#1565C0; }

    .tab-row { display:flex; gap:0; margin-bottom:20px; background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .tab-btn { flex:1; padding:11px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.14s; font-family:'DM Sans',sans-serif; }
    .tab-btn:hover { background:var(--crimson-soft); color:var(--crimson); }
    .tab-btn.active { color:var(--crimson); border-bottom-color:var(--crimson); background:var(--crimson-soft); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Finance</div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Payment</button>
    </div>
  </div>
  <div class="page-content">

    <div class="summary-row" id="summaryRow"></div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('Paid',this)">Paid</button>
      <button class="tab-btn" onclick="setTab('debtors',this)">Debtors</button>
    </div>

    <div class="toolbar" style="margin-bottom:16px">
      <div class="search-bar"><span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search student, group, level…" oninput="renderInvoices()">
      </div>
      <select id="filterLevel" onchange="renderInvoices()" style="width:auto;padding:9px 14px">
        <option value="">All Levels</option>
        <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
        <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
      </select>
      <span class="text-muted" id="invoiceCount" style="margin-left:auto"></span>
    </div>

    <div class="card">
      <div id="invoiceList"></div>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="width:520px">
    <div class="modal-header">
      <div class="modal-title" id="invModalTitle">New Payment</div>
      <button class="modal-close" onclick="closeModal('invoiceModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editInvId">

      <div class="form-row">
        <div class="form-group">
          <label>Student *</label>
          <select id="invStudent" onchange="onStudentChange()"><option value="">— Select —</option></select>
        </div>
        <div class="form-group">
          <label>Group</label>
          <select id="invGroup" onchange="onGroupChange()"><option value="">— Select —</option></select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="invLevel">
            <option value="">— Select —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Month *</label>
          <input type="month" id="invMonth">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Amount (UZS) *</label>
          <input type="number" id="invTotal" placeholder="0" min="0" step="1000">
        </div>
        <div class="form-group">
          <label>Payment Type *</label>
          <div style="display:flex;gap:10px;margin-top:4px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;border:1.5px solid var(--crimson);background:var(--crimson-soft);border-radius:8px;padding:10px 12px;transition:all 0.14s" id="typeCash">
              <input type="radio" name="payType" value="Cash" checked onchange="onPayType()">
              <span style="font-size:18px">💵</span>
              <span style="font-weight:700;font-size:14px">Cash</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;transition:all 0.14s" id="typeClick">
              <input type="radio" name="payType" value="Click" onchange="onPayType()">
              <span style="font-size:18px">📱</span>
              <span style="font-weight:700;font-size:14px">Click</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="invStatus"><option>Paid</option></select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="invDue">
        </div>
      </div>

      <div class="form-group"><label>Notes</label><textarea id="invNotes" placeholder="Any notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()">Save Payment</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('payments');
  renderSidebar('payments');

  const LEVEL_COLORS = {
    'RoundUp':'#FB8C00','Beginner':'#43A047','Elementary':'#E53935',
    'Pre-Intermediate':'#1E88E5','Intermediate':'#F9A825','CEFR':'#8E24AA','IELTS':'#00897B'
  };
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let invoices=[], students=[], groups=[];
  let currentTab = 'Paid';

  async function load() {
    try {
      [invoices, students, groups] = await Promise.all([
        apiGet('/api/invoices'), apiGet('/api/students'), apiGet('/api/groups')
      ]);
    } catch(e) {
      invoices=[]; students=[]; groups=[];
    }
    renderSummary();
    if (currentTab === 'debtors') renderDebtors();
    else renderInvoices();
  }

  function renderSummary() {
    const paid      = invoices.filter(i=>i.status==='Paid').reduce((s,i)=>s+Number(i.total||0),0);
    const debtors   = students.filter(s=>Number(s.balance||0)<0);
    const totalDebt = debtors.reduce((s,st)=>s+Math.abs(Number(st.balance||0)),0);
    const fmt = n => n.toLocaleString('uz-UZ') + ' UZS';
    document.getElementById('summaryRow').innerHTML = `
      <div class="sum-card green"><div class="sum-card-label">Paid Total</div><div class="sum-card-val">${fmt(paid)}</div></div>
      <div class="sum-card red"><div class="sum-card-label">Total Debt</div><div class="sum-card-val">${fmt(totalDebt)}</div></div>
      <div class="sum-card red"><div class="sum-card-label">Debtors</div><div class="sum-card-val">${debtors.length}</div></div>`;
  }

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'debtors') renderDebtors();
    else renderInvoices();
  }

  function renderInvoices() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fl = document.getElementById('filterLevel').value;

    const filtered = invoices.filter(i => {
      const stu  = students.find(s=>s.id===i.studentId);
      const name = stu ? (stu.firstName+' '+stu.lastName).toLowerCase() : '';
      const grp  = groups.find(g=>g.id===i.groupId);
      return i.status === currentTab
          && (!fl || i.level===fl)
          && (!q || name.includes(q) || (i.level||'').toLowerCase().includes(q) || (grp?.name||'').toLowerCase().includes(q));
    });

    document.getElementById('invoiceCount').textContent = `${filtered.length} payment${filtered.length!==1?'s':''}`;

    const STATUS_BADGE = { Paid:'badge-green', Pending:'badge-gold', Overdue:'badge-red' };
    const el = document.getElementById('invoiceList');

    if (!filtered.length) {
      el.innerHTML='<div class="empty-state"><div class="empty-icon">💳</div><p>No payments found.</p></div>';
      return;
    }

    el.innerHTML = filtered.map(i => {
      const stu  = students.find(s=>s.id===i.studentId);
      const name = stu ? stu.firstName+' '+stu.lastName : 'Unknown';
      const grp  = groups.find(g=>g.id===i.groupId);
      const col  = LEVEL_COLORS[i.level] || '#666';
      const monthLabel = i.month ? (() => { const [y,m]=i.month.split('-'); return MONTHS[Number(m)-1]+' '+y; })() : '—';
      const fmt  = n => Number(n||0).toLocaleString('uz-UZ') + ' UZS';

      return `<div class="inv-row">
        <div class="avatar" style="background:${avatarColor(name)};width:38px;height:38px;font-size:13px;flex-shrink:0">${initials(name)}</div>
        <div style="flex:1;min-width:120px">
          <div style="font-weight:700"><a href="student-profile.html?id=${stu?.id}" style="color:inherit;text-decoration:none">${name}</a></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
            ${grp ? `<span>👥 <a href="group.html?id=${grp.id}" style="color:inherit;text-decoration:none">${grp.name}</a></span>` : ''}
            ${i.level ? `<span style="color:${col};font-weight:600">${i.level}</span>` : ''}
            <span>📅 ${monthLabel}</span>
          </div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:900;white-space:nowrap">${fmt(i.total)}</div>
        <span class="badge ${i.paymentType==='Click'?'badge-click':'badge-cash'}">${i.paymentType==='Click'?'📱':'💵'} ${i.paymentType||'Cash'}</span>
        <span class="badge ${STATUS_BADGE[i.status]||'badge-grey'}">${i.status}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="editInvoice('${i.id}')">${IC.edit}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteInvoice('${i.id}')">${IC.trash}</button>
        </div>
      </div>`;
    }).join('');
  }

  function renderDebtors() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const debtors = students.filter(s => {
      const bal = Number(s.balance||0);
      if (bal >= 0) return false;
      const name = (s.firstName+' '+s.lastName).toLowerCase();
      return !q || name.includes(q) || (s.phone||'').includes(q);
    }).sort((a,b)=>Number(a.balance||0)-Number(b.balance||0));

    document.getElementById('invoiceCount').textContent = `${debtors.length} debtor${debtors.length!==1?'s':''}`;

    const el = document.getElementById('invoiceList');
    if (!debtors.length) {
      el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><p>No debtors found.</p></div>';
      return;
    }

    const fmt = n => Number(n||0).toLocaleString('uz-UZ') + ' UZS';
    el.innerHTML = debtors.map(s => {
      const name = s.firstName+' '+s.lastName;
      const bal  = Number(s.balance||0);
      return `<div class="inv-row">
        <div class="avatar" style="background:${avatarColor(name)};width:38px;height:38px;font-size:13px;flex-shrink:0">${initials(name)}</div>
        <div style="flex:1;min-width:120px">
          <div style="font-weight:700"><a href="student-profile.html?id=${s.id}" style="color:inherit;text-decoration:none">${name}</a></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${s.phone||''}</div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--crimson);white-space:nowrap">${fmt(Math.abs(bal))}</div>
        <a href="student-profile.html?id=${s.id}" class="btn btn-outline btn-sm">View Profile</a>
      </div>`;
    }).join('');
  }

  function openAdd() {
    clearForm();
    populateStudentSelect();
    populateGroupSelect();
    const now = new Date();
    document.getElementById('invMonth').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const due = new Date(now.getFullYear(), now.getMonth()+1, 0);
    document.getElementById('invDue').value = due.toISOString().split('T')[0];
    document.getElementById('invModalTitle').textContent = 'New Payment';
    openModal('invoiceModal');
  }

  function onStudentChange() {
    const sid = document.getElementById('invStudent').value;
    if (!sid) return;
    const grp = groups.find(g=>(g.studentIds||[]).includes(sid));
    if (grp) {
      document.getElementById('invGroup').value = grp.id;
      document.getElementById('invLevel').value = grp.level || '';
      if (grp.price) document.getElementById('invTotal').value = grp.price;
    }
  }

  function onGroupChange() {
    const gid = document.getElementById('invGroup').value;
    const grp = groups.find(g=>g.id===gid);
    if (grp) {
      if (grp.level) document.getElementById('invLevel').value = grp.level;
      if (grp.price) document.getElementById('invTotal').value = grp.price;
    }
  }

  function onPayType() {
    const val = document.querySelector('input[name="payType"]:checked')?.value;
    document.getElementById('typeCash').style.borderColor  = val==='Cash'  ? 'var(--crimson)' : 'var(--border)';
    document.getElementById('typeCash').style.background   = val==='Cash'  ? 'var(--crimson-soft)' : '';
    document.getElementById('typeClick').style.borderColor = val==='Click' ? 'var(--crimson)' : 'var(--border)';
    document.getElementById('typeClick').style.background  = val==='Click' ? 'var(--crimson-soft)' : '';
  }

  function editInvoice(id) {
    const i = invoices.find(i=>i.id===id); if(!i) return;
    clearForm();
    populateStudentSelect();
    populateGroupSelect();
    document.getElementById('editInvId').value   = id;
    document.getElementById('invStudent').value  = i.studentId||'';
    document.getElementById('invGroup').value    = i.groupId||'';
    document.getElementById('invLevel').value    = i.level||'';
    document.getElementById('invMonth').value    = i.month||'';
    document.getElementById('invTotal').value    = i.total||'';
    document.getElementById('invStatus').value   = 'Paid';
    document.getElementById('invDue').value      = i.dueDate?i.dueDate.split('T')[0]:'';
    document.getElementById('invNotes').value    = i.notes||'';
    const radio = document.querySelector(`input[name="payType"][value="${i.paymentType||'Cash'}"]`);
    if (radio) { radio.checked = true; onPayType(); }
    document.getElementById('invModalTitle').textContent = 'Edit Payment';
    openModal('invoiceModal');
  }

  async function saveInvoice() {
    const studentId = document.getElementById('invStudent').value;
    const month     = document.getElementById('invMonth').value;
    const total     = document.getElementById('invTotal').value;
    if (!studentId || !month || !total) { showToast('Student, month and amount are required.','error'); return; }
    const id = document.getElementById('editInvId').value;
    const level = document.getElementById('invLevel').value;
    const data = {
      studentId,
      groupId:     document.getElementById('invGroup').value||null,
      level:       level||null,
      month,
      total:       Number(total),
      status:      document.getElementById('invStatus').value,
      paymentType: document.querySelector('input[name="payType"]:checked')?.value||'Cash',
      dueDate:     document.getElementById('invDue').value||null,
      notes:       document.getElementById('invNotes').value.trim(),
      desc:        `${level||''}${month?' — '+month:''}`,
    };
    try {
      if (id) {
        await apiPut('/api/invoices/'+id, data);
        logActivity('Updated payment','');
      } else {
        data.id = genId();
        data.number = 'INV-'+Date.now().toString().slice(-6);
        await apiPost('/api/invoices', data);
        logActivity('Created payment','green');
      }
      closeModal('invoiceModal');
      await load();
      showToast(id?'Payment updated!':'Payment created!');
    } catch(e) { showToast('Error: '+e.message,'error'); }
  }

  async function quickPay(id, paymentType) {
    try {
      await apiPatch('/api/invoices/'+id+'/status', { status:'Paid', paymentType });
      logActivity(`Payment received via ${paymentType}`,'green');
      await load();
      showToast(`Marked as paid (${paymentType})!`);
    } catch(e) { showToast('Error: '+e.message,'error'); }
  }

  async function deleteInvoice(id) {
    if (!confirm('Delete this payment?')) return;
    await apiDelete('/api/invoices/'+id);
    await load();
    showToast('Deleted.','error');
  }

  function clearForm() {
    ['editInvId','invStudent','invGroup','invLevel','invMonth','invTotal','invDue','invNotes'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
    document.getElementById('invStatus').value='Paid';
    const cash=document.querySelector('input[name="payType"][value="Cash"]');
    if(cash){cash.checked=true;onPayType();}
  }

  function populateStudentSelect() {
    const sel = document.getElementById('invStudent');
    sel.innerHTML = '<option value="">— Select student —</option>' +
      students.filter(s=>s.status==='Active'||s.status==='Trial').map(s=>
        `<option value="${s.id}">${s.firstName} ${s.lastName}</option>`
      ).join('');
  }

  function populateGroupSelect() {
    const sel = document.getElementById('invGroup');
    sel.innerHTML = '<option value="">— Select group —</option>' +
      groups.map(g=>`<option value="${g.id}">${g.name}${g.level?' · '+g.level:''}</option>`).join('');
  }

  load();
</script>
</body>
</html>
