<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .perm-section-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 8px}
    .perm-section-title{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted)}
    .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .perm-chip{display:flex;align-items:center;gap:9px;border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all 0.13s;background:white;user-select:none}
    .perm-chip:hover{border-color:var(--crimson-light)}
    .perm-chip input{width:16px;height:16px;cursor:pointer;accent-color:var(--crimson);flex-shrink:0;margin:0}
    .perm-chip.on{border-color:var(--crimson);background:var(--crimson-soft)}
    .perm-chip-label{font-size:13px;font-weight:600;color:var(--text)}
    .perm-toggle-all{font-size:12px;font-weight:700;color:var(--crimson);background:none;border:none;cursor:pointer;padding:2px 4px}
    .perm-toggle-all:hover{text-decoration:underline}
    .sf-perms{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
    .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
    .sf-card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.15s,transform 0.15s}
    .sf-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
    .sf-banner{height:72px;background:linear-gradient(135deg,#1a1a2e,#16213e);position:relative}
    .sf-avatar{position:absolute;bottom:-28px;left:20px;width:56px;height:56px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:white}
    .sf-body{padding:36px 20px 16px}
    .sf-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--text)}
    .sf-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .sf-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Staff</div>
    <div class="topbar-right"><button class="btn btn-primary" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Staff</button></div>
  </div>
  <div class="page-content">
    <div class="staff-grid" id="userCards"></div>
  </div>
</div>

<div class="modal-overlay" id="userModal">
  <div class="modal" style="width:520px">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Add Staff Member</div>
      <button class="modal-close" onclick="closeModal('userModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="uFirst" placeholder="Tommy"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="uLast" placeholder="Smith"></div>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <div style="display:flex;align-items:center">
          <span style="padding:10px 14px;background:var(--crimson-soft);border:1.5px solid var(--border);border-right:none;border-radius:8px 0 0 8px;font-size:14px;color:var(--crimson-dark);font-weight:700">+998</span>
          <input type="tel" id="uPhone" placeholder="90 123 45 67" oninput="fmtPhone(this)" style="border-radius:0 8px 8px 0;border-left:none">
        </div>
      </div>
      <div class="form-group">
        <label>Password <span id="pwLabel" style="font-weight:400;text-transform:none;letter-spacing:0">*</span></label>
        <input type="password" id="uPassword" placeholder="Set a password">
        <div id="pwHint" style="font-size:12px;color:var(--muted);margin-top:5px;display:none">Leave blank to keep existing password.</div>
      </div>
      <div class="form-group">
        <label>Job title *</label>
        <input type="text" id="uTitle" placeholder="e.g. Manager, Front desk, Teacher" oninput="onTitleInput()">
      </div>

      <div id="teacherNote" style="display:none;background:var(--crimson-soft);border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.6">
        <strong>Teacher account — fixed access:</strong><br>
        • Dashboard — own groups only<br>
        • Students — own students only<br>
        • Groups — view &amp; mark attendance only
      </div>

      <div class="form-group" id="permSection">
        <div class="perm-section-head">
          <span class="perm-section-title">Page access <span style="font-weight:400;text-transform:none;letter-spacing:0">(can see &amp; manage)</span></span>
          <button type="button" class="perm-toggle-all" id="toggleAllBtn" onclick="toggleAllPerms()">Select all</button>
        </div>
        <div class="perm-grid" id="pagePerms"></div>
        <label class="perm-chip" id="financeViewOnlyRow" style="display:none;margin-top:2px">
          <input type="checkbox" id="financeViewOnly"><span class="perm-chip-label">Finance: view only (cannot record or edit payments)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('settings');
  renderSidebar('settings');

  const PAGE_PERMS = [
    ['dashboard','Dashboard'],['leads','Leads'],['students','Students'],['groups','Groups'],
    ['finance','Finance'],['teachers','Teachers'],['staff','Staff'],['actions','Actions'],
    ['classrooms','Classrooms'],['archived','Archived']
  ];
  const canManage = can('staff');

  let users = [];

  function fmtPhone(input) {
    let v=input.value.replace(/\D/g,'').slice(0,9),o='';
    if(v.length>0)o+=v.slice(0,2);if(v.length>2)o+=' '+v.slice(2,5);if(v.length>5)o+=' '+v.slice(5,7);if(v.length>7)o+=' '+v.slice(7,9);
    input.value=o;
  }

  function isTeacherTitle() { return document.getElementById('uTitle').value.trim().toLowerCase()==='teacher'; }
  function onTitleInput() {
    const t = isTeacherTitle();
    document.getElementById('teacherNote').style.display = t ? '' : 'none';
    document.getElementById('permSection').style.display = t ? 'none' : '';
  }

  function buildPermChips() {
    document.getElementById('pagePerms').innerHTML = PAGE_PERMS.map(([key,label]) =>
      `<label class="perm-chip" data-key="${key}"><input type="checkbox" value="${key}" onchange="onPermChange(this)"><span class="perm-chip-label">${label}</span></label>`).join('');
  }
  function onPermChange(cb) {
    cb.closest('.perm-chip').classList.toggle('on', cb.checked);
    if (cb.value==='finance') document.getElementById('financeViewOnlyRow').style.display = cb.checked ? '' : 'none';
    syncToggleAllLabel();
  }
  function setPerms(list) {
    const set = new Set(list||[]);
    document.querySelectorAll('#pagePerms input').forEach(cb => {
      cb.checked = set.has(cb.value);
      cb.closest('.perm-chip').classList.toggle('on', cb.checked);
    });
    const fvo = document.getElementById('financeViewOnly');
    fvo.checked = set.has('finance_view_only');
    document.getElementById('financeViewOnlyRow').style.display = set.has('finance') ? '' : 'none';
    document.getElementById('financeViewOnlyRow').classList.toggle('on', fvo.checked);
    syncToggleAllLabel();
  }
  function getPerms() {
    const list = [...document.querySelectorAll('#pagePerms input:checked')].map(cb=>cb.value);
    if (list.includes('finance') && document.getElementById('financeViewOnly').checked) list.push('finance_view_only');
    return list;
  }
  function toggleAllPerms() {
    const boxes = [...document.querySelectorAll('#pagePerms input')];
    const allOn = boxes.every(cb=>cb.checked);
    boxes.forEach(cb => { cb.checked = !allOn; cb.closest('.perm-chip').classList.toggle('on', !allOn); });
    document.getElementById('financeViewOnlyRow').style.display = !allOn ? '' : 'none';
    syncToggleAllLabel();
  }
  function syncToggleAllLabel() {
    const boxes = [...document.querySelectorAll('#pagePerms input')];
    document.getElementById('toggleAllBtn').textContent = boxes.length && boxes.every(cb=>cb.checked) ? 'Clear all' : 'Select all';
  }

  async function load() { users = await apiGet('/api/users'); renderUsers(); }

  function renderUsers() {
    const session = getSession();
    const el = document.getElementById('userCards');
    if (!users.length) { el.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👥</div><p>No staff found.</p></div>'; return; }
    el.innerHTML = users.map(u => {
      const name = u.firstName+' '+u.lastName;
      const col  = avatarColor(name);
      const isMe = session && session.id === u.id;
      const perms = u.permissions || [];
      const teacher = String(u.title||'').trim().toLowerCase()==='teacher';
      const pages = perms.filter(p=>p!=='finance_view_only');
      const summary = teacher ? 'Teacher — own groups only'
        : (pages.length ? `${pages.length} section${pages.length!==1?'s':''}${perms.includes('finance_view_only')?' · finance view-only':''}` : 'No access yet');
      return `<div class="sf-card">
        <div class="sf-banner"><div class="sf-avatar" style="background:${col}">${initials(name)}</div></div>
        <div class="sf-body">
          <div class="sf-name">${name} ${isMe?'<span style="font-size:11px;color:var(--muted);font-family:Inter,sans-serif;font-weight:400">(you)</span>':''}</div>
          <div class="sf-meta">
            ${u.phone?`<span>📞 +998 ${u.phone}</span>`:''}
            <span style="background:var(--surface);color:var(--muted);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700">${u.title||u.role}</span>
          </div>
          <div class="sf-perms">🔑 ${summary}</div>
        </div>
        <div class="sf-footer">
          ${canManage ? `<button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">${IC.edit} Edit</button>
          ${!isMe?`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">${IC.trash}</button>`:''}` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function openAdd() {
    clearForm(); document.getElementById('userModalTitle').textContent='Add Staff Member';
    setPerms(['dashboard']);
    openModal('userModal');
  }

  function editUser(id) {
    const u=users.find(u=>u.id===id); if(!u) return;
    clearForm();
    document.getElementById('editUserId').value=id;
    document.getElementById('uFirst').value=u.firstName;
    document.getElementById('uLast').value=u.lastName;
    document.getElementById('uPhone').value=u.phone||'';
    document.getElementById('uTitle').value=u.title||u.role||'';
    setPerms(u.permissions||[]);
    onTitleInput();
    document.getElementById('pwHint').style.display='block';
    document.getElementById('pwLabel').textContent='(optional)';
    document.getElementById('userModalTitle').textContent='Edit Staff Member';
    openModal('userModal');
  }

  async function saveUser() {
    const first=document.getElementById('uFirst').value.trim();
    const last =document.getElementById('uLast').value.trim();
    const phone=document.getElementById('uPhone').value.trim();
    const pass =document.getElementById('uPassword').value;
    const title=document.getElementById('uTitle').value.trim();
    const teacher=title.toLowerCase()==='teacher';
    const permissions=teacher?['dashboard','students','groups']:getPerms();
    const id   =document.getElementById('editUserId').value;
    if(!first||!last){showToast('Name required.','error');return;}
    if(!phone){showToast('Phone required.','error');return;}
    if(!title){showToast('Job title required.','error');return;}
    if(!id&&!pass){showToast('Password required.','error');return;}
    if(!teacher&&!permissions.length){showToast('Select at least one permission.','error');return;}
    const data={firstName:first,lastName:last,phone,title,permissions};
    if(pass)data.password=pass;
    try {
      if(id){await apiPut('/api/users/'+id,data);logActivity(`Updated staff: ${first} ${last}`,'');}
      else{data.id=genId();await apiPost('/api/users',data);logActivity(`Added staff: ${first} ${last}`,'green');}
      closeModal('userModal'); await load(); showToast(id?'Updated!':'Staff added!');
    } catch(e){showToast(e.message||'Error saving.','error');}
  }

  async function deleteUser(id) {
    const u=users.find(u=>u.id===id);
    if(!confirm(`Delete ${u?.firstName} ${u?.lastName}?`))return;
    try {
      await apiDelete('/api/users/'+id);
      logActivity(`Removed staff: ${u?.firstName} ${u?.lastName}`,'red');
      await load(); showToast('Deleted.','error');
    } catch(e){ showToast(e.message||'Error deleting.','error'); }
  }

  function clearForm() {
    ['editUserId','uFirst','uLast','uPhone','uPassword','uTitle'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('financeViewOnly').checked=false;
    setPerms([]);
    onTitleInput();
    document.getElementById('pwHint').style.display='none';
    document.getElementById('pwLabel').textContent='*';
  }

  buildPermChips();
  if (!canManage) document.querySelector('.topbar-right').style.display='none';
  load();
</script>
</body>
</html>
