<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .perm-section-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 8px}
    .perm-section-title{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted)}
    .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .perm-chip{display:flex;align-items:center;gap:9px;border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:all 0.13s;background:white;user-select:none}
    .perm-chip:hover{border-color:var(--crimson-light)}
    .perm-chip input{width:16px;height:16px;cursor:pointer;accent-color:var(--crimson);flex-shrink:0;margin:0}
    .perm-chip.on{border-color:var(--crimson);background:var(--crimson-soft)}
    .perm-chip-label{font-size:13px;font-weight:600;color:var(--text)}
    .perm-toggle-all{font-size:12px;font-weight:700;color:var(--crimson);background:none;border:none;cursor:pointer;padding:2px 4px}
    .perm-toggle-all:hover{text-decoration:underline}
    .sf-perms{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
    .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .sf-card{background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column}
    .sf-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}

    /* Banner + avatar */
    .sf-banner{height:80px;position:relative;flex-shrink:0}
    .sf-banner-bg{position:absolute;inset:0;opacity:.18}
    .sf-avatar-wrap{position:absolute;bottom:-22px;left:20px}
    .sf-avatar{width:52px;height:52px;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:white;box-shadow:0 2px 8px rgba(0,0,0,.18)}

    /* Body */
    .sf-body{padding:30px 20px 14px;flex:1}
    .sf-name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
    .sf-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
    .sf-you{font-size:10px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 7px;white-space:nowrap;margin-top:2px;flex-shrink:0}
    .sf-roles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .sf-role-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
    .sf-phone{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);margin-bottom:8px}
    .sf-phone svg{color:var(--muted);flex-shrink:0}
    .sf-perms-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--muted);line-height:1.5}

    /* Footer */
    .sf-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;background:#fafafa;border-radius:0 0 16px 16px}

    /* Shift fields */
    .shift-row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;margin-top:8px;flex-wrap:wrap}
    .shift-toggle{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--text);text-transform:none;letter-spacing:0;margin:0;cursor:pointer}
    .shift-toggle span{font-size:11px;font-weight:500;color:var(--muted)}
    .shift-toggle input{width:16px;height:16px;accent-color:var(--crimson);cursor:pointer}
    .shift-times{display:flex;align-items:center;gap:6px}
    .shift-times select{width:auto;padding:6px 8px}
    .shift-times span{color:var(--muted)}
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    @media(max-width:640px){
      .users-grid{grid-template-columns:1fr !important;gap:10px}
      .user-card-footer{flex-wrap:wrap}
      .user-card-footer .btn{flex:1;justify-content:center}
      .topbar-right .btn span { display:none; }
    }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Staff</div>
    <div class="topbar-right">
      <button class="btn btn-outline" id="backupBtn" onclick="downloadBackup()" style="display:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> <span>Download Backup</span></button>
      <button class="btn btn-primary" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> <span>Add Staff</span></button>
    </div>
  </div>
  <div class="page-content">
<div class="staff-grid" id="userCards"></div>
  </div>
</div>

<div class="modal-overlay" id="userModal">
  <div class="modal" style="width:520px">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Add Staff Member</div>
      <button class="modal-close" onclick="closeModal('userModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-row">
        <div class="form-group"><label>Last Name *</label><input type="text" id="uLast" placeholder="Smith"></div>
        <div class="form-group"><label>First Name *</label><input type="text" id="uFirst" placeholder="Tommy"></div>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <div style="display:flex;align-items:center">
          <span style="padding:10px 14px;background:var(--crimson-soft);border:1.5px solid var(--border);border-right:none;border-radius:8px 0 0 8px;font-size:14px;color:var(--crimson-dark);font-weight:700">+998</span>
          <input type="tel" id="uPhone" placeholder="90 123 45 67" oninput="fmtPhone(this)" style="border-radius:0 8px 8px 0;border-left:none">
        </div>
      </div>
      <div class="form-group">
        <label>Password <span id="pwLabel" style="font-weight:400;text-transform:none;letter-spacing:0">*</span></label>
        <input type="password" id="uPassword" placeholder="At least 8 digits">
        <div style="font-size:12px;color:var(--muted);margin-top:5px">At least 8 digits. The user must change it on first login.</div>
        <div id="pwHint" style="font-size:12px;color:var(--muted);margin-top:5px;display:none">Leave blank to keep existing password.</div>
      </div>
      <div class="form-group">
        <label>Roles * <span style="font-weight:400;font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0">(select one or more)</span></label>
        <div id="roleCheckboxes" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <label class="perm-chip" id="rchk_CEO" style="${amHeadAdminOnly?'display:none':''}"><input type="checkbox" value="CEO" onchange="onRoleChange()"> <span class="perm-chip-label">CEO</span></label>
          <label class="perm-chip" id="rchk_HeadAdmin" style="${amHeadAdminOnly?'display:none':''}"><input type="checkbox" value="Head Admin" onchange="onRoleChange()"> <span class="perm-chip-label">Head Admin</span></label>
          <label class="perm-chip" id="rchk_Manager" style="${amHeadAdminOnly?'display:none':''}"><input type="checkbox" value="Manager" onchange="onRoleChange()"> <span class="perm-chip-label">Manager</span></label>
          <label class="perm-chip" id="rchk_Admin"><input type="checkbox" value="Admin" onchange="onRoleChange()"> <span class="perm-chip-label">Admin</span></label>
          <label class="perm-chip" id="rchk_Teacher"><input type="checkbox" value="Teacher" onchange="onRoleChange()"> <span class="perm-chip-label">Teacher</span></label>
          <label class="perm-chip" id="rchk_SupportTeacher"><input type="checkbox" value="Support Teacher" onchange="onRoleChange()"> <span class="perm-chip-label">Support Teacher</span></label>
        </div>
        <div id="roleDesc" style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:8px;display:none"></div>
      </div>
      <div id="supportShiftFields" style="display:none">
        <label>Working shifts *</label>
        <div class="shift-row">
          <label class="shift-toggle"><input type="checkbox" id="uOddOn" onchange="toggleShift('Odd')"> Odd <span>Mon·Wed·Fri</span></label>
          <div class="shift-times"><select id="uOddStart"></select><span>–</span><select id="uOddEnd"></select></div>
        </div>
        <div class="shift-row">
          <label class="shift-toggle"><input type="checkbox" id="uEvenOn" onchange="toggleShift('Even')"> Even <span>Tue·Thu·Sat</span></label>
          <div class="shift-times"><select id="uEvenStart"></select><span>–</span><select id="uEvenEnd"></select></div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Tick the days the teacher works and set hours for each.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('settings');
  renderSidebar('settings');

  const ROLE_DESC = {
    'CEO': 'Full access to everything.',
    'Head Admin': 'Everything except Actions. Finance is view-only (cannot record or edit payments).',
    'Manager': 'Everything except Actions.',
    'Admin': 'Dashboard, Leads, Students, Groups, Teachers. Cannot see Finance, Staff, Archived, Actions or Classrooms.',
    'Teacher': 'Own groups only — Dashboard, own Students, and Groups (view & mark attendance).',
    'Support Teacher': 'Sees only their own Support timetable. Cannot change anything.'
  };
  const canManage = can('staff');
  const HEAD_ADMIN_ALLOWED = ['Teacher','Support Teacher','Admin'];
  const myRoles = (getSession()?.roles || [getSession()?.title || '']).filter(Boolean);
  const amHeadAdminOnly = myRoles.includes('Head Admin') && !myRoles.includes('CEO');
  function canManageUser(targetRoles) {
    if (!canManage) return false;
    if (amHeadAdminOnly) return targetRoles.every(r => HEAD_ADMIN_ALLOWED.includes(r));
    return true;
  }

  let users = [];

  function fmtPhone(input) {
    let v=input.value.replace(/\D/g,'').slice(0,9),o='';
    if(v.length>0)o+=v.slice(0,2);if(v.length>2)o+=' '+v.slice(2,5);if(v.length>5)o+=' '+v.slice(5,7);if(v.length>7)o+=' '+v.slice(7,9);
    input.value=o;
  }

  function buildTimeOpts(sel, val){
    let o=''; for(let m=8*60;m<=21*60+30;m+=30){const hh=String(Math.floor(m/60)).padStart(2,'0'),mm=String(m%60).padStart(2,'0');o+=`<option>${hh}:${mm}</option>`;}
    sel.innerHTML=o; if(val) sel.value=val;
  }
  function toggleShift(kind){
    const on = document.getElementById('u'+kind+'On').checked;
    document.getElementById('u'+kind+'Start').disabled = !on;
    document.getElementById('u'+kind+'End').disabled = !on;
  }
  function getSelectedRoles() {
    return [...document.querySelectorAll('#roleCheckboxes input[type=checkbox]:checked')].map(c => c.value);
  }
  function setSelectedRoles(roles) {
    document.querySelectorAll('#roleCheckboxes input[type=checkbox]').forEach(c => {
      c.checked = roles.includes(c.value);
      c.closest('.perm-chip').classList.toggle('on', roles.includes(c.value));
    });
    onRoleChange();
  }
  function onRoleChange() {
    document.querySelectorAll('#roleCheckboxes input[type=checkbox]').forEach(c => {
      c.closest('.perm-chip').classList.toggle('on', c.checked);
    });
    const roles = getSelectedRoles();
    const desc = document.getElementById('roleDesc');
    if (roles.length === 1) {
      desc.textContent = ROLE_DESC[roles[0]] || '';
      desc.style.display = '';
    } else if (roles.length > 1) {
      desc.textContent = 'Combined access from: ' + roles.join(', ') + '.';
      desc.style.display = '';
    } else {
      desc.style.display = 'none';
    }
    document.getElementById('supportShiftFields').style.display = roles.includes('Support Teacher') ? '' : 'none';
  }

  async function load() { users = await apiGet('/api/users'); renderUsers(); }

  function renderUsers() {
    const session = getSession();
    const el = document.getElementById('userCards');
    if (!users.length) { el.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👥</div><p>No staff found.</p></div>'; return; }
    el.innerHTML = users.map(u => {
      const name  = u.lastName+' '+u.firstName;
      const col   = avatarColor(name);
      const isMe  = session && session.id === u.id;
      const roles = u.roles && u.roles.length ? u.roles : [u.title||u.role||'Admin'];
      const summary = roles.length === 1
        ? (ROLE_DESC[roles[0]] || roles[0])
        : 'Combined access from: ' + roles.join(', ') + '.';
      const rolePillColor = r => {
        if(r==='CEO')           return 'background:#fef3c7;color:#92400e';
        if(r==='Head Admin')    return 'background:#ede9fe;color:#5b21b6';
        if(r==='Manager')       return 'background:#dbeafe;color:#1e40af';
        if(r==='Admin')         return 'background:#dcfce7;color:#166534';
        if(r==='Teacher')       return 'background:#ffedd5;color:#9a3412';
        if(r==='Support Teacher') return 'background:#fce7f3;color:#9d174d';
        return 'background:var(--bg);color:var(--muted)';
      };
      return `<div class="sf-card">
        <div class="sf-banner">
          <div class="sf-banner-bg" style="background:${col}"></div>
          <div style="position:absolute;inset:0;background:linear-gradient(135deg,${col}55,${col}22)"></div>
          <div class="sf-avatar-wrap">
            <div class="sf-avatar" style="background:${col}">${initials(name)}</div>
          </div>
        </div>
        <div class="sf-body">
          <div class="sf-name-row">
            <div class="sf-name">${name}</div>
            ${isMe ? '<span class="sf-you">you</span>' : ''}
          </div>
          <div class="sf-roles">
            ${roles.map(r=>`<span class="sf-role-pill" style="${rolePillColor(r)}">${r}</span>`).join('')}
          </div>
          ${u.phone ? `<div class="sf-phone"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.83a16 16 0 0 0 6.29 6.29l1.7-1.71a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>+998 ${u.phone}</div>` : ''}
          <div class="sf-perms-box">${summary}</div>
        </div>
        <div class="sf-footer">
          ${canManageUser(roles) ? `<button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">${IC.edit} Edit</button>${!isMe?`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">${IC.trash}</button>`:''}` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function openAdd() {
    clearForm(); document.getElementById('userModalTitle').textContent='Add Staff Member';
    openModal('userModal');
  }

  function editUser(id) {
    const u=users.find(u=>u.id===id); if(!u) return;
    clearForm();
    document.getElementById('editUserId').value=id;
    document.getElementById('uFirst').value=u.firstName;
    document.getElementById('uLast').value=u.lastName;
    document.getElementById('uPhone').value=u.phone||'';
    const existingRoles = u.roles && u.roles.length ? u.roles : [u.title||u.role||'Admin'];
    setSelectedRoles(existingRoles);
    document.getElementById('uOddOn').checked=!!u.oddStart;
    document.getElementById('uEvenOn').checked=!!u.evenStart;
    buildTimeOpts(document.getElementById('uOddStart'), u.oddStart||'09:00');
    buildTimeOpts(document.getElementById('uOddEnd'), u.oddEnd||'12:30');
    buildTimeOpts(document.getElementById('uEvenStart'), u.evenStart||'14:00');
    buildTimeOpts(document.getElementById('uEvenEnd'), u.evenEnd||'18:30');
    toggleShift('Odd'); toggleShift('Even');
    document.getElementById('pwHint').style.display='block';
    document.getElementById('pwLabel').textContent='(optional)';
    document.getElementById('userModalTitle').textContent='Edit Staff Member';
    openModal('userModal');
  }

  async function saveUser() {
    const first=document.getElementById('uFirst').value.trim();
    const last =document.getElementById('uLast').value.trim();
    const phone=document.getElementById('uPhone').value.trim();
    const pass =document.getElementById('uPassword').value;
    const roles=getSelectedRoles();
    const id   =document.getElementById('editUserId').value;
    if(!first||!last){showToast('Name required.','error');return;}
    if(!phone){showToast('Phone required.','error');return;}
    if(!roles.length){showToast('Select at least one role.','error');return;}
    if(!id&&!pass){showToast('Password required.','error');return;}
    if(pass && ((pass.match(/\d/g)||[]).length<8)){showToast('Password must contain at least 8 digits.','error');return;}
    const data={firstName:first,lastName:last,phone,roles};
    if(roles.includes('Support Teacher')){
      const odd=document.getElementById('uOddOn').checked, even=document.getElementById('uEvenOn').checked;
      if(!odd&&!even){showToast('Select at least one working shift (odd or even).','error');return;}
      if(odd){ data.oddStart=document.getElementById('uOddStart').value; data.oddEnd=document.getElementById('uOddEnd').value; if(data.oddStart>=data.oddEnd){showToast('Odd shift end must be after start.','error');return;} }
      if(even){ data.evenStart=document.getElementById('uEvenStart').value; data.evenEnd=document.getElementById('uEvenEnd').value; if(data.evenStart>=data.evenEnd){showToast('Even shift end must be after start.','error');return;} }
    }
    if(pass)data.password=pass;
    try {
      if(id){await apiPut('/api/users/'+id,data);logActivity(`Updated staff: ${first} ${last}`,'');}
      else{data.id=genId();await apiPost('/api/users',data);logActivity(`Added staff: ${first} ${last}`,'green');}
      closeModal('userModal'); await load(); showToast(id?'Updated!':'Staff added!');
    } catch(e){showToast(e.message||'Error saving.','error');}
  }

  async function deleteUser(id) {
    const u=users.find(u=>u.id===id);
    if(!confirm(`Delete ${u?.lastName} ${u?.firstName}?`))return;
    try {
      await apiDelete('/api/users/'+id);
      logActivity(`Removed staff: ${u?.lastName} ${u?.firstName}`,'red');
      await load(); showToast('Deleted.','error');
    } catch(e){ showToast(e.message||'Error deleting.','error'); }
  }

  function clearForm() {
    ['editUserId','uFirst','uLast','uPhone','uPassword'].forEach(id=>document.getElementById(id).value='');
    setSelectedRoles(['Admin']);
    document.getElementById('uOddOn').checked=false; document.getElementById('uEvenOn').checked=false;
    buildTimeOpts(document.getElementById('uOddStart'),'09:00');
    buildTimeOpts(document.getElementById('uOddEnd'),'12:30');
    buildTimeOpts(document.getElementById('uEvenStart'),'14:00');
    buildTimeOpts(document.getElementById('uEvenEnd'),'18:30');
    toggleShift('Odd'); toggleShift('Even');
    document.getElementById('pwHint').style.display='none';
    document.getElementById('pwLabel').textContent='*';
  }

  if (!canManage) document.querySelector('.topbar-right').style.display='none';
  if (myRoles.includes('CEO')) document.getElementById('backupBtn').style.display='';
  load();
  setupLive(['users'], () => load());

  async function downloadBackup() {
    const btn = document.getElementById('backupBtn');
    btn.disabled = true;
    try {
      const res = await fetch('/api/backup', { headers: authHeaders() });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || res.statusText); }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tommylc-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast('Backup downloaded.');
    } catch(e) { showToast('Error: '+e.message, 'error'); }
    finally { btn.disabled = false; }
  }
</script>
</body>
</html>
