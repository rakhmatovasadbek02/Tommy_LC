<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — TommyLC CRM</title>
<link rel="stylesheet" href="shared.css">
<style>
.welcome-banner {
background: linear-gradient(135deg, #990000 0%, #CC0000 100%);
border-radius: var(--radius);
padding: 24px 32px;
margin-bottom: 24px;
display: flex;
align-items: center;
justify-content: space-between;
position: relative;
overflow: hidden;
}
.welcome-banner::after {
content: '';
position: absolute; right: 28px; top: 50%;
transform: translateY(-50%);
font-size: 72px; opacity: 0.08;
}
.welcome-banner h2 { font-family: 'Inter', sans-serif; font-size: 22px; color: white; margin-bottom: 3px; }
.welcome-banner p { color: rgba(255,255,255,0.6); font-size: 13px; }
.date-chip {
background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.92);
padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 500; white-space: nowrap;
}
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-box {
background: white; border-radius: var(--radius); border: 1px solid var(--border);
padding: 20px 24px; min-width: 0; position: relative;
overflow: hidden; cursor: default; transition: box-shadow 0.16s, transform 0.16s;
}
.stat-box:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.stat-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--crimson); }
.stat-box.green::before { background: var(--green); }
.stat-box.blue::before { background: var(--blue); }
.stat-box.amber::before { background: var(--amber); }
.stat-box.purple::before { background: #7C3AED; }
.stat-box-icon { position: absolute; top: 16px; right: 16px; font-size: 26px; opacity: 0.11; }
.stat-box-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.stat-box-value { font-family: 'Inter', sans-serif; font-size: 36px; color: var(--text); line-height: 1; }
.stat-box-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.timetable-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.timetable-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 900; color: var(--text); }
.day-tabs { display: flex; gap: 4px; }
.day-tab {
padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
border: 1.5px solid var(--border); background: white; color: var(--muted);
cursor: pointer; transition: all 0.14s; font-family: 'Inter', sans-serif;
}
.day-tab:hover { border-color: var(--crimson); color: var(--crimson); }
.day-tab.active { background: var(--crimson); color: white; border-color: var(--crimson); }
.custom-day-row { display: none; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.custom-day-row.show { display: flex; }
.cday-chip input[type="radio"] { display: none; }
.cday-chip span {
display: inline-flex; align-items: center; justify-content: center;
width: 44px; height: 34px; border: 1.5px solid var(--border); border-radius: 7px;
font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.14s; background: white; color: var(--muted);
}
.cday-chip input:checked + span { background: var(--crimson); color: white; border-color: var(--crimson); }
.cday-chip span:hover { border-color: var(--crimson); color: var(--crimson); }
.cday-chip input:checked + span:hover { color: white; }
.timetable-wrap { background: white; border: 1px solid #e0a0a0; border-radius: var(--radius); overflow: auto; box-shadow: var(--shadow); }
.dashboard-topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
.dashboard-topbar .topbar-right { justify-content: flex-end; }
.sup-datenav { display: flex; align-items: center; gap: 4px; border: 1.5px solid var(--border); border-radius: 8px; background: white; overflow: hidden; }
.sup-datenav button { border: none; background: none; cursor: pointer; font-size: 18px; line-height: 1; color: var(--crimson); padding: 7px 12px; font-family: 'Inter', sans-serif; }
.sup-datenav button:hover { background: var(--crimson-soft); }
.sup-datenav span { font-size: 13px; font-weight: 700; color: var(--text); min-width: 92px; text-align: center; }
.dur-seg { display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.dur-seg button { flex: 1; border: none; background: white; cursor: pointer; padding: 9px 12px; font-size: 13px; font-weight: 600; color: var(--muted); font-family: 'Inter', sans-serif; transition: all 0.14s; }
.dur-seg button:first-child { border-right: 1.5px solid var(--border); }
.dur-seg button.active { background: var(--crimson); color: white; }
.sp-result { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; }
.sp-result:hover { background: var(--crimson-soft); }
.sup-cell:hover { background: var(--crimson-soft); }
@media(max-width:900px){
  .timetable-section { flex-direction:column !important; }
  .timetable-section > div { width:100% !important; }
}
.nums-hidden .stat-box-value { filter:blur(8px); user-select:none; pointer-events:none; }
@media(max-width:640px){
  .welcome-banner { padding:14px 16px !important; }
  .welcome-banner h2 { font-size:16px !important; }
  .stat-row { display:grid !important; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-box { min-width:0 !important; }
}
</style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
<div class="topbar dashboard-topbar">
<div class="page-title">Dashboard</div>
<div style="width:320px;position:relative;">
<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;display:flex"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
<input type="text" id="globalSearch" placeholder="Search…"
style="width:100%;padding:9px 14px 9px 38px;border-radius:24px;border:1.5px solid var(--border);font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border-color 0.15s;"
oninput="searchStudents(this.value)"
onfocus="this.style.borderColor='var(--crimson)'"
onblur="this.style.borderColor='var(--border)'">
<div id="searchDropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:999;max-height:320px;overflow-y:auto;"></div>
</div>
<div class="topbar-right">
  <button id="hideNumsBtn" onclick="toggleHideNums()" class="btn btn-outline btn-sm" title="Hide numbers">
    <svg id="hideNumsIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    <span id="hideNumsLabel">Hide</span>
  </button>
</div>
</div>
<div class="page-content">
<div class="welcome-banner">
<div>
<h2 id="welcomeMsg">Good morning </h2>
<p>Here's what's happening at Tommy Learning Center today.</p>
</div>
<div class="date-chip" id="dateBadge"></div>
</div>
<div class="stat-row" id="statRow"></div>
<div class="timetable-header">
<div class="timetable-title">Timetable</div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
<div class="day-tabs">
<button class="day-tab active" onclick="setDayTab('odd',this)">Odd Days</button>
<button class="day-tab" onclick="setDayTab('even',this)">Even Days</button>
<button class="day-tab" onclick="setDayTab('custom',this)">Custom</button>
</div>
<a href="groups.html" class="btn btn-outline btn-sm">All Groups <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
</div>
</div>
<div class="custom-day-row" id="customDayRow">
<span style="font-size:12px;font-weight:700;color:var(--muted);margin-right:4px">Day:</span>
<label class="cday-chip"><input type="radio" name="customDay" value="1" onchange="renderTimetable()"><span>Mon</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="2" onchange="renderTimetable()"><span>Tue</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="3" onchange="renderTimetable()"><span>Wed</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="4" onchange="renderTimetable()"><span>Thu</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="5" onchange="renderTimetable()"><span>Fri</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="6" onchange="renderTimetable()"><span>Sat</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="0" onchange="renderTimetable()"><span>Sun</span></label>
</div>
<div class="timetable-wrap">
<div id="ttGrid"></div>
</div>

<div class="timetable-header" id="supportHeader" style="margin-top:34px">
<div class="timetable-title">Support</div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
<div class="sup-datenav">
<button type="button" onclick="supportDay(-1)" aria-label="Previous day">‹</button>
<span id="supportDateLabel"></span>
<button type="button" onclick="supportDay(1)" aria-label="Next day">›</button>
</div>
<button class="btn btn-primary btn-sm" id="addSupportBtn" onclick="openSupport()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add session</button>
</div>
</div>
<div class="timetable-wrap">
<div id="supportGrid"></div>
</div>
</div>
</div>

<!-- SUPPORT SESSION MODAL -->
<div class="modal-overlay" id="supportModal">
<div class="modal" style="width:460px">
<div class="modal-header">
<div class="modal-title">Add support session</div>
<button class="modal-close" onclick="closeModal('supportModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>
<div class="modal-body">
<div class="form-group"><label>Support teacher *</label><select id="spTeacher" onchange="onSupTeacherChange()"><option value="">— Select —</option></select></div>
<div class="form-group" style="position:relative">
<label>Student *</label>
<input type="text" id="spStudentSearch" placeholder="Search student…" autocomplete="off" oninput="spSearchStudents(this.value)" onfocus="spSearchStudents(this.value)">
<input type="hidden" id="spStudentId">
<div id="spStudentResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);z-index:5;max-height:220px;overflow-y:auto;margin-top:4px"></div>
</div>
<div class="form-row">
<div class="form-group">
<label>Time *</label>
<select id="spTime"></select>
</div>
<div class="form-group">
<label>Duration *</label>
<div class="dur-seg" id="spDurSeg">
<button type="button" class="active" onclick="setDur(30,this)">30 min</button>
<button type="button" onclick="setDur(60,this)">60 min</button>
</div>
</div>
</div>
<div id="spGroupInfo" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:12px;font-size:13px">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
    <div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Group</div><div style="font-weight:600" id="spGroupName">—</div></div>
    <div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Level</div><div style="font-weight:600" id="spGroupLevel">—</div></div>
    <div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Teacher</div><div style="font-weight:600" id="spGroupTeacher">—</div></div>
    <div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Current Unit</div><div style="font-weight:600" id="spGroupUnit">—</div></div>
  </div>
</div>
<div class="form-group"><label>Support Theme *</label><input type="text" id="spTheme" placeholder="e.g. Past Simple exercises, Unit 3 vocabulary…"></div>
</div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeModal('supportModal')">Cancel</button>
<button class="btn btn-primary" onclick="saveSupport()">Save session</button>
</div>
</div>
</div>
<div class="toast-container" id="toastContainer"></div>

<!-- Absent Today Modal -->
<div class="modal-overlay" id="absentModal">
  <div class="modal" style="width:min(520px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Absent Today</div>
      <button class="modal-close" onclick="closeModal('absentModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="absentList" style="max-height:420px;overflow-y:auto"></div>
  </div>
</div>
<script src="shared.js"></script>
<script>
requireAuth('dashboard');
// Pure support teachers (no teacher role) belong on support.html
if (isSupportTeacher() && !isTeacher()) { window.location.replace('support.html'); }
renderSidebar('dashboard');
const session = getSession();
const role = getRole();
const now = new Date();
function tickClock() {
const d = new Date();
const date = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
const time = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
const el = document.getElementById('dateBadge');
if (el) el.textContent = `${time} · ${date}`;
}
tickClock(); setInterval(tickClock, 1000);
const firstName = session ? session.name.split(' ')[0] : 'there';
const hour = now.getHours();
const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
document.getElementById('welcomeMsg').textContent = `${t(greeting)}, ${firstName} `;
const STAT_DEFS = [
{ id:'statActive', label:'Active Students', icon:'', color:'', perm:'students', calc:()=>S().activeStudents, sub:'currently enrolled', link:'students.html' },
{ id:'statDebtors', label:'Debtors', icon:'️', color:'red', perm:'finance', calc:()=>S().debtors, sub:'negative balance', link:'finance.html' },
{ id:'statPaid', label:'Paid', icon:'', color:'green', perm:'finance', calc:()=>S().paidCount, sub:'invoices settled', link:'finance.html' },
{ id:'statLead', label:'Leads', icon:'', color:'purple', perm:'leads', calc:()=>S().leads, sub:'in pipeline', link:'leads.html' },
{ id:'statTrial', label:'Trial', icon:'', color:'amber', perm:'leads', calc:()=>S().trial, sub:'on trial period', link:'leads.html' },
{ id:'statAbsent', label:'Absent Today', icon:'', color:'red', perm:'students', calc:()=>S().absentToday, sub:'not in class today', link:null, onclick:'showAbsentModal()' },
];
function S(){ return window._stats || {activeStudents:0,debtors:0,paidCount:0,leads:0,trial:0,absentToday:0}; }
function renderStats() {
const row = document.getElementById('statRow');
row.innerHTML = STAT_DEFS
.filter(s => can(s.perm))
.map(s => `
<div class="stat-box ${s.color}" ${s.link?`onclick="location.href='${s.link}'" style="cursor:pointer"`:s.onclick?`onclick="${s.onclick}" style="cursor:pointer"`:''}">
<span class="stat-box-icon">${s.icon}</span>
<div class="stat-box-label">${s.label}</div>
<div class="stat-box-value" id="${s.id}">—</div>
<div class="stat-box-sub">${s.sub}</div>
</div>`).join('');
STAT_DEFS.filter(s => can(s.perm)).forEach(s => {
const el = document.getElementById(s.id);
if (el) el.textContent = s.calc();
});
}
let _studentsLoaded = false;
async function ensureStudents() {
if (_studentsLoaded) return;
try { window._students = await apiGet('/api/students'); if (isTeacher()) window._students = window._students.filter(s=>(s.groups||[]).some(ownsGroup)); _studentsLoaded = true; } catch { window._students = []; }
}
async function searchStudents(q) {
const dd = document.getElementById('searchDropdown');
if (!q.trim()) { dd.style.display = 'none'; return; }
await ensureStudents();
const results = (window._students || []).filter(s =>
(s.firstName+' '+s.lastName).toLowerCase().includes(q.toLowerCase()) ||
(s.phone||'').includes(q) ||
(s.level||'').toLowerCase().includes(q.toLowerCase())
).slice(0, 8);
const SBADGE = { Active:'#1E6B45', Trial:'#A05C00', Lead:'#1D4ED8', Inactive:'#666' };
dd.innerHTML = !results.length
? `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No students found</div>`
: results.map(s => {
const name = s.firstName+' '+s.lastName;
const col = avatarColor(name);
return `<div onclick="window.location.href='student-profile.html?id=${s.id}'"
style="display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.1s;"
onmouseover="this.style.background='var(--crimson-soft)'" onmouseout="this.style.background=''">
<div style="width:32px;height:32px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${initials(name)}</div>
<div style="flex:1;min-width:0">
<div style="font-weight:600;font-size:13px">${name}</div>
<div style="font-size:11px;color:var(--muted)">${s.phone||''}${s.level?' · '+s.level:''}</div>
</div>
<span style="font-size:10px;font-weight:700;color:${SBADGE[s.status]||'#666'}">${s.status}</span>
</div>`;
}).join('');
dd.style.display = 'block';
}
document.addEventListener('click', e => {
if (!e.target.closest('#globalSearch') && !e.target.closest('#searchDropdown'))
document.getElementById('searchDropdown').style.display = 'none';
});
const LEVEL_COLORS = {
'RoundUp':'#FB8C00','Beginner':'#43A047','Elementary':'#E53935',
'Pre-Intermediate':'#1E88E5','Intermediate':'#F9A825','CEFR':'#8E24AA','IELTS':'#00897B',
};
const LEVEL_DEFAULT = '#546E7A';
let dayFilter = 'odd';
function classColor(cls) { return LEVEL_COLORS[cls.level] || LEVEL_DEFAULT; }
function classTextColor(cls) { return cls.level === 'Intermediate' ? '#1a1a1a' : 'white'; }
function autoDetectTab() { return [2,4,6].includes(now.getDay()) ? 'even' : 'odd'; }
function setDayTab(type, btn) {
dayFilter = type;
document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('customDayRow').classList.toggle('show', type === 'custom');
renderTimetable();
}
function getCustomDow() {
const r = document.querySelector('input[name="customDay"]:checked');
return r ? Number(r.value) : null;
}
function classVisible(cls) {
if (dayFilter === 'odd') return cls.schedType === 'odd';
if (dayFilter === 'even') return cls.schedType === 'even';
if (dayFilter === 'custom') {
const dow = getCustomDow();
return dow !== null && cls.schedType === 'custom' && (cls.customDays||[]).includes(dow);
}
return false;
}
const FIXED_ROOMS = [
  { id:'r1', name:'Room 1' },
  { id:'r2', name:'Room 2' },
  { id:'r3', name:'Room 3' },
  { id:'r4', name:'Room 4' },
];
function renderTimetable() {
const rooms = FIXED_ROOMS;
const classes = window._groups || [];
const grid = document.getElementById('ttGrid');
if (dayFilter === 'custom' && getCustomDow() === null) {
grid.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)"><p>Select a day above to view the groups.</p></div>`;
return;
}
const visibleClasses = classes.filter(classVisible);
function timeToMin(t) {
if (!t) return 0;
const [h, m] = t.split(':').map(Number);
return h * 60 + (m || 0);
}
function minToTime(m) {
return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
let rangeStart = 9 * 60, rangeEnd = 18 * 60;
visibleClasses.forEach(cls => {
const start = timeToMin(cls.time);
const end = start + Number(cls.duration || 90);
if (start < rangeStart) rangeStart = Math.floor(start / 60) * 60;
if (end > rangeEnd) rangeEnd = Math.ceil(end / 60) * 60;
});
const slots = [];
for (let m = rangeStart; m < rangeEnd; m += 30) slots.push(m);
const COL_W = 60, ROOM_W = 130;
const totalW = ROOM_W + slots.length * COL_W;
let html = `<div style="display:flex;min-width:${totalW}px;position:sticky;top:0;z-index:5;">
<div style="width:${ROOM_W}px;flex-shrink:0;background:var(--crimson);padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.65);border-right:1px solid rgba(255,255,255,0.15);position:sticky;left:0;z-index:6;">Classroom</div>
${slots.map(s => {
const isHour = s % 60 === 0;
return `<div style="width:${COL_W}px;flex-shrink:0;background:var(--crimson);padding:10px 4px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);overflow:hidden;">
<div style="font-size:${isHour?12:10}px;font-weight:${isHour?700:400};color:${isHour?'#fff':'rgba(255,255,255,0.55)'};white-space:nowrap;">${minToTime(s)}</div>
</div>`;
}).join('')}
</div>`;
const roomNames = rooms.map(r => r.name);
const unassignedGroups = visibleClasses.filter(c => !roomNames.includes(c.room));
const allRooms = [...rooms, ...(unassignedGroups.length ? [{ name:'Unassigned', id:'_unassigned' }] : [])];
allRooms.forEach(room => {
const roomClasses = visibleClasses.filter(c => c.room === room.name);
html += `<div style="display:flex;min-width:${totalW}px;">
<div style="width:${ROOM_W}px;flex-shrink:0;padding:14px 16px;border-right:1px solid #e0a0a0;background:var(--crimson-soft);display:flex;flex-direction:column;justify-content:center;position:sticky;left:0;z-index:4;">
<div style="font-weight:700;font-size:14px;color:var(--crimson)">${room.name}</div>
</div>
${slots.map(s => {
const startingHere = roomClasses.filter(cls => timeToMin(cls.time) === s);
const coveredByEarlier = roomClasses.some(cls => {
const cStart = timeToMin(cls.time), cEnd = cStart + Number(cls.duration || 90);
return s > cStart && s < cEnd;
});
if (coveredByEarlier) return `<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid #e0a0a0;border-bottom:1px solid #e0a0a0;min-height:90px;pointer-events:none;"></div>`;
return `<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid #e0a0a0;border-bottom:1px solid #e0a0a0;min-height:90px;position:relative;">
${startingHere.map(cls => {
const c = classColor(cls);
const textCol = classTextColor(cls);
const cStart = timeToMin(cls.time);
const cEnd = cStart + Number(cls.duration || 90);
const spanSlots = slots.filter(s2 => s2 >= cStart && s2 < cEnd).length;
const blockW = spanSlots * COL_W - 4;
const enrolled = cls.enrolledCount != null ? cls.enrolledCount : (cls.studentIds || []).length;
return `<div onclick="window.location.href='group.html?id=${cls.id}'"
style="position:absolute;top:2px;left:2px;width:${blockW}px;bottom:2px;background:${c};border-radius:6px;padding:5px 8px;cursor:pointer;overflow:hidden;z-index:3;box-sizing:border-box;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto 1fr auto;gap:1px 4px;"
onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
<div style="grid-column:1;grid-row:1;overflow:hidden">
<span style="font-weight:800;font-size:11px;color:${textCol};white-space:nowrap">${cls.name}</span>
${cls.level?`<span style="font-size:10px;color:${textCol};opacity:0.85;margin-left:4px;white-space:nowrap">${cls.level}</span>`:''}
</div>
<div style="grid-column:2;grid-row:1;text-align:right">
${cls.currentUnit?`<span style="font-size:9px;font-weight:700;color:${c};background:${textCol};padding:1px 5px;border-radius:3px;white-space:nowrap">${cls.currentUnit}</span>`:''}
</div>
<div style="grid-column:1/3;grid-row:2;display:flex;align-items:center;overflow:hidden">
<span style="font-size:10px;color:${textCol};opacity:0.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cls.teacher||'No teacher'}</span>
</div>
<div style="grid-column:1;grid-row:3">
<span style="font-size:9px;color:${textCol};opacity:0.85;white-space:nowrap"> ${cls.time}–${minToTime(cEnd)}</span>
</div>
<div style="grid-column:2;grid-row:3;text-align:right">
${enrolled?`<span style="font-size:9px;color:${textCol};opacity:0.85;white-space:nowrap"> ${enrolled}</span>`:''}
</div>
</div>`;
}).join('')}
</div>`;
}).join('')}
</div>`;
});
grid.innerHTML = html;
}
async function showAbsentModal() {
  openModal('absentModal');
  const el = document.getElementById('absentList');
  el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted)">Loading…</div>';
  try {
    const today = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tashkent'})).toISOString().split('T')[0];
    const [attRows, allStudents, allGroups] = await Promise.all([
      apiGet('/api/attendance/day/'+today),
      window._students || apiGet('/api/students'),
      window._groups   || [],
    ]);
    window._students = window._students || allStudents;
    const absentIds = attRows.filter(r => r.status === 'absent').map(r => r.student_id);
    const groupByStudentId = {};
    (window._groups||[]).forEach(g => (g.studentIds||[]).forEach(sid => { groupByStudentId[sid] = g.name; }));
    const absent = (window._students||[]).filter(s => absentIds.includes(s.id));
    if (!absent.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted)">No absences recorded today.</div>';
      return;
    }
    el.innerHTML = absent.map(s => {
      const name = s.firstName+' '+s.lastName;
      const col = avatarColor(name);
      const grp = groupByStudentId[s.id] || '—';
      return `<div onclick="window.location.href='student-profile.html?id=${s.id}'" style="display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;transition:background .1s" onmouseover="this.style.background='var(--crimson-soft)'" onmouseout="this.style.background=''">
        <div style="width:36px;height:36px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0">${initials(name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${name}</div>
          <div style="font-size:12px;color:var(--muted)">${grp}${s.phone?' · +998 '+s.phone:''}</div>
        </div>
        <span style="font-size:11px;font-weight:700;color:#c0392b;background:#fde8e8;padding:3px 9px;border-radius:20px">Absent</span>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="padding:24px;color:var(--muted)">Failed to load.</div>';
  }
}

let _numsHidden = localStorage.getItem('dash_hide_nums') === '1';
function applyHideNums() {
  document.getElementById('statRow').classList.toggle('nums-hidden', _numsHidden);
  document.getElementById('hideNumsLabel').textContent = _numsHidden ? 'Show' : 'Hide';
  const icon = document.getElementById('hideNumsIcon');
  if (_numsHidden) {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  } else {
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

function toggleHideNums() {
  _numsHidden = !_numsHidden;

async function init() {
try {
const d = await apiGet('/api/dashboard');
window._groups = d.groups; window._stats = d.stats;
} catch(e) {
window._groups=[]; window._stats=null;
}
renderStats();
applyHideNums();
const autoTab = autoDetectTab();
dayFilter = autoTab;
document.querySelectorAll('.day-tab').forEach(btn => {
btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(autoTab));
});
renderTimetable();
// Support-teacher accounts see ONLY their support timetable (read-only).
if (isSupportTeacher()) {
document.getElementById('statRow').style.display = 'none';
document.querySelectorAll('.timetable-header')[0].style.display = 'none';
document.getElementById('customDayRow').style.display = 'none';
document.querySelectorAll('.timetable-wrap')[0].style.display = 'none';
document.getElementById('supportHeader').style.marginTop = '0';
document.querySelector('.welcome-banner p').textContent = 'Your support timetable';
}
// Hide support timetable entirely for users who are not admin and not a support teacher
const canSeeSupport = isAdministration() || isSupportTeacher();
if (!canSeeSupport) {
  document.getElementById('supportHeader').style.display = 'none';
  document.getElementById('supportGrid').style.display = 'none';
}
supportDateISO = isoLocal(new Date());
renderSupportDateLabel();
if (!can('groups')) document.getElementById('addSupportBtn').style.display = 'none';
if (canSeeSupport) loadSupport();
}

/* ── Support timetable ── */
let _support = [];
function isoLocal(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
let supportDateISO = isoLocal(new Date());
let _spDur = 30;
const CAN_SUPPORT = can('groups');
const SUPPORT_OWNER = isSupportTeacher() ? (getSession()?.name||'') : null;
function spMin(t){ const [h,m]=String(t||'0:0').split(':').map(Number); return (h||0)*60+(m||0); }
function supportTeacherColor(name){ return avatarColor(name||'?'); }
function supDayType(){ const dow=new Date(supportDateISO+'T00:00:00').getDay(); if([1,3,5].includes(dow))return 'odd'; if([2,4,6].includes(dow))return 'even'; return null; }
function supTeacherObj(name){ return (window._supportTeachers||[]).find(t=>t.name===name)||null; }
function supShiftFor(name){ const t=supTeacherObj(name), dt=supDayType(); return (t&&dt)?t[dt]:null; }
function renderSupportDateLabel(){
const d = new Date(supportDateISO+'T00:00:00');
document.getElementById('supportDateLabel').textContent = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function supportDay(delta){
const d = new Date(supportDateISO+'T00:00:00'); d.setDate(d.getDate()+delta);
supportDateISO = isoLocal(d); renderSupportDateLabel(); loadSupport();
}
async function loadSupport() {
if (!window._supportStudents) { try { window._supportStudents = await apiGet('/api/students'); } catch { window._supportStudents=[]; } }
if (!window._supportTeachers) { try { window._supportTeachers = await apiGet('/api/support-teachers'); } catch { window._supportTeachers=[]; } }
try { _support = await apiGet('/api/support/'+supportDateISO); } catch(e) { _support = []; }
if (SUPPORT_OWNER) _support = _support.filter(s => s.teacher === SUPPORT_OWNER);
renderSupportGrid();
}
function renderSupportGrid() {
const grid = document.getElementById('supportGrid');
const placed = _support.map(s => ({ ...s, st: spMin(s.time), en: spMin(s.time)+Number(s.duration||30) }));
// Rows: support teachers whose shift covers this day type, plus anyone who already has a session.
let teachers = (window._supportTeachers||[]).filter(t=>supShiftFor(t.name)).map(t=>t.name);
[...new Set(placed.map(p=>p.teacher))].forEach(n=>{ if(!teachers.includes(n)) teachers.push(n); });
if (SUPPORT_OWNER) teachers = teachers.filter(n=>n===SUPPORT_OWNER);
teachers.sort();
if (!teachers.length) {
const anyTeachers = (window._supportTeachers||[]).length;
grid.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted)"><p>${anyTeachers ? 'No support teachers work on this day.' : 'No support teachers yet — add one in Staff (role “Support Teacher”).'}</p></div>`;
return;
}
let rangeStart = 9*60, rangeEnd = 18*60;
teachers.forEach(n=>{ const sh=supShiftFor(n); if(sh){ rangeStart=Math.min(rangeStart, spMin(sh.start)); rangeEnd=Math.max(rangeEnd, spMin(sh.end)); } });
placed.forEach(s => { if (s.st < rangeStart) rangeStart = Math.floor(s.st/60)*60; if (s.en > rangeEnd) rangeEnd = Math.ceil(s.en/60)*60; });
const slots = []; for (let m=rangeStart; m<rangeEnd; m+=30) slots.push(m);
const COL_W=60, LANE_W=150;
const minToTime = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const totalW2 = LANE_W + slots.length * COL_W;
let html = `<div style="display:flex;min-width:${totalW2}px;position:sticky;top:0;z-index:5;">
<div style="width:${LANE_W}px;flex-shrink:0;background:var(--crimson);padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.65);border-right:1px solid rgba(255,255,255,0.15);position:sticky;left:0;z-index:6;">Support</div>
${slots.map(s=>{const isHour=s%60===0;return `<div style="width:${COL_W}px;flex-shrink:0;background:var(--crimson);padding:10px 4px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);"><div style="font-size:${isHour?12:10}px;font-weight:${isHour?700:400};color:${isHour?'#fff':'rgba(255,255,255,0.55)'};white-space:nowrap;">${minToTime(s)}</div></div>`;}).join('')}
</div>`;
teachers.forEach(teacher => {
const tSessions = placed.filter(p=>p.teacher===teacher);
const tCol = supportTeacherColor(teacher);
const tEsc = teacher.replace(/"/g,'&quot;');
const shift = supShiftFor(teacher);
const shStart = shift ? spMin(shift.start) : -1, shEnd = shift ? spMin(shift.end) : -1;
html += `<div style="display:flex;min-width:${totalW2}px;">
<div style="width:${LANE_W}px;flex-shrink:0;padding:12px 16px;border-right:1px solid #e0a0a0;background:var(--crimson-soft);display:flex;align-items:center;gap:9px;position:sticky;left:0;z-index:4;">
<div style="font-weight:700;font-size:13px;color:var(--text)">${teacher}</div>
</div>
${slots.map(s=>{
const starting = tSessions.filter(p=>p.st===s);
const covered = tSessions.some(p=>s>p.st && s<p.en);
if (covered) return `<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid #e0a0a0;border-bottom:1px solid #e0a0a0;min-height:74px;pointer-events:none;"></div>`;
const inShift = s >= shStart && s < shEnd;
if (!inShift) return `<div title="Off shift" style="width:${COL_W}px;flex-shrink:0;border-right:1px solid #e0a0a0;border-bottom:1px solid #e0a0a0;min-height:74px;background:repeating-linear-gradient(45deg,#ffc5c5,#ffc5c5 6px,#ffd9d9 6px,#ffd9d9 12px);"></div>`;
const nowTz2 = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tashkent'}));
const isToday2 = supportDateISO === nowTz2.toISOString().split('T')[0];
const isPast = isToday2 && s <= nowTz2.getHours()*60 + nowTz2.getMinutes();
const clickable = CAN_SUPPORT && !starting.length && !isPast;
return `<div ${clickable?`onclick="openSupport(&quot;${tEsc}&quot;,'${minToTime(s)}')" class="sup-cell"`:''} style="width:${COL_W}px;flex-shrink:0;border-right:1px solid #e0a0a0;border-bottom:1px solid #e0a0a0;min-height:74px;position:relative;${clickable?'cursor:pointer;':''}">
${starting.map(p=>{
const span = slots.filter(s2=>s2>=p.st && s2<p.en).length;
const w = span*COL_W-4;
const stu = (window._supportStudents||[]).find(x=>x.id===p.studentId);
const sName = stu ? stu.firstName+' '+stu.lastName : 'Student';
return `<div style="position:absolute;top:2px;left:2px;width:${w}px;bottom:2px;background:${tCol};border-radius:6px;padding:6px 8px;overflow:hidden;z-index:3;box-sizing:border-box;color:#fff;">
<div style="font-weight:800;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sName}</div>
<div style="font-size:10px;opacity:0.9;white-space:nowrap">${p.time} · ${p.duration}m</div>
${isAdministration()?`<button onclick="event.stopPropagation();deleteSupport('${p.id}')" title="Delete" style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.25);border:none;color:#fff;border-radius:4px;width:16px;height:16px;font-size:11px;line-height:1;cursor:pointer;padding:0">×</button>`:''}
</div>`;
}).join('')}
</div>`;
}).join('')}
</div>`;
});
grid.innerHTML = html;
}
function setDur(min, btn){ _spDur = min; document.querySelectorAll('#spDurSeg button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function spSearchStudents(q){
const box = document.getElementById('spStudentResults');
const list = window._supportStudents||[];
const ql = (q||'').toLowerCase().trim();
if (!ql) { document.getElementById('spStudentResults').style.display='none'; return; }
const res = list.filter(s=>(s.firstName+' '+s.lastName).toLowerCase().includes(ql)||(s.phone||'').includes(ql)).slice(0,12);
if (!res.length) { box.style.display='none'; return; }
box.innerHTML = res.map(s=>{const n=(s.firstName+' '+s.lastName).replace(/"/g,'&quot;');return `<div class="sp-result" onclick="spPickStudent('${s.id}', &quot;${n}&quot;)"><div class="avatar" style="width:28px;height:28px;font-size:11px;background:${avatarColor(n)}">${initials(n)}</div><div><div style="font-size:13px;font-weight:600">${n}</div><div style="font-size:11px;color:var(--muted)">${s.phone||''}${s.level?' · '+s.level:''}</div></div></div>`;}).join('');
box.style.display='block';
}
function spPickStudent(id, name){
document.getElementById('spStudentId').value = id;
document.getElementById('spStudentSearch').value = name;
// Auto-fill group info
const grp = (window._supportGroups||[]).find(g=>(g.studentIds||g.student_ids||[]).includes(id));
document.getElementById('spGroupInfo').style.display = grp ? '' : 'none';
if (grp) {
  document.getElementById('spGroupName').textContent = grp.name || '—';
  document.getElementById('spGroupLevel').textContent = grp.level || '—';
  document.getElementById('spGroupTeacher').textContent = grp.teacher || '—';
  document.getElementById('spGroupUnit').textContent = grp.currentUnit || grp.current_unit || '—';
}
document.getElementById('spStudentResults').style.display='none';
}
document.addEventListener('click', e=>{ if(!e.target.closest('#spStudentResults') && e.target.id!=='spStudentSearch'){ const b=document.getElementById('spStudentResults'); if(b) b.style.display='none'; } });

function supBuildTimes(teacher, want){
const sh = teacher ? supShiftFor(teacher) : null;
const lo = sh ? spMin(sh.start) : 8*60, hi = sh ? spMin(sh.end) : 21*60+30;
const nowTz = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tashkent'}));
const isToday = supportDateISO === nowTz.toISOString().split('T')[0];
const nowMin = isToday ? nowTz.getHours()*60 + nowTz.getMinutes() : 0;
let times=''; for(let t=lo; t<=hi-30; t+=30){ if(t <= nowMin && isToday) continue; const hh=String(Math.floor(t/60)).padStart(2,'0'), mm=String(t%60).padStart(2,'0'); times+=`<option>${hh}:${mm}</option>`; }
const sel=document.getElementById('spTime'); sel.innerHTML=times||'<option disabled>No available slots</option>';
if (want && [...sel.options].some(o=>o.value===want)) sel.value=want;
}
function onSupTeacherChange(){ supBuildTimes(document.getElementById('spTeacher').value); }
async function openSupport(prefillTeacher, prefillTime) {
if (!window._supportTeachers) { try { window._supportTeachers = await apiGet('/api/support-teachers'); } catch { window._supportTeachers=[]; } }
if (!window._supportStudents) { try { window._supportStudents = await apiGet('/api/students'); } catch { window._supportStudents=[]; } }
if (!window._supportGroups) { try { window._supportGroups = await apiGet('/api/groups'); } catch { window._supportGroups=[]; } }
document.getElementById('spGroupInfo').style.display='none';
_spDur = 30; document.querySelectorAll('#spDurSeg button').forEach((b,i)=>b.classList.toggle('active', i===0));
const onlyWorking = (window._supportTeachers||[]).filter(t=>supShiftFor(t.name));
document.getElementById('spTeacher').innerHTML = '<option value="">— Select —</option>' + onlyWorking.map(t=>`<option>${t.name}</option>`).join('');
const pre = (prefillTeacher && typeof prefillTeacher==='string') ? prefillTeacher : '';
if (pre) document.getElementById('spTeacher').value = pre;
supBuildTimes(pre, (prefillTime && typeof prefillTime==='string') ? prefillTime : '09:00');
document.getElementById('spStudentSearch').value=''; document.getElementById('spStudentId').value=''; document.getElementById('spStudentResults').style.display='none';
document.getElementById('spTheme').value='';
openModal('supportModal');
}
async function saveSupport() {
const theme = document.getElementById('spTheme').value.trim();
const data = {
id: genId(),
date: supportDateISO,
time: document.getElementById('spTime').value,
duration: _spDur,
teacher: document.getElementById('spTeacher').value,
studentId: document.getElementById('spStudentId').value,
theme,
};
if (!data.teacher) { showToast('Select a support teacher.','error'); return; }
if (!data.studentId) { showToast('Select a student.','error'); return; }
if (!theme) { showToast('Theme is required.','error'); return; }
try {
await apiPost('/api/support', data);
closeModal('supportModal');
await loadSupport();
showToast('Support session added!');
} catch(e) { showToast(e.message||'Error.','error'); }
}
async function deleteSupport(id) {
if (!confirm('Delete this session?')) return;
try { await apiDelete('/api/support/'+id); await loadSupport(); showToast('Deleted.','error'); }
catch(e) { showToast(e.message||'Error.','error'); }
}
init();
</script>
