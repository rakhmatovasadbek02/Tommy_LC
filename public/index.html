<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — TommyLC CRM</title>
<link rel="stylesheet" href="shared.css">
<style>
.welcome-banner {
background: linear-gradient(135deg, #990000 0%, #CC0000 100%);
border-radius: var(--radius);
padding: 24px 32px;
margin-bottom: 24px;
display: flex;
align-items: center;
justify-content: space-between;
position: relative;
overflow: hidden;
}
.welcome-banner::after {
content: '';
position: absolute; right: 28px; top: 50%;
transform: translateY(-50%);
font-size: 72px; opacity: 0.08;
}
.welcome-banner h2 { font-family: 'Inter', sans-serif; font-size: 22px; color: white; margin-bottom: 3px; }
.welcome-banner p { color: rgba(255,255,255,0.6); font-size: 13px; }
.date-chip {
background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.92);
padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 500; white-space: nowrap;
}
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-box {
background: white; border-radius: var(--radius); border: 1px solid var(--border);
padding: 20px 24px; min-width: 0; position: relative;
overflow: hidden; cursor: default; transition: box-shadow 0.16s, transform 0.16s;
}
.stat-box:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.stat-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--crimson); }
.stat-box.green::before { background: var(--green); }
.stat-box.blue::before { background: var(--blue); }
.stat-box.amber::before { background: var(--amber); }
.stat-box.purple::before { background: #7C3AED; }
.stat-box-icon { position: absolute; top: 16px; right: 16px; font-size: 26px; opacity: 0.11; }
.stat-box-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.stat-box-value { font-family: 'Inter', sans-serif; font-size: 36px; color: var(--text); line-height: 1; }
.stat-box-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.timetable-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.timetable-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 900; color: var(--text); }
.day-tabs { display: flex; gap: 4px; }
.day-tab {
padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
border: 1.5px solid var(--border); background: white; color: var(--muted);
cursor: pointer; transition: all 0.14s; font-family: 'Inter', sans-serif;
}
.day-tab:hover { border-color: var(--crimson); color: var(--crimson); }
.day-tab.active { background: var(--crimson); color: white; border-color: var(--crimson); }
.custom-day-row { display: none; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.custom-day-row.show { display: flex; }
.cday-chip input[type="radio"] { display: none; }
.cday-chip span {
display: inline-flex; align-items: center; justify-content: center;
width: 44px; height: 34px; border: 1.5px solid var(--border); border-radius: 7px;
font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.14s; background: white; color: var(--muted);
}
.cday-chip input:checked + span { background: var(--crimson); color: white; border-color: var(--crimson); }
.cday-chip span:hover { border-color: var(--crimson); color: var(--crimson); }
.cday-chip input:checked + span:hover { color: white; }
.timetable-wrap { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; box-shadow: var(--shadow); }
.dashboard-topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
.dashboard-topbar .topbar-right { justify-content: flex-end; }
</style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
<div class="topbar dashboard-topbar">
<div class="page-title">Dashboard</div>
<div style="width:320px;position:relative;">
<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;display:flex"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
<input type="text" id="globalSearch" placeholder="Search students…"
style="width:100%;padding:9px 14px 9px 38px;border-radius:24px;border:1.5px solid var(--border);font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border-color 0.15s;"
oninput="searchStudents(this.value)"
onfocus="this.style.borderColor='var(--crimson)'"
onblur="this.style.borderColor='var(--border)'">
<div id="searchDropdown" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:999;max-height:320px;overflow-y:auto;"></div>
</div>
<div class="topbar-right">
<span class="text-muted" id="currentDate"></span>
</div>
</div>
<div class="page-content">
<div class="welcome-banner">
<div>
<h2 id="welcomeMsg">Good morning </h2>
<p>Here's what's happening at Tommy Learning Center today.</p>
</div>
<div class="date-chip" id="dateBadge"></div>
</div>
<div class="stat-row" id="statRow"></div>
<div class="timetable-header">
<div class="timetable-title">Timetable</div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
<div class="day-tabs">
<button class="day-tab active" onclick="setDayTab('odd',this)">Odd Days</button>
<button class="day-tab" onclick="setDayTab('even',this)">Even Days</button>
<button class="day-tab" onclick="setDayTab('custom',this)">Custom</button>
</div>
<a href="groups.html" class="btn btn-outline btn-sm">All Groups <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
</div>
</div>
<div class="custom-day-row" id="customDayRow">
<span style="font-size:12px;font-weight:700;color:var(--muted);margin-right:4px">Day:</span>
<label class="cday-chip"><input type="radio" name="customDay" value="1" onchange="renderTimetable()"><span>Mon</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="2" onchange="renderTimetable()"><span>Tue</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="3" onchange="renderTimetable()"><span>Wed</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="4" onchange="renderTimetable()"><span>Thu</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="5" onchange="renderTimetable()"><span>Fri</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="6" onchange="renderTimetable()"><span>Sat</span></label>
<label class="cday-chip"><input type="radio" name="customDay" value="0" onchange="renderTimetable()"><span>Sun</span></label>
</div>
<div class="timetable-wrap">
<div id="ttGrid"></div>
</div>
</div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
requireAuth('dashboard');
renderSidebar('dashboard');
const session = getSession();
const role = getRole();
const now = new Date();
document.getElementById('currentDate').textContent =
now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
document.getElementById('dateBadge').textContent =
now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
const firstName = session ? session.name.split(' ')[0] : 'there';
const hour = now.getHours();
const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
document.getElementById('welcomeMsg').textContent = `${t(greeting)}, ${firstName} `;
const STAT_DEFS = [
{ id:'statActive', label:'Active Students', icon:'', color:'', perm:'students', calc:()=>S().activeStudents, sub:'currently enrolled', link:'students.html' },
{ id:'statDebtors', label:'Debtors', icon:'️', color:'red', perm:'finance', calc:()=>S().debtors, sub:'negative balance', link:'finance.html' },
{ id:'statPaid', label:'Paid', icon:'', color:'green', perm:'finance', calc:()=>S().paidCount, sub:'invoices settled', link:'finance.html' },
{ id:'statLead', label:'Leads', icon:'', color:'purple', perm:'leads', calc:()=>S().leads, sub:'in pipeline', link:'leads.html' },
{ id:'statTrial', label:'Trial', icon:'', color:'amber', perm:'leads', calc:()=>S().trial, sub:'on trial period', link:'leads.html' },
{ id:'statAbsent', label:'Absent Today', icon:'', color:'red', perm:'students', calc:()=>S().absentToday, sub:'not in class today', link:'students.html' },
];
function S(){ return window._stats || {activeStudents:0,debtors:0,paidCount:0,leads:0,trial:0,absentToday:0}; }
function renderStats() {
const row = document.getElementById('statRow');
row.innerHTML = STAT_DEFS
.filter(s => can(s.perm))
.map(s => `
<div class="stat-box ${s.color}" ${s.link?`onclick="location.href='${s.link}'" style="cursor:pointer"`:''}">
<span class="stat-box-icon">${s.icon}</span>
<div class="stat-box-label">${s.label}</div>
<div class="stat-box-value" id="${s.id}">—</div>
<div class="stat-box-sub">${s.sub}</div>
</div>`).join('');
STAT_DEFS.filter(s => can(s.perm)).forEach(s => {
const el = document.getElementById(s.id);
if (el) el.textContent = s.calc();
});
}
let _studentsLoaded = false;
async function ensureStudents() {
if (_studentsLoaded) return;
try { window._students = await apiGet('/api/students'); if (isTeacher()) window._students = window._students.filter(s=>(s.groups||[]).some(ownsGroup)); _studentsLoaded = true; } catch { window._students = []; }
}
async function searchStudents(q) {
const dd = document.getElementById('searchDropdown');
if (!q.trim()) { dd.style.display = 'none'; return; }
await ensureStudents();
const results = (window._students || []).filter(s =>
(s.firstName+' '+s.lastName).toLowerCase().includes(q.toLowerCase()) ||
(s.phone||'').includes(q) ||
(s.level||'').toLowerCase().includes(q.toLowerCase())
).slice(0, 8);
const SBADGE = { Active:'#1E6B45', Trial:'#A05C00', Lead:'#1D4ED8', Inactive:'#666' };
dd.innerHTML = !results.length
? `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No students found</div>`
: results.map(s => {
const name = s.firstName+' '+s.lastName;
const col = avatarColor(name);
return `<div onclick="window.location.href='student-profile.html?id=${s.id}'"
style="display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.1s;"
onmouseover="this.style.background='var(--crimson-soft)'" onmouseout="this.style.background=''">
<div style="width:32px;height:32px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${initials(name)}</div>
<div style="flex:1;min-width:0">
<div style="font-weight:600;font-size:13px">${name}</div>
<div style="font-size:11px;color:var(--muted)">${s.phone||''}${s.level?' · '+s.level:''}</div>
</div>
<span style="font-size:10px;font-weight:700;color:${SBADGE[s.status]||'#666'}">${s.status}</span>
</div>`;
}).join('');
dd.style.display = 'block';
}
document.addEventListener('click', e => {
if (!e.target.closest('#globalSearch') && !e.target.closest('#searchDropdown'))
document.getElementById('searchDropdown').style.display = 'none';
});
const LEVEL_COLORS = {
'RoundUp':'#FB8C00','Beginner':'#43A047','Elementary':'#E53935',
'Pre-Intermediate':'#1E88E5','Intermediate':'#F9A825','CEFR':'#8E24AA','IELTS':'#00897B',
};
const LEVEL_DEFAULT = '#546E7A';
let dayFilter = 'odd';
function classColor(cls) { return LEVEL_COLORS[cls.level] || LEVEL_DEFAULT; }
function classTextColor(cls) { return cls.level === 'Intermediate' ? '#1a1a1a' : 'white'; }
function autoDetectTab() { return [2,4,6].includes(now.getDay()) ? 'even' : 'odd'; }
function setDayTab(type, btn) {
dayFilter = type;
document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('customDayRow').classList.toggle('show', type === 'custom');
renderTimetable();
}
function getCustomDow() {
const r = document.querySelector('input[name="customDay"]:checked');
return r ? Number(r.value) : null;
}
function classVisible(cls) {
if (dayFilter === 'odd') return cls.schedType === 'odd';
if (dayFilter === 'even') return cls.schedType === 'even';
if (dayFilter === 'custom') {
const dow = getCustomDow();
return dow !== null && cls.schedType === 'custom' && (cls.customDays||[]).includes(dow);
}
return false;
}
function renderTimetable() {
const rooms = window._classrooms || [];
const classes = window._groups || [];
const grid = document.getElementById('ttGrid');
if (!rooms.length) {
grid.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">
<div style="font-size:32px;margin-bottom:10px"></div><p>No classrooms yet.</p>
<a href="classrooms.html" class="btn btn-outline btn-sm" style="margin-top:10px">Add Classrooms</a>
</div>`;
return;
}
if (dayFilter === 'custom' && getCustomDow() === null) {
grid.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)"><p>Select a day above to view the groups.</p></div>`;
return;
}
const visibleClasses = classes.filter(classVisible);
function timeToMin(t) {
if (!t) return 0;
const [h, m] = t.split(':').map(Number);
return h * 60 + (m || 0);
}
function minToTime(m) {
return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
let rangeStart = 9 * 60, rangeEnd = 18 * 60;
visibleClasses.forEach(cls => {
const start = timeToMin(cls.time);
const end = start + Number(cls.duration || 90);
if (start < rangeStart) rangeStart = Math.floor(start / 60) * 60;
if (end > rangeEnd) rangeEnd = Math.ceil(end / 60) * 60;
});
const slots = [];
for (let m = rangeStart; m < rangeEnd; m += 30) slots.push(m);
const COL_W = 60, ROOM_W = 130;
let html = `<div style="display:flex;position:sticky;top:0;z-index:5;">
<div style="width:${ROOM_W}px;flex-shrink:0;background:var(--crimson);padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.65);border-right:1px solid rgba(255,255,255,0.15);">Classroom</div>
${slots.map(s => {
const isHour = s % 60 === 0;
return `<div style="width:${COL_W}px;flex-shrink:0;background:var(--crimson);padding:10px 4px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);overflow:hidden;">
<div style="font-size:${isHour?12:10}px;font-weight:${isHour?700:400};color:${isHour?'#fff':'rgba(255,255,255,0.55)'};white-space:nowrap;">${minToTime(s)}</div>
</div>`;
}).join('')}
</div>`;
const roomNames = rooms.map(r => r.name);
const unassignedGroups = visibleClasses.filter(c => !roomNames.includes(c.room));
const allRooms = [...rooms, ...(unassignedGroups.length ? [{ name:'Unassigned', id:'_unassigned' }] : [])];
allRooms.forEach(room => {
const roomClasses = visibleClasses.filter(c => c.room === room.name);
html += `<div style="display:flex;border-bottom:1px solid var(--border);">
<div style="width:${ROOM_W}px;flex-shrink:0;padding:14px 16px;border-right:1px solid var(--border);background:var(--crimson-soft);display:flex;flex-direction:column;justify-content:center;">
<div style="font-weight:700;font-size:14px;color:var(--crimson)">${room.name}</div>
</div>
${slots.map(s => {
const startingHere = roomClasses.filter(cls => timeToMin(cls.time) === s);
const coveredByEarlier = roomClasses.some(cls => {
const cStart = timeToMin(cls.time), cEnd = cStart + Number(cls.duration || 90);
return s > cStart && s < cEnd;
});
if (coveredByEarlier) return `<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);min-height:90px;pointer-events:none;"></div>`;
return `<div style="width:${COL_W}px;flex-shrink:0;border-right:1px solid var(--border);min-height:90px;position:relative;">
${startingHere.map(cls => {
const c = classColor(cls);
const textCol = classTextColor(cls);
const cStart = timeToMin(cls.time);
const cEnd = cStart + Number(cls.duration || 90);
const spanSlots = slots.filter(s2 => s2 >= cStart && s2 < cEnd).length;
const blockW = spanSlots * COL_W - 4;
const enrolled = cls.enrolledCount != null ? cls.enrolledCount : (cls.studentIds || []).length;
return `<div onclick="window.location.href='group.html?id=${cls.id}'"
style="position:absolute;top:2px;left:2px;width:${blockW}px;bottom:2px;background:${c};border-radius:6px;padding:5px 8px;cursor:pointer;overflow:hidden;z-index:3;box-sizing:border-box;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto 1fr auto;gap:1px 4px;"
onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
<div style="grid-column:1;grid-row:1;overflow:hidden">
<span style="font-weight:800;font-size:11px;color:${textCol};white-space:nowrap">${cls.name}</span>
${cls.level?`<span style="font-size:10px;color:${textCol};opacity:0.85;margin-left:4px;white-space:nowrap">${cls.level}</span>`:''}
</div>
<div style="grid-column:2;grid-row:1;text-align:right">
${cls.currentUnit?`<span style="font-size:9px;font-weight:700;color:${c};background:${textCol};padding:1px 5px;border-radius:3px;white-space:nowrap">${cls.currentUnit}</span>`:''}
</div>
<div style="grid-column:1/3;grid-row:2;display:flex;align-items:center;overflow:hidden">
<span style="font-size:10px;color:${textCol};opacity:0.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cls.teacher||'No teacher'}</span>
</div>
<div style="grid-column:1;grid-row:3">
<span style="font-size:9px;color:${textCol};opacity:0.85;white-space:nowrap"> ${cls.time}–${minToTime(cEnd)}</span>
</div>
<div style="grid-column:2;grid-row:3;text-align:right">
${enrolled?`<span style="font-size:9px;color:${textCol};opacity:0.85;white-space:nowrap"> ${enrolled}</span>`:''}
</div>
</div>`;
}).join('')}
</div>`;
}).join('')}
</div>`;
});
grid.innerHTML = `<div style="overflow-x:auto;min-width:100%;">${html}</div>`;
}
async function init() {
try {
const d = await apiGet('/api/dashboard');
window._groups = d.groups; window._classrooms = d.classrooms; window._stats = d.stats;
} catch(e) {
window._groups=[]; window._classrooms=[]; window._stats=null;
}
renderStats();
const autoTab = autoDetectTab();
dayFilter = autoTab;
document.querySelectorAll('.day-tab').forEach(btn => {
btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(autoTab));
});
renderTimetable();
}
init();
</script>
</body>
</html>
