<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reminders — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    html, body { height:100%; overflow:hidden; }
    .main { height:100vh; max-width:none !important; width:calc(100vw - var(--nav-w)); overflow:hidden; display:flex; flex-direction:column; }
    .topbar { flex-shrink:0; }
    .tasks-wrap { display:flex; flex:1; min-height:0; overflow:hidden; }
    .tasks-sidebar { width:210px; flex-shrink:0; border-right:1px solid var(--border); background:var(--white); overflow-y:auto; padding:18px 0; }
    .tasks-main { flex:1; min-width:0; overflow-y:auto; padding:24px 28px; }
    .app-footer { display:none !important; }
    @media(max-width:900px){ .kanban { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:640px){
      .main{width:100vw;}
      .tasks-sidebar{display:none;}
      .tasks-main { padding:14px; }
      .kanban { grid-template-columns:1fr; }
      .stats-row { flex-wrap:wrap; }
      .stat-card { min-width:calc(50% - 6px); flex:1 1 calc(50% - 6px); }
      .stat-val { font-size:18px; }
      .task-card { padding:10px 11px; }
    }

    /* Sidebar */
    .filter-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); padding:0 18px; margin-bottom:6px; }
    .filter-label:not(:first-child) { margin-top:16px; }
    .filter-item { display:flex; align-items:center; gap:10px; padding:9px 14px; margin:0 6px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); transition:background .12s; }
    .filter-item:hover { background:var(--bg); }
    .filter-item.active { background:rgba(192,57,43,.09); color:var(--primary); font-weight:600; }
    .filter-count { margin-left:auto; font-size:11px; background:var(--bg); border-radius:20px; padding:1px 7px; color:var(--text-muted); font-weight:500; min-width:20px; text-align:center; }
    .filter-item.active .filter-count { background:rgba(192,57,43,.12); color:var(--primary); }

    /* Stats */
    .stats-row { display:flex; gap:12px; margin-bottom:20px; }
    .stat-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px 18px; flex:1; display:flex; align-items:center; gap:14px; }
    .stat-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:17px; }
    .stat-val { font-size:20px; font-weight:800; line-height:1; }
    .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:3px; font-weight:500; }

    /* Kanban board */
    .kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start; }
    .kanban-col { border-radius:14px; overflow:hidden; border:1px solid var(--border); background:var(--white); display:flex; flex-direction:column; }
    .kanban-col-header { display:flex; align-items:center; gap:10px; padding:13px 14px 12px; border-bottom:1px solid var(--border); }
    .col-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .col-pending   .col-dot { background:#3b5bdb; }
    .col-in_process .col-dot { background:#e67e22; }
    .col-completed .col-dot { background:#27ae60; }
    .col-overdue   .col-dot { background:#c0392b; }
    .kanban-col-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; flex:1; }
    .col-pending   .kanban-col-title { color:#3b5bdb; }
    .col-in_process .kanban-col-title { color:#e67e22; }
    .col-completed .kanban-col-title { color:#27ae60; }
    .col-overdue   .kanban-col-title { color:#c0392b; }
    .kanban-col-count { font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; min-width:22px; text-align:center; }
    .col-pending   .kanban-col-count { background:#eef2ff; color:#3b5bdb; }
    .col-in_process .kanban-col-count { background:#fff3e0; color:#e67e22; }
    .col-completed .kanban-col-count { background:#e8f5e9; color:#27ae60; }
    .col-overdue   .kanban-col-count { background:#fde8e8; color:#c0392b; }
    .kanban-col-body { padding:10px; display:flex; flex-direction:column; gap:8px; min-height:80px; }

    /* Task cards */
    .task-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 13px; cursor:pointer; transition:box-shadow .15s, transform .1s; position:relative; }
    .task-card:hover { box-shadow:0 3px 12px rgba(0,0,0,.09); transform:translateY(-1px); }
    .task-card.pri-high    { background:#fff5f5; border-color:#fca5a5; border-left:3px solid #c0392b; }
    .task-card.pri-medium  { background:#fffbf0; border-color:#fcd34d; border-left:3px solid #e67e22; }
    .task-card.pri-low     { background:#f0fdf4; border-color:#86efac; border-left:3px solid #27ae60; }
    .task-card.status-overdue { background:#fff0f0 !important; border-color:#fca5a5 !important; border-left:3px solid #c0392b !important; }
    .task-card.status-completed { opacity:.6; filter:grayscale(.3); }
    .task-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.45; }
    .task-title.done-text { text-decoration:line-through; color:var(--text-muted); }
    .task-note { font-size:11.5px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
    .pill { padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:600; }
    .pill-due    { background:#f0f4ff; color:#3b5bdb; }
    .pill-due.overdue { background:#fde8e8; color:#c0392b; }
    .pill-person { background:#f5f0ff; color:#6f42c1; }
    .pill-assignee { background:#e8f5e9; color:#27ae60; }
    .task-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:1px solid var(--border); gap:6px; }
    .task-footer-left { display:flex; gap:5px; flex-wrap:wrap; }
    .task-footer-right { display:flex; gap:5px; flex-shrink:0; }
    .task-btn { border:1px solid var(--border); background:var(--white); color:var(--text-muted); border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; transition:all .12s; }
    .task-btn:hover { background:var(--bg); color:var(--text); }
    .task-btn.danger:hover { background:#fde8e8; border-color:#fbb; color:#c0392b; }

    /* Countdown timer */
    .task-timer { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; font-size:10px; font-weight:700; }
    .task-timer.timer-ok     { background:#eef2ff; color:#3b5bdb; }
    .task-timer.timer-soon   { background:#fff3e0; color:#e67e22; }
    .task-timer.timer-urgent { background:#fde8e8; color:#c0392b; animation:pulse .9s infinite alternate; }
    .task-timer.timer-over   { background:#fde8e8; color:#c0392b; }
    @keyframes pulse { from{opacity:1} to{opacity:.55} }

    /* Task detail panel */
    .detail-overlay { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.35); align-items:center; justify-content:center; }
    .detail-overlay.open { display:flex; }
    .detail-panel { background:#fff; border-radius:16px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,.18); animation:modalIn .18s ease; }
    .detail-header { padding:20px 22px 0; display:flex; align-items:flex-start; gap:12px; }
    .detail-status-bar { width:4px; border-radius:4px; flex-shrink:0; margin-top:4px; align-self:stretch; min-height:20px; }
    .detail-title { font-size:17px; font-weight:800; color:var(--text); line-height:1.35; flex:1; }
    .detail-close { width:30px; height:30px; border:none; background:var(--bg); border-radius:8px; cursor:pointer; font-size:18px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s; }
    .detail-close:hover { background:var(--border); }
    .detail-body { padding:16px 22px 22px; display:flex; flex-direction:column; gap:14px; }
    .detail-row { display:flex; align-items:flex-start; gap:12px; }
    .detail-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); min-width:90px; padding-top:2px; flex-shrink:0; }
    .detail-val { font-size:13px; color:var(--text); font-weight:500; line-height:1.5; }
    .detail-note { background:var(--bg); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--text); line-height:1.6; margin-top:2px; }
    .detail-footer { padding:14px 22px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
    .detail-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:20px; font-size:12px; font-weight:700; }
    .detail-badge.pending    { background:#eef2ff; color:#3b5bdb; }
    .detail-badge.in_process { background:#fff3e0; color:#e67e22; }
    .detail-badge.completed  { background:#e8f5e9; color:#27ae60; }
    .detail-badge.overdue    { background:#fde8e8; color:#c0392b; }
    .detail-badge.high   { background:#fde8e8; color:#c0392b; }
    .detail-badge.medium { background:#fef3cd; color:#b7791f; }
    .detail-badge.low    { background:#e8f5e9; color:#27ae60; }

    .col-empty { text-align:center; padding:24px 12px; color:var(--text-muted); font-size:12px; opacity:.6; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }

    .tasks-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .tasks-header h2 { font-size:18px; font-weight:800; flex:1; margin:0; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .form-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="page-title">Reminders</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ New Task</button>
      </div>
    </div>

    <div class="tasks-wrap">
      <!-- Sidebar -->
      <div class="tasks-sidebar">
        <div class="filter-label">View</div>
        <div class="filter-item active" data-filter="all" onclick="setFilter('all',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          All Staff <span class="filter-count" id="fc-all">0</span>
        </div>
        <div class="filter-label" style="margin-top:14px">By Member</div>
        <div id="memberFilters"></div>
      </div>

      <!-- Main -->
      <div class="tasks-main">
        <div class="stats-row" id="statsRow"></div>
        <div class="tasks-header">
          <h2 id="viewTitle">All Staff Tasks</h2>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="text" class="form-control" id="searchInput" placeholder="Search…" style="max-width:180px;font-size:13px" oninput="renderList()">
            <select id="filterPriority" onchange="renderList()" style="width:auto;padding:7px 12px;font-size:13px">
              <option value="">All Priorities</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select id="filterDue" onchange="renderList()" style="width:auto;padding:7px 12px;font-size:13px">
              <option value="">All Due Dates</option>
              <option value="overdue">Overdue</option>
              <option value="today">Due Today</option>
              <option value="week">Due This Week</option>
            </select>
          </div>
        </div>
        <div id="taskList"></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- Task Modal -->
<div id="taskModal" class="modal-overlay">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">New Task</span>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
      <input type="hidden" id="tmId">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="tmTitle" class="form-control" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label>Assign To *</label>
        <select id="tmAssignId" class="form-control">
          <option value="">Select member…</option>
          <option value="administration">🏢 Administration (Admin · Head Admin · Manager)</option>
          <option disabled>──────────────</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date *</label>
          <input type="date" id="tmDue" class="form-control">
        </div>
        <div class="form-group">
          <label>Due Time *</label>
          <div style="display:flex;gap:6px">
            <select id="tmHour" class="form-control" style="flex:1"><option value="">HH</option></select>
            <select id="tmMinute" class="form-control" style="flex:1"><option value="">MM</option></select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Priority *</label>
        <select id="tmPriority" class="form-control">
          <option value="">Select priority…</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Repeat <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <select id="tmRepeat" class="form-control">
          <option value="">No repeat</option>
          <option value="daily">Every day</option>
          <option value="weekly">Every week</option>
          <option value="biweekly">Every 2 weeks</option>
          <option value="monthly">Every month</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <textarea id="tmNote" class="form-control" rows="3" placeholder="Additional details…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Task Detail Panel -->
<div id="detailOverlay" class="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div class="detail-status-bar" id="detailBar"></div>
      <div class="detail-title" id="detailTitle"></div>
      <button class="detail-close" onclick="closeDetailPanel()">×</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-footer" id="detailFooter"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth('manreminders');
renderSidebar('manreminders');

const me = getSession();
const myRoles = (me.roles || [me.title || '']).map(r => String(r).trim().toLowerCase());
const isCEO = myRoles.includes('ceo');

let ALL_TASKS = [];
let ALL_USERS = [];
let CURRENT_FILTER = 'all'; // 'all' or a user id

const STATUS_ORDER = ['pending','in_process','completed','overdue'];
const STATUS_LABEL = { pending:'Pending', in_process:'In Process', completed:'Completed', overdue:'Overdue' };
const STATUS_BAR_COLOR = { pending:'#3b5bdb', in_process:'#e67e22', completed:'#27ae60', overdue:'#c0392b' };

// Populate hour/minute selects
(function(){
  const h = document.getElementById('tmHour');
  const m = document.getElementById('tmMinute');
  for (let i=0;i<24;i++) { const o=document.createElement('option'); o.value=String(i).padStart(2,'0'); o.textContent=String(i).padStart(2,'0'); h.appendChild(o); }
  for (let i=0;i<60;i+=5) { const o=document.createElement('option'); o.value=String(i).padStart(2,'0'); o.textContent=String(i).padStart(2,'0'); m.appendChild(o); }
})();

async function init() {
  const [tasks, users] = await Promise.all([
    apiGet('/api/reminders/all'),
    apiGet('/api/members').catch(() => []),
  ]);
  ALL_TASKS = tasks || [];
  ALL_USERS = users || [];

  // Populate assign select
  const sel = document.getElementById('tmAssignId');
  ALL_USERS.forEach(u => {
    const o = document.createElement('option');
    o.value = u.id;
    o.textContent = reverseName(u.name) + (u.title ? ` — ${u.title}` : '');
    sel.appendChild(o);
  });

  buildMemberFilters();
  renderStats();
  renderList();
}

function filteredTasks() {
  if (CURRENT_FILTER === 'all') return ALL_TASKS;
  if (CURRENT_FILTER === 'administration') return ALL_TASKS.filter(t => t.assignedToId === 'administration');
  return ALL_TASKS.filter(t => t.assignedToId === CURRENT_FILTER);
}

function buildMemberFilters() {
  // Count tasks per user (non-completed)
  const counts = {};
  ALL_TASKS.forEach(t => {
    if (t.status === 'completed') return;
    const key = t.assignedToId || 'unknown';
    counts[key] = (counts[key] || 0) + 1;
  });

  document.getElementById('fc-all').textContent = ALL_TASKS.filter(t => t.status !== 'completed').length;

  // Collect unique assignees from tasks
  const seen = new Set();
  const people = [];
  ALL_TASKS.forEach(t => {
    const key = t.assignedToId;
    if (!key || seen.has(key)) return;
    seen.add(key);
    people.push({ id: key, name: t.assignedToName || key });
  });
  people.sort((a,b) => a.name.localeCompare(b.name));

  const container = document.getElementById('memberFilters');
  container.innerHTML = people.map(p => `
    <div class="filter-item" data-filter="${esc(p.id)}" onclick="setFilter('${esc(p.id)}',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(reverseName(p.name))}</span>
      <span class="filter-count">${counts[p.id] || 0}</span>
    </div>`).join('');
}

function setFilter(filter, el) {
  CURRENT_FILTER = filter;
  document.querySelectorAll('.filter-item').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  const name = filter === 'all' ? 'All Staff Tasks'
    : reverseName(ALL_TASKS.find(t => t.assignedToId === filter)?.assignedToName) || filter;
  document.getElementById('viewTitle').textContent = name;
  renderStats();
  renderList();
}

function renderStats() {
  const items = filteredTasks();
  const stats = [
    { val: items.filter(t=>t.status==='pending').length,    lbl:'Pending',    color:'#3b5bdb', bg:'#eef2ff', icon:'⏳' },
    { val: items.filter(t=>t.status==='in_process').length, lbl:'In Process', color:'#e67e22', bg:'#fff3e0', icon:'🔄' },
    { val: items.filter(t=>t.status==='completed').length,  lbl:'Completed',  color:'#27ae60', bg:'#e8f5e9', icon:'✅' },
    { val: items.filter(t=>t.status==='overdue').length,    lbl:'Overdue',    color:'#c0392b', bg:'#fde8e8', icon:'🚨' },
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s =>
    `<div class="stat-card">
      <div class="stat-icon" style="background:${s.bg}">${s.icon}</div>
      <div class="stat-text">
        <div class="stat-val" style="color:${s.color}">${s.val}</div>
        <div class="stat-lbl">${s.lbl}</div>
      </div>
    </div>`
  ).join('');
}

function renderList() {
  const q  = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const fp = document.getElementById('filterPriority')?.value || '';
  const fd = document.getElementById('filterDue')?.value || '';
  let items = filteredTasks();
  if (q)  items = items.filter(t => t.title.toLowerCase().includes(q) || (t.note||'').toLowerCase().includes(q));
  if (fp) items = items.filter(t => t.priority === fp);
  if (fd) {
    const now = new Date();
    const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    const weekEnd  = new Date(todayEnd); weekEnd.setDate(weekEnd.getDate() + (7 - weekEnd.getDay()));
    items = items.filter(t => {
      if (!t.dueDate) return false;
      const d = new Date(t.dueDate);
      if (fd === 'overdue') return d < now;
      if (fd === 'today')   return d <= todayEnd && d >= new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (fd === 'week')    return d <= weekEnd && d >= now;
      return true;
    });
  }

  const PRIO_ORDER = { high:0, medium:1, low:2 };
  const el = document.getElementById('taskList');
  el.innerHTML = `<div class="kanban">${STATUS_ORDER.map(s => {
    let tasks = items.filter(t => t.status === s);
    if (s === 'pending') tasks = [...tasks].sort((a,b) => (PRIO_ORDER[a.priority]??1) - (PRIO_ORDER[b.priority]??1));
    return `<div class="kanban-col col-${s}">
      <div class="kanban-col-header">
        <span class="col-dot"></span>
        <span class="kanban-col-title">${STATUS_LABEL[s]}</span>
        <span class="kanban-col-count">${tasks.length}</span>
      </div>
      <div class="kanban-col-body">
        ${tasks.length ? tasks.map(t => cardHTML(t)).join('') : `<div class="col-empty">No tasks</div>`}
      </div>
    </div>`;
  }).join('')}</div>`;
  tickTimers();
}

function cardHTML(t) {
  const canEdit   = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const canDelete = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const dueLabel  = t.dueDate ? fmtDate(t.dueDate) + (t.dueTime ? ' · ' + t.dueTime.slice(0,5) : '') : '';
  const isOverdueDue = t.status === 'overdue';
  const PRIO_COLORS = { high:'#c0392b', medium:'#e67e22', low:'#27ae60' };
  const prioColor = PRIO_COLORS[t.priority] || '#999';

  let dueIso = '';
  if (t.dueDate) {
    const timeStr = t.dueTime ? t.dueTime.slice(0,5) : '23:59';
    dueIso = t.dueDate.slice(0,10) + 'T' + timeStr + ':00';
  }
  const timerHtml = (dueIso && t.status !== 'completed')
    ? `<span class="task-timer" data-due="${dueIso}">${timerText(dueIso)}</span>`
    : '';

  const assigneeLabel = t.assignedToId === 'administration' ? '🏢 Administration' : reverseName(t.assignedToName || '');
  const creatorLabel  = reverseName(t.createdByName || '');

  return `<div class="task-card status-${t.status} pri-${t.priority}" data-id="${t.id}" onclick="showTaskDetail('${t.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
      <div class="task-title${t.status==='completed'?' done-text':''}">${esc(t.title)}</div>
      <span style="font-size:10px;font-weight:700;color:${prioColor};white-space:nowrap;flex-shrink:0;margin-top:2px">${cap(t.priority)}</span>
    </div>
    ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
    ${timerHtml ? `<div style="margin-top:7px">${timerHtml}</div>` : ''}
    <div class="task-footer" style="margin-top:8px">
      <div class="task-footer-left" style="flex:1;min-width:0;display:flex;flex-wrap:wrap;gap:4px">
        ${assigneeLabel ? `<span class="pill pill-assignee" style="font-size:10px">→ ${esc(assigneeLabel)}</span>` : ''}
        ${creatorLabel  ? `<span class="pill pill-person"   style="font-size:10px">From: ${esc(creatorLabel)}</span>` : ''}
        ${dueLabel ? `<span class="pill pill-due${isOverdueDue?' overdue':''}" style="font-size:10px">📅 ${dueLabel}</span>` : ''}
        ${t.repeatEvery ? `<span class="pill" style="font-size:10px;background:#f0fdf4;color:#16a34a">🔁 ${t.repeatEvery}</span>` : ''}
      </div>
      <div class="task-footer-right">
        ${canEdit   ? `<button class="task-btn" onclick="event.stopPropagation();editTask('${t.id}')">Edit</button>` : ''}
        ${canDelete ? `<button class="task-btn danger" onclick="event.stopPropagation();deleteTask('${t.id}')">Del</button>` : ''}
      </div>
    </div>
  </div>`;
}

function cap(s) { return s ? s[0].toUpperCase()+s.slice(1) : ''; }
function esc(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${String(dt.getUTCDate()).padStart(2,'0')}.${String(dt.getUTCMonth()+1).padStart(2,'0')}.${dt.getUTCFullYear()}`;
}

function timerText(isoStr) {
  const diff = new Date(isoStr) - Date.now();
  if (diff <= 0) return '⏰ Overdue';
  const totalMin = Math.floor(diff / 60000);
  const d = Math.floor(totalMin / 1440);
  const h = Math.floor((totalMin % 1440) / 60);
  const m = totalMin % 60;
  if (d > 0) return `⏳ ${d}d ${h}h left`;
  if (h > 0) return `⏳ ${h}h ${m}m left`;
  return `⚡ ${m}m left`;
}
function timerClass(isoStr) {
  const diff = new Date(isoStr) - Date.now();
  if (diff <= 0) return 'timer-over';
  const min = diff / 60000;
  if (min < 60) return 'timer-urgent';
  if (min < 180) return 'timer-soon';
  return 'timer-ok';
}
function tickTimers() {
  document.querySelectorAll('.task-timer[data-due]').forEach(el => {
    el.textContent = timerText(el.dataset.due);
    el.className = 'task-timer ' + timerClass(el.dataset.due);
  });
}
setInterval(tickTimers, 30000);

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiDelete(`/api/reminders/${id}`);
    ALL_TASKS = ALL_TASKS.filter(x => x.id !== id);
    buildMemberFilters(); renderStats(); renderList();
    showToast('Task deleted');
  } catch(e) { showToast(e.message || 'Cannot delete', 'error'); }
}

function openTaskModal(task) {
  document.getElementById('tmId').value = task?.id || '';
  document.getElementById('tmTitle').value = task?.title || '';
  document.getElementById('tmNote').value = task?.note || '';
  document.getElementById('tmDue').value = task?.dueDate ? task.dueDate.slice(0,10) : '';
  const timeParts = task?.dueTime ? task.dueTime.slice(0,5).split(':') : ['',''];
  document.getElementById('tmHour').value = timeParts[0] || '';
  document.getElementById('tmMinute').value = timeParts[1] ? String(Math.round(parseInt(timeParts[1])/5)*5).padStart(2,'0') : '';
  document.getElementById('tmPriority').value = task?.priority || '';
  document.getElementById('tmRepeat').value = task?.repeatEvery || '';
  document.getElementById('tmAssignId').value = task ? (task.assignedToId || me.id) : me.id;
  document.getElementById('taskModalTitle').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }
function editTask(id) { const t = ALL_TASKS.find(x => x.id === id); if (t) openTaskModal(t); }

async function saveTask() {
  const id           = document.getElementById('tmId').value;
  const title        = document.getElementById('tmTitle').value.trim();
  const assignedToId = document.getElementById('tmAssignId').value;
  const dueDate      = document.getElementById('tmDue').value;
  const hour         = document.getElementById('tmHour').value;
  const minute       = document.getElementById('tmMinute').value;
  const priority     = document.getElementById('tmPriority').value;
  const dueTime      = (hour && minute) ? `${hour}:${minute}` : '';
  if (!title)        return showToast('Please enter a title', 'error');
  if (!assignedToId) return showToast('Please select a member', 'error');
  if (!dueDate)      return showToast('Please set a due date', 'error');
  if (!dueTime)      return showToast('Please set a due time', 'error');
  if (!priority)     return showToast('Please select a priority', 'error');
  const body = { title, note: document.getElementById('tmNote').value.trim() || null, dueDate, dueTime, priority, assignedToId, repeatEvery: document.getElementById('tmRepeat').value || null };
  try {
    if (id) { await apiPut(`/api/reminders/${id}`, body); showToast('Task updated'); }
    else     { await apiPost('/api/reminders', { ...body, id: 'rem_'+Date.now()+'_'+Math.random().toString(36).slice(2,6) }); showToast('Task created'); }
    closeTaskModal();
    ALL_TASKS = await apiGet('/api/reminders/all');
    buildMemberFilters(); renderStats(); renderList();
  } catch(e) { showToast(e.message || 'Error saving', 'error'); }
}

function showTaskDetail(id) {
  const t = ALL_TASKS.find(x => x.id === id);
  if (!t) return;
  document.getElementById('detailTitle').textContent = t.title;
  document.getElementById('detailBar').style.background = STATUS_BAR_COLOR[t.status] || '#ccc';
  const dueStr = t.dueDate ? fmtDate(t.dueDate) + (t.dueTime ? ' at ' + t.dueTime.slice(0,5) : '') : (t.dueTime ? t.dueTime.slice(0,5) : '—');
  const rows = [
    { lbl:'Status',      val:`<span class="detail-badge ${t.status}">${STATUS_LABEL[t.status]}</span>` },
    { lbl:'Priority',    val:`<span class="detail-badge ${t.priority}">${cap(t.priority)}</span>` },
    { lbl:'Assigned to', val: esc(t.assignedToId === 'administration' ? '🏢 Administration' : (reverseName(t.assignedToName)||'—')) },
    { lbl:'Created by',  val: esc(reverseName(t.createdByName)||'—') },
    { lbl:'Due',         val: dueStr },
    { lbl:'Repeat',      val: t.repeatEvery ? `🔁 ${t.repeatEvery}` : '—' },
    { lbl:'Created',     val: fmtDate(t.createdAt) },
  ];
  document.getElementById('detailBody').innerHTML =
    rows.map(r => `<div class="detail-row"><span class="detail-lbl">${r.lbl}</span><span class="detail-val">${r.val}</span></div>`).join('') +
    (t.note ? `<div><div class="detail-lbl" style="margin-bottom:6px">Note</div><div class="detail-note">${esc(t.note)}</div></div>` : '');
  const canEdit   = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const canDelete = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  document.getElementById('detailFooter').innerHTML =
    (canEdit   ? `<button class="btn btn-secondary btn-sm" onclick="closeDetailPanel();editTask('${t.id}')">Edit</button>` : '') +
    (canDelete ? `<button class="btn btn-sm" style="background:#fde8e8;color:#c0392b;border:1px solid #fca5a5" onclick="closeDetailPanel();deleteTask('${t.id}')">Delete</button>` : '');
  if (!canEdit && !canDelete) document.getElementById('detailFooter').style.display = 'none';
  else document.getElementById('detailFooter').style.display = '';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailPanel() { document.getElementById('detailOverlay').classList.remove('open'); }
function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailPanel(); }

init();
setupLive(['reminders'], async () => { ALL_TASKS = await apiGet('/api/reminders/all'); buildMemberFilters(); renderStats(); renderList(); });
</script>
</body>
</html>
