<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { height:100%; overflow:hidden; }
    .main { height:100vh; max-width:none !important; width:calc(100vw - var(--nav-w)); overflow:hidden; display:flex; flex-direction:column; }
    .topbar { flex-shrink:0; }
    .tasks-wrap { display:flex; flex:1; min-height:0; overflow:hidden; }
    .tasks-sidebar { width:200px; flex-shrink:0; border-right:1px solid var(--border); background:var(--white); overflow-y:auto; padding:18px 0; }
    .tasks-main { flex:1; min-width:0; overflow-y:auto; padding:24px 28px; }
    .app-footer { display:none !important; }
    @media(max-width:640px){ .main{width:100vw;} .tasks-sidebar{display:none;} }

    /* Sidebar */
    .filter-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); padding:0 18px; margin-bottom:6px; }
    .filter-item { display:flex; align-items:center; gap:10px; padding:9px 14px; margin:0 6px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); transition:background .12s; }
    .filter-item:hover { background:var(--bg); }
    .filter-item.active { background:rgba(192,57,43,.09); color:var(--primary); font-weight:600; }
    .filter-count { margin-left:auto; font-size:11px; background:var(--bg); border-radius:20px; padding:1px 7px; color:var(--text-muted); font-weight:500; min-width:20px; text-align:center; }
    .filter-item.active .filter-count { background:rgba(192,57,43,.12); color:var(--primary); }

    /* Stats */
    .stats-row { display:flex; gap:10px; margin-bottom:22px; }
    .stat-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:12px 16px; flex:1; text-align:center; }
    .stat-val { font-size:22px; font-weight:800; }
    .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* Kanban columns */
    .kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:start; }
    .kanban-col { background:var(--bg); border-radius:12px; padding:12px; min-height:120px; }
    .kanban-col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .kanban-col-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; }
    .kanban-col-count { font-size:11px; font-weight:700; background:var(--white); border-radius:20px; padding:1px 8px; }
    .col-pending .kanban-col-title { color:#3b5bdb; }
    .col-in_process .kanban-col-title { color:#e67e22; }
    .col-completed .kanban-col-title { color:#27ae60; }
    .col-overdue .kanban-col-title { color:#c0392b; }
    /* Task cards */
    .task-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; transition:box-shadow .12s; }
    .task-card:last-child { margin-bottom:0; }
    .task-card:hover { box-shadow:0 2px 10px rgba(0,0,0,.07); }
    .task-card.status-overdue { border-left:3px solid #c0392b; }
    .task-card.status-completed { opacity:.55; }
    .task-top { display:flex; align-items:flex-start; gap:10px; }
    .task-body { flex:1; min-width:0; }
    .task-title { font-size:14px; font-weight:600; color:var(--text); line-height:1.4; }
    .task-title.done-text { text-decoration:line-through; color:var(--text-muted); }
    .task-note { font-size:12px; color:var(--text-muted); margin-top:3px; line-height:1.5; }
    .task-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center; }
    .pill { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
    .pill-high { background:#fde8e8; color:#c0392b; }
    .pill-medium { background:#fef3cd; color:#b7791f; }
    .pill-low { background:#e8f5e9; color:#27ae60; }
    .pill-due { background:#f0f4ff; color:#3b5bdb; }
    .pill-due.overdue { background:#fde8e8; color:#c0392b; }
    .pill-person { background:#f5f0ff; color:#6f42c1; }

    /* Status badge */
    .status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; flex-shrink:0; }
    .badge-pending { background:#f0f4ff; color:#3b5bdb; }
    .badge-in_process { background:#fff3e0; color:#e67e22; }
    .badge-completed { background:#e8f5e9; color:#27ae60; }
    .badge-overdue { background:#fde8e8; color:#c0392b; }

    /* Progress buttons (assignee only) */
    .progress-btn { border:none; border-radius:6px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; transition:all .12s; }
    .btn-start { background:#fff3e0; color:#e67e22; }
    .btn-start:hover { background:#e67e22; color:#fff; }
    .btn-done { background:#e8f5e9; color:#27ae60; }
    .btn-done:hover { background:#27ae60; color:#fff; }

    /* Edit/Delete */
    .task-actions { display:flex; gap:6px; flex-shrink:0; }
    .task-btn { border:1px solid var(--border); background:var(--white); color:var(--text-muted); border-radius:6px; padding:4px 9px; font-size:11px; cursor:pointer; transition:all .12s; }
    .task-btn:hover { background:var(--bg); color:var(--text); }
    .task-btn.danger:hover { background:#fde8e8; border-color:#fbb; color:#c0392b; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty-state svg { display:block; margin:0 auto 14px; opacity:.25; }

    /* Modal */
    .usd { position:relative; }
    .usd-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--white); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto; z-index:300; box-shadow:0 4px 12px rgba(0,0,0,.1); display:none; }
    .usd-item { padding:9px 14px; cursor:pointer; font-size:13px; }
    .usd-item:hover { background:var(--bg); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .form-row{grid-template-columns:1fr;} }
    .tasks-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .tasks-header h2 { font-size:18px; font-weight:800; flex:1; margin:0; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="page-title">Tasks</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ New Task</button>
      </div>
    </div>

    <div class="tasks-wrap">
      <!-- Sidebar -->
      <div class="tasks-sidebar">
        <div class="filter-label">View</div>
        <div class="filter-item active" data-filter="inbox" onclick="setFilter('inbox',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          My Tasks <span class="filter-count" id="fc-inbox">0</span>
        </div>
        <div class="filter-item" data-filter="assigned" onclick="setFilter('assigned',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Assigned by Me <span class="filter-count" id="fc-assigned">0</span>
        </div>
      </div>

      <!-- Main -->
      <div class="tasks-main">
        <div class="stats-row" id="statsRow"></div>
        <div class="tasks-header">
          <h2 id="viewTitle">My Tasks</h2>
          <input type="text" class="form-control" id="searchInput" placeholder="Search…" style="max-width:200px;font-size:13px" oninput="renderList()">
        </div>
        <div id="taskList"></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- Task Modal -->
<div id="taskModal" class="modal-overlay">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">New Task</span>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
      <input type="hidden" id="tmId">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="tmTitle" class="form-control" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label>Assign To *</label>
        <div class="usd">
          <input type="text" id="tmAssignSearch" class="form-control" placeholder="Search member…" autocomplete="off" oninput="searchAssign()">
          <div id="tmAssignDd" class="usd-dropdown"></div>
        </div>
        <input type="hidden" id="tmAssignId">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="tmDue" class="form-control">
        </div>
        <div class="form-group">
          <label>Due Time</label>
          <input type="time" id="tmTime" class="form-control">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="tmPriority" class="form-control">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div></div>
      </div>
      <div class="form-group">
        <label>Note <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <textarea id="tmNote" class="form-control" rows="3" placeholder="Additional details…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth();
renderSidebar('reminders');

const me = getSession();
const myRoles = (me.roles || [me.title || '']).map(r => String(r).trim().toLowerCase());
const isCEO = myRoles.includes('ceo');

let ALL_TASKS = [];
let ALL_USERS = [];
let CURRENT_FILTER = 'inbox';

const STATUS_ORDER = ['pending','in_process','completed','overdue'];
const STATUS_LABEL = { pending:'Pending', in_process:'In Process', completed:'Completed', overdue:'Overdue' };
const STATUS_NEXT  = { pending:'in_process', in_process:'completed' };
const STATUS_BTN   = { pending:['btn-start','Mark In Process'], in_process:['btn-done','Mark Completed'] };

async function init() {
  const [tasks, users] = await Promise.all([apiGet('/api/reminders'), apiGet('/api/users')]);
  ALL_TASKS = tasks || [];
  ALL_USERS = users || [];
  updateCounts();
  renderStats();
  renderList();
}

function myTasks()       { return ALL_TASKS.filter(t => t.assignedToId === me.id); }
function assignedByMe()  { return ALL_TASKS.filter(t => t.createdById === me.id && t.assignedToId !== me.id); }

function updateCounts() {
  document.getElementById('fc-inbox').textContent    = myTasks().filter(t => t.status !== 'completed').length;
  document.getElementById('fc-assigned').textContent = assignedByMe().length;
}

function renderStats() {
  const inbox = myTasks();
  const stats = [
    { val: inbox.filter(t=>t.status==='pending').length,    lbl:'Pending',    color:'#3b5bdb' },
    { val: inbox.filter(t=>t.status==='in_process').length, lbl:'In Process', color:'#e67e22' },
    { val: inbox.filter(t=>t.status==='completed').length,  lbl:'Completed',  color:'#27ae60' },
    { val: inbox.filter(t=>t.status==='overdue').length,    lbl:'Overdue',    color:'#c0392b' },
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`
  ).join('');
}

function setFilter(filter, el) {
  CURRENT_FILTER = filter;
  document.querySelectorAll('.filter-item').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('viewTitle').textContent = filter === 'inbox' ? 'My Tasks' : 'Assigned by Me';
  renderList();
}

function renderList() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let items = CURRENT_FILTER === 'inbox' ? myTasks() : assignedByMe();
  if (q) items = items.filter(t => t.title.toLowerCase().includes(q) || (t.note||'').toLowerCase().includes(q));

  // Group by status
  const groups = STATUS_ORDER.map(s => ({ status: s, tasks: items.filter(t => t.status === s) })).filter(g => g.tasks.length);

  const el = document.getElementById('taskList');
  const COL_COLORS = { pending:'#3b5bdb', in_process:'#e67e22', completed:'#27ae60', overdue:'#c0392b' };
  el.innerHTML = `<div class="kanban">${STATUS_ORDER.map(s => {
    const tasks = items.filter(t => t.status === s);
    return `<div class="kanban-col col-${s}">
      <div class="kanban-col-header">
        <span class="kanban-col-title">${STATUS_LABEL[s]}</span>
        <span class="kanban-col-count" style="color:${COL_COLORS[s]}">${tasks.length}</span>
      </div>
      ${tasks.length ? tasks.map(t => cardHTML(t)).join('') : `<div style="text-align:center;padding:20px 0;color:var(--text-muted);font-size:12px">No tasks</div>`}
    </div>`;
  }).join('')}</div>`;
}

function cardHTML(t) {
  const isAssignee = t.assignedToId === me.id;
  const canEdit = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const canDelete = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const dueLabel = t.dueDate ? fmtDate(t.dueDate) + (t.dueTime ? ' ' + t.dueTime.slice(0,5) : '') : '';
  const isOverdueDue = t.dueDate && t.status === 'overdue';
  const personPill = t.assignedToId === t.createdById
    ? `<span class="pill" style="background:#f0f0f0;color:#666">Self</span>`
    : CURRENT_FILTER === 'inbox'
      ? `<span class="pill pill-person">From: ${esc(t.createdByName||'')}</span>`
      : `<span class="pill pill-person">To: ${esc(t.assignedToName||'')}</span>`;

  // Progress button: only assignee, only on non-overdue non-completed
  let progressBtn = '';
  if (isAssignee && STATUS_BTN[t.status]) {
    const [cls, label] = STATUS_BTN[t.status];
    progressBtn = `<button class="progress-btn ${cls}" onclick="advanceStatus('${t.id}','${STATUS_NEXT[t.status]}')">${label}</button>`;
  }

  return `<div class="task-card status-${t.status}">
    <div class="task-top">
      <div class="task-body">
        <div class="task-title${t.status==='completed'?' done-text':''}">${esc(t.title)}</div>
        ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        <div class="task-meta">
          <span class="pill pill-${t.priority}">${cap(t.priority)}</span>
          ${dueLabel ? `<span class="pill pill-due${isOverdueDue?' overdue':''}">${dueLabel}</span>` : ''}
          ${personPill}
        </div>
      </div>
      <div class="task-actions">
        ${progressBtn}
        ${canEdit ? `<button class="task-btn" onclick="editTask('${t.id}')">Edit</button>` : ''}
        ${canDelete ? `<button class="task-btn danger" onclick="deleteTask('${t.id}')">Delete</button>` : ''}
      </div>
    </div>
  </div>`;
}

function cap(s) { return s ? s[0].toUpperCase()+s.slice(1) : ''; }
function esc(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${String(dt.getUTCDate()).padStart(2,'0')}.${String(dt.getUTCMonth()+1).padStart(2,'0')}.${dt.getUTCFullYear()}`;
}

async function advanceStatus(id, newStatus) {
  try {
    await apiPut(`/api/reminders/${id}/status`, { status: newStatus });
    const t = ALL_TASKS.find(x => x.id === id);
    if (t) t.status = newStatus;
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
  } catch(e) { showToast(e.message || 'Error', 'error'); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiDelete(`/api/reminders/${id}`);
    ALL_TASKS = ALL_TASKS.filter(x => x.id !== id);
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
    showToast('Task deleted');
  } catch(e) { showToast(e.message || 'Cannot delete', 'error'); }
}

// Modal
function openTaskModal(task) {
  document.getElementById('tmId').value = task?.id || '';
  document.getElementById('tmTitle').value = task?.title || '';
  document.getElementById('tmNote').value = task?.note || '';
  document.getElementById('tmDue').value = task?.dueDate ? task.dueDate.slice(0,10) : '';
  document.getElementById('tmTime').value = task?.dueTime ? task.dueTime.slice(0,5) : '';
  document.getElementById('tmPriority').value = task?.priority || 'medium';
  document.getElementById('tmAssignSearch').value = task ? (task.assignedToName || '') : me.name;
  document.getElementById('tmAssignId').value = task ? (task.assignedToId || '') : me.id;
  document.getElementById('taskModalTitle').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

function editTask(id) { const t = ALL_TASKS.find(x => x.id === id); if (t) openTaskModal(t); }

function searchAssign() {
  const q = document.getElementById('tmAssignSearch').value.trim().toLowerCase();
  document.getElementById('tmAssignId').value = '';
  const dd = document.getElementById('tmAssignDd');
  if (!q) { dd.style.display='none'; return; }
  const hits = ALL_USERS.filter(u => u.name && u.name.toLowerCase().includes(q)).slice(0,8);
  if (!hits.length) { dd.style.display='none'; return; }
  dd.innerHTML = hits.map(u => `<div class="usd-item" onclick="pickAssign('${u.id}','${esc(u.name)}')">${esc(u.name)}<span style="color:var(--text-muted);font-size:11px;margin-left:6px">${u.title||''}</span></div>`).join('');
  dd.style.display = 'block';
}
function pickAssign(id, name) {
  document.getElementById('tmAssignId').value = id;
  document.getElementById('tmAssignSearch').value = name;
  document.getElementById('tmAssignDd').style.display = 'none';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#tmAssignSearch') && !e.target.closest('#tmAssignDd'))
    document.getElementById('tmAssignDd').style.display = 'none';
});

async function saveTask() {
  const id = document.getElementById('tmId').value;
  const title = document.getElementById('tmTitle').value.trim();
  const assignedToId = document.getElementById('tmAssignId').value;
  if (!title) return showToast('Please enter a title', 'error');
  if (!assignedToId) return showToast('Please select a member', 'error');
  const body = {
    title,
    note: document.getElementById('tmNote').value.trim() || null,
    dueDate: document.getElementById('tmDue').value || null,
    dueTime: document.getElementById('tmTime').value || null,
    priority: document.getElementById('tmPriority').value,
    assignedToId,
  };
  try {
    if (id) {
      await apiPut(`/api/reminders/${id}`, body);
      showToast('Task updated');
    } else {
      await apiPost('/api/reminders', { ...body, id: 'rem_'+Date.now()+'_'+Math.random().toString(36).slice(2,6) });
      showToast('Task created');
    }
    closeTaskModal();
    ALL_TASKS = await apiGet('/api/reminders');
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
  } catch(e) { showToast(e.message || 'Error saving', 'error'); }
}

init();
</script>
</body>
</html>
