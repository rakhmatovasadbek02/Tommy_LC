<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { height:100%; overflow:hidden; }
    .main { height:100vh; max-width:none !important; width:calc(100vw - var(--nav-w)); overflow:hidden; display:flex; flex-direction:column; }
    .topbar { flex-shrink:0; }
    .tasks-wrap { display:flex; flex:1; min-height:0; overflow:hidden; }
    .tasks-sidebar { width:200px; flex-shrink:0; border-right:1px solid var(--border); background:var(--white); overflow-y:auto; padding:18px 0; }
    .tasks-main { flex:1; min-width:0; overflow-y:auto; padding:24px 28px; }
    .app-footer { display:none !important; }
    @media(max-width:640px){ .main{width:100vw;} .tasks-sidebar{display:none;} }

    /* Sidebar */
    .filter-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-muted); padding:0 18px; margin-bottom:6px; }
    .filter-item { display:flex; align-items:center; gap:10px; padding:9px 14px; margin:0 6px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); transition:background .12s; }
    .filter-item:hover { background:var(--bg); }
    .filter-item.active { background:rgba(192,57,43,.09); color:var(--primary); font-weight:600; }
    .filter-count { margin-left:auto; font-size:11px; background:var(--bg); border-radius:20px; padding:1px 7px; color:var(--text-muted); font-weight:500; min-width:20px; text-align:center; }
    .filter-item.active .filter-count { background:rgba(192,57,43,.12); color:var(--primary); }

    /* Stats */
    .stats-row { display:flex; gap:12px; margin-bottom:20px; }
    .stat-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px 18px; flex:1; display:flex; align-items:center; gap:14px; }
    .stat-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:17px; }
    .stat-text {}
    .stat-val { font-size:20px; font-weight:800; line-height:1; }
    .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:3px; font-weight:500; }

    /* Kanban board */
    .kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start; }
    .kanban-col { border-radius:14px; overflow:hidden; border:1px solid var(--border); background:var(--white); display:flex; flex-direction:column; }
    .kanban-col-header { display:flex; align-items:center; gap:10px; padding:13px 14px 12px; border-bottom:1px solid var(--border); }
    .col-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .col-pending   .col-dot { background:#3b5bdb; }
    .col-in_process .col-dot { background:#e67e22; }
    .col-completed .col-dot { background:#27ae60; }
    .col-overdue   .col-dot { background:#c0392b; }
    .kanban-col-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; flex:1; }
    .col-pending   .kanban-col-title { color:#3b5bdb; }
    .col-in_process .kanban-col-title { color:#e67e22; }
    .col-completed .kanban-col-title { color:#27ae60; }
    .col-overdue   .kanban-col-title { color:#c0392b; }
    .kanban-col-count { font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; min-width:22px; text-align:center; }
    .col-pending   .kanban-col-count { background:#eef2ff; color:#3b5bdb; }
    .col-in_process .kanban-col-count { background:#fff3e0; color:#e67e22; }
    .col-completed .kanban-col-count { background:#e8f5e9; color:#27ae60; }
    .col-overdue   .kanban-col-count { background:#fde8e8; color:#c0392b; }
    .kanban-col-body { padding:10px; display:flex; flex-direction:column; gap:8px; min-height:80px; }

    /* Task cards */
    .task-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 13px; transition:box-shadow .15s, transform .1s; position:relative; }
    .task-card:hover { box-shadow:0 3px 12px rgba(0,0,0,.09); transform:translateY(-1px); }
    /* Priority-based card colors */
    .task-card.pri-high    { background:#fff5f5; border-color:#fca5a5; border-left:3px solid #c0392b; }
    .task-card.pri-medium  { background:#fffbf0; border-color:#fcd34d; border-left:3px solid #e67e22; }
    .task-card.pri-low     { background:#f0fdf4; border-color:#86efac; border-left:3px solid #27ae60; }
    /* Overdue overrides card color */
    .task-card.status-overdue { background:#fff0f0 !important; border-color:#fca5a5 !important; border-left:3px solid #c0392b !important; }
    .task-card.status-completed { opacity:.6; filter:grayscale(.3); }
    .task-top { display:flex; align-items:flex-start; gap:8px; }
    .task-body { flex:1; min-width:0; }
    .task-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.45; }
    .task-title.done-text { text-decoration:line-through; color:var(--text-muted); }
    .task-note { font-size:11.5px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
    .task-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; align-items:center; }
    .pill { padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:600; }
    .pill-high   { background:#fde8e8; color:#c0392b; }
    .pill-medium { background:#fef3cd; color:#b7791f; }
    .pill-low    { background:#e8f5e9; color:#27ae60; }
    .pill-due    { background:#f0f4ff; color:#3b5bdb; }
    .pill-due.overdue { background:#fde8e8; color:#c0392b; }
    .pill-person { background:#f5f0ff; color:#6f42c1; }
    .task-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:1px solid var(--border); gap:6px; }
    .task-footer-left { display:flex; gap:5px; flex-wrap:wrap; }
    .task-footer-right { display:flex; gap:5px; flex-shrink:0; }

    /* Progress button */
    .progress-btn { border:none; border-radius:6px; padding:4px 11px; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px; }
    .btn-start { background:#fff3e0; color:#e67e22; }
    .btn-start:hover { background:#e67e22; color:#fff; }
    .btn-done  { background:#e8f5e9; color:#27ae60; }
    .btn-done:hover  { background:#27ae60; color:#fff; }

    /* Edit/Delete */
    .task-actions { display:flex; gap:5px; }
    .task-btn { border:1px solid var(--border); background:var(--white); color:var(--text-muted); border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; transition:all .12s; }
    .task-btn:hover { background:var(--bg); color:var(--text); }
    .task-btn.danger:hover { background:#fde8e8; border-color:#fbb; color:#c0392b; }

    /* Drag and drop */
    .task-card { cursor:pointer; }
    .task-card[draggable="true"] { cursor:grab; }
    .task-card[draggable="true"]:active { cursor:grabbing; }
    .task-card.dragging { opacity:.3; transform:scale(.98); }

    /* Task detail panel */
    .detail-overlay { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.35); align-items:center; justify-content:center; }
    .detail-overlay.open { display:flex; }
    .detail-panel { background:#fff; border-radius:16px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 16px 48px rgba(0,0,0,.18); animation:modalIn .18s ease; }
    .detail-header { padding:20px 22px 0; display:flex; align-items:flex-start; gap:12px; }
    .detail-status-bar { width:4px; border-radius:4px; flex-shrink:0; margin-top:4px; align-self:stretch; min-height:20px; }
    .detail-title { font-size:17px; font-weight:800; color:var(--text); line-height:1.35; flex:1; }
    .detail-close { width:30px; height:30px; border:none; background:var(--bg); border-radius:8px; cursor:pointer; font-size:18px; color:var(--text-muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s; }
    .detail-close:hover { background:var(--border); }
    .detail-body { padding:16px 22px 22px; display:flex; flex-direction:column; gap:14px; }
    .detail-row { display:flex; align-items:flex-start; gap:12px; }
    .detail-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); min-width:90px; padding-top:2px; flex-shrink:0; }
    .detail-val { font-size:13px; color:var(--text); font-weight:500; line-height:1.5; }
    .detail-note { background:var(--bg); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--text); line-height:1.6; margin-top:2px; }
    .detail-footer { padding:14px 22px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
    .detail-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:20px; font-size:12px; font-weight:700; }
    .detail-badge.pending    { background:#eef2ff; color:#3b5bdb; }
    .detail-badge.in_process { background:#fff3e0; color:#e67e22; }
    .detail-badge.completed  { background:#e8f5e9; color:#27ae60; }
    .detail-badge.overdue    { background:#fde8e8; color:#c0392b; }
    .detail-badge.high   { background:#fde8e8; color:#c0392b; }
    .detail-badge.medium { background:#fef3cd; color:#b7791f; }
    .detail-badge.low    { background:#e8f5e9; color:#27ae60; }
    .kanban-col.drag-over { background:#f0f4ff; border-color:#a5b4fc; }
    .kanban-col.drag-over .kanban-col-header { background:#eef2ff; }
    .kanban-col.drag-blocked { background:#fff8f8; border-color:#fca5a5; }

    .col-empty { text-align:center; padding:24px 12px; color:var(--text-muted); font-size:12px; opacity:.6; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty-state svg { display:block; margin:0 auto 14px; opacity:.25; }

    /* Print section */
    .print-toggle { display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:5px 12px;border-radius:7px;border:1px dashed var(--border);background:var(--bg);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .14s; }
    .print-toggle:hover,.print-toggle.active { border-color:#3b5bdb;background:#eef2ff;color:#3b5bdb; }
    .print-section { display:none;margin-top:10px;padding:14px;background:#f8f9ff;border:1px solid #c7d2fe;border-radius:10px; }
    .print-section.open { display:block; }
    .print-grid { display:grid;grid-template-columns:1fr 90px 90px 80px;gap:10px; }

    /* Modal */
    .usd { position:relative; }
    .usd-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--white); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto; z-index:300; box-shadow:0 4px 12px rgba(0,0,0,.1); display:none; }
    .usd-item { padding:9px 14px; cursor:pointer; font-size:13px; }
    .usd-item:hover { background:var(--bg); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .form-row{grid-template-columns:1fr;} }
    .tasks-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .tasks-header h2 { font-size:18px; font-weight:800; flex:1; margin:0; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="page-title">To Do List</div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ New Task</button>
      </div>
    </div>

    <div class="tasks-wrap">
      <!-- Sidebar -->
      <div class="tasks-sidebar">
        <div class="filter-label">View</div>
        <div class="filter-item active" data-filter="inbox" onclick="setFilter('inbox',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
          My Tasks <span class="filter-count" id="fc-inbox">0</span>
        </div>
        <div class="filter-item" data-filter="assigned" onclick="setFilter('assigned',this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Assigned by Me <span class="filter-count" id="fc-assigned">0</span>
        </div>
      </div>

      <!-- Main -->
      <div class="tasks-main">
        <div class="stats-row" id="statsRow"></div>
        <div class="tasks-header">
          <h2 id="viewTitle">My Tasks</h2>
          <input type="text" class="form-control" id="searchInput" placeholder="Search…" style="max-width:200px;font-size:13px" oninput="renderList()">
        </div>
        <div id="taskList"></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>

<!-- Task Modal -->
<div id="taskModal" class="modal-overlay">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <span class="modal-title" id="taskModalTitle">New Task</span>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
      <input type="hidden" id="tmId">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="tmTitle" class="form-control" placeholder="What needs to be done?" oninput="this.dataset.autofilled=''">
        <button type="button" class="print-toggle" id="printToggle" onclick="togglePrintSection()">
          🖨️ Print
        </button>
        <div class="print-section" id="printSection">
          <div class="print-grid">
            <div class="form-group" style="margin:0">
              <label style="font-size:11px">Level</label>
              <select id="prLevel" class="form-control" onchange="buildPrintTitle()">
                <option value="">Select…</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label style="font-size:11px">Number</label>
              <select id="prFileNum" class="form-control" onchange="onPrintNumChange()">
                <option value="">—</option>
              </select>
            </div>
            <div class="form-group" style="margin:0" id="prLetterWrap">
              <label style="font-size:11px">Letter</label>
              <select id="prFileLetter" class="form-control" onchange="buildPrintTitle()">
                <option value="">—</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label style="font-size:11px">Amount</label>
              <input type="number" id="prAmount" class="form-control" min="1" placeholder="30" oninput="buildPrintTitle()">
            </div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Assign To *</label>
        <div class="usd">
          <input type="text" id="tmAssignSearch" class="form-control" placeholder="Search member…" autocomplete="off" oninput="searchAssign()">
          <div id="tmAssignDd" class="usd-dropdown"></div>
        </div>
        <input type="hidden" id="tmAssignId">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date *</label>
          <input type="date" id="tmDue" class="form-control">
        </div>
        <div class="form-group">
          <label>Due Time *</label>
          <div style="display:flex;gap:6px">
            <select id="tmHour" class="form-control" style="flex:1">
              <option value="">HH</option>
            </select>
            <select id="tmMinute" class="form-control" style="flex:1">
              <option value="">MM</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Priority *</label>
        <select id="tmPriority" class="form-control">
          <option value="">Select priority…</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <textarea id="tmNote" class="form-control" rows="3" placeholder="Additional details…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Task Detail Panel -->
<div id="detailOverlay" class="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div class="detail-status-bar" id="detailBar"></div>
      <div class="detail-title" id="detailTitle"></div>
      <button class="detail-close" onclick="closeDetailPanel()">×</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-footer" id="detailFooter"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth();
renderSidebar('reminders');

const me = getSession();
const myRoles = (me.roles || [me.title || '']).map(r => String(r).trim().toLowerCase());
const isCEO = myRoles.includes('ceo');

let ALL_TASKS = [];
let ALL_USERS = [];
let CURRENT_FILTER = 'inbox';

const STATUS_ORDER = ['pending','in_process','completed','overdue'];
const STATUS_LABEL = { pending:'Pending', in_process:'In Process', completed:'Completed', overdue:'Overdue' };
const STATUS_NEXT  = { pending:'in_process', in_process:'completed' };
const STATUS_BTN   = { pending:['btn-start','Mark In Process'], in_process:['btn-done','Mark Completed'] };

async function init() {
  const [tasks, users] = await Promise.all([
    apiGet('/api/reminders'),
    apiGet('/api/members').catch(() => []),
  ]);
  initPrintSection();
  ALL_TASKS = tasks || [];
  ALL_USERS = users || [];
  updateCounts();
  renderStats();
  renderList();
}

function myTasks()       { return ALL_TASKS.filter(t => t.assignedToId === me.id); }
function assignedByMe()  { return ALL_TASKS.filter(t => t.createdById === me.id && t.assignedToId !== me.id); }

function updateCounts() {
  document.getElementById('fc-inbox').textContent    = myTasks().filter(t => t.status !== 'completed').length;
  document.getElementById('fc-assigned').textContent = assignedByMe().length;
}

function renderStats() {
  const inbox = myTasks();
  const stats = [
    { val: inbox.filter(t=>t.status==='pending').length,    lbl:'Pending',    color:'#3b5bdb', bg:'#eef2ff', icon:'⏳' },
    { val: inbox.filter(t=>t.status==='in_process').length, lbl:'In Process', color:'#e67e22', bg:'#fff3e0', icon:'🔄' },
    { val: inbox.filter(t=>t.status==='completed').length,  lbl:'Completed',  color:'#27ae60', bg:'#e8f5e9', icon:'✅' },
    { val: inbox.filter(t=>t.status==='overdue').length,    lbl:'Overdue',    color:'#c0392b', bg:'#fde8e8', icon:'🚨' },
  ];
  document.getElementById('statsRow').innerHTML = stats.map(s =>
    `<div class="stat-card">
      <div class="stat-icon" style="background:${s.bg}">${s.icon}</div>
      <div class="stat-text">
        <div class="stat-val" style="color:${s.color}">${s.val}</div>
        <div class="stat-lbl">${s.lbl}</div>
      </div>
    </div>`
  ).join('');
}

function setFilter(filter, el) {
  CURRENT_FILTER = filter;
  document.querySelectorAll('.filter-item').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('viewTitle').textContent = filter === 'inbox' ? 'My Tasks' : 'Assigned by Me';
  renderList();
}

function renderList() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let items = CURRENT_FILTER === 'inbox' ? myTasks() : assignedByMe();
  if (q) items = items.filter(t => t.title.toLowerCase().includes(q) || (t.note||'').toLowerCase().includes(q));

  // Group by status
  const groups = STATUS_ORDER.map(s => ({ status: s, tasks: items.filter(t => t.status === s) })).filter(g => g.tasks.length);

  const el = document.getElementById('taskList');
  const COL_COLORS = { pending:'#3b5bdb', in_process:'#e67e22', completed:'#27ae60', overdue:'#c0392b' };
  const PRIO_ORDER = { high: 0, medium: 1, low: 2 };
  el.innerHTML = `<div class="kanban">${STATUS_ORDER.map(s => {
    let tasks = items.filter(t => t.status === s);
    if (s === 'pending') tasks = [...tasks].sort((a,b) => (PRIO_ORDER[a.priority]??1) - (PRIO_ORDER[b.priority]??1));
    return `<div class="kanban-col col-${s}" data-col="${s}">
      <div class="kanban-col-header">
        <span class="col-dot"></span>
        <span class="kanban-col-title">${STATUS_LABEL[s]}</span>
        <span class="kanban-col-count">${tasks.length}</span>
      </div>
      <div class="kanban-col-body">
        ${tasks.length ? tasks.map(t => cardHTML(t)).join('') : `<div class="col-empty">No tasks here</div>`}
      </div>
    </div>`;
  }).join('')}</div>`;
  initDrag();
}

function cardHTML(t) {
  const isAssignee = t.assignedToId === me.id;
  const canEdit   = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const canDelete = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const dueLabel  = t.dueDate
    ? fmtDate(t.dueDate) + (t.dueTime ? ' · ' + t.dueTime.slice(0,5) : '')
    : (t.dueTime ? t.dueTime.slice(0,5) : '');
  const isOverdueDue = t.status === 'overdue';

  const isSelf = t.assignedToId === t.createdById;
  const personLabel = isSelf ? null
    : CURRENT_FILTER === 'inbox'
      ? `From: ${t.createdByName||''}`
      : `To: ${t.assignedToName||''}`;

  // Draggable: only assignee on non-overdue, non-completed tasks
  const canDrag = isAssignee && t.status !== 'overdue' && t.status !== 'completed';

  const PRIO_COLORS = { high:'#c0392b', medium:'#e67e22', low:'#27ae60' };
  const prioColor = PRIO_COLORS[t.priority] || '#999';

  return `<div class="task-card status-${t.status} pri-${t.priority}" data-id="${t.id}" data-status="${t.status}" ${canDrag ? 'draggable="true"' : ''} onclick="showTaskDetail('${t.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:${t.note?'5px':'0'}">
      <div class="task-title${t.status==='completed'?' done-text':''}">${esc(t.title)}</div>
      <span style="font-size:10px;font-weight:700;color:${prioColor};white-space:nowrap;flex-shrink:0;margin-top:2px">${cap(t.priority)}</span>
    </div>
    ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
    <div class="task-footer" style="margin-top:10px">
      <div class="task-footer-left" style="flex:1;min-width:0">
        ${dueLabel ? `<span class="pill pill-due${isOverdueDue?' overdue':''}" style="font-size:10px">📅 ${dueLabel}</span>` : ''}
        ${personLabel ? `<span class="pill pill-person" style="font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(personLabel)}</span>` : ''}
      </div>
      <div class="task-footer-right">
        ${canEdit   ? `<button class="task-btn" onclick="event.stopPropagation();editTask('${t.id}')">Edit</button>` : ''}
        ${canDelete ? `<button class="task-btn danger" onclick="event.stopPropagation();deleteTask('${t.id}')">Del</button>` : ''}
      </div>
    </div>
  </div>`;
}

function cap(s) { return s ? s[0].toUpperCase()+s.slice(1) : ''; }
function esc(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${String(dt.getUTCDate()).padStart(2,'0')}.${String(dt.getUTCMonth()+1).padStart(2,'0')}.${dt.getUTCFullYear()}`;
}

async function advanceStatus(id, newStatus) {
  try {
    await apiPut(`/api/reminders/${id}/status`, { status: newStatus });
    const t = ALL_TASKS.find(x => x.id === id);
    if (t) t.status = newStatus;
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
  } catch(e) { showToast(e.message || 'Error', 'error'); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await apiDelete(`/api/reminders/${id}`);
    ALL_TASKS = ALL_TASKS.filter(x => x.id !== id);
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
    showToast('Task deleted');
  } catch(e) { showToast(e.message || 'Cannot delete', 'error'); }
}

// Populate hour/minute selects once
(function(){
  const h = document.getElementById('tmHour');
  const m = document.getElementById('tmMinute');
  for (let i=0;i<24;i++) { const o=document.createElement('option'); o.value=String(i).padStart(2,'0'); o.textContent=String(i).padStart(2,'0'); h.appendChild(o); }
  for (let i=0;i<60;i+=5) { const o=document.createElement('option'); o.value=String(i).padStart(2,'0'); o.textContent=String(i).padStart(2,'0'); m.appendChild(o); }
})();

// Modal
function openTaskModal(task) {
  document.getElementById('tmId').value = task?.id || '';
  document.getElementById('tmTitle').value = task?.title || '';
  document.getElementById('tmNote').value = task?.note || '';
  document.getElementById('tmDue').value = task?.dueDate ? task.dueDate.slice(0,10) : '';
  const timeParts = task?.dueTime ? task.dueTime.slice(0,5).split(':') : ['',''];
  document.getElementById('tmHour').value = timeParts[0] || '';
  document.getElementById('tmMinute').value = timeParts[1] ? String(Math.round(parseInt(timeParts[1])/5)*5).padStart(2,'0') : '';
  document.getElementById('tmPriority').value = task?.priority || '';
  document.getElementById('tmAssignSearch').value = task ? (task.assignedToName || '') : me.name;
  document.getElementById('tmAssignId').value = task ? (task.assignedToId || '') : me.id;
  document.getElementById('taskModalTitle').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('open');
  document.getElementById('printSection').classList.remove('open');
  document.getElementById('printToggle').classList.remove('active');
  document.getElementById('prLevel').value = '';
  document.getElementById('prFileNum').value = '';
  document.getElementById('prFileLetter').value = '';
  document.getElementById('prAmount').value = '';
  document.getElementById('tmTitle').dataset.autofilled = '';
}

function editTask(id) { const t = ALL_TASKS.find(x => x.id === id); if (t) openTaskModal(t); }

function searchAssign() {
  const q = document.getElementById('tmAssignSearch').value.trim().toLowerCase();
  document.getElementById('tmAssignId').value = '';
  const dd = document.getElementById('tmAssignDd');
  if (!q) { dd.style.display='none'; return; }
  const hits = ALL_USERS.filter(u => u.name && u.name.toLowerCase().includes(q)).slice(0,8);
  if (!hits.length) { dd.style.display='none'; return; }
  dd.innerHTML = hits.map(u => `<div class="usd-item" onclick="pickAssign('${u.id}','${esc(u.name)}')">${esc(u.name)}<span style="color:var(--text-muted);font-size:11px;margin-left:6px">${u.title||''}</span></div>`).join('');
  dd.style.display = 'block';
}
function pickAssign(id, name) {
  document.getElementById('tmAssignId').value = id;
  document.getElementById('tmAssignSearch').value = name;
  document.getElementById('tmAssignDd').style.display = 'none';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#tmAssignSearch') && !e.target.closest('#tmAssignDd'))
    document.getElementById('tmAssignDd').style.display = 'none';
});

async function saveTask() {
  const id           = document.getElementById('tmId').value;
  const title        = document.getElementById('tmTitle').value.trim();
  const assignedToId = document.getElementById('tmAssignId').value;
  const dueDate      = document.getElementById('tmDue').value;
  const hour         = document.getElementById('tmHour').value;
  const minute       = document.getElementById('tmMinute').value;
  const priority     = document.getElementById('tmPriority').value;
  const dueTime      = (hour && minute) ? `${hour}:${minute}` : '';

  if (!title)        return showToast('Please enter a title', 'error');
  if (!assignedToId) return showToast('Please select a member', 'error');
  if (!dueDate)      return showToast('Please set a due date', 'error');
  if (!dueTime)      return showToast('Please set a due time', 'error');
  if (!priority)     return showToast('Please select a priority', 'error');

  const body = {
    title,
    note: document.getElementById('tmNote').value.trim() || null,
    dueDate,
    dueTime,
    priority,
    assignedToId,
  };
  try {
    if (id) {
      await apiPut(`/api/reminders/${id}`, body);
      showToast('Task updated');
    } else {
      await apiPost('/api/reminders', { ...body, id: 'rem_'+Date.now()+'_'+Math.random().toString(36).slice(2,6) });
      showToast('Task created');
    }
    closeTaskModal();
    ALL_TASKS = await apiGet('/api/reminders');
    updateCounts(); renderStats(); renderList(); refreshReminderCount();
  } catch(e) { showToast(e.message || 'Error saving', 'error'); }
}

// Print section
const FILE_NUMS = [...Array.from({length:12}, (_,i) => String(i+1)), '1-6', '7-12', 'Final'];
const PRINT_LEVELS = ['Beginner', 'Elementary', 'Pre-Intermediate', 'Intermediate'];

function initPrintSection() {
  const prFileNum = document.getElementById('prFileNum');
  FILE_NUMS.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; prFileNum.appendChild(o); });
  const prLevel = document.getElementById('prLevel');
  PRINT_LEVELS.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; prLevel.appendChild(o); });
}

function onPrintNumChange() {
  const num = document.getElementById('prFileNum').value;
  const letterWrap = document.getElementById('prLetterWrap');
  const letterSel = document.getElementById('prFileLetter');
  const noLetter = ['1-6', '7-12', 'Final'].includes(num) || !num;
  letterWrap.style.opacity = noLetter ? '0.35' : '1';
  letterWrap.style.pointerEvents = noLetter ? 'none' : '';
  if (noLetter) letterSel.value = '';
  buildPrintTitle();
}

function togglePrintSection() {
  const sec = document.getElementById('printSection');
  const btn = document.getElementById('printToggle');
  const open = sec.classList.toggle('open');
  btn.classList.toggle('active', open);
  if (!open) {
    document.getElementById('prLevel').value = '';
    document.getElementById('prFileNum').value = '';
    document.getElementById('prFileLetter').value = '';
    document.getElementById('prAmount').value = '';
    // Only clear title if it was auto-generated
    if (document.getElementById('tmTitle').dataset.autofilled === 'true') {
      document.getElementById('tmTitle').value = '';
      document.getElementById('tmTitle').dataset.autofilled = '';
    }
  }
}

function buildPrintTitle() {
  const level  = document.getElementById('prLevel').value;
  const num    = document.getElementById('prFileNum').value;
  const letter = document.getElementById('prFileLetter').value;
  const amount = document.getElementById('prAmount').value;
  if (!num && !amount) return;
  const fileStr = num ? (letter ? `${num}${letter}` : num) : '';
  const parts = ['Print'];
  if (fileStr) parts.push(`File Test ${fileStr}`);
  if (level)   parts.push(`for ${level}`);
  if (amount)  parts.push(`× ${amount}`);
  const title = document.getElementById('tmTitle');
  title.value = parts.join(' ');
  title.dataset.autofilled = 'true';
}

// Task detail panel
const STATUS_BAR_COLOR = { pending:'#3b5bdb', in_process:'#e67e22', completed:'#27ae60', overdue:'#c0392b' };

function showTaskDetail(id) {
  const t = ALL_TASKS.find(x => x.id === id);
  if (!t) return;

  document.getElementById('detailTitle').textContent = t.title;
  document.getElementById('detailBar').style.background = STATUS_BAR_COLOR[t.status] || '#ccc';

  const isSelf = t.assignedToId === t.createdById;
  const dueStr = t.dueDate
    ? fmtDate(t.dueDate) + (t.dueTime ? ' at ' + t.dueTime.slice(0,5) : '')
    : (t.dueTime ? t.dueTime.slice(0,5) : '—');

  const rows = [
    { lbl:'Status',    val:`<span class="detail-badge ${t.status}">${STATUS_LABEL[t.status]}</span>` },
    { lbl:'Priority',  val:`<span class="detail-badge ${t.priority}">${cap(t.priority)}</span>` },
    { lbl:'Assigned to', val: esc(t.assignedToName || '—') },
    { lbl:'Created by',  val: esc(t.createdByName  || '—') + (isSelf ? ' <span style="color:var(--text-muted);font-size:11px">(self)</span>' : '') },
    { lbl:'Due',         val: dueStr },
    { lbl:'Created',     val: fmtDate(t.createdAt) },
  ];

  document.getElementById('detailBody').innerHTML =
    rows.map(r => `<div class="detail-row">
      <span class="detail-lbl">${r.lbl}</span>
      <span class="detail-val">${r.val}</span>
    </div>`).join('') +
    (t.note ? `<div><div class="detail-lbl" style="margin-bottom:6px">Note</div><div class="detail-note">${esc(t.note)}</div></div>` : '');

  const canEdit   = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  const canDelete = isCEO || (t.createdById === me.id && t.status !== 'overdue');
  document.getElementById('detailFooter').innerHTML =
    (canEdit   ? `<button class="btn btn-secondary btn-sm" onclick="closeDetailPanel();editTask('${t.id}')">Edit</button>` : '') +
    (canDelete ? `<button class="btn btn-sm" style="background:#fde8e8;color:#c0392b;border:1px solid #fca5a5" onclick="closeDetailPanel();deleteTask('${t.id}')">Delete</button>` : '');

  if (!canEdit && !canDelete) document.getElementById('detailFooter').style.display = 'none';
  else document.getElementById('detailFooter').style.display = '';

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailPanel() { document.getElementById('detailOverlay').classList.remove('open'); }
function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailPanel(); }

// Status order index for forward-only enforcement
const STATUS_IDX = { pending:0, in_process:1, completed:2, overdue:3 };

function initDrag() {
  let dragId = null;
  let dragStatus = null;

  document.querySelectorAll('.task-card[draggable="true"]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      dragStatus = card.dataset.status;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over','drag-blocked'));
    });
  });

  document.querySelectorAll('.kanban-col').forEach(col => {
    const colStatus = col.dataset.col;

    col.addEventListener('dragover', e => {
      if (!dragId) return;
      e.preventDefault();
      const forward = STATUS_IDX[colStatus] > STATUS_IDX[dragStatus];
      const same = colStatus === dragStatus;
      const blocked = colStatus === 'overdue' || (!forward && !same);
      col.classList.toggle('drag-over', !blocked && !same);
      col.classList.toggle('drag-blocked', blocked);
      e.dataTransfer.dropEffect = blocked ? 'none' : 'move';
    });

    col.addEventListener('dragleave', e => {
      if (!e.relatedTarget || !col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over','drag-blocked');
      }
    });

    col.addEventListener('drop', async e => {
      e.preventDefault();
      col.classList.remove('drag-over','drag-blocked');
      if (!dragId) return;
      const forward = STATUS_IDX[colStatus] > STATUS_IDX[dragStatus];
      if (!forward || colStatus === 'overdue') return;
      await advanceStatus(dragId, colStatus);
      dragId = null; dragStatus = null;
    });
  });
}

init();
