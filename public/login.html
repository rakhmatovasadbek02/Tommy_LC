<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Tommy LC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; color: #1A0000; }

/* ── Left brand panel ── */
.brand-panel {
flex: 1.05; position: relative; overflow: hidden;
background: linear-gradient(155deg, #B00000 0%, #8a0000 55%, #5c0000 100%);
display: flex; flex-direction: column; justify-content: space-between;
padding: 48px 52px; color: #fff;
}
.brand-panel::before {
content: ''; position: absolute; inset: 0; pointer-events: none;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size: 46px 46px;
mask-image: radial-gradient(ellipse 80% 80% at 30% 30%, #000 0%, transparent 75%);
}
.brand-panel > * { position: relative; z-index: 1; }
.bp-logo { display: flex; align-items: center; gap: 13px; }
.bp-logo .bp-logo-text { font-size: 26px; font-weight: 900; letter-spacing: 0.5px; line-height: 1; }
.bp-logo span { display: block; font-size: 10px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,0.45); margin-top: 5px; }
.bp-quote { max-width: 440px; }
.bp-quote-mark { font-size: 72px; line-height: 0.6; color: rgba(255,255,255,0.22); font-weight: 900; margin-bottom: 8px; }
.bp-head { font-size: 30px; font-weight: 800; line-height: 1.28; letter-spacing: -0.3px; max-width: 440px; transition: opacity 0.4s; }
.bp-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 16px; max-width: 380px; line-height: 1.6; font-weight: 600; letter-spacing: 0.5px; transition: opacity 0.4s; }
.bp-feats { margin-top: 30px; display: flex; flex-direction: column; gap: 13px; }
.bp-feat { display: flex; align-items: center; gap: 12px; font-size: 14px; color: rgba(255,255,255,0.88); font-weight: 500; }
.bp-feat .tick { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.14); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.bp-foot { font-size: 12px; color: rgba(255,255,255,0.4); }

/* ── Right form panel ── */
.form-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
.form-wrap { width: 100%; max-width: 360px; }
.fw-mobile-logo { display: none; align-items: center; gap: 10px; font-size: 22px; font-weight: 900; color: #990000; margin-bottom: 24px; }
.form-wrap h2 { font-size: 30px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 5px; }
.subtitle { font-size: 14px; color: #994444; margin-bottom: 30px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #994444; margin-bottom: 7px; }
.phone-wrap { display: flex; align-items: stretch; border: 1.5px solid #FFD0D0; border-radius: 11px; overflow: hidden; background: #fff; transition: border-color 0.16s, box-shadow 0.16s; }
.phone-wrap:focus-within { border-color: #FF0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.10); }
.phone-prefix { padding: 13px 14px; background: #FFF0F0; font-size: 14px; font-weight: 700; color: #330000; border-right: 1.5px solid #FFD0D0; user-select: none; }
.phone-wrap input { border: none; outline: none; flex: 1; padding: 13px 14px; font-size: 15px; font-family: 'Inter', sans-serif; color: #1A0000; background: #fff; letter-spacing: 1.5px; }
input[type="password"] { width: 100%; padding: 13px 16px; border: 1.5px solid #FFD0D0; border-radius: 11px; font-size: 14px; font-family: 'Inter', sans-serif; color: #1A0000; background: #fff; outline: none; transition: border-color 0.16s, box-shadow 0.16s; }
input[type="password"]:focus { border-color: #FF0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.10); }
.error-msg { background: #FFF0F0; color: #8B1228; border: 1px solid #FFD0D0; border-radius: 9px; padding: 10px 14px; font-size: 13px; font-weight: 500; margin-bottom: 18px; display: none; align-items: center; gap: 8px; }
.error-msg.show { display: flex; }
.btn-login { width: 100%; padding: 14px; background: #FF0000; color: #fff; border: none; border-radius: 11px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.18s; margin-top: 6px; }
.btn-login:hover { background: #CC0000; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,0,0,0.30); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.creator-row { margin-top: 22px; padding-top: 20px; border-top: 1px solid #FFE0E0; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.creator-label { font-size: 12.5px; color: #994444; }
.creator-access { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid #FFD0D0; color: #990000; border-radius: 100px; padding: 7px 15px 7px 12px; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.16s; }
.creator-access:hover { background: #FFF0F0; border-color: #FF0000; }
.creator-access:disabled { opacity: 0.5; cursor: not-allowed; }
.creator-dot { width: 7px; height: 7px; border-radius: 50%; background: #1E6B45; box-shadow: 0 0 0 3px rgba(30,107,69,0.18); flex-shrink: 0; }

.login-lang { position: fixed; top: 18px; right: 22px; display: flex; gap: 6px; z-index: 20; }
.login-lang button { display: flex; align-items: center; gap: 5px; background: #fff; border: 1.5px solid #FFD0D0; color: #990000; border-radius: 100px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.14s; }
.login-lang button.active { background: #FF0000; color: #fff; border-color: #FF0000; }
@media (max-width: 860px) {
.brand-panel { display: none; }
.form-panel { flex: 1; }
.fw-mobile-logo { display: flex; }
}
</style>
</head>
<body>
<div class="login-lang" id="loginLang"></div>
<div class="brand-panel">
<div class="bp-logo">
<img src="logo.png" width="48" height="48" alt="Tommy LC" style="display:block;flex-shrink:0">
<div class="bp-logo-text">Tommy LC<span>Learning Center</span></div>
</div>
<div class="bp-quote">
<div class="bp-quote-mark">“</div>
<div class="bp-head" id="quoteText"></div>
<div class="bp-sub" id="quoteAuthor"></div>
</div>
<div class="bp-foot">© Tommy Learning Center</div>
</div>

<div class="form-panel">
<div class="form-wrap">
<div class="fw-mobile-logo"><img src="logo.png" width="32" height="32" alt="Tommy LC" style="display:block;flex-shrink:0"> Tommy LC</div>
<h2>Welcome back</h2>
<div class="subtitle">Sign in to continue</div>
<div class="error-msg" id="errorMsg"><span>⚠️</span><span id="errorText">Invalid phone or password.</span></div>
<div class="form-group">
<label>Phone Number</label>
<div class="phone-wrap">
<div class="phone-prefix">+998</div>
<input type="tel" id="loginPhone" placeholder="90 123 45 67" oninput="fmtPhone(this)" autocomplete="tel" maxlength="12">
</div>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
</div>
<button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
<div class="creator-row">
<span class="creator-label">Are you the creator?</span>
<button class="creator-access" id="creatorBtn" onclick="creatorLogin()" title="Sign in as creator">
<span class="creator-dot"></span> Sign in
</button>
</div>
</div>
</div>
<script src="shared.js"></script>
<script>
document.getElementById('loginLang').innerHTML = Object.entries(LANGS).map(([c,o])=>`<button onclick="setLang('${c}')" class="${getLang()===c?'active':''}">${o.flag} ${c.toUpperCase()}</button>`).join('');
const QUOTES = [
['Great things in business are never done by one person. They are done by a team.','Steve Jobs'],
['The secret of getting ahead is getting started.','Mark Twain'],
['Quality means doing it right when no one is looking.','Henry Ford'],
['Success is the sum of small efforts repeated day in and day out.','Robert Collier'],
['Teaching is the one profession that creates all other professions.','Unknown'],
['Hard work beats talent when talent doesn’t work hard.','Tim Notke'],
['Every student you help today shapes the future tomorrow.','Tommy LC'],
['Excellence is not an act, but a habit.','Aristotle'],
['Start where you are. Use what you have. Do what you can.','Arthur Ashe'],
['Your work is going to fill a large part of your life — do it well.','Steve Jobs'],
];
(function(){
let i = Math.floor(Math.random()*QUOTES.length);
const t = document.getElementById('quoteText'), a = document.getElementById('quoteAuthor');
function show(){ if(!t) return; t.textContent = QUOTES[i][0]; a.textContent = '— '+QUOTES[i][1]; }
show();
setInterval(()=>{ if(!t) return; t.style.opacity=a.style.opacity=0;
setTimeout(()=>{ i=(i+1)%QUOTES.length; show(); t.style.opacity=a.style.opacity=1; },400); }, 7000);
})();
function fmtPhone(input) {
let v = input.value.replace(/\D/g,'').slice(0,9);
let o = '';
if (v.length>0) o+=v.slice(0,2);
if (v.length>2) o+=' '+v.slice(2,5);
if (v.length>5) o+=' '+v.slice(5,7);
if (v.length>7) o+=' '+v.slice(7,9);
input.value = o;
}
const existing = JSON.parse(sessionStorage.getItem('lc_session')||localStorage.getItem('lc_session')||'null');
if (existing && existing.token) window.location.replace('index.html');
else { sessionStorage.removeItem('lc_session'); localStorage.removeItem('lc_session'); }
async function creatorLogin() {
const btn = document.getElementById('creatorBtn');
btn.disabled = true;
try {
const res = await fetch('/api/auth/creator-login', { method:'POST' });
if (!res.ok) throw new Error('unavailable');
const user = await res.json();
const session = { id:user.id, name:user.name, role:user.role, title:user.title, avatar:user.avatar,
  permissions:user.permissions||[], token:user.token, loginTime:new Date().toISOString() };
sessionStorage.setItem('lc_session', JSON.stringify(session));
localStorage.setItem('lc_session', JSON.stringify(session));
window.location.replace('index.html');
} catch(e) {
btn.disabled = false;
const errText = document.getElementById('errorText');
errText.textContent = 'Creator sign-in unavailable.';
document.getElementById('errorMsg').classList.add('show');
}
}
async function doLogin() {
const phone = document.getElementById('loginPhone').value.trim();
const password = document.getElementById('loginPassword').value;
const btn = document.getElementById('loginBtn');
const errMsg = document.getElementById('errorMsg');
const errText = document.getElementById('errorText');
btn.disabled = true; btn.textContent = 'Signing in…';
errMsg.classList.remove('show');
try {
const data = await fetch('/api/auth/login', {
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({ phone, password })
});
if (!data.ok) {
const err = await data.json();
errText.textContent = err.error || 'Invalid phone or password.';
errMsg.classList.add('show');
document.getElementById('loginPassword').value = '';
return;
}
const user = await data.json();
const session = { id:user.id, name:user.name, role:user.role, title:user.title, avatar:user.avatar,
  permissions:user.permissions||[], token:user.token, loginTime:new Date().toISOString() };
sessionStorage.setItem('lc_session', JSON.stringify(session));
localStorage.setItem('lc_session', JSON.stringify(session));
window.location.replace('index.html');
} catch(e) {
errText.textContent = 'Could not connect to server.';
errMsg.classList.add('show');
} finally {
btn.disabled = false; btn.textContent = 'Sign In →';
}
}
document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
</body>
</html>
