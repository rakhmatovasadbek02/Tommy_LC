<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Tommy LC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Inter', sans-serif;
background: #990000;
min-height: 100vh;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
position: relative; overflow: hidden;
}
.bg-glow {
position: fixed; inset: 0; pointer-events: none;
background:
radial-gradient(ellipse 60% 50% at 10% 10%, rgba(255,255,255,0.06) 0%, transparent 60%),
radial-gradient(ellipse 50% 60% at 90% 90%, rgba(255,255,255,0.04) 0%, transparent 60%);
}
.bg-grid {
position: fixed; inset: 0; pointer-events: none;
background-image:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size: 48px 48px;
}
.brand-corner {
position: fixed; top: 28px; right: 36px; z-index: 10; text-align: right;
}
.brand-name {
font-family: 'Inter', sans-serif;
font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 0.5px; line-height: 1;
}
.login-card {
background: #fff; border-radius: 20px; padding: 48px 44px 44px;
width: 420px; max-width: 95vw;
box-shadow: 0 40px 100px rgba(153,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08);
position: relative; z-index: 1;
}
.login-card::before {
content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
background: linear-gradient(90deg, #FF0000, #CC0000);
border-radius: 20px 20px 0 0;
}
.login-card h2 { font-family: 'Inter', sans-serif; font-size: 28px; color: #1A0000; font-weight: 900; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #994444; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #994444; margin-bottom: 7px; }
.phone-wrap {
display: flex; align-items: stretch;
border: 1.5px solid #FFD0D0; border-radius: 10px; overflow: hidden; background: #fff;
transition: border-color 0.16s, box-shadow 0.16s;
}
.phone-wrap:focus-within { border-color: #FF0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.10); }
.phone-prefix { padding: 12px 14px; background: #FFF0F0; font-size: 14px; font-weight: 700; color: #330000; border-right: 1.5px solid #FFD0D0; user-select: none; letter-spacing: 0.5px; }
.phone-wrap input { border: none; outline: none; flex: 1; padding: 12px 14px; font-size: 15px; font-family: 'Inter', sans-serif; color: #1A0000; background: #fff; letter-spacing: 1.5px; }
input[type="password"] {
width: 100%; padding: 12px 16px;
border: 1.5px solid #FFD0D0; border-radius: 10px;
font-size: 14px; font-family: 'Inter', sans-serif; color: #1A0000; background: #fff; outline: none;
transition: border-color 0.16s, box-shadow 0.16s;
}
input[type="password"]:focus { border-color: #FF0000; box-shadow: 0 0 0 3px rgba(255,0,0,0.10); }
.error-msg {
background: #FFF0F0; color: #8B1228; border: 1px solid #FFD0D0;
border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500;
margin-bottom: 20px; display: none; align-items: center; gap: 8px;
}
.error-msg.show { display: flex; }
.btn-login {
width: 100%; padding: 14px; background: #FF0000; color: #fff; border: none;
border-radius: 10px; font-size: 15px; font-weight: 600;
font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.18s; margin-top: 8px;
}
.btn-login:hover { background: #CC0000; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,0,0,0.35); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.creator-access {
position: fixed; bottom: 20px; left: 20px; z-index: 10;
display: inline-flex; align-items: center; gap: 8px;
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
color: rgba(255,255,255,0.78); border-radius: 100px;
padding: 8px 16px 8px 13px; font-size: 13px; font-weight: 600;
font-family: 'Inter', sans-serif; cursor: pointer; letter-spacing: 0.3px;
transition: background 0.16s, color 0.16s, border-color 0.16s, transform 0.16s;
}
.creator-access:hover { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.35); transform: translateY(-1px); }
.creator-access:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.creator-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.22); flex-shrink: 0; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="brand-corner">
<div class="brand-name">Tommy LC</div>
</div>
<div class="login-card">
<h2>Welcome back</h2>
<div class="subtitle">Sign in to continue</div>
<div class="error-msg" id="errorMsg"><span>️</span><span id="errorText">Invalid phone or password.</span></div>
<div class="form-group">
<label>Phone Number</label>
<div class="phone-wrap">
<div class="phone-prefix">+998</div>
<input type="tel" id="loginPhone" placeholder="90 123 45 67" oninput="fmtPhone(this)" autocomplete="tel" maxlength="12">
</div>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
</div>
<button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>
</div>
<button class="creator-access" id="creatorBtn" onclick="creatorLogin()" title="Sign in as creator">
<span class="creator-dot"></span> creator
</button>
<script>
function fmtPhone(input) {
let v = input.value.replace(/\D/g,'').slice(0,9);
let o = '';
if (v.length>0) o+=v.slice(0,2);
if (v.length>2) o+=' '+v.slice(2,5);
if (v.length>5) o+=' '+v.slice(5,7);
if (v.length>7) o+=' '+v.slice(7,9);
input.value = o;
}
const existing = JSON.parse(sessionStorage.getItem('lc_session')||localStorage.getItem('lc_session')||'null');
if (existing) window.location.replace('index.html');
async function creatorLogin() {
const btn = document.getElementById('creatorBtn');
btn.disabled = true;
try {
const res = await fetch('/api/auth/creator-login', { method:'POST' });
if (!res.ok) throw new Error('unavailable');
const user = await res.json();
const session = { id:user.id, name:user.name, role:user.role, title:user.title, avatar:user.avatar,
  permissions:user.permissions||[], token:user.token, loginTime:new Date().toISOString() };
sessionStorage.setItem('lc_session', JSON.stringify(session));
localStorage.setItem('lc_session', JSON.stringify(session));
window.location.replace('index.html');
} catch(e) {
btn.disabled = false;
const errText = document.getElementById('errorText');
errText.textContent = 'Creator sign-in unavailable.';
document.getElementById('errorMsg').classList.add('show');
}
}
async function doLogin() {
const phone = document.getElementById('loginPhone').value.trim();
const password = document.getElementById('loginPassword').value;
const btn = document.getElementById('loginBtn');
const errMsg = document.getElementById('errorMsg');
const errText = document.getElementById('errorText');
btn.disabled = true; btn.textContent = 'Signing in…';
errMsg.classList.remove('show');
try {
const data = await fetch('/api/auth/login', {
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({ phone, password })
});
if (!data.ok) {
const err = await data.json();
errText.textContent = err.error || 'Invalid phone or password.';
errMsg.classList.add('show');
document.getElementById('loginPassword').value = '';
return;
}
const user = await data.json();
const session = { id:user.id, name:user.name, role:user.role, title:user.title, avatar:user.avatar,
  permissions:user.permissions||[], token:user.token, loginTime:new Date().toISOString() };
sessionStorage.setItem('lc_session', JSON.stringify(session));
localStorage.setItem('lc_session', JSON.stringify(session));
window.location.replace('index.html');
} catch(e) {
errText.textContent = 'Could not connect to server.';
errMsg.classList.add('show');
} finally {
btn.disabled = false; btn.textContent = 'Sign In →';
}
}
document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
</body>
</html>
