<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classrooms — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .rooms-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
    .room-card { background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:box-shadow 0.15s,transform 0.15s; }
    .room-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
    .room-card-top { background:var(--crimson); padding:24px 20px 20px; }
    .room-icon { font-size:36px; margin-bottom:8px; display:block; }
    .room-card-name { font-family:'Playfair Display',serif; font-size:20px; font-weight:900; color:white; }
    .room-card-body { padding:16px 20px; }
    .room-stat { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .room-stat:last-child { border-bottom:none; }
    .room-stat-label { color:var(--muted); }
    .room-stat-val { font-weight:700; color:var(--text); }
    .room-card-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
    .add-card { background:white; border:2px dashed var(--border); border-radius:var(--radius); padding:28px 24px; display:flex; flex-direction:column; gap:12px; }
    .add-card-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; color:var(--text); margin-bottom:4px; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Classrooms</div>
    <div class="topbar-right"><span class="text-muted" id="roomCount"></span></div>
  </div>
  <div class="page-content">
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal" style="width:360px">
    <div class="modal-header">
      <div class="modal-title">Edit Classroom</div>
      <button class="modal-close" onclick="closeModal('editModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editRoomId">
      <div class="form-group"><label>Room Name *</label><input type="text" id="editRoomName" placeholder="Room 1"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('classrooms');
  renderSidebar('classrooms');
  let rooms = [], groups = [];

  async function load() {
    [rooms, groups] = await Promise.all([apiGet('/api/classrooms'), apiGet('/api/groups')]);
    renderRooms();
  }

  function renderRooms() {
    const grid = document.getElementById('roomsGrid');
    document.getElementById('roomCount').textContent = `${rooms.length} classroom${rooms.length!==1?'s':''}`;

    let html = `<div class="add-card">
      <div class="add-card-title">🏛 Add Classroom</div>
      <div class="form-group" style="margin:0"><label>Room Name *</label><input type="text" id="newRoomName" placeholder="Room 1"></div>
      <button class="btn btn-primary" onclick="addRoom()" style="margin-top:4px">Add Classroom</button>
    </div>`;

    html += rooms.map(r => {
      const here = groups.filter(g => g.room === r.name);
      return `<div class="room-card">
        <div class="room-card-top"><span class="room-icon">🏛</span><div class="room-card-name">${r.name}</div></div>
        <div class="room-card-body">
          <div class="room-stat"><span class="room-stat-label">Groups assigned</span><span class="room-stat-val">${here.length}</span></div>
          ${here.length ? `<div class="room-stat" style="flex-direction:column;align-items:flex-start;gap:6px">
            <span class="room-stat-label">Groups</span>
            <div style="display:flex;flex-wrap:wrap;gap:4px">${here.map(g=>`<span class="badge badge-red">${g.name}</span>`).join('')}</div>
          </div>` : ''}
        </div>
        <div class="room-card-footer">
          <button class="btn btn-ghost btn-sm" onclick="openEdit('${r.id}')">${IC.edit} Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRoom('${r.id}')">${IC.trash} Delete</button>
        </div>
      </div>`;
    }).join('');

    grid.innerHTML = html;
  }

  async function addRoom() {
    const name = document.getElementById('newRoomName').value.trim();
    if (!name) { showToast('Room name required.','error'); return; }
    if (rooms.find(r=>r.name.toLowerCase()===name.toLowerCase())) { showToast('Already exists.','error'); return; }
    await apiPost('/api/classrooms', { id:genId(), name, capacity:null });
    logActivity(`Added classroom: ${name}`,'green');
    document.getElementById('newRoomName').value = '';
    await load(); showToast(`"${name}" added!`);
  }

  function openEdit(id) {
    const r = rooms.find(r=>r.id===id); if(!r) return;
    document.getElementById('editRoomId').value   = id;
    document.getElementById('editRoomName').value = r.name;
    openModal('editModal');
  }

  async function saveEdit() {
    const id   = document.getElementById('editRoomId').value;
    const name = document.getElementById('editRoomName').value.trim();
    if (!name) { showToast('Name required.','error'); return; }
    await apiPut('/api/classrooms/'+id, { name, capacity:null });
    logActivity(`Updated classroom: ${name}`,'');
    closeModal('editModal'); await load(); showToast('Classroom updated!');
  }

  async function deleteRoom(id) {
    const r = rooms.find(r=>r.id===id);
    if (!confirm(`Delete "${r?.name}"?`)) return;
    await apiDelete('/api/classrooms/'+id);
    logActivity(`Deleted classroom: ${r?.name}`,'red');
    await load(); showToast('Deleted.','error');
  }

  load();
</script>
</body>
</html>
