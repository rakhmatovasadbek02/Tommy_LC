<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actions — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .actions-feed { display:flex; flex-direction:column; gap:0; }
    .action-item { display:flex; align-items:flex-start; gap:16px; padding:14px 0; border-bottom:1px solid var(--border); }
    .action-item:last-child { border-bottom:none; }
    .action-dot-col { display:flex; flex-direction:column; align-items:center; padding-top:3px; flex-shrink:0; }
    .action-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .action-dot.green  { background:#22c55e; }
    .action-dot.red    { background:#ef4444; }
    .action-dot.blue   { background:#3b82f6; }
    .action-dot.gold   { background:#f59e0b; }
    .action-dot.grey   { background:#94a3b8; }
    .action-dot.default{ background:#94a3b8; }
    .action-line { width:1px; background:var(--border); flex:1; min-height:20px; margin-top:4px; }
    .action-body { flex:1; min-width:0; }
    .action-text { font-size:14px; color:var(--text); line-height:1.4; }
    .action-meta { display:flex; gap:10px; align-items:center; margin-top:4px; flex-wrap:wrap; }
    .action-actor { font-size:12px; font-weight:600; color:var(--text); }
    .action-role  { font-size:11px; padding:2px 8px; border-radius:100px; font-weight:600; }
    .action-time  { font-size:11px; color:var(--muted); margin-left:auto; white-space:nowrap; }
    .actions-empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .actions-empty .empty-icon { font-size:48px; margin-bottom:12px; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Actions</div>
    <div class="topbar-right">
      <span class="text-muted" id="actionCount" style="font-size:13px"></span>
    </div>
  </div>
  <div class="page-content">
    <div class="toolbar" style="margin-bottom:16px">
      <div class="search-bar" style="flex:1;max-width:300px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search actions…" oninput="renderFeed()">
      </div>
      <select id="filterActor" onchange="renderFeed()" style="width:auto;padding:9px 14px">
        <option value="">All Staff</option>
      </select>
      <select id="filterRole" onchange="renderFeed()" style="width:auto;padding:9px 14px">
        <option value="">All Roles</option>
        <option>CEO</option><option>Head Admin</option><option>Manager</option><option>Admin</option><option>Teacher</option>
      </select>
      <select id="filterDate" onchange="renderFeed()" style="width:auto;padding:9px 14px">
        <option value="">All Time</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
      </select>
    </div>
    <div class="card">
      <div class="card-body" style="padding:0 24px">
        <div id="actionsFeed" class="actions-feed"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('actions');
  renderSidebar('actions');

  const ROLE_COLORS = {
    'CEO':     { bg:'#FFF0F0', color:'#CC0000' },
    'Admin':   { bg:'#E8F5E9', color:'#1E6B45' },
    'Teacher': { bg:'#EFF6FF', color:'#1D4ED8' },
  };

  const DOT_CLASS = { green:'green', red:'red', blue:'blue', gold:'gold', '':'default', null:'default' };

  let _allItems = [];

  async function load() {
    _allItems = await apiGet('/api/activity');
    // Populate actor dropdown
    const actors = [...new Set(_allItems.map(a => a.actor).filter(Boolean))].sort();
    const aSel = document.getElementById('filterActor');
    actors.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; aSel.appendChild(o); });
    renderFeed();
  }

  function renderFeed() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    const fa  = document.getElementById('filterActor').value;
    const fr  = document.getElementById('filterRole').value;
    const fd  = document.getElementById('filterDate').value;
    const now = new Date();
    const startOfDay   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek  = new Date(startOfDay); startOfWeek.setDate(startOfDay.getDate() - startOfDay.getDay());
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

    const items = _allItems.filter(a => {
      if (q  && !(a.text||'').toLowerCase().includes(q) && !(a.actor||'').toLowerCase().includes(q)) return false;
      if (fa && a.actor !== fa) return false;
      if (fr && a.role  !== fr) return false;
      if (fd) {
        const ts = a.rawTime ? new Date(a.rawTime) : null;
        if (ts) {
          if (fd === 'today' && ts < startOfDay) return false;
          if (fd === 'week'  && ts < startOfWeek) return false;
          if (fd === 'month' && ts < startOfMonth) return false;
        }
      }
      return true;
    });

    document.getElementById('actionCount').textContent = `${items.length} action${items.length!==1?'s':''}`;
    const feed = document.getElementById('actionsFeed');
    if (!items.length) {
      feed.innerHTML = '<div class="actions-empty"><div class="empty-icon">📋</div><p>No actions found.</p></div>';
      return;
    }
    feed.innerHTML = items.map((a, i) => {
      const dotClass = DOT_CLASS[a.color] || 'default';
      const rc = ROLE_COLORS[a.role] || { bg:'#F1F5F9', color:'#64748b' };
      const isLast = i === items.length - 1;
      return `<div class="action-item">
        <div class="action-dot-col">
          <div class="action-dot ${dotClass}"></div>
          ${!isLast ? '<div class="action-line"></div>' : ''}
        </div>
        <div class="action-body">
          <div class="action-text">${a.text}</div>
          <div class="action-meta">
            ${a.actor ? `<span class="action-actor">${a.actor}</span>` : ''}
            ${a.role  ? `<span class="action-role" style="background:${rc.bg};color:${rc.color}">${a.role}</span>` : ''}
            <span class="action-time">${a.time}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  load();
</script>
</body>
</html>
