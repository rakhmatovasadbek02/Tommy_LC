<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistics · Tommy LC</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── tokens ── */
:root {
  --cr:#c0392b; --cr2:#e74c3c; --cr-soft:#fdf2f2;
  --sg:#16a34a; --sg-soft:#f0fdf4;
  --sb:#2563eb; --sb-soft:#eff6ff;
  --sa:#d97706; --sa-soft:#fffbeb;
  --sp:#7c3aed; --sp-soft:#f5f3ff;
  --card-r:16px;
  --card-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
}

/* ── page shell ── */
.stat-page { padding-bottom:64px; }

/* ── section ── */
.sec { margin-bottom:40px; }
.sec-hd { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #f0dede; }
.sec-hd-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sec-hd-icon svg { width:15px; height:15px; }
.sec-hd h2 { font-size:14px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:var(--text); margin:0; }
.sec-hd-meta { font-size:12px; color:var(--muted); margin-left:auto; font-weight:500; }

/* ── KPI strip ── */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:12px; margin-bottom:36px; }
.kpi { background:white; border:1px solid #f0dede; border-radius:var(--card-r); padding:16px 18px 14px; box-shadow:var(--card-shadow); display:flex; flex-direction:column; gap:0; }
.kpi-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.kpi-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.kpi-icon svg { width:17px; height:17px; }
.kpi-trend { font-size:11px; font-weight:700; padding:2px 7px; border-radius:99px; }
.kpi-trend.up { background:#dcfce7; color:#15803d; }
.kpi-trend.dn { background:#fee2e2; color:#dc2626; }
.kpi-trend.neu { background:var(--surface); color:var(--muted); }
.kpi-val { font-size:30px; font-weight:900; color:var(--text); line-height:1; letter-spacing:-1.5px; }
.kpi-val.md { font-size:22px; letter-spacing:-.8px; }
.kpi-lbl { font-size:11px; font-weight:600; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.7px; }
.kpi-sub { font-size:11px; color:var(--muted); margin-top:5px; }

/* ── grid layouts ── */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
.g3s { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
@media(max-width:1100px){ .g3{ grid-template-columns:1fr; } }
@media(max-width:900px){ .g2,.g3s{ grid-template-columns:1fr; } }
@media(max-width:640px){ .kpi-row{ grid-template-columns:1fr 1fr; } .stat-page{ padding-bottom:40px; } }

/* ── card ── */
.card { background:white; border:1px solid #f0dede; border-radius:var(--card-r); padding:20px 22px; box-shadow:var(--card-shadow); }
.card-title { font-size:11px; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:var(--muted); margin:0 0 16px; }

/* ── revenue bar chart ── */
.rev-chart { overflow-x:auto; }
.rev-bars { display:flex; align-items:flex-end; gap:8px; height:130px; min-width:280px; padding-bottom:0; }
.rev-col { display:flex; flex-direction:column; align-items:center; flex:1; gap:4px; height:100%; justify-content:flex-end; min-width:26px; }
.rev-bar { width:100%; border-radius:6px 6px 2px 2px; min-height:4px; position:relative; }
.rev-bar.hi { background:var(--cr); }
.rev-bar.lo { background:#f9a8a8; }
.rev-x { font-size:9px; color:var(--muted); font-weight:600; white-space:nowrap; }
.rev-v { font-size:9px; font-weight:800; color:var(--text); line-height:1; }

/* ── donut ── */
.donut-wrap { display:flex; align-items:center; gap:20px; min-height:112px; }
.donut-legend { flex:1; min-width:0; display:flex; flex-direction:column; gap:9px; }
.dl-row { display:flex; align-items:center; gap:8px; }
.dl-swatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.dl-lbl { font-size:12.5px; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dl-pct { font-size:12px; font-weight:800; color:var(--text); }
.dl-amt { font-size:10px; color:var(--muted); margin-left:2px; }
@media(max-width:480px){ .donut-wrap{ flex-direction:column; align-items:flex-start; } }

/* ── funnel ── */
.funnel { display:flex; flex-direction:column; gap:7px; }
.f-row { display:flex; align-items:center; gap:10px; }
.f-lbl { font-size:12px; font-weight:600; color:var(--text); width:88px; flex-shrink:0; text-align:right; }
.f-track { flex:1; height:36px; background:#fdf2f2; border-radius:8px; overflow:hidden; position:relative; min-width:0; }
.f-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:12px; transition:width .7s cubic-bezier(.4,0,.2,1); }
.f-fill span { font-size:12px; font-weight:800; color:rgba(255,255,255,.95); white-space:nowrap; }
.f-n { font-size:12px; font-weight:800; color:var(--text); width:30px; text-align:right; flex-shrink:0; }
@media(max-width:480px){ .f-lbl{ width:64px; font-size:11px; } }

/* ── gauge ── */
.gauge-card { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding-top:10px; }
.gauge-num { font-size:42px; font-weight:900; color:var(--cr); letter-spacing:-3px; line-height:1; margin-top:-4px; }
.gauge-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
.gauge-sub { font-size:12px; color:var(--muted); margin-top:6px; }

/* ── staff table ── */
.tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.stbl { width:100%; border-collapse:collapse; min-width:360px; }
.stbl th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); padding:0 8px 10px; text-align:left; white-space:nowrap; }
.stbl th:not(:first-child) { text-align:right; }
.stbl td { padding:8px 8px; border-top:1px solid #fae8e8; font-size:13px; color:var(--text); vertical-align:middle; }
.stbl td:not(:first-child) { text-align:right; }
.stbl tbody tr:hover td { background:#fdf7f7; }
.sname { display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; white-space:nowrap; }
.savatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:white; flex-shrink:0; }
.rate-cell { display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.rate-track { width:56px; height:5px; background:#f3e8e8; border-radius:99px; overflow:hidden; flex-shrink:0; }
.rate-fill { height:100%; border-radius:99px; }
.rate-pct { font-size:11px; font-weight:800; min-width:30px; text-align:right; }

/* ── archive pills ── */
.arch-pills { display:flex; flex-wrap:wrap; gap:8px; }
.arch-pill { display:flex; align-items:center; gap:7px; background:var(--cr-soft); border:1px solid #f5d0d0; border-radius:99px; padding:6px 14px 6px 10px; }
.arch-pill-n { font-size:14px; font-weight:900; color:var(--cr); }
.arch-pill-l { font-size:12px; color:var(--text); font-weight:500; }

/* ── topbar extras ── */
.topbar-right { display:flex; align-items:center; gap:10px; }
.refresh-tag { font-size:11px; color:var(--muted); font-weight:500; }
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Statistics</div>
    <div class="topbar-right">
      <span class="refresh-tag" id="refreshedAt"></span>
    </div>
  </div>

  <div class="page-content stat-page" id="content">
    <div style="text-align:center;padding:80px 0;color:var(--muted)">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35;display:block;margin:0 auto 12px"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Loading…
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth('statistics');
renderSidebar('statistics');

const fmt  = n => Number(n||0).toLocaleString('ru-RU');
const fmtM = n => { const v=Number(n||0); if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(0)+'K'; return fmt(v); };
const pct  = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const PALETTE = ['#c0392b','#2563eb','#7c3aed','#d97706','#16a34a','#0891b2','#be185d','#b45309'];

function bg(name) {
  const P=['#c0392b','#2563eb','#7c3aed','#d97706','#16a34a','#0891b2','#be185d','#b45309'];
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return P[h%P.length];
}
function ini(n) { const p=(n||'').trim().split(/\s+/); return (p[0]?.[0]||'')+(p[1]?.[0]||''); }

/* ── donut SVG ── */
function donutSVG(slices) {
  const r=46, cx=54, cy=54, sw=13;
  const total=slices.reduce((s,x)=>s+x.v,0);
  if (!total) return `<svg width="108" height="108"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f5e0e0" stroke-width="${sw}"/></svg>`;
  const circ=2*Math.PI*r; let off=0;
  const arcs=slices.map(s=>{
    const len=circ*(s.v/total)-1.2;
    const a=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}"
      stroke-dasharray="${Math.max(0,len)} ${circ-Math.max(0,len)}"
      stroke-dashoffset="${-(off*circ/total-circ/4)}" stroke-linecap="butt"/>`;
    off+=s.v; return a;
  }).join('');
  return `<svg width="108" height="108" viewBox="0 0 108 108" style="flex-shrink:0">${arcs}</svg>`;
}

/* ── gauge SVG ── */
function gaugeSVG(val) {
  const r=50, cx=70, cy=68, sw=11, circ=Math.PI*r;
  const filled=circ*(Math.min(val,100)/100);
  return `<svg width="140" height="78" viewBox="0 0 140 78">
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="#f5e0e0" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="url(#gg)" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${filled} ${circ}"/>
    <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8a8"/><stop offset="100%" stop-color="#c0392b"/>
    </linearGradient></defs>
  </svg>`;
}

async function load() {
  const d = await apiGet('/api/statistics');
  document.getElementById('refreshedAt').textContent =
    'Updated ' + new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  render(d);
}

function render(d) {
  const {students:S, leads:L, finance:F, staff:ST, archive:AR} = d;

  /* ── mom delta ── */
  const mom = F.prevMonthRevenue > 0
    ? Math.round((F.thisMonthRevenue - F.prevMonthRevenue) / F.prevMonthRevenue * 100) : null;
  const momTag = mom !== null
    ? `<span class="kpi-trend ${mom>=0?'up':'dn'}">${mom>=0?'↑':'↓'} ${Math.abs(mom)}%</span>` : '';

  /* ── bar chart ── */
  const months = Object.entries(F.revenueByMonth).sort((a,b)=>a[0].localeCompare(b[0])).slice(-9);
  const maxR = Math.max(...months.map(m=>m[1]),1);
  const bars = months.map(([m,v])=>{
    const h = Math.max(Math.round(v/maxR*100),2);
    const isMax = v===maxR;
    return `<div class="rev-col">
      <div class="rev-v">${fmtM(v)}</div>
      <div class="rev-bar ${isMax?'hi':'lo'}" style="height:${h}%"></div>
      <div class="rev-x">${m.slice(5)}</div>
    </div>`;
  }).join('');

  /* ── donut ── */
  const ptE = Object.entries(F.revenueByType);
  const ptT = ptE.reduce((s,[,v])=>s+v,0);
  const ptS = ptE.map(([k,v],i)=>({c:PALETTE[i%PALETTE.length],k,v}));
  const donut = donutSVG(ptS);
  const legend = ptS.map(s=>`<div class="dl-row">
    <div class="dl-swatch" style="background:${s.c}"></div>
    <div class="dl-lbl">${s.k}</div>
    <div class="dl-pct">${pct(s.v,ptT)}%</div>
    <div class="dl-amt">${fmtM(s.v)}</div>
  </div>`).join('');

  /* ── funnel ── */
  const FORD = (L.funnelOrder||[]).concat(
    Object.keys(L.byStatus).filter(k=>!(L.funnelOrder||[]).includes(k))
  );
  const fMax = Math.max(...FORD.map(k=>L.byStatus[k]||0),1);
  const FCOLS = ['#c0392b','#d97706','#2563eb','#7c3aed','#16a34a'];
  const funnel = FORD.filter(k=>L.byStatus[k]>0).map((k,i)=>{
    const n=L.byStatus[k]||0, w=pct(n,fMax);
    return `<div class="f-row">
      <div class="f-lbl">${k}</div>
      <div class="f-track">
        <div class="f-fill" style="width:${w}%;background:${FCOLS[i%FCOLS.length]}">
          <span>${n}</span>
        </div>
      </div>
      <div class="f-n">${n}</div>
    </div>`;
  }).join('') || `<p style="color:var(--muted);font-size:13px;margin:0">No leads yet</p>`;

  /* ── staff rows ── */
  function staffRow(t, col3lbl, col3val, rate) {
    const rc = rate===null?'#bbb':rate>=80?'#16a34a':rate>=60?'#d97706':'#dc2626';
    return `<tr>
      <td><div class="sname"><div class="savatar" style="background:${bg(t.name)}">${ini(t.name)}</div>${t.name}</div></td>
      <td>${col3val}</td>
      <td>
        ${rate!==null
          ? `<div class="rate-cell"><div class="rate-track"><div class="rate-fill" style="width:${rate}%;background:${rc}"></div></div><span class="rate-pct" style="color:${rc}">${rate}%</span></div>`
          : `<span style="color:var(--muted);font-size:11px">—</span>`}
      </td>
    </tr>`;
  }

  const tRows = ST.teachers.length
    ? ST.teachers.map(t=>staffRow(t,'Students',`${t.groups}g · ${t.students}s`,t.attendanceRate)).join('')
    : `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px 0;font-size:13px">No teacher data</td></tr>`;

  const sRows = ST.support.length
    ? ST.support.map(t=>staffRow(t,'Sessions',`${t.total} sessions`,t.rate)).join('')
    : `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px 0;font-size:13px">No session data</td></tr>`;

  /* ── archive ── */
  const archHTML = Object.entries(AR.byReason).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="arch-pill"><span class="arch-pill-n">${v}</span><span class="arch-pill-l">${k}</span></div>`)
    .join('') || `<span style="color:var(--muted);font-size:13px">No archived records</span>`;

  /* ── icon fragments ── */
  const IC_FINANCE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`;
  const IC_LEADS   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`;
  const IC_STAFF   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
  const IC_ARCHIVE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`;

  document.getElementById('content').innerHTML = `

    <!-- KPI ROW -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-top">
          <div class="kpi-icon" style="background:#fde8e8">${IC_STAFF.replace('stroke="currentColor"','stroke="#c0392b"')}</div>
          <span class="kpi-trend neu">${S.inactive} inactive</span>
        </div>
        <div class="kpi-val">${S.active}</div>
        <div class="kpi-lbl">Active Students</div>
        <div class="kpi-sub">${S.total} total · ${S.debtors} in debt</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">
          <div class="kpi-icon" style="background:#eff6ff">${IC_LEADS.replace('stroke="currentColor"','stroke="#2563eb"')}</div>
          <span class="kpi-trend ${L.leadsThisMonth>0?'up':'neu'}">+${L.leadsThisMonth} this month</span>
        </div>
        <div class="kpi-val">${L.total}</div>
        <div class="kpi-lbl">Active Leads</div>
        <div class="kpi-sub">${L.conversionRate}% converted</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">
          <div class="kpi-icon" style="background:#f0fdf4">${IC_FINANCE.replace('stroke="currentColor"','stroke="#16a34a"')}</div>
          ${momTag ? momTag : '<span class="kpi-trend neu">this month</span>'}
        </div>
        <div class="kpi-val md">${fmtM(F.thisMonthRevenue)}</div>
        <div class="kpi-lbl">Revenue this month</div>
        <div class="kpi-sub">${fmtM(F.totalRevenue)} total all time</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">
          <div class="kpi-icon" style="background:#fffbeb"><svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <span class="kpi-trend neu">${F.paidCount} paid</span>
        </div>
        <div class="kpi-val md">${fmtM(F.pendingRevenue)}</div>
        <div class="kpi-lbl">Pending Revenue</div>
        <div class="kpi-sub">Awaiting payment</div>
      </div>
      <div class="kpi">
        <div class="kpi-top">
          <div class="kpi-icon" style="background:#f5f3ff"><svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41"/></svg></div>
          <span class="kpi-trend neu">${ST.teachers.length} teachers</span>
        </div>
        <div class="kpi-val">${ST.total}</div>
        <div class="kpi-lbl">Staff Members</div>
        <div class="kpi-sub">${ST.support.length} support teachers</div>
      </div>
    </div>

    <!-- FINANCE -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-hd-icon" style="background:#fde8e8">${IC_FINANCE.replace('stroke="currentColor"','stroke="#c0392b"')}</div>
        <h2>Finance</h2>
        <span class="sec-hd-meta">${fmtM(F.totalRevenue)} UZS total revenue</span>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-title">Monthly Revenue</div>
          <div class="rev-chart"><div class="rev-bars">${bars||`<p style="color:var(--muted);font-size:13px;width:100%;text-align:center;margin:auto">No payment data yet</p>`}</div></div>
        </div>
        <div class="card">
          <div class="card-title">Payment Methods</div>
          <div class="donut-wrap">
            ${donut}
            <div class="donut-legend">${legend||`<p style="color:var(--muted);font-size:13px;margin:0">No data yet</p>`}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- LEADS PIPELINE -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-hd-icon" style="background:#eff6ff">${IC_LEADS.replace('stroke="currentColor"','stroke="#2563eb"')}</div>
        <h2>Leads Pipeline</h2>
        <span class="sec-hd-meta">${L.total} active leads</span>
      </div>
      <div class="g3">
        <div class="card">
          <div class="card-title">Pipeline Funnel</div>
          <div class="funnel">${funnel}</div>
        </div>
        <div class="card">
          <div class="card-title">Conversion Rate</div>
          <div class="gauge-card">
            ${gaugeSVG(L.conversionRate||0)}
            <div class="gauge-num">${L.conversionRate||0}%</div>
            <div class="gauge-lbl">Leads → Students</div>
            <div class="gauge-sub">${L.leadsThisMonth} new leads this month</div>
          </div>
        </div>
      </div>
