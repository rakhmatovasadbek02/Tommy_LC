<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistics · Tommy LC</title>
<link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root { --cr:#c0392b; --sg:#16a34a; --sb:#2563eb; --sa:#d97706; --sp:#7c3aed; }

.stat-page { padding-bottom:64px; }

/* section */
.sec { margin-bottom:40px; }
.sec-hd { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #f0dede; }
.sec-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sec-icon svg { width:15px; height:15px; }
.sec-hd h2 { font-size:14px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:var(--text); margin:0; }
.sec-meta { font-size:12px; color:var(--muted); margin-left:auto; font-weight:500; }

/* card */
.card { background:white; border:1px solid #f0dede; border-radius:16px; padding:22px 24px; box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04); }
.card-title { font-size:11px; font-weight:700; letter-spacing:.9px; text-transform:uppercase; color:var(--muted); margin:0 0 20px; }

/* grid layouts */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
@media(max-width:1100px){ .g3{ grid-template-columns:1fr; } }
@media(max-width:860px){ .g2{ grid-template-columns:1fr; } }

/* line chart */
.linechart-wrap { position:relative; width:100%; }
.linechart-legend { display:flex; gap:20px; margin-bottom:14px; flex-wrap:wrap; }
.lc-dot { width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:5px; }
.lc-label { font-size:12px; color:var(--text); font-weight:600; }
.linechart-svg { width:100%; overflow:visible; display:block; }
.linechart-tooltip { position:absolute; background:rgba(20,10,10,.88); color:white; border-radius:8px; padding:8px 12px; font-size:12px; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity .15s; z-index:10; }
.linechart-tooltip.show { opacity:1; }

/* funnel */
.funnel { display:flex; flex-direction:column; gap:7px; }
.f-row { display:flex; align-items:center; gap:10px; }
.f-lbl { font-size:12px; font-weight:600; color:var(--text); width:88px; flex-shrink:0; text-align:right; }
.f-track { flex:1; height:36px; background:#fdf2f2; border-radius:8px; overflow:hidden; min-width:0; }
.f-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:12px; transition:width .7s cubic-bezier(.4,0,.2,1); }
.f-fill span { font-size:12px; font-weight:800; color:rgba(255,255,255,.95); white-space:nowrap; }
.f-n { font-size:12px; font-weight:800; color:var(--text); width:28px; text-align:right; flex-shrink:0; }
@media(max-width:480px){ .f-lbl{ width:60px; font-size:11px; } }

/* gauge */
.gauge-card { display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:10px; gap:2px; }
.gauge-num { font-size:44px; font-weight:900; color:var(--cr); letter-spacing:-3px; line-height:1; margin-top:-6px; }
.gauge-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
.gauge-sub { font-size:12px; color:var(--muted); margin-top:6px; }

/* donut */
.donut-wrap { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.donut-legend { flex:1; min-width:0; display:flex; flex-direction:column; gap:9px; }
.dl-row { display:flex; align-items:center; gap:8px; }
.dl-sw { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.dl-lbl { font-size:12.5px; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dl-pct { font-size:12px; font-weight:800; color:var(--text); }
.dl-amt { font-size:10px; color:var(--muted); margin-left:2px; }

/* staff table */
.tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.stbl { width:100%; border-collapse:collapse; min-width:340px; }
.stbl th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); padding:0 8px 10px; text-align:left; white-space:nowrap; }
.stbl th:not(:first-child) { text-align:right; }
.stbl td { padding:8px; border-top:1px solid #fae8e8; font-size:13px; color:var(--text); vertical-align:middle; }
.stbl td:not(:first-child) { text-align:right; }
.stbl tbody tr:hover td { background:#fdf7f7; }
.sname { display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; white-space:nowrap; }
.savatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:white; flex-shrink:0; }
.rate-cell { display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.rate-track { width:52px; height:5px; background:#f3e8e8; border-radius:99px; overflow:hidden; }
.rate-fill { height:100%; border-radius:99px; }
.rate-pct { font-size:11px; font-weight:800; min-width:30px; text-align:right; }

/* archive pills */
.arch-pills { display:flex; flex-wrap:wrap; gap:8px; }
.arch-pill { display:flex; align-items:center; gap:6px; background:#fdf2f2; border:1px solid #f5d0d0; border-radius:99px; padding:6px 14px 6px 10px; }
.arch-pill-n { font-size:14px; font-weight:900; color:var(--cr); }
.arch-pill-l { font-size:12px; color:var(--text); font-weight:500; }

.topbar-right { display:flex; align-items:center; gap:10px; }
.refresh-tag { font-size:11px; color:var(--muted); font-weight:500; }

@media(max-width:640px){
  .card { padding:16px; }
  .sec-hd { flex-wrap:wrap; }
  .stat-page { padding-bottom:40px; }
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Statistics</div>
    <div class="topbar-right">
      <span class="refresh-tag" id="refreshedAt"></span>
    </div>
  </div>

  <div class="page-content stat-page" id="content">
    <div style="text-align:center;padding:80px 0;color:var(--muted)">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35;display:block;margin:0 auto 12px"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Loading…
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth('statistics');
renderSidebar('statistics');

const fmt  = n => Number(n||0).toLocaleString('ru-RU');
const fmtM = n => { const v=Number(n||0); if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(0)+'K'; return fmt(v); };
const pct  = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const PAL  = ['#c0392b','#2563eb','#7c3aed','#d97706','#16a34a','#0891b2','#be185d'];

function bgColor(name) {
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return PAL[h%PAL.length];
}
function ini(n) { const p=(n||'').trim().split(/\s+/); return (p[0]?.[0]||'')+(p[1]?.[0]||''); }

/* ── Line chart SVG ── */
function lineChartSVG(series, months, containerId) {
  const W=800, H=220, PL=52, PR=16, PT=16, PB=28;
  const cW=W-PL-PR, cH=H-PT-PB;
  const n = months.length;
  if (n < 2) return `<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0">Not enough data — need at least 2 months</div>`;

  const allVals = series.flatMap(s=>s.values);
  const maxV = Math.max(...allVals, 1);
  const step = cW / (n-1);

  function xOf(i) { return PL + i*step; }
  function yOf(v) { return PT + cH - (v/maxV)*cH; }

  // y-axis grid lines
  const ticks = 4;
  let grid='', yLabels='';
  for(let i=0;i<=ticks;i++){
    const v = maxV*(i/ticks);
    const y = yOf(v);
    grid += `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f0dede" stroke-width="1"/>`;
    yLabels += `<text x="${PL-6}" y="${y+4}" text-anchor="end" font-size="9" fill="#bbb" font-family="Inter,sans-serif">${fmtM(v)}</text>`;
  }

  // x labels
  let xLabels='';
  months.forEach((m,i)=>{
    xLabels += `<text x="${xOf(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#bbb" font-family="Inter,sans-serif">${m.slice(5)}</text>`;
  });

  // lines + areas
  const SCOLS = ['#c0392b','#2563eb','#16a34a'];
  let paths='';
  series.forEach((s,si)=>{
    const col = SCOLS[si%SCOLS.length];
    const pts = s.values.map((v,i)=>`${xOf(i)},${yOf(v)}`).join(' ');
    // area fill
    const areaD = `M${xOf(0)},${yOf(s.values[0])} ` +
      s.values.map((v,i)=>`L${xOf(i)},${yOf(v)}`).join(' ') +
      ` L${xOf(n-1)},${PT+cH} L${xOf(0)},${PT+cH} Z`;
    paths += `<path d="${areaD}" fill="${col}" fill-opacity="0.07"/>`;
    // line
    const lineD = `M${xOf(0)},${yOf(s.values[0])} ` + s.values.map((v,i)=>`L${xOf(i)},${yOf(v)}`).join(' ');
    paths += `<path d="${lineD}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    // dots + invisible hover targets stored in data attrs
    s.values.forEach((v,i)=>{
      paths += `<circle cx="${xOf(i)}" cy="${yOf(v)}" r="3.5" fill="${col}" stroke="white" stroke-width="1.5" class="lc-dot-pt" data-series="${s.label}" data-val="${v}" data-month="${months[i]}" data-x="${xOf(i)}" data-y="${yOf(v)}"/>`;
    });
  });

  // invisible hover bar per x position
  let hovers='';
  months.forEach((m,i)=>{
    const vals = series.map(s=>`${s.label}:${s.values[i]}`).join('|');
    hovers += `<rect x="${xOf(i)-step/2}" y="${PT}" width="${step}" height="${cH}" fill="transparent" class="lc-hover" data-month="${m}" data-vals="${vals}" data-x="${xOf(i)}"/>`;
  });

  return `<svg class="linechart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" id="${containerId}">
    ${grid}${yLabels}${xLabels}${paths}${hovers}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="#f0dede" stroke-width="1"/>
  </svg>`;
}

/* ── Donut SVG ── */
function donutSVG(slices) {
  const r=46,cx=54,cy=54,sw=13,circ=2*Math.PI*r;
  const total=slices.reduce((s,x)=>s+x.v,0);
  if(!total) return `<svg width="108" height="108"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f5e0e0" stroke-width="${sw}"/></svg>`;
  let off=0;
  const arcs=slices.map(s=>{
    const len=circ*(s.v/total)-1.2;
    const a=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${Math.max(0,len)} ${circ-Math.max(0,len)}" stroke-dashoffset="${-(off*circ/total-circ/4)}" stroke-linecap="butt"/>`;
    off+=s.v; return a;
  }).join('');
  return `<svg width="108" height="108" viewBox="0 0 108 108" style="flex-shrink:0">${arcs}</svg>`;
}

/* ── Gauge SVG ── */
function gaugeSVG(val) {
  const r=50,cx=70,cy=68,sw=11,circ=Math.PI*r;
  const filled=circ*(Math.min(val,100)/100);
  return `<svg width="140" height="78" viewBox="0 0 140 78">
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="#f5e0e0" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="url(#gg)" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${filled} ${circ}"/>
    <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f9a8a8"/><stop offset="100%" stop-color="#c0392b"/></linearGradient></defs>
  </svg>`;
}

/* ── Tooltip wiring ── */
function wireTooltip(wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  const tip = wrap.querySelector('.linechart-tooltip');
  wrap.querySelectorAll('.lc-hover').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const vals = el.dataset.vals.split('|').map(v => {
        const [lbl,num] = v.split(':');
        return `<div style="display:flex;gap:8px;justify-content:space-between"><span>${lbl}</span><strong>${fmtM(Number(num))}</strong></div>`;
      }).join('');
      tip.innerHTML = `<div style="font-weight:700;margin-bottom:4px">${el.dataset.month}</div>${vals}`;
      tip.classList.add('show');
    });
    el.addEventListener('mousemove', e => {
      const rect = wrap.getBoundingClientRect();
      let left = e.clientX - rect.left + 12;
      if (left + 180 > wrap.offsetWidth) left = e.clientX - rect.left - 190;
      tip.style.left = left + 'px';
      tip.style.top  = (e.clientY - rect.top - 20) + 'px';
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });
}

async function load() {
  const d = await apiGet('/api/statistics');
  document.getElementById('refreshedAt').textContent =
    'Updated ' + new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  render(d);
}

function render(d) {
  const {students:S, leads:L, finance:F, staff:ST, archive:AR} = d;

  /* ── Build unified month list from all 3 series ── */
  const allMonths = new Set([
    ...Object.keys(F.revenueByMonth||{}),
    ...Object.keys(F.pendingByMonth||{}),
    ...Object.keys(F.spendingByMonth||{}),
  ]);
  const months = [...allMonths].sort().slice(-12);

  const revSeries     = months.map(m => F.revenueByMonth?.[m]||0);
  const pendingSeries = months.map(m => F.pendingByMonth?.[m]||0);
  const spendSeries   = months.map(m => F.spendingByMonth?.[m]||0);

  const series = [
    { label:'Net Revenue', values:revSeries },
    { label:'Pending',     values:pendingSeries },
    { label:'Spendings',   values:spendSeries },
  ];

  const chartSVG = months.length >= 2
    ? lineChartSVG(series, months, 'finSvg')
    : `<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0">Not enough data yet</div>`;

  /* ── Donut ── */
  const ptE = Object.entries(F.revenueByType||{});
  const ptT = ptE.reduce((s,[,v])=>s+v,0);
  const ptS = ptE.map(([k,v],i)=>({c:PAL[i%PAL.length],k,v}));
  const legend = ptS.map(s=>`<div class="dl-row">
    <div class="dl-sw" style="background:${s.c}"></div>
    <div class="dl-lbl">${s.k}</div>
    <div class="dl-pct">${pct(s.v,ptT)}%</div>
    <div class="dl-amt">${fmtM(s.v)}</div>
  </div>`).join('');

  /* ── Funnel ── */
  const FORD = (L.funnelOrder||[]).concat(
    Object.keys(L.byStatus||{}).filter(k=>!(L.funnelOrder||[]).includes(k))
  );
  const fMax = Math.max(...FORD.map(k=>L.byStatus[k]||0),1);
  const FCOLS = ['#c0392b','#d97706','#2563eb','#7c3aed','#16a34a'];
  const funnel = FORD.filter(k=>L.byStatus[k]>0).map((k,i)=>{
    const n=L.byStatus[k]||0, w=pct(n,fMax);
    return `<div class="f-row">
      <div class="f-lbl">${k}</div>
      <div class="f-track"><div class="f-fill" style="width:${w}%;background:${FCOLS[i%FCOLS.length]}"><span>${n}</span></div></div>
      <div class="f-n">${n}</div>
    </div>`;
  }).join('') || `<p style="color:var(--muted);font-size:13px;margin:0">No leads yet</p>`;

  /* ── Staff rows ── */
  function staffRow(name, col2, rate) {
    const rc = rate===null?'#bbb':rate>=80?'#16a34a':rate>=60?'#d97706':'#dc2626';
    return `<tr>
      <td><div class="sname"><div class="savatar" style="background:${bgColor(name)}">${ini(name)}</div>${name}</div></td>
      <td>${col2}</td>
      <td>${rate!==null
        ? `<div class="rate-cell"><div class="rate-track"><div class="rate-fill" style="width:${rate}%;background:${rc}"></div></div><span class="rate-pct" style="color:${rc}">${rate}%</span></div>`
        : `<span style="color:var(--muted);font-size:11px">—</span>`}
      </td>
    </tr>`;
  }
  const tRows = (ST.teachers||[]).length
    ? ST.teachers.map(t=>staffRow(t.name,`${t.groups}g · ${t.students}s`,t.attendanceRate)).join('')
    : `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:18px 0;font-size:13px">No teacher data</td></tr>`;
  const sRows = (ST.support||[]).length
    ? ST.support.map(t=>staffRow(t.name,`${t.total} sessions`,t.rate)).join('')
    : `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:18px 0;font-size:13px">No session data</td></tr>`;

  /* ── Archive ── */
  const archHTML = Object.entries(AR.byReason||{}).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="arch-pill"><span class="arch-pill-n">${v}</span><span class="arch-pill-l">${k}</span></div>`)
    .join('') || `<span style="color:var(--muted);font-size:13px">No archived records</span>`;

  /* ── SVG icons ── */
  const iFinance = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`;
  const iLeads   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`;
  const iStaff   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
  const iArchive = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`;

  document.getElementById('content').innerHTML = `

    <!-- FINANCE LINE CHART -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon" style="background:#fde8e8">${iFinance.replace('stroke="currentColor"','stroke="#c0392b"')}</div>
        <h2>Finance</h2>
        <span class="sec-meta">${fmtM(F.totalRevenue)} total revenue · ${fmtM(F.totalSpendings||0)} total spendings</span>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Monthly Overview</div>
        <div class="linechart-legend">
          <span><span class="lc-dot" style="background:#c0392b"></span><span class="lc-label">Net Revenue</span></span>
          <span><span class="lc-dot" style="background:#2563eb"></span><span class="lc-label">Pending</span></span>
          <span><span class="lc-dot" style="background:#16a34a"></span><span class="lc-label">Spendings</span></span>
        </div>
        <div class="linechart-wrap" id="finChartWrap">
          ${chartSVG}
          <div class="linechart-tooltip" id="finTip"></div>
        </div>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-title">Payment Methods</div>
          <div class="donut-wrap">
            ${donutSVG(ptS)}
            <div class="donut-legend">${legend||`<p style="color:var(--muted);font-size:13px;margin:0">No payments yet</p>`}</div>
          </div>
        </div>
        <div class="card" style="display:flex;flex-direction:column;gap:12px;justify-content:center">
          <div class="card-title" style="margin-bottom:4px">Summary</div>
          ${[
            ['Total Revenue',   fmtM(F.totalRevenue),     '#16a34a'],
            ['This Month',      fmtM(F.thisMonthRevenue), '#c0392b'],
            ['Pending',         fmtM(F.pendingRevenue),   '#d97706'],
            ['Total Spendings', fmtM(F.totalSpendings||0),'#dc2626'],
          ].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fae8e8">
            <span style="font-size:12px;color:var(--muted);font-weight:500">${l}</span>
            <span style="font-size:14px;font-weight:800;color:${c}">${v}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- LEADS PIPELINE -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon" style="background:#eff6ff">${iLeads.replace('stroke="currentColor"','stroke="#2563eb"')}</div>
        <h2>Leads Pipeline</h2>
        <span class="sec-meta">${L.total} active · ${L.leadsThisMonth} new this month</span>
      </div>
      <div class="g3">
        <div class="card">
          <div class="card-title">Pipeline Funnel</div>
          <div class="funnel">${funnel}</div>
        </div>
        <div class="card">
          <div class="card-title">Conversion Rate</div>
          <div class="gauge-card">
            ${gaugeSVG(L.conversionRate||0)}
            <div class="gauge-num">${L.conversionRate||0}%</div>
            <div class="gauge-lbl">Leads → Students</div>
            <div class="gauge-sub">${S.active} active students · ${S.total} total</div>
          </div>
        </div>
      </div>
    </div>

    <!-- STAFF EFFICIENCY -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon" style="background:#fde8e8">${iStaff.replace('stroke="currentColor"','stroke="#c0392b"')}</div>
        <h2>Staff Efficiency</h2>
        <span class="sec-meta">Last 2 months · ${ST.total} staff</span>
      </div>
      <div class="g2">
        <div class="card">
          <div class="card-title">Teachers · Attendance Rate</div>
          <div class="tscroll"><table class="stbl">
            <thead><tr><th>Teacher</th><th>Load</th><th>Attendance</th></tr></thead>
            <tbody>${tRows}</tbody>
          </table></div>
        </div>
        <div class="card">
          <div class="card-title">Support Teachers · Completion Rate</div>
          <div class="tscroll"><table class="stbl">
            <thead><tr><th>Teacher</th><th>Sessions</th><th>Completion</th></tr></thead>
            <tbody>${sRows}</tbody>
          </table></div>
        </div>
      </div>
    </div>

    <!-- ARCHIVE -->
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-icon" style="background:#fde8e8">${iArchive.replace('stroke="currentColor"','stroke="#c0392b"')}</div>
        <h2>Archive</h2>
        <span class="sec-meta">${AR.total} total archived</span>
      </div>
      <div class="card">
        <div class="card-title">Reasons for Archiving</div>
        <div class="arch-pills">${archHTML}</div>
      </div>
    </div>
  `;

  /* wire tooltip after DOM is ready */
  const wrap = document.getElementById('finChartWrap');
  if (wrap) {
    const tip = document.getElementById('finTip');
    wrap.querySelectorAll('.lc-hover').forEach(el => {
      el.addEventListener('mouseenter', () => {
        const vals = el.dataset.vals.split('|').map(v => {
          const [lbl,num] = v.split(':');
          return `<div style="display:flex;gap:16px;justify-content:space-between"><span style="opacity:.8">${lbl}</span><strong>${fmtM(Number(num))}</strong></div>`;
        }).join('');
        tip.innerHTML = `<div style="font-weight:700;margin-bottom:5px;opacity:.7;font-size:11px">${el.dataset.month}</div>${vals}`;
        tip.classList.add('show');
      });
      el.addEventListener('mousemove', e => {
        const rect = wrap.getBoundingClientRect();
        let left = e.clientX - rect.left + 14;
        if (left + 200 > wrap.offsetWidth) left = e.clientX - rect.left - 210;
        tip.style.left = left+'px';
        tip.style.top  = (e.clientY - rect.top - 16)+'px';
      });
      el.addEventListener('mouseleave', () => tip.classList.remove('show'));
    });
  }
}

load();
</script>
</div>
</body>
</html>
