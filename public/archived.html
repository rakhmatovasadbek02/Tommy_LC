<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archived Students — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .arch-layout{display:grid;grid-template-columns:1fr 1fr 280px;gap:20px;align-items:start}
    @media(max-width:1100px){.arch-layout{grid-template-columns:1fr 1fr}}
    @media(max-width:700px){.arch-layout{grid-template-columns:1fr}}
    .arch-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:8px}
    .arch-section-title span{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;color:var(--muted)}

    /* Left — main table */
    .arch-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .arch-table{width:100%;border-collapse:collapse;background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);min-width:520px}
    .arch-table th{background:var(--bg);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
    .arch-table td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border-light,#f1f1f1);vertical-align:middle}
    .arch-table td:last-child{text-align:right;white-space:nowrap}
    .arch-table tr:last-child td{border-bottom:none}
    .arch-table tr:hover td{background:#fafafa}
    .arch-avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0}
    .arch-name{font-weight:600;color:var(--text)}
    .arch-reason{max-width:160px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .arch-date{color:var(--muted);font-size:12px;white-space:nowrap}
    .arch-comment{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Right — blacklist panel */
    .blacklist-panel{background:white;border:1.5px solid #fca5a5;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:20px}
    .blacklist-panel-header{background:#fff5f5;padding:14px 16px;border-bottom:1px solid #fca5a5;display:flex;align-items:center;gap:8px}
    .blacklist-panel-title{font-size:13px;font-weight:700;color:#dc2626;flex:1}
    .blacklist-panel-count{font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:20px}
    .bl-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #fef2f2}
    .bl-item:last-child{border-bottom:none}
    .bl-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0;background:#dc2626}
    .bl-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
    .bl-name a{color:inherit;text-decoration:none}
    .bl-name a:hover{color:#dc2626}
    .bl-phone{font-size:11px;color:var(--muted);margin-top:1px}
    .bl-comment{font-size:11px;color:#7f1d1d;font-style:italic;margin-top:3px;line-height:1.4}
    .bl-date{font-size:10px;color:#9ca3af;margin-top:2px}
    .blacklist-badge{display:inline-flex;align-items:center;gap:4px;background:#fee2e2;color:#dc2626;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;margin-left:6px;flex-shrink:0}

    /* Overlay sidebar for managing reasons */
    .reasons-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
    .reasons-backdrop.open{opacity:1;pointer-events:all}
    .reasons-sidebar{position:fixed;top:0;right:0;bottom:0;width:320px;background:white;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
    .reasons-sidebar.open{transform:translateX(0)}
    .reasons-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .reasons-sidebar-title{font-size:15px;font-weight:700;color:var(--text)}
    .reasons-sidebar-close{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .reasons-sidebar-close:hover{background:var(--bg);color:var(--text)}
    .reasons-sidebar-body{flex:1;overflow-y:auto;padding:20px}
    .fixed-reason{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #fca5a5;border-radius:10px;background:#fff5f5;margin-bottom:16px}
    .fixed-reason-label{font-size:13px;font-weight:700;color:#dc2626;flex:1}
    .fixed-reason-note{font-size:11px;color:#9ca3af;font-style:italic}
    .reasons-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
    .reason-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:white;margin-bottom:8px}
    .reason-row-label{flex:1;font-size:13px;color:var(--text)}
    .reason-row-del{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
    .reason-row-del:hover{background:#fee2e2;color:#dc2626}
    .reasons-add-row{display:flex;gap:8px;margin-top:16px}
    .reasons-add-row input{flex:1}
  </style>
</head>
<body>
<nav class="sidebar"></nav>

<!-- Reasons management overlay -->
<div class="reasons-backdrop" id="reasonsBackdrop" onclick="closeReasonsSidebar()"></div>
<div class="reasons-sidebar" id="reasonsSidebar">
  <div class="reasons-sidebar-header">
    <div class="reasons-sidebar-title">Archive Reasons</div>
    <button class="reasons-sidebar-close" onclick="closeReasonsSidebar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="reasons-sidebar-body">
    <div class="fixed-reason">
      <span style="font-size:18px">⛔</span>
      <div>
        <div class="fixed-reason-label">Blacklist</div>
        <div class="fixed-reason-note">Fixed reason — cannot be removed</div>
      </div>
    </div>
    <div class="reasons-section-title">Custom Reasons</div>
    <div id="reasonsList"></div>
    <div class="reasons-add-row">
      <input type="text" id="newReasonInput" placeholder="New reason…" onkeydown="if(event.key==='Enter')addReason()">
      <button class="btn btn-primary btn-sm" onclick="addReason()">Add</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Archived Students</div>
    <div class="topbar-right">
      <span id="countBadge"></span>
      <button class="btn btn-outline" onclick="openReasonsSidebar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Manage Reasons
      </button>
    </div>
  </div>
  <div class="page-content">
    <div class="toolbar" style="margin-bottom:16px">
      <div class="search-bar" style="flex:1;max-width:280px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search by name or phone…" oninput="filterList()">
      </div>
      <select id="filterReason" onchange="filterList()" style="width:auto;padding:9px 14px">
        <option value="">All Reasons</option>
      </select>
    </div>
    <div class="arch-layout">

      <!-- Column 1: Previously Active -->
      <div>
        <div class="arch-section-title">Previously Active <span id="activeCount">0</span></div>
        <div id="activeWrap"></div>
      </div>

      <!-- Column 2: Leads / Never Active -->
      <div>
        <div class="arch-section-title">Leads / Never Active <span id="inactiveCount">0</span></div>
        <div id="inactiveWrap"></div>
      </div>

      <!-- Column 3: Blacklist panel -->
      <div>
        <div class="blacklist-panel">
          <div class="blacklist-panel-header">
            <span style="font-size:16px">⛔</span>
            <div class="blacklist-panel-title">Blacklisted</div>
            <span class="blacklist-panel-count" id="blCount">0</span>
          </div>
          <div id="blList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('archived');
  renderSidebar('archived');

  let _all = [], _reasons = [];

  async function load() {
    [_all, _reasons] = await Promise.all([
      apiGet('/api/students/archived'),
      apiGet('/api/archive-reasons')
    ]);
    renderReasonsList();
    renderBlacklist();

    const rSel = document.getElementById('filterReason');
    rSel.innerHTML = '<option value="">All Reasons</option>';
    _reasons.forEach(r => {
      const o = document.createElement('option');
      o.value = r.label; o.textContent = r.label;
      rSel.appendChild(o);
    });

    const nonBl = _all.filter(s => s.archiveReason !== 'Blacklist');
    document.getElementById('countBadge').innerHTML = nonBl.length
      ? `<span style="font-size:13px;color:var(--muted);margin-right:8px">${nonBl.length} student${nonBl.length===1?'':'s'}</span>`
      : '';
    filterList();
  }

  function renderBlacklist() {
    const bl = _all.filter(s => s.archiveReason === 'Blacklist');
    document.getElementById('blCount').textContent = bl.length;
    const el = document.getElementById('blList');
    if (!bl.length) {
      el.innerHTML = '<div style="padding:20px 16px;text-align:center;color:var(--muted);font-size:13px">No blacklisted students.</div>';
      return;
    }
    el.innerHTML = bl.map(s => {
      const name = s.firstName + ' ' + s.lastName;
      const col  = avatarColor(name);
      const dt   = s.archivedAt ? new Date(s.archivedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '';
      return `<div class="bl-item">
        <div class="bl-avatar" style="background:${col}">${initials(name)}</div>
        <div style="min-width:0;flex:1">
          <div class="bl-name"><a href="student-profile.html?id=${s.id}">${name}</a></div>
          ${s.phone ? `<div class="bl-phone">+998 ${s.phone}</div>` : ''}
          ${s.archiveComment ? `<div class="bl-comment">"${s.archiveComment}"</div>` : ''}
          <div class="bl-date">${dt}</div>
        </div>
      </div>`;
    }).join('');
  }

  function isWasActive(s) {
    // pre_archive_status saved since this feature; for older records null = assume active if they had Active status history
    return s.preArchiveStatus === 'Active' || (!s.preArchiveStatus && s.archiveReason && s.archiveReason !== 'Blacklist');
  }

  function filterList() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fr = document.getElementById('filterReason').value;
    const list = _all.filter(s => {
      if (s.archiveReason === 'Blacklist') return false;
      if (q && !(s.firstName+' '+s.lastName).toLowerCase().includes(q) && !(s.phone||'').includes(q)) return false;
      if (fr && s.archiveReason !== fr) return false;
      return true;
    });
    const active   = list.filter(s => s.preArchiveStatus === 'Active'   || (!s.preArchiveStatus));
    const inactive = list.filter(s => s.preArchiveStatus && s.preArchiveStatus !== 'Active');
    document.getElementById('activeCount').textContent  = active.length;
    document.getElementById('inactiveCount').textContent = inactive.length;
    renderSection('activeWrap',   active);
    renderSection('inactiveWrap', inactive);
  }

  function renderSection(wrapId, list) {
    const wrap = document.getElementById(wrapId);
    if (!list.length) {
      wrap.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0 4px">No students.</div>';
      return;
    }
    wrap.innerHTML = `<div class="arch-table-wrap"><table class="arch-table">
      <thead><tr>
        <th style="width:36px"></th>
        <th>Name</th><th>Phone</th><th>Reason</th><th>Archived At</th>
        <th style="width:100px"></th>
      </tr></thead>
      <tbody>${list.map(s => {
        const name  = s.firstName + ' ' + s.lastName;
        const col   = avatarColor(name);
        const dt    = s.archivedAt ? new Date(s.archivedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
        const phone = s.phone ? '+998 ' + s.phone : '—';
        return `<tr>
          <td><span class="arch-avatar" style="background:${col}">${initials(name)}</span></td>
          <td><span class="arch-name"><a href="student-profile.html?id=${s.id}" style="color:inherit;text-decoration:none">${name}</a></span></td>
          <td style="color:var(--muted);font-size:13px">${phone}</td>
          <td>
            <div class="arch-reason" title="${(s.archiveReason||'').replace(/"/g,'&quot;')}">${s.archiveReason||'—'}</div>
            ${s.archiveComment ? `<div class="arch-comment" title="${s.archiveComment.replace(/"/g,'&quot;')}">${s.archiveComment}</div>` : ''}
          </td>
          <td><div class="arch-date">${dt}</div></td>
          <td><button class="btn btn-outline btn-sm" onclick="restoreStudent('${s.id}','${name.replace(/'/g,"\\'")}')">Restore</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  function openReasonsSidebar() {
    document.getElementById('reasonsSidebar').classList.add('open');
    document.getElementById('reasonsBackdrop').classList.add('open');
  }
  function closeReasonsSidebar() {
    document.getElementById('reasonsSidebar').classList.remove('open');
    document.getElementById('reasonsBackdrop').classList.remove('open');
  }

  function renderReasonsList() {
    const el = document.getElementById('reasonsList');
    if (!_reasons.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:4px 0">No custom reasons yet.</div>';
      return;
    }
    el.innerHTML = _reasons.map(r =>
      `<div class="reason-row">
        <span class="reason-row-label">${r.label}</span>
        <button class="reason-row-del" onclick="deleteReason(${r.id},'${r.label.replace(/'/g,"\\'")}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`
    ).join('');
  }

  async function addReason() {
    const label = document.getElementById('newReasonInput').value.trim();
    if (!label) return showToast('Enter a reason.', 'error');
    if (label.toLowerCase() === 'blacklist') return showToast('Blacklist is a fixed reason.', 'error');
    try {
      await apiPost('/api/archive-reasons', { label, isBlacklist: false });
      document.getElementById('newReasonInput').value = '';
      await load();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
  }

  async function deleteReason(id, label) {
    if (!confirm(`Delete reason "${label}"?`)) return;
    await apiDelete('/api/archive-reasons/' + id);
    await load();
  }

  async function restoreStudent(id, name) {
    if (!confirm(`Restore ${name} as Inactive student?`)) return;
    try {
      await apiPut('/api/students/' + id + '/restore', {});
      showToast(name + ' restored.');
      _all = _all.filter(s => s.id !== id);
      filterList();
      renderBlacklist();
      const nonBl = _all.filter(s => s.archiveReason !== 'Blacklist');
      document.getElementById('countBadge').innerHTML = nonBl.length
        ? `<span style="font-size:13px;color:var(--muted);margin-right:8px">${nonBl.length} student${nonBl.length===1?'':'s'}</span>`
        : '';
    } catch(e) { showToast('Error restoring.', 'error'); }
  }

  load();
</script>
</body>
</html>
