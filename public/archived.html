<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archived Students — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    /* Layout */
    .arch-layout{display:grid;grid-template-columns:1fr 1fr 300px;gap:20px;align-items:start}
    @media(max-width:1100px){.arch-layout{grid-template-columns:1fr 1fr}}
    @media(max-width:700px){.arch-layout{grid-template-columns:1fr}}
    @media(max-width:640px){
      .topbar-right .btn span { display:none; }
      .arch-card { gap:10px; padding:12px 14px; }
    }

    /* Column header */
    .col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
    .col-count{font-size:11px;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:2px 9px;border-radius:20px}

    /* Cards */
    .arch-cards{display:flex;flex-direction:column;gap:8px}
    .arch-card{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:box-shadow .15s,border-color .15s}
    .arch-card:hover{border-color:#cbd5e1;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .arch-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;flex-shrink:0}
    .arch-info{flex:1;min-width:0}
    .arch-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
    .arch-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .arch-name a{color:inherit;text-decoration:none}
    .arch-name a:hover{color:var(--primary)}
    .lead-badge{font-size:10px;font-weight:700;background:#eff6ff;color:#3b82f6;border-radius:20px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
    .arch-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .arch-phone{font-size:12px;color:var(--muted)}
    .arch-dot{width:3px;height:3px;border-radius:50%;background:var(--border);flex-shrink:0}
    .arch-reason-pill{font-size:11px;font-weight:600;background:#f1f5f9;color:#64748b;border-radius:20px;padding:2px 9px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
    .arch-date{font-size:11px;color:#94a3b8;white-space:nowrap}
    .arch-comment{font-size:11px;color:#94a3b8;font-style:italic;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
    .arch-restore{flex-shrink:0}

    /* Blacklist column */
    .bl-panel{background:white;border:1.5px solid #fca5a5;border-radius:12px;overflow:hidden;position:sticky;top:20px}
    .bl-panel-head{background:#fff5f5;padding:14px 16px;border-bottom:1px solid #fca5a5;display:flex;align-items:center;gap:8px}
    .bl-panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#dc2626;flex:1}
    .bl-count{font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;padding:2px 9px;border-radius:20px}
    .bl-cards{display:flex;flex-direction:column;gap:0;padding:8px}
    .bl-card{border:1px solid #fee2e2;border-radius:10px;padding:12px;margin-bottom:8px;background:#fffafa}
    .bl-card:last-child{margin-bottom:0}
    .bl-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .bl-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0;background:#dc2626}
    .bl-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bl-name a{color:inherit;text-decoration:none}
    .bl-name a:hover{color:#dc2626}
    .bl-phone{font-size:11px;color:var(--muted);margin-bottom:4px}
    .bl-comment{font-size:11px;color:#991b1b;background:#fff1f1;border-left:2px solid #fca5a5;padding:4px 8px;border-radius:0 6px 6px 0;margin-bottom:6px;line-height:1.4;font-style:italic}
    .bl-footer{display:flex;align-items:center;justify-content:space-between}
    .bl-date{font-size:10px;color:#9ca3af}

    /* Sidebar */
    .reasons-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
    .reasons-backdrop.open{opacity:1;pointer-events:all}
    .reasons-sidebar{position:fixed;top:0;right:0;bottom:0;width:320px;background:white;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
    .reasons-sidebar.open{transform:translateX(0)}
    .reasons-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .reasons-sidebar-title{font-size:15px;font-weight:700;color:var(--text)}
    .reasons-sidebar-close{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .reasons-sidebar-close:hover{background:var(--bg);color:var(--text)}
    .reasons-sidebar-body{flex:1;overflow-y:auto;padding:20px}
    .fixed-reason{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #fca5a5;border-radius:10px;background:#fff5f5;margin-bottom:16px}
    .fixed-reason-label{font-size:13px;font-weight:700;color:#dc2626;flex:1}
    .fixed-reason-note{font-size:11px;color:#9ca3af;font-style:italic}
    .reasons-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
    .reason-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:white;margin-bottom:8px}
    .reason-row-label{flex:1;font-size:13px;color:var(--text)}
    .reason-row-del{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
    .reason-row-del:hover{background:#fee2e2;color:#dc2626}
    .reasons-add-row{display:flex;gap:8px;margin-top:16px}
    .reasons-add-row input{flex:1}
  </style>
</head>
<body>
<nav class="sidebar"></nav>

<div class="reasons-backdrop" id="reasonsBackdrop" onclick="closeReasonsSidebar()"></div>
<div class="reasons-sidebar" id="reasonsSidebar">
  <div class="reasons-sidebar-header">
    <div class="reasons-sidebar-title">Archive Reasons</div>
    <button class="reasons-sidebar-close" onclick="closeReasonsSidebar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="reasons-sidebar-body">
    <div class="fixed-reason">
      <span style="font-size:18px">⛔</span>
      <div>
        <div class="fixed-reason-label">Blacklist</div>
        <div class="fixed-reason-note">Fixed reason — cannot be removed</div>
      </div>
    </div>
    <div class="reasons-section-title">Custom Reasons</div>
    <div id="reasonsList"></div>
    <div class="reasons-add-row">
      <input type="text" id="newReasonInput" placeholder="New reason…" onkeydown="if(event.key==='Enter')addReason()">
      <button class="btn btn-primary btn-sm" onclick="addReason()">Add</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Archived</div>
    <div class="topbar-right">
      <button class="btn btn-outline" onclick="openReasonsSidebar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Manage Reasons</span>
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="toolbar" style="margin-bottom:16px">
      <div class="search-bar" style="flex:1;max-width:280px">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search…" oninput="filterList()">
      </div>
      <select id="filterReason" onchange="filterList()" style="width:auto;padding:9px 14px">
        <option value="">All Reasons</option>
      </select>
    </div>

    <div class="arch-layout">
      <div>
        <div class="col-header">
          <span class="col-title">Previously Active</span>
          <span class="col-count" id="activeCount">0</span>
        </div>
        <div class="arch-cards" id="activeWrap"></div>
      </div>

      <div>
        <div class="col-header">
          <span class="col-title">Leads / Never Active</span>
          <span class="col-count" id="inactiveCount">0</span>
        </div>
        <div class="arch-cards" id="inactiveWrap"></div>
      </div>

      <div>
        <div class="bl-panel">
          <div class="bl-panel-head">
            <span style="font-size:15px">⛔</span>
            <span class="bl-panel-title">Blacklisted</span>
            <span class="bl-count" id="blCount">0</span>
          </div>
          <div class="bl-cards" id="blList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  requireAuth('archived');
  renderSidebar('archived');

  let _all = [], _reasons = [];

  async function load() {
    [_all, _reasons] = await Promise.all([
      apiGet('/api/students/archived'),
      apiGet('/api/archive-reasons')
    ]);
    renderReasonsList();
    renderBlacklist();

    const rSel = document.getElementById('filterReason');
    rSel.innerHTML = '<option value="">All Reasons</option>';
    _reasons.forEach(r => {
      const o = document.createElement('option');
      o.value = r.label; o.textContent = r.label;
      rSel.appendChild(o);
    });
    filterList();
  }

  function renderBlacklist() {
    const bl = _all.filter(s => s.archiveReason === 'Blacklist');
    document.getElementById('blCount').textContent = bl.length;
    const el = document.getElementById('blList');
    if (!bl.length) {
      el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">No blacklisted entries.</div>';
      return;
    }
    el.innerHTML = bl.map(s => {
      const name = s.firstName + ' ' + s.lastName;
      const col  = avatarColor(name);
      const dt   = s.archivedAt ? new Date(s.archivedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '';
      const src  = s.sourceType || 'student';
      const safeName = name.replace(/'/g,"\\'");
      return `<div class="bl-card">
        <div class="bl-top">
          <div class="bl-avatar" style="background:${col}">${initials(name)}</div>
          <div class="bl-name">
            ${src === 'lead'
              ? `<span class="lead-badge" style="font-size:9px;margin-right:4px">Lead</span>${name}`
              : `<a href="student-profile.html?id=${s.id}">${name}</a>`}
          </div>
        </div>
        ${s.phone ? `<div class="bl-phone">+998 ${s.phone}</div>` : ''}
        ${s.archiveComment ? `<div class="bl-comment">${s.archiveComment}</div>` : ''}
        <div class="bl-footer">
          <span class="bl-date">${dt}</span>
          <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 10px" onclick="restoreStudent('${s.id}','${safeName}','${src}')">Restore</button>
        </div>
      </div>`;
    }).join('');
  }

  function filterList() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fr = document.getElementById('filterReason').value;
    const list = _all.filter(s => {
      if (s.archiveReason === 'Blacklist') return false;
      if (q && !(s.firstName+' '+s.lastName).toLowerCase().includes(q) && !(s.phone||'').includes(q)) return false;
      if (fr && s.archiveReason !== fr) return false;
      return true;
    });
    const active   = list.filter(s => s.sourceType !== 'lead' && s.preArchiveStatus === 'Active');
    const inactive = list.filter(s => s.sourceType === 'lead' || s.preArchiveStatus !== 'Active');
    document.getElementById('activeCount').textContent   = active.length;
    document.getElementById('inactiveCount').textContent = inactive.length;
    renderSection('activeWrap',   active);
    renderSection('inactiveWrap', inactive);
  }

  function renderSection(wrapId, list) {
    const wrap = document.getElementById(wrapId);
    if (!list.length) {
      wrap.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:4px 0">None.</div>';
      return;
    }
    wrap.innerHTML = list.map(s => {
      const name  = s.firstName + ' ' + s.lastName;
      const col   = avatarColor(name);
      const dt    = s.archivedAt ? new Date(s.archivedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
      const phone = s.phone ? '+998 ' + s.phone : null;
      const src   = s.sourceType || 'student';
      const safeName = name.replace(/'/g,"\\'");
      return `<div class="arch-card">
        <div class="arch-avatar" style="background:${col}">${initials(name)}</div>
        <div class="arch-info">
          <div class="arch-name-row">
            ${src === 'lead' ? '<span class="lead-badge">Lead</span>' : ''}
            <span class="arch-name">
              ${src === 'lead'
                ? name
                : `<a href="student-profile.html?id=${s.id}">${name}</a>`}
            </span>
          </div>
          <div class="arch-meta">
            ${phone ? `<span class="arch-phone">${phone}</span>` : ''}
            ${phone && s.archiveReason ? '<span class="arch-dot"></span>' : ''}
            ${s.archiveReason ? `<span class="arch-reason-pill" title="${s.archiveReason}">${s.archiveReason}</span>` : ''}
            ${(phone||s.archiveReason) ? '<span class="arch-dot"></span>' : ''}
            <span class="arch-date">${dt}</span>
          </div>
          ${s.archiveComment ? `<div class="arch-comment" title="${s.archiveComment.replace(/"/g,'&quot;')}">${s.archiveComment}</div>` : ''}
        </div>
        <div class="arch-restore">
          <button class="btn btn-outline btn-sm" onclick="restoreStudent('${s.id}','${safeName}','${src}')">Restore</button>
        </div>
      </div>`;
    }).join('');
  }

  function openReasonsSidebar()  { document.getElementById('reasonsSidebar').classList.add('open');    document.getElementById('reasonsBackdrop').classList.add('open'); }
  function closeReasonsSidebar() { document.getElementById('reasonsSidebar').classList.remove('open'); document.getElementById('reasonsBackdrop').classList.remove('open'); }

  function renderReasonsList() {
    const el = document.getElementById('reasonsList');
    if (!_reasons.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:4px 0">No custom reasons yet.</div>';
      return;
    }
    el.innerHTML = _reasons.map(r =>
      `<div class="reason-row">
        <span class="reason-row-label">${r.label}</span>
        <button class="reason-row-del" onclick="deleteReason(${r.id},'${r.label.replace(/'/g,"\\'")}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`
    ).join('');
  }

  async function addReason() {
    const label = document.getElementById('newReasonInput').value.trim();
    if (!label) return showToast('Enter a reason.', 'error');
    if (label.toLowerCase() === 'blacklist') return showToast('Blacklist is a fixed reason.', 'error');
    try {
      await apiPost('/api/archive-reasons', { label, isBlacklist: false });
      document.getElementById('newReasonInput').value = '';
      await load();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
  }

  async function deleteReason(id, label) {
    if (!confirm(`Delete reason "${label}"?`)) return;
    await apiDelete('/api/archive-reasons/' + id);
    await load();
  }

  async function restoreStudent(id, name, sourceType) {
    if (!confirm(`Restore ${name}?`)) return;
    try {
      const endpoint = sourceType === 'lead' ? `/api/leads/${id}/restore` : `/api/students/${id}/restore`;
      await apiPut(endpoint, {});
      showToast(name + ' restored.');
      await load();
    } catch(e) { showToast('Error restoring.', 'error'); }
  }

  load();
</script>
</body>
</html>
