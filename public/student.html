<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student — Tommy LC</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── Layout ── */
.page-content { padding: 20px 24px 40px; }
.student-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }

/* ── LEFT PANEL ── */
.left-panel {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; position: sticky; top: 84px;
}

/* Avatar + name block */
.profile-block {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  text-align: center; position: relative;
}
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800; color: white; margin-bottom: 12px;
  flex-shrink: 0;
}
.profile-name { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.profile-id { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

/* Action buttons top-right */
.profile-actions {
  position: absolute; top: 14px; right: 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.profile-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid var(--border); background: white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; transition: all 0.15s;
}
.profile-btn:hover { border-color: var(--crimson); background: var(--crimson-soft); }
.profile-btn.red { border-color: #ffcdd2; color: var(--crimson); }
.profile-btn.red:hover { background: var(--crimson); color: white; border-color: var(--crimson); }

/* Balance badge */
.balance-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px;
  font-weight: 700; font-size: 14px; margin-bottom: 8px;
}
.balance-badge.positive { background: #E8F5E9; color: #1E6B45; border: 1.5px solid #A5D6A7; }
.balance-badge.negative { background: #fdecea; color: var(--crimson); border: 1.5px solid #f5c6c6; }
.balance-badge.zero { background: var(--surface); color: var(--muted); border: 1.5px solid var(--border); }
.balance-label { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

/* Info rows */
.info-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
.info-row:last-child { margin-bottom: 0; }
.info-label { color: var(--muted); min-width: 80px; font-size: 12px; }
.info-val { color: var(--text); font-weight: 500; }
.info-val a { color: var(--crimson); text-decoration: none; font-weight: 600; }
.info-val a:hover { text-decoration: underline; }
.info-date { color: var(--muted); font-size: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); }

/* Bottom action bar */
.left-action-bar {
  display: flex; gap: 8px; padding: 12px 16px;
  justify-content: center; flex-wrap: wrap;
}
.action-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 20px;
  border: 1.5px solid var(--border); background: white;
  cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--text); transition: all 0.15s; font-family: 'Inter', sans-serif;
}
.action-pill:hover { border-color: var(--crimson); color: var(--crimson); background: var(--crimson-soft); }
.action-pill.green { border-color: #A5D6A7; color: #1E6B45; }
.action-pill.green:hover { background: #1E6B45; color: white; border-color: #1E6B45; }

/* ── RIGHT PANEL ── */
.right-panel {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
}
.tab-nav {
  display: flex; border-bottom: 2px solid var(--border);
  padding: 0 20px; overflow-x: auto;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-nav-btn {
  padding: 14px 16px; font-size: 13px; font-weight: 600;
  color: var(--muted); background: none; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap;
}
.tab-nav-btn:hover { color: var(--text); }
.tab-nav-btn.active { color: var(--crimson); border-bottom-color: var(--crimson); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── GROUPS TAB ── */
.group-card {
  border: 1px solid var(--border); border-radius: 10px; margin: 16px 20px;
  overflow: hidden;
}
.group-card-top {
  display: grid; grid-template-columns: 1fr auto;
  padding: 16px 18px; gap: 12px;
}
.group-tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700; background: var(--surface);
  color: var(--muted); border: 1px solid var(--border); margin-bottom: 6px;
}
.group-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.group-meta { font-size: 13px; color: var(--muted); }
.group-date-block { text-align: right; font-size: 12px; color: var(--muted); white-space: nowrap; }
.group-card-bottom {
  border-top: 1px solid var(--border); padding: 10px 18px;
  background: var(--surface); font-size: 13px;
  display: flex; gap: 20px; flex-wrap: wrap;
}
.group-stat { display: flex; flex-direction: column; }
.group-stat-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 1px; }
.group-stat-val { font-weight: 700; color: var(--text); }
.group-card-actions { display: flex; gap: 6px; align-items: flex-start; }
.gc-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid var(--border); background: white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all 0.14s;
}
.gc-btn:hover { border-color: var(--crimson); background: var(--crimson-soft); }
.gc-btn.red:hover { background: var(--crimson); color: white; border-color: var(--crimson); }

/* ── BALANCE / PAYMENTS TAB ── */
.balance-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.month-balance-grid { display: flex; gap: 10px; padding: 16px 20px; flex-wrap: wrap; }
.month-box {
  border: 1.5px solid #A5D6A7; border-radius: 10px; padding: 12px 16px;
  min-width: 120px; cursor: pointer; transition: all 0.14s;
}
.month-box:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.month-box-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.month-box-val { font-size: 20px; font-weight: 800; color: #1E6B45; }
.month-box.negative { border-color: #f5c6c6; }
.month-box.negative .month-box-val { color: var(--crimson); }

/* Payments table */
.pay-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pay-table th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface); }
.pay-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.pay-table tr:last-child td { border-bottom: none; }
.pay-table tr:hover td { background: var(--crimson-soft); }
.pay-amount { font-weight: 700; font-size: 15px; }
.pay-amount.plus { color: #1E6B45; }
.pay-amount.minus { color: var(--crimson); }
.pay-type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700;
}
.pay-type-badge.payment { background: #E8F5E9; color: #1E6B45; }
.pay-type-badge.system { background: #f0f0f0; color: #777; }
.pay-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── COMMENTS & CALLS ── */
.log-section { padding: 16px 20px; }
.log-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
.log-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; resize: none; transition: border-color 0.14s; }
.log-input:focus { border-color: var(--crimson); }
.log-entry {
  display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border);
}
.log-entry:last-child { border-bottom: none; }
.log-bar { width: 4px; border-radius: 2px; flex-shrink: 0; background: var(--crimson); margin-top: 2px; }
.log-bar.blue { background: #1D4ED8; }
.log-body { flex: 1; }
.log-text { font-size: 13px; color: var(--text); margin-bottom: 4px; line-height: 1.5; }
.log-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.log-delete { border: none; background: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0; }
.log-delete:hover { color: var(--crimson); }

/* SMS tab */
.sms-section { padding: 20px; }
.sms-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
.sms-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; resize: none; }
.sms-input:focus { border-color: var(--crimson); }
.sms-quick { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.sms-quick-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.14s; }
.sms-quick-btn:hover { border-color: var(--crimson); color: var(--crimson); background: var(--crimson-soft); }

/* History tab */
.history-empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

/* Empty states */
.tab-empty { padding: 48px 20px; text-align: center; color: var(--muted); }
.tab-empty-icon { font-size: 36px; margin-bottom: 10px; }
.tab-empty-text { font-size: 14px; }

/* Responsive */
@media (max-width: 860px) {
  .student-layout { grid-template-columns: 1fr; }
  .left-panel { position: static; }
}
</style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="students.html" class="btn btn-ghost btn-sm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</a>
    <div class="page-title" id="pageTitle">Student</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-primary" onclick="openPaymentModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Add Payment</button>
  </div>
</div>

<div class="page-content">
<div id="loadingState" style="text-align:center;padding:60px;color:var(--muted)">Loading…</div>
<div class="student-layout" id="studentLayout" style="display:none">

  <!-- ══ LEFT PANEL ══ -->
  <div>
  <div class="left-panel">
    <div class="profile-block">
      <div class="profile-actions">
        <button class="profile-btn" title="Edit" onclick="openEditModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="profile-btn red" title="Delete" onclick="doDelete()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-id" id="profileId"></div>
      <div class="balance-badge" id="balanceBadge">0 UZS</div>
      <div class="balance-label">balance</div>
    </div>

    <div class="info-section">
      <div class="info-row" id="phoneRow">
        <span class="info-label">Phone:</span>
        <span class="info-val" id="profilePhone">—</span>
      </div>
      <div class="info-row" id="parentRow">
        <span class="info-label">Parent:</span>
        <span class="info-val" id="profileParent">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Level:</span>
        <span class="info-val" id="profileLevel">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status:</span>
        <span class="info-val" id="profileStatus">—</span>
      </div>
    </div>

    <div class="info-date" id="profileDate"></div>

    <div class="left-action-bar">
      <button class="action-pill" onclick="setTab('groups',document.querySelector('[data-tab=groups]'))">👥 Add to group</button>
      <button class="action-pill green" onclick="openPaymentModal()">💳 Add payment</button>
    </div>
  </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right-panel">
    <div class="tab-nav">
      <button class="tab-nav-btn active" data-tab="groups" onclick="setTab('groups',this)">Groups</button>
      <button class="tab-nav-btn" data-tab="comments" onclick="setTab('comments',this)">Comments</button>
      <button class="tab-nav-btn" data-tab="calls" onclick="setTab('calls',this)">Call history</button>
      <button class="tab-nav-btn" data-tab="sms" onclick="setTab('sms',this)">SMS</button>
      <button class="tab-nav-btn" data-tab="payments" onclick="setTab('payments',this)">Payments</button>
      <button class="tab-nav-btn" data-tab="history" onclick="setTab('history',this)">History</button>
    </div>

    <!-- GROUPS -->
    <div class="tab-content active" id="tab-groups">
      <div id="groupsList"></div>
    </div>

    <!-- COMMENTS -->
    <div class="tab-content" id="tab-comments">
      <div class="log-section">
        <div class="log-input-row">
          <textarea class="log-input" id="commentInput" placeholder="Write a comment…" rows="2"></textarea>
          <button class="btn btn-primary" style="align-self:flex-end" onclick="addComment()">Add</button>
        </div>
        <div id="commentsList"></div>
      </div>
    </div>

    <!-- CALL HISTORY -->
    <div class="tab-content" id="tab-calls">
      <div class="log-section">
        <div class="log-input-row">
          <textarea class="log-input" id="callInput" placeholder="Log a call note…" rows="2"></textarea>
          <button class="btn btn-primary" style="align-self:flex-end" onclick="addCall()">Log</button>
        </div>
        <div id="callsList"></div>
      </div>
    </div>

    <!-- SMS -->
    <div class="tab-content" id="tab-sms">
      <div class="sms-section">
        <div class="sms-quick">
          <button class="sms-quick-btn" onclick="setSmsText('Your next lesson is tomorrow. Tommy LC.')">📅 Tomorrow reminder</button>
          <button class="sms-quick-btn" onclick="setSmsText('Please pay your monthly fee. Tommy LC.')">💰 Payment reminder</button>
          <button class="sms-quick-btn" onclick="setSmsText('Your child was absent today. Tommy LC.')">❌ Absence notice</button>
        </div>
        <div class="sms-input-row">
          <textarea class="sms-input" id="smsText" placeholder="Type SMS message…" rows="3"></textarea>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div style="font-size:12px;color:var(--muted)" id="smsPhoneLabel"></div>
          <button class="btn btn-primary" onclick="sendSms()">📤 Send SMS</button>
        </div>
        <div id="smsStatus" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
      </div>
    </div>

    <!-- PAYMENTS -->
    <div class="tab-content" id="tab-payments">
      <div class="balance-header">
        <div style="font-size:16px;font-weight:700;color:var(--text)">Payment History</div>
        <button class="btn btn-primary btn-sm" onclick="openPaymentModal()">+ Add Payment</button>
      </div>
      <div class="month-balance-grid" id="monthBalances"></div>
      <div style="padding:0 20px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">All transactions</div>
      <div style="overflow-x:auto">
        <table class="pay-table">
          <thead><tr>
            <th>Date</th><th>Type</th><th>Amount</th><th>Comment</th>
          </tr></thead>
          <tbody id="invoicesTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-content" id="tab-history">
      <div class="history-empty">
        <div style="font-size:32px;margin-bottom:10px">📋</div>
        <div style="font-size:14px;color:var(--muted)">History will appear here as actions are taken.</div>
      </div>
    </div>
  </div>

</div><!-- /student-layout -->
</div><!-- /page-content -->
</div><!-- /main -->

<!-- ══ EDIT MODAL ══ -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="width:min(540px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Edit Student</div>
      <button class="modal-close" onclick="closeModal('editModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="eFirst"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="eLast"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone (Student)</label>
          <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
            <span style="padding:9px 10px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
            <input type="tel" id="ePhone" style="border:none;outline:none;flex:1;padding:9px 10px;font-size:13px;font-family:'Inter',sans-serif;background:white" oninput="fmtPhone(this)">
          </div>
        </div>
        <div class="form-group">
          <label>Parent Phone</label>
          <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
            <span style="padding:9px 10px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
            <input type="tel" id="eParent" style="border:none;outline:none;flex:1;padding:9px 10px;font-size:13px;font-family:'Inter',sans-serif;background:white" oninput="fmtPhone(this)">
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="eLevel">
            <option value="">— Select —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="eStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Archived">Archived</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="eNotes" rows="3" placeholder="Optional notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ══ PAYMENT MODAL ══ -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal" style="width:min(460px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Add Payment</div>
      <button class="modal-close" onclick="closeModal('paymentModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="payStudentName" style="font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text)"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount (UZS) *</label>
          <input type="number" id="payAmount" placeholder="0" min="0" step="1000">
        </div>
        <div class="form-group">
          <label>Payment Type</label>
          <select id="payType">
            <option value="Cash">💵 Cash</option>
            <option value="Click">📱 Click</option>
            <option value="Payme">📱 Payme</option>
            <option value="Bank transfer">🏦 Bank transfer</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Group (optional)</label>
        <select id="payGroup"><option value="">— Select group —</option></select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="payDesc" placeholder="Monthly payment, April 2026…">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="payNotes" placeholder="Optional notes…">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('paymentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Confirm Payment</button>
    </div>
  </div>
</div>

<!-- ══ ADD TO GROUP MODAL ══ -->
<div class="modal-overlay" id="addGroupModal">
  <div class="modal" style="width:min(460px,96vw)">
    <div class="modal-header">
      <div class="modal-title">Add to Group</div>
      <button class="modal-close" onclick="closeModal('addGroupModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Search Group</label>
        <input type="text" id="groupSearchInput" placeholder="Search by name…" oninput="filterGroupSearch()">
      </div>
      <div id="groupSearchResults" style="max-height:280px;overflow-y:auto;margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addGroupModal')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
function fmtPhone(input) {
  let v = input.value.replace(/\D/g,'').slice(0,9), o='';
  if(v.length>0) o+=v.slice(0,2);
  if(v.length>2) o+=' '+v.slice(2,5);
  if(v.length>5) o+=' '+v.slice(5,7);
  if(v.length>7) o+=' '+v.slice(7,9);
  input.value = o;
}

requireAuth('students');
renderSidebar('students');

const params = new URLSearchParams(window.location.search);
const studentId = params.get('id');
if (!studentId) window.location.replace('students.html');

const session = getSession();
const actorName = session ? session.name : 'Admin';

let student = null, studentGroups = [], allGroups = [], invoices = [], comments = [], calls = [];

async function load() {
  try {
    [student, studentGroups, allGroups, invoices, comments, calls] = await Promise.all([
      apiGet('/api/students/'+studentId),
      apiGet('/api/students/'+studentId+'/groups'),
      apiGet('/api/groups'),
      apiGet('/api/students/'+studentId+'/invoices'),
      apiGet('/api/students/'+studentId+'/comments'),
      apiGet('/api/students/'+studentId+'/calls'),
    ]);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('studentLayout').style.display = 'grid';
    renderProfile();
    renderGroups();
    renderPayments();
    renderComments();
    renderCalls();
    renderSmsPhone();
    populatePayGroup();
  } catch(e) {
    document.getElementById('loadingState').textContent = 'Error loading student.';
  }
}

function renderProfile() {
  const name = student.firstName + ' ' + student.lastName;
  document.getElementById('pageTitle').textContent = name;
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileId').textContent = 'id: ' + student.id;

  const av = document.getElementById('profileAvatar');
  av.textContent = initials(name);
  av.style.background = avatarColor(name);

  // Balance
  const bal = student.balance || 0;
  const badge = document.getElementById('balanceBadge');
  badge.textContent = formatUzs(bal) + ' UZS';
  badge.className = 'balance-badge ' + (bal > 0 ? 'positive' : bal < 0 ? 'negative' : 'zero');

  // Phone links
  const ph = document.getElementById('profilePhone');
  if (student.phone) {
    ph.innerHTML = `<a href="tel:+998${student.phone.replace(/\s/g,'')}">${student.phone}</a>`;
  } else { ph.textContent = '—'; }

  const pp = document.getElementById('profileParent');
  if (student.phoneParent) {
    pp.innerHTML = `Parent – <a href="tel:+998${student.phoneParent.replace(/\s/g,'')}">${student.phoneParent}</a>`;
  } else { pp.textContent = '—'; }

  document.getElementById('profileLevel').textContent = student.level || '—';
  document.getElementById('profileStatus').innerHTML =
    `<span style="background:${student.status==='Active'?'#E8F5E9':'var(--surface)'};color:${student.status==='Active'?'#1E6B45':'var(--muted)'};padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700">${student.status}</span>`;

  document.getElementById('profileDate').textContent =
    `Added at: ${formatDateLong(student.createdAt)}`;
}

function renderGroups() {
  const el = document.getElementById('groupsList');
  if (!studentGroups.length) {
    el.innerHTML = `<div class="tab-empty"><div class="tab-empty-icon">👥</div><div class="tab-empty-text">Not enrolled in any groups.<br><button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="openAddGroupModal()">+ Add to Group</button></div></div>`;
    return;
  }
  const SCHED = { odd:'Odd days', even:'Even days', custom:'Custom' };
  el.innerHTML = studentGroups.map(g => {
    const endTime = calcEndTime(g.time, g.duration);
    return `<div class="group-card">
      <div class="group-card-top">
        <div>
          <span class="group-tag">${g.name}</span>
          <div class="group-name">${g.level || '—'}</div>
          <div class="group-meta">${g.teacher || '—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="group-date-block">
            ${g.startDate ? formatDateShort(g.startDate) + ' —' : ''}
            <br>${SCHED[g.schedType]||'—'} • ${g.time||'—'}${endTime?' – '+endTime:''}
          </div>
          <div style="display:flex;gap:6px">
            <button class="gc-btn" title="Open group" onclick="window.location.href='group.html?id=${g.id}'">${IC.arrowRight}</button>
            <button class="gc-btn red" title="Remove from group" onclick="removeFromGroup('${g.id}')">${IC.close}</button>
          </div>
        </div>
      </div>
      <div class="group-card-bottom">
        <div class="group-stat">
          <span class="group-stat-label">Status</span>
          <span class="group-stat-val" style="color:#1E6B45">Active (Learns)</span>
        </div>
        <div class="group-stat">
          <span class="group-stat-label">Price / month</span>
          <span class="group-stat-val">${formatUzs(g.price)} UZS</span>
        </div>
        <div class="group-stat">
          <span class="group-stat-label">Unit</span>
          <span class="group-stat-val">${g.currentUnit || '1A'}</span>
        </div>
      </div>
    </div>`;
  }).join('') + `<div style="padding:12px 20px">
    <button class="btn btn-outline btn-sm" onclick="openAddGroupModal()">+ Add to Another Group</button>
  </div>`;
}

function renderPayments() {
  // Monthly balance boxes
  const byMonth = {};
  invoices.forEach(inv => {
    const m = inv.month || inv.createdAt?.slice(0,7) || 'Unknown';
    if (!byMonth[m]) byMonth[m] = 0;
    byMonth[m] += inv.total;
  });
  const months = Object.keys(byMonth).sort().reverse();
  const monthGrid = document.getElementById('monthBalances');
  monthGrid.innerHTML = months.length ? months.map(m => {
    const val = byMonth[m];
    return `<div class="month-box${val<0?' negative':''}">
      <div class="month-box-label">${formatMonthLabel(m)}</div>
      <div class="month-box-val">${formatUzs(Math.abs(val))}</div>
    </div>`;
  }).join('') : `<div style="padding:16px;color:var(--muted);font-size:13px">No payments yet.</div>`;

  // Transactions table
  const tbody = document.getElementById('invoicesTbody');
  if (!invoices.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="padding:32px;text-align:center;color:var(--muted)">No transactions yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = invoices.map(inv => {
    const isPayment = inv.status === 'Paid' && inv.total > 0;
    const group = allGroups.find(g => g.id === inv.groupId);
    return `<tr>
      <td style="white-space:nowrap">${formatDateShort(inv.createdAt)}</td>
      <td><span class="pay-type-badge ${isPayment?'payment':'system'}">${isPayment?'payment':'system'}</span></td>
      <td>
        <div class="pay-amount ${isPayment?'plus':'minus'}">
          ${isPayment?'+':'−'}${formatUzs(Math.abs(inv.total))} UZS
        </div>
        <div class="pay-meta">${inv.paymentType||''}</div>
      </td>
      <td>
        ${group ? `<div style="font-size:12px;font-weight:600;background:var(--surface);display:inline-block;padding:2px 6px;border-radius:4px;margin-bottom:3px">${group.name}</div><br>` : ''}
        <span style="font-size:13px">${inv.desc||inv.notes||'—'}</span>
      </td>
    </tr>`;
  }).join('');
}

function renderComments() {
  const el = document.getElementById('commentsList');
  if (!comments.length) {
    el.innerHTML = `<div class="tab-empty"><div class="tab-empty-text">No comments yet.</div></div>`;
    return;
  }
  el.innerHTML = comments.map(c => `
    <div class="log-entry">
      <div class="log-bar"></div>
      <div class="log-body">
        <div class="log-text">${escHtml(c.text)}</div>
        <div class="log-meta">
          <span>${c.actor||'Admin'}</span>
          <span>${formatDateFull(c.created_at)}</span>
          <button class="log-delete" onclick="deleteComment(${c.id})">${IC.close}</button>
        </div>
      </div>
    </div>`).join('');
}

function renderCalls() {
  const el = document.getElementById('callsList');
  if (!calls.length) {
    el.innerHTML = `<div class="tab-empty"><div class="tab-empty-text">No calls logged yet.</div></div>`;
    return;
  }
  el.innerHTML = calls.map(c => `
    <div class="log-entry">
      <div class="log-bar blue"></div>
      <div class="log-body">
        <div class="log-text">${escHtml(c.note)}</div>
        <div class="log-meta">
          <span>${c.actor||'Admin'}</span>
          <span>${formatDateFull(c.created_at)}</span>
          <button class="log-delete" onclick="deleteCall(${c.id})">${IC.close}</button>
        </div>
      </div>
    </div>`).join('');
}

function renderSmsPhone() {
  const phones = [student.phone, student.phoneParent].filter(Boolean);
  document.getElementById('smsPhoneLabel').textContent =
    phones.length ? 'To: +998 ' + phones.join(', +998 ') : 'No phone number on file.';
}

/* ── Actions ── */
function setTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

async function addComment() {
  const text = document.getElementById('commentInput').value.trim();
  if (!text) return;
  try {
    await apiPost('/api/students/'+studentId+'/comments', { text, actor: actorName });
    document.getElementById('commentInput').value = '';
    comments = await apiGet('/api/students/'+studentId+'/comments');
    renderComments();
    showToast('Comment added!');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function deleteComment(id) {
  if (!confirm('Delete this comment?')) return;
  try {
    await apiDelete('/api/students/comments/'+id);
    comments = await apiGet('/api/students/'+studentId+'/comments');
    renderComments();
    showToast('Deleted.', 'error');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function addCall() {
  const note = document.getElementById('callInput').value.trim();
  if (!note) return;
  try {
    await apiPost('/api/students/'+studentId+'/calls', { note, actor: actorName });
    document.getElementById('callInput').value = '';
    calls = await apiGet('/api/students/'+studentId+'/calls');
    renderCalls();
    showToast('Call logged!');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function deleteCall(id) {
  if (!confirm('Delete this call log?')) return;
  try {
    await apiDelete('/api/students/calls/'+id);
    calls = await apiGet('/api/students/'+studentId+'/calls');
    renderCalls();
    showToast('Deleted.', 'error');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

function setSmsText(t) { document.getElementById('smsText').value = t; }

async function sendSms() {
  const text = document.getElementById('smsText').value.trim();
  if (!text) { showToast('Enter a message.', 'error'); return; }
  const phones = [student.phone, student.phoneParent].filter(Boolean);
  if (!phones.length) { showToast('No phone number on file.', 'error'); return; }
  // Simulate SMS (no real SMS integration — log as call)
  await apiPost('/api/students/'+studentId+'/calls', { note: 'SMS sent: '+text, actor: actorName });
  document.getElementById('smsStatus').innerHTML = `<span style="color:#1E6B45;font-weight:600">✅ SMS logged to: +998 ${phones.join(', +998 ')}</span>`;
  document.getElementById('smsText').value = '';
  calls = await apiGet('/api/students/'+studentId+'/calls');
  showToast('SMS logged!');
}

/* Payment */
function populatePayGroup() {
  const sel = document.getElementById('payGroup');
  sel.innerHTML = '<option value="">— No group —</option>' +
    studentGroups.map(g => `<option value="${g.id}">${g.name} · ${g.level||'—'}</option>`).join('');
}

function openPaymentModal() {
  const name = student.firstName + ' ' + student.lastName;
  document.getElementById('payStudentName').textContent = name;
  document.getElementById('payAmount').value = '';
  document.getElementById('payNotes').value = '';
  document.getElementById('payDesc').value = '';
  openModal('paymentModal');
}

async function savePayment() {
  const amount = parseFloat(document.getElementById('payAmount').value);
  if (!amount || amount <= 0) { showToast('Enter a valid amount.', 'error'); return; }
  const payType = document.getElementById('payType').value;
  const groupId = document.getElementById('payGroup').value;
  const desc = document.getElementById('payDesc').value.trim() || 'Payment';
  const notes = document.getElementById('payNotes').value.trim();
  try {
    await apiPost('/api/students/'+studentId+'/payment', { amount, paymentType: payType, groupId: groupId||null, desc, notes });
    closeModal('paymentModal');
    // Reload data
    [student, invoices] = await Promise.all([
      apiGet('/api/students/'+studentId),
      apiGet('/api/students/'+studentId+'/invoices'),
    ]);
    renderProfile();
    renderPayments();
    logActivity(`Payment ${formatUzs(amount)} UZS from ${student.firstName} ${student.lastName}`, 'green');
    showToast(`Payment of ${formatUzs(amount)} UZS recorded!`);
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

/* Edit */
function openEditModal() {
  document.getElementById('eFirst').value  = student.firstName;
  document.getElementById('eLast').value   = student.lastName;
  document.getElementById('ePhone').value  = student.phone || '';
  document.getElementById('eParent').value = student.phoneParent || '';
  document.getElementById('eLevel').value  = student.level || '';
  document.getElementById('eStatus').value = student.status || 'Active';
  document.getElementById('eNotes').value  = student.notes || '';
  openModal('editModal');
}

async function saveEdit() {
  const first = document.getElementById('eFirst').value.trim();
  const last  = document.getElementById('eLast').value.trim();
  if (!first || !last) { showToast('Name required.', 'error'); return; }
  try {
    await apiPut('/api/students/'+studentId, {
      firstName: first, lastName: last,
      phone: document.getElementById('ePhone').value.trim() || null,
      phoneParent: document.getElementById('eParent').value.trim() || null,
      level: document.getElementById('eLevel').value,
      status: document.getElementById('eStatus').value,
      notes: document.getElementById('eNotes').value.trim(),
    });
    closeModal('editModal');
    student = await apiGet('/api/students/'+studentId);
    renderProfile();
    showToast('Student updated!');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function doDelete() {
  const name = student.firstName + ' ' + student.lastName;
  if (!confirm(`Delete ${name}? This cannot be undone.`)) return;
  await apiDelete('/api/students/'+studentId);
  logActivity(`Deleted student: ${name}`, 'red');
  showToast('Student deleted.', 'error');
  setTimeout(() => window.location.replace('students.html'), 800);
}

/* Add to group */
function openAddGroupModal() {
  document.getElementById('groupSearchInput').value = '';
  filterGroupSearch();
  openModal('addGroupModal');
}

function filterGroupSearch() {
  const q = document.getElementById('groupSearchInput').value.toLowerCase();
  const enrolled = new Set(studentGroups.map(g => g.id));
  const results = allGroups.filter(g =>
    (!q || g.name.toLowerCase().includes(q) || (g.level||'').toLowerCase().includes(q)) &&
    !enrolled.has(g.id)
  );
  const el = document.getElementById('groupSearchResults');
  el.innerHTML = results.length ? results.map(g => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:background 0.12s" onmouseover="this.style.background='var(--crimson-soft)'" onmouseout="this.style.background='white'">
      <div>
        <div style="font-size:13px;font-weight:600">${g.name}</div>
        <div style="font-size:11px;color:var(--muted)">${g.level||'—'} · ${g.time||'—'} · ${g.room||'—'}</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addToGroup('${g.id}')">Add</button>
    </div>`).join('')
  : `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No groups available.</div>`;
}

async function addToGroup(groupId) {
  try {
    const g = allGroups.find(g => g.id === groupId);
    const ids = [...new Set([...(g.studentIds||[]), studentId])];
    await apiPatch('/api/groups/'+groupId+'/students', { studentIds: ids });
    closeModal('addGroupModal');
    studentGroups = await apiGet('/api/students/'+studentId+'/groups');
    renderGroups();
    populatePayGroup();
    showToast('Added to group!');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

async function removeFromGroup(groupId) {
  const g = allGroups.find(g => g.id === groupId);
  if (!confirm(`Remove from group "${g?.name}"?`)) return;
  try {
    const ids = (g.studentIds||[]).filter(id => id !== studentId);
    await apiPatch('/api/groups/'+groupId+'/students', { studentIds: ids });
    studentGroups = await apiGet('/api/students/'+studentId+'/groups');
    renderGroups();
    populatePayGroup();
    showToast('Removed from group.');
  } catch(e) { showToast('Error: '+e.message, 'error'); }
}

/* ── Utility ── */
function formatUzs(n) {
  return Number(n||0).toLocaleString('uz-UZ').replace(/,/g,' ');
}
function formatDateLong(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}
function formatDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function formatDateFull(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return formatDateShort(iso) + ' ' + String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function formatMonthLabel(m) {
  if (!m) return '—';
  const [y,mo] = m.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (months[parseInt(mo)-1]||mo) + ' ' + y;
}
function calcEndTime(time, duration) {
  if (!time) return '';
  const [h,m] = time.split(':').map(Number);
  const end = h*60+(m||0)+Number(duration||90);
  return String(Math.floor(end/60)).padStart(2,'0')+':'+String(end%60).padStart(2,'0');
}
function formatDateShort2(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'.');
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
