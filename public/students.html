<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Students</div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openAdd()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Enroll Student</button>
    </div>
  </div>
  <div class="page-content">
    <div class="toolbar">
      <div class="search-bar"><span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search students…" oninput="renderStudents()">
      </div>
      <select id="filterStatus" onchange="renderStudents()" style="width:auto;padding:9px 14px;">
        <option value="">All Statuses</option>
        <option>Active</option><option>Trial</option><option>Lead</option><option>Inactive</option>
      </select>
      <span class="text-muted" id="studentCount" style="margin-left:auto"></span>
    </div>
    <div id="studentCards"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="studentModal">
  <div class="modal" style="width:min(560px,96vw)">
    <div class="modal-header">
      <div class="modal-title" id="studentModalTitle">Enroll Student</div>
      <button class="modal-close" onclick="closeModal('studentModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editStudentId">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="sFirst" placeholder="John"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="sLast" placeholder="Smith"></div>
      </div>
      <div class="form-group">
        <label>Phone Numbers <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(at least 2 required)</span></label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👤 Student</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneStudent" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👨 Father</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneFather" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👩 Mother</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneMother" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👥 Other</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneOther" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
        </div>
        <div id="sPhoneError" style="color:var(--crimson);font-size:12px;margin-top:6px;display:none">⚠️ At least 2 phone numbers required.</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Level</label><select id="sLevel"><option value="">— Select level —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
        </select></div>
        <div class="form-group"><label>Test Result</label><input type="text" id="sExam" placeholder="Score or notes"></div>
      </div>
      <div class="form-row" id="sStatusRow" style="display:none">
        <div class="form-group"><label>Status</label>
          <select id="sStatus"><option>Active</option><option>Trial</option><option>Lead</option><option>Inactive</option></select>
        </div>
        <div class="form-group"><label>Exam Date</label><input type="date" id="sExamDate"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="sNotes" placeholder="Any additional notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  function fmtPhone(input) {
    let v = input.value.replace(/\D/g,'').slice(0,9), o='';
    if(v.length>0) o+=v.slice(0,2);
    if(v.length>2) o+=' '+v.slice(2,5);
    if(v.length>5) o+=' '+v.slice(5,7);
    if(v.length>7) o+=' '+v.slice(7,9);
    input.value = o;
  }

  requireAuth('students');
  renderSidebar('students');

  let students = [];

  async function load() {
    students = await apiGet('/api/students');
    renderStudents();
  }

  function renderStudents() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fs = document.getElementById('filterStatus').value;
    const filtered = students.filter(s => {
      const name = (s.firstName+' '+s.lastName).toLowerCase();
      return (!q || name.includes(q) || (s.phone||'').includes(q) || (s.level||'').toLowerCase().includes(q))
          && (!fs || s.status === fs);
    });
    document.getElementById('studentCount').textContent = `${filtered.length} student${filtered.length!==1?'s':''}`;
    const SBADGE = { Active:'badge-green', Trial:'badge-gold', Lead:'badge-blue', Inactive:'badge-grey' };
    const el = document.getElementById('studentCards');
    if (!filtered.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><p>No students found.</p></div>'; return;
    }
    el.innerHTML = filtered.map(s => {
      const name = s.firstName+' '+s.lastName;
      const col  = avatarColor(name);
      return `<div class="card" style="margin-bottom:12px">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div class="avatar" style="background:${col};width:44px;height:44px;font-size:16px;flex-shrink:0">${initials(name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:15px">${name}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:12px;flex-wrap:wrap">
              ${s.phone?`<span>📞 ${s.phone}</span>`:''}
              ${s.level?`<span>📚 ${s.level}</span>`:''}
              ${s.exam?`<span>🎯 ${s.exam}</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="badge ${SBADGE[s.status]||'badge-grey'}">${s.status}</span>
            <button class="btn btn-ghost btn-sm" onclick="editStudent('${s.id}')">${IC.edit} Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">${IC.trash}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function openAdd() {
    clearForm();
    document.getElementById('studentModalTitle').textContent = 'Enroll Student';
    document.getElementById('sStatusRow').style.display = 'none';
    openModal('studentModal');
  }

  function editStudent(id) {
    const s = students.find(s=>s.id===id); if (!s) return;
    clearForm();
    document.getElementById('editStudentId').value       = id;
    document.getElementById('sFirst').value              = s.firstName;
    document.getElementById('sLast').value               = s.lastName;
    document.getElementById('sPhoneStudent').value       = s.phone||'';
    document.getElementById('sPhoneFather').value        = s.phoneParent||'';
    document.getElementById('sStatus').value             = s.status||'Active';
    document.getElementById('sLevel').value              = s.level||'';
    document.getElementById('sExam').value               = s.exam||'';
    document.getElementById('sExamDate').value           = s.examDate ? s.examDate.split('T')[0] : '';
    document.getElementById('sNotes').value              = s.notes||'';
    document.getElementById('studentModalTitle').textContent = 'Edit Student';
    document.getElementById('sStatusRow').style.display = '';
    openModal('studentModal');
  }

  async function saveStudent() {
    const first = document.getElementById('sFirst').value.trim();
    const last  = document.getElementById('sLast').value.trim();
    if (!first||!last) { showToast('First and last name are required.','error'); return; }
    const id = document.getElementById('editStudentId').value;
    const phones = [
      document.getElementById('sPhoneStudent').value.trim(),
      document.getElementById('sPhoneFather').value.trim(),
      document.getElementById('sPhoneMother').value.trim(),
      document.getElementById('sPhoneOther').value.trim(),
    ];
    if (!id && phones.filter(Boolean).length < 2) {
      document.getElementById('sPhoneError').style.display = '';
      showToast('At least 2 phone numbers required.','error'); return;
    }
    document.getElementById('sPhoneError').style.display = 'none';
    const parentPhone = phones[1] || phones[2] || phones[3] || null;
    const data = {
      firstName: first, lastName: last,
      phone:       phones[0] || null,
      phoneParent: parentPhone,
      status:   id ? document.getElementById('sStatus').value : 'Inactive',
      level:    document.getElementById('sLevel').value,
      exam:     document.getElementById('sExam').value.trim(),
      examDate: id ? (document.getElementById('sExamDate').value||null) : null,
      notes:    document.getElementById('sNotes').value.trim(),
    };
    try {
      if (id) { await apiPut('/api/students/'+id, data); logActivity(`Updated student: ${first} ${last}`,''); }
      else    { data.id = genId(); await apiPost('/api/students', data); logActivity(`Enrolled: ${first} ${last}`,'green'); }
      closeModal('studentModal');
      await load();
      showToast(id ? 'Student updated!' : 'Student enrolled!');
    } catch(e) { showToast('Error saving student.','error'); }
  }

  async function deleteStudent(id) {
    const s = students.find(s=>s.id===id);
    if (!confirm(`Delete ${s?.firstName} ${s?.lastName}?`)) return;
    await apiDelete('/api/students/'+id);
    logActivity(`Removed student: ${s?.firstName} ${s?.lastName}`,'red');
    await load(); showToast('Student deleted.','error');
  }

  function clearForm() {
    ['editStudentId','sFirst','sLast','sPhoneStudent','sPhoneFather','sPhoneMother','sPhoneOther','sLevel','sExam','sExamDate','sNotes']
      .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('sStatus').value = 'Active';
    document.getElementById('sPhoneError').style.display = 'none';
  }

  load();
</script>
</body>
</html>
