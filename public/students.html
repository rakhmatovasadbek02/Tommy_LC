<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#990000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TommyLC">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .students-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .students-toolbar .search-bar { flex:1; min-width:160px; max-width:260px; }
    .students-table-wrap { overflow-x:auto; background:white; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
    .students-table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
    .students-table thead th { background:#fafafa; padding:9px 10px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; }
    .students-table thead th.sortable { cursor:pointer; user-select:none; }
    .students-table thead th.sortable:hover { color:var(--text); }
    .students-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer; }
    .students-table tbody tr:last-child { border-bottom:none; }
    .students-table tbody tr:hover { background:var(--crimson-soft); }
    .students-table tbody tr:hover .st-name { color:var(--crimson); }
    .students-table td { padding:9px 10px; vertical-align:middle; overflow:hidden; }
    /* Column widths */
    .col-check  { width:36px; }
    .col-name   { width:18%; }
    .col-phone  { width:13%; }
    .col-status { width:8%; }
    .col-groups { width:20%; }
    .col-teacher{ width:11%; }
    .col-dates  { width:9%; }
    .col-bal    { width:8%; }
    .col-comment{ width:13%; }
    .col-actions{ width:72px; }
    .st-name-cell { display:flex; align-items:center; gap:9px; }
    .st-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; color:white; flex-shrink:0; }
    .st-name { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .st-sub  { font-size:11px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .st-phone { font-size:12px; white-space:nowrap; }
    .group-pill { display:flex; flex-direction:column; background:#F1F5F9; border-radius:6px; padding:3px 7px; font-size:11px; line-height:1.4; margin:2px 0; width:100%; box-sizing:border-box; }
    .group-pill-name { font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .group-pill-sub  { color:var(--muted); font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .st-teacher { font-size:12px; }
    .st-dates { font-size:11px; color:var(--muted); }
    .st-balance { font-weight:700; font-size:13px; white-space:nowrap; }
    .st-balance.pos { color:#16a34a; }
    .st-balance.neg { color:#dc2626; }
    .st-balance.zero { color:var(--muted); }
    .st-comment-text { font-size:11px; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .st-comment-meta { font-size:10px; color:var(--muted); margin-top:2px; }
    .st-actions { display:flex; gap:4px; justify-content:flex-end; }
    input[type="checkbox"].row-check { cursor:pointer; width:14px; height:14px; accent-color:var(--crimson); }
    .st-status-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:100px; }
    .sort-arrow { display:inline-flex; flex-direction:column; gap:1px; margin-left:4px; vertical-align:middle; opacity:0.4; }
    .sort-arrow svg { display:block; }
    th.sort-asc .sort-arrow, th.sort-desc .sort-arrow { opacity:1; }

    @media(max-width:1100px){
      .col-comment { display:none; }
      .col-dates   { display:none; }
    }
    @media(max-width:860px){
      .col-teacher { display:none; }
      .students-table { table-layout:auto; }
    }
    @media(max-width:640px){
      .students-toolbar { gap:6px; }
      .students-toolbar .search-bar { max-width:100%; flex:1 1 100%; }
      .students-toolbar select { flex:1; min-width:0; }
      .col-phone { display:none; }
      .students-table { font-size:12px; }
      .topbar-right .btn span { display:none; }
    }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Students <span id="quantityLabel" style="font-size:15px;font-weight:400;color:var(--muted);margin-left:8px"></span></div>
    <div class="topbar-right">
      <button class="btn btn-primary" id="addStudentBtn" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Add New</span>
      </button>
    </div>
  </div>
  <div class="page-content">
    <div class="students-toolbar">
      <div class="search-bar">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search by name or phone…" oninput="renderStudents()">
      </div>
      <select id="filterStatus" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Statuses</option>
        <option>Active</option><option>Frozen</option><option>Inactive</option>
      </select>
      <select id="filterLevel" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Levels</option>
        <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
        <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
      </select>
      <select id="filterGroup" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Groups</option>
      </select>
      <select id="filterTeacher" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Teachers</option>
      </select>
      <select id="filterBalance" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Balances</option>
        <option value="pos">Credit (positive)</option>
        <option value="neg">Debt (negative)</option>
        <option value="zero">Zero</option>
      </select>
    </div>

    <div class="students-table-wrap">
      <table class="students-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="checkAll" class="row-check" onchange="toggleAll(this)"></th>
            <th class="col-name sortable" onclick="toggleSort('name')" id="th-name">Name <span class="sort-arrow"><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 0L8 5H0z" fill="currentColor"/></svg><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 5L0 0H8z" fill="currentColor"/></svg></span></th>
            <th class="col-phone">Phone</th>
            <th class="col-status">Status</th>
            <th class="col-groups">Groups</th>
            <th class="col-teacher">Teacher</th>
            <th class="col-dates">Start</th>
            <th class="col-bal sortable" onclick="toggleSort('balance')" id="th-balance">Balance <span class="sort-arrow"><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 0L8 5H0z" fill="currentColor"/></svg><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 5L0 0H8z" fill="currentColor"/></svg></span></th>
            <th class="col-comment">Last comment</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="studentsTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Enroll Modal -->
<div class="modal-overlay" id="studentModal">
  <div class="modal" style="width:min(560px,96vw)">
    <div class="modal-header">
      <div class="modal-title" id="studentModalTitle">Enroll Student</div>
      <button class="modal-close" onclick="closeModal('studentModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editStudentId">
      <div id="blacklistWarning" style="display:none;margin-bottom:12px;padding:12px 14px;background:#fff5f5;border:1.5px solid #fca5a5;border-radius:8px"></div>
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="sFirst" placeholder="John" oninput="checkBlacklist()"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="sLast" placeholder="Smith" oninput="checkBlacklist()"></div>
      </div>
      <div class="form-group">
        <label>Phone Numbers <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(at least 2 required)</span></label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👤 Student</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this);checkBlacklist()" id="sPhoneStudent" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👨 Father</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneFather" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👩 Mother</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneMother" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👥 Other</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneOther" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
        </div>
        <div id="sPhoneError" style="color:var(--crimson);font-size:12px;margin-top:6px;display:none">⚠️ At least 2 phone numbers required.</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Level</label><select id="sLevel"><option value="">— Select level —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
        </select></div>
        <div class="form-group"><label>Test Result</label><input type="text" id="sExam" placeholder="Score or notes"></div>
      </div>
      <div class="form-row" id="sStatusRow" style="display:none">
        <div class="form-group"><label>Status</label>
          <select id="sStatus"><option>Active</option><option>Frozen</option><option>Inactive</option></select>
        </div>
        <div class="form-group"><label>Exam Date</label><input type="date" id="sExamDate"></div>
      </div>
      <div class="form-group"><label>Comment</label><textarea id="sNotes" placeholder="Add a comment…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">Save</button>
    </div>
  </div>
</div>

<!-- Archive reason modal -->
<div class="modal-overlay" id="archiveModal">
  <div class="modal" style="width:440px">
    <div class="modal-header">
      <div class="modal-title">Archive Student</div>
      <button class="modal-close" onclick="closeModal('archiveModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="archiveStudentName" style="font-weight:700;font-size:15px;margin-bottom:12px"></div>
      <div class="form-group">
        <label>Reason *</label>
        <select id="archiveReason" onchange="onArchiveReasonChange()">
          <option value="">Select a reason…</option>
        </select>
      </div>
      <div class="form-group" id="archiveCommentGroup" style="display:none">
        <label>Blacklist comment *</label>
        <textarea id="archiveComment" placeholder="Describe why this student is blacklisted…" style="height:80px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('archiveModal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmArchive()">Archive</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  function fmtPhone(input) {
    let v = input.value.replace(/\D/g,'').slice(0,9), o='';
    if(v.length>0) o+=v.slice(0,2);
    if(v.length>2) o+=' '+v.slice(2,5);
    if(v.length>5) o+=' '+v.slice(5,7);
    if(v.length>7) o+=' '+v.slice(7,9);
    input.value = o;
  }

  if (isTeacher()) { window.location.replace('index.html'); }
  requireAuth('students');
  renderSidebar('students');

  let students = [], archiveReasons = [];
  let sortCol = '', sortDir = 1;
  let selectedIds = new Set();

  const SBADGE = { Active:'badge-green', Trial:'badge-gold', Lead:'badge-blue', Frozen:'badge-blue', Inactive:'badge-grey' };

  async function load() {
    [students, archiveReasons] = await Promise.all([
      apiGet('/api/students'),
      apiGet('/api/archive-reasons').catch(() => [])
    ]);
    if (isTeacher()) { students = students.filter(s => (s.groups||[]).some(ownsGroup)); document.getElementById('addStudentBtn').style.display='none'; }
    // Populate group and teacher filter dropdowns dynamically (reset first to avoid duplicates on reload)
    const allGroups   = [...new Map(students.flatMap(s=>s.groups||[]).map(g=>[g.id,g])).values()];
    const allTeachers = [...new Set(students.flatMap(s=>(s.groups||[]).map(g=>g.teacher)).filter(Boolean))].sort();
    const gSel = document.getElementById('filterGroup');
    gSel.innerHTML = '<option value="">All Groups</option>';
    allGroups.forEach(g => { const o=document.createElement('option'); o.value=g.id; o.textContent=g.name; gSel.appendChild(o); });
    const tSel = document.getElementById('filterTeacher');
    tSel.innerHTML = '<option value="">All Teachers</option>';
    allTeachers.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; tSel.appendChild(o); });
    renderStudents();
  }

  function toggleSort(col) {
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    ['name','balance'].forEach(c => {
      const th = document.getElementById('th-'+c);
      if (th) { th.classList.toggle('sort-asc', sortCol===c && sortDir===1); th.classList.toggle('sort-desc', sortCol===c && sortDir===-1); }
    });
    renderStudents();
  }

  function toggleAll(cb) {
    document.querySelectorAll('.row-check:not(#checkAll)').forEach(c => { c.checked = cb.checked; });
    selectedIds = cb.checked ? new Set(students.map(s=>s.id)) : new Set();
  }

  function renderStudents() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fs = document.getElementById('filterStatus').value;
    const fl = document.getElementById('filterLevel').value;
    const fg = document.getElementById('filterGroup').value;
    const ft = document.getElementById('filterTeacher').value;
    const fb = document.getElementById('filterBalance').value;
    let filtered = students.filter(s => {
      const name = (s.firstName+' '+s.lastName).toLowerCase();
      const bal  = Number(s.balance||0);
      return (!q || name.includes(q) || (s.phone||'').includes(q))
          && (!fs || s.status === fs)
          && (!fl || s.level === fl)
          && (!fg || (s.groups||[]).some(g=>g.id===fg))
          && (!ft || (s.groups||[]).some(g=>g.teacher===ft))
          && (!fb || (fb==='pos'?bal>0 : fb==='neg'?bal<0 : bal===0));
    });
    if (sortCol === 'name') filtered.sort((a,b) => sortDir*(a.firstName+a.lastName).localeCompare(b.firstName+b.lastName));
    if (sortCol === 'balance') filtered.sort((a,b) => sortDir*(a.balance - b.balance));

    document.getElementById('quantityLabel').textContent = `Quantity — ${filtered.length}`;
    const tbody = document.getElementById('studentsTbody');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--muted)">No students found.</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map((s, i) => {
      const name = s.firstName+' '+s.lastName;
      const col  = avatarColor(name);
      const balClass = s.balance > 0 ? 'pos' : s.balance < 0 ? 'neg' : 'zero';
      const balStr = s.balance !== 0 ? s.balance.toLocaleString() : '0';
      const groupsHTML = (s.groups||[]).map(g =>
        `<a href="group.html?id=${g.id}" onclick="event.stopPropagation()" style="text-decoration:none"><div class="group-pill"><span class="group-pill-name">${g.name}</span><span class="group-pill-sub">${g.level||''}${g.time?' ('+g.time+')':''}</span></div></a>`
      ).join('') || '<span style="color:var(--muted);font-size:12px">—</span>';
      const teachers = [...new Set((s.groups||[]).map(g=>g.teacher).filter(Boolean))];
      const teacherHTML = teachers.length ? teachers.map(t=>`<div>${t}</div>`).join('') : '<span style="color:var(--muted)">—</span>';
      const dates = (s.groups||[]).filter(g=>g.startDate).map(g => {
        const d = new Date(g.startDate);
        return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
      });
      const dateHTML = dates.length ? dates.map(d=>`<div>${d}</div>`).join('') : '<span style="color:var(--muted)">—</span>';
      const lc = s.lastComment;
      const commentHTML = lc
        ? `<div class="st-comment-text">${lc.text}</div><div class="st-comment-meta">${lc.time}${lc.actor?' • '+lc.actor:''}</div>`
        : `<span style="color:var(--muted);font-size:12px">—</span>`;
      return `<tr onclick="location.href='student-profile.html?id=${s.id}'">
        <td class="col-check" onclick="event.stopPropagation()"><input type="checkbox" class="row-check" ${selectedIds.has(s.id)?'checked':''}></td>
        <td class="col-name">
          <div class="st-name-cell">
            <div class="st-avatar" style="background:${col}">${initials(name)}</div>
            <div style="min-width:0">
              <div class="st-name"><a href="student-profile.html?id=${s.id}" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">${name}</a></div>
            </div>
          </div>
        </td>
        <td class="col-phone st-phone">${s.phone?'+998 '+s.phone:'<span style="color:var(--muted)">—</span>'}</td>
        <td class="col-status"><span class="badge ${SBADGE[s.status]||'badge-grey'} st-status-badge">${s.status}</span></td>
        <td class="col-groups">${groupsHTML}</td>
        <td class="col-teacher st-teacher">${teacherHTML}</td>
        <td class="col-dates st-dates">${dateHTML}</td>
        <td class="col-bal"><span class="st-balance ${balClass}">${balStr}</span></td>
        <td class="col-comment">${commentHTML}</td>
        <td class="col-actions st-actions" onclick="event.stopPropagation()">
          ${isTeacher()?'':`<button class="btn btn-ghost btn-sm" onclick="editStudent('${s.id}')">${IC.edit}</button>`}
        </td>
      </tr>`;
    }).join('');
  }

  function openAdd() {
    clearForm();
    document.getElementById('studentModalTitle').textContent = 'Enroll Student';
    document.getElementById('sStatusRow').style.display = 'none';
    openModal('studentModal');
  }

  function editStudent(id) {
    const s = students.find(s=>s.id===id); if (!s) return;
    clearForm();
    document.getElementById('editStudentId').value       = id;
    document.getElementById('sFirst').value              = s.firstName;
    document.getElementById('sLast').value               = s.lastName;
    document.getElementById('sPhoneStudent').value       = s.phone||'';
    document.getElementById('sPhoneFather').value        = s.phoneParent||'';
    document.getElementById('sStatus').value             = s.status||'Active';
    document.getElementById('sLevel').value              = s.level||'';
    document.getElementById('sExam').value               = s.exam||'';
    document.getElementById('sExamDate').value           = s.examDate ? s.examDate.split('T')[0] : '';
    document.getElementById('sNotes').value              = '';
    document.getElementById('studentModalTitle').textContent = 'Edit Student';
    document.getElementById('sStatusRow').style.display = '';
    openModal('studentModal');
  }

  async function saveStudent() {
    const first = document.getElementById('sFirst').value.trim();
    const last  = document.getElementById('sLast').value.trim();
    if (!first||!last) { showToast('First and last name are required.','error'); return; }
    const id = document.getElementById('editStudentId').value;
    const phones = [
      document.getElementById('sPhoneStudent').value.trim(),
      document.getElementById('sPhoneFather').value.trim(),
      document.getElementById('sPhoneMother').value.trim(),
      document.getElementById('sPhoneOther').value.trim(),
    ];
    if (!id && phones.filter(Boolean).length < 2) {
      document.getElementById('sPhoneError').style.display = '';
      showToast('At least 2 phone numbers required.','error'); return;
    }
    document.getElementById('sPhoneError').style.display = 'none';
    const parentPhone = phones[1] || phones[2] || phones[3] || null;
    const comment = document.getElementById('sNotes').value.trim();
    const data = {
      firstName: first, lastName: last,
      phone:       phones[0] || null,
      phoneParent: parentPhone,
      status:   id ? document.getElementById('sStatus').value : 'Inactive',
      level:    document.getElementById('sLevel').value,
      exam:     document.getElementById('sExam').value.trim(),
      examDate: id ? (document.getElementById('sExamDate').value||null) : null,
    };
    try {
      if (id) {
        await apiPut('/api/students/'+id, data);
        if (comment) { const s = getSession(); await apiPost('/api/students/'+id+'/comments', { text: comment, actor: s?.name||'Unknown' }); }
        logActivity(`Updated student: ${first} ${last}`,'');
      } else {
        const created = await apiPost('/api/students', data);
        if (comment) { const s = getSession(); await apiPost('/api/students/'+created.id+'/comments', { text: comment, actor: s?.name||'Unknown' }); }
        logActivity(`Enrolled: ${first} ${last}`,'green');
      }
      closeModal('studentModal');
      await load();
      showToast(id ? 'Student updated!' : 'Student enrolled!');
    } catch(e) { showToast('Error saving student.','error'); }
  }

  let _archiveId = null;
  async function deleteStudent(id) {
    const s = students.find(s=>s.id===id);
    _archiveId = id;
    document.getElementById('archiveStudentName').textContent = s ? s.firstName+' '+s.lastName : '';
    document.getElementById('archiveCommentGroup').style.display = 'none';
    document.getElementById('archiveComment').value = '';
    // Fetch fresh reasons every time
    const sel = document.getElementById('archiveReason');
    sel.innerHTML = '<option value="">Select a reason…</option><option value="Blacklist" data-blacklist="true">⛔ Blacklist</option>';
    try {
      const fresh = await apiGet('/api/archive-reasons');
      fresh.forEach(r => {
        const o = document.createElement('option');
        o.value = r.label;
        o.dataset.blacklist = 'false';
        o.textContent = r.label;
        sel.appendChild(o);
      });
    } catch {}
    openModal('archiveModal');
  }
  function onArchiveReasonChange() {
    const sel = document.getElementById('archiveReason');
    const isBlacklist = sel.selectedOptions[0]?.dataset.blacklist === 'true';
    document.getElementById('archiveCommentGroup').style.display = isBlacklist ? '' : 'none';
    if (!isBlacklist) document.getElementById('archiveComment').value = '';
  }
  async function confirmArchive() {
    const sel = document.getElementById('archiveReason');
    const reason = sel.value;
    const isBlacklist = sel.selectedOptions[0]?.dataset.blacklist === 'true';
    const comment = document.getElementById('archiveComment').value.trim();
    if (isBlacklist && !comment) { showToast('Please enter a blacklist comment.', 'error'); return; }
    const s = students.find(s=>s.id===_archiveId);
    try {
      await apiDelete('/api/students/'+_archiveId, { reason, comment: comment||null });
      logActivity(`Archived student: ${s?.firstName} ${s?.lastName} — ${reason}${isBlacklist?' [BLACKLISTED]':''}`, 'red');
      closeModal('archiveModal');
      await load();
      showToast('Student archived.');
    } catch(e) { showToast('Error archiving student.', 'error'); }
  }

  function clearForm() {
    ['editStudentId','sFirst','sLast','sPhoneStudent','sPhoneFather','sPhoneMother','sPhoneOther','sLevel','sExam','sExamDate','sNotes']
      .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('sStatus').value = 'Active';
    document.getElementById('sPhoneError').style.display = 'none';
    document.getElementById('blacklistWarning').style.display = 'none';
  }

  let _blTimer = null;
  function checkBlacklist() {
    if (document.getElementById('editStudentId').value) return; // skip on edit
    clearTimeout(_blTimer);
    _blTimer = setTimeout(async () => {
      const name  = (document.getElementById('sFirst').value + ' ' + document.getElementById('sLast').value).trim();
      const phone = document.getElementById('sPhoneStudent').value.replace(/\s/g, '');
      if (!name && phone.length < 7) { document.getElementById('blacklistWarning').style.display = 'none'; return; }
      try {
        const hits = await apiGet(`/api/students/blacklist-check?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`);
        const warn = document.getElementById('blacklistWarning');
        if (!hits.length) { warn.style.display = 'none'; return; }
        warn.style.display = '';
        warn.innerHTML = hits.map(h => `
          <div style="display:flex;align-items:flex-start;gap:10px;${hits.length>1?'margin-bottom:8px':''}">
            <span style="font-size:20px;flex-shrink:0">⛔</span>
            <div>
              <div style="font-weight:700;color:#dc2626;font-size:13px">Blacklisted student match: ${h.name}${h.phone?' · +998 '+h.phone:''}</div>
              <div style="font-size:12px;color:#7f1d1d;margin-top:2px">Reason: ${h.reason}</div>
              ${h.comment ? `<div style="font-size:12px;color:#991b1b;margin-top:2px;font-style:italic">"${h.comment}"</div>` : ''}
            </div>
          </div>`).join('');
      } catch { /* silent */ }
    }, 400);
  }

  load();
</script>
</body>
</html>
