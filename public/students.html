<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — TommyLC CRM</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .students-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
    .students-toolbar .search-bar { flex:1; min-width:180px; max-width:280px; }
    .students-table-wrap { overflow-x:auto; background:white; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
    .students-table { width:100%; border-collapse:collapse; font-size:13px; min-width:900px; }
    .students-table thead th { background:#fafafa; padding:10px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; }
    .students-table thead th.sortable { cursor:pointer; user-select:none; }
    .students-table thead th.sortable:hover { color:var(--text); }
    .students-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer; }
    .students-table tbody tr:last-child { border-bottom:none; }
    .students-table tbody tr:hover { background:var(--crimson-soft); }
    .students-table tbody tr:hover .st-name { color:var(--crimson); }
    .students-table td { padding:10px 12px; vertical-align:middle; }
    .st-num { color:var(--muted); font-size:12px; width:32px; text-align:center; }
    .st-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:white; flex-shrink:0; }
    .st-name { font-weight:600; font-size:13.5px; white-space:nowrap; }
    .st-sub  { font-size:11px; color:var(--muted); margin-top:1px; }
    .st-phone { font-size:13px; white-space:nowrap; }
    .group-pill { display:inline-flex; flex-direction:column; background:#F1F5F9; border-radius:6px; padding:4px 8px; font-size:11px; line-height:1.4; margin:2px 0; }
    .group-pill-name { font-weight:700; color:var(--text); }
    .group-pill-sub  { color:var(--muted); }
    .st-teacher { font-size:12px; white-space:nowrap; }
    .st-dates { font-size:11px; color:var(--muted); white-space:nowrap; }
    .st-balance { font-weight:700; font-size:13px; white-space:nowrap; }
    .st-balance.pos { color:#16a34a; }
    .st-balance.neg { color:#dc2626; }
    .st-balance.zero { color:var(--muted); }
    .st-comment { max-width:180px; }
    .st-comment-text { font-size:12px; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .st-comment-meta { font-size:10px; color:var(--muted); margin-top:2px; }
    .st-actions { display:flex; gap:6px; justify-content:flex-end; white-space:nowrap; }
    .st-check { width:32px; text-align:center; }
    input[type="checkbox"].row-check { cursor:pointer; width:14px; height:14px; accent-color:var(--crimson); }
    .st-status-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:100px; }
    .sort-arrow { display:inline-flex; flex-direction:column; gap:1px; margin-left:4px; vertical-align:middle; opacity:0.4; }
    .sort-arrow svg { display:block; }
    th.sort-asc .sort-arrow, th.sort-desc .sort-arrow { opacity:1; }
  </style>
</head>
<body>
<nav class="sidebar"></nav>
<div class="main">
  <div class="topbar">
    <div class="page-title">Students <span id="quantityLabel" style="font-size:15px;font-weight:400;color:var(--muted);margin-left:8px"></span></div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openAdd()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add New
      </button>
    </div>
  </div>
  <div class="page-content">
    <div class="students-toolbar">
      <div class="search-bar">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="searchInput" placeholder="Search by name or phone…" oninput="renderStudents()">
      </div>
      <select id="filterStatus" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Statuses</option>
        <option>Active</option><option>Trial</option><option>Lead</option><option>Inactive</option>
      </select>
      <select id="filterLevel" onchange="renderStudents()" style="width:auto;padding:9px 14px">
        <option value="">All Levels</option>
        <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
        <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
      </select>
    </div>

    <div class="students-table-wrap">
      <table class="students-table">
        <thead>
          <tr>
            <th class="st-check"><input type="checkbox" id="checkAll" class="row-check" onchange="toggleAll(this)"></th>
            <th class="st-num">#</th>
            <th>Photo</th>
            <th class="sortable" onclick="toggleSort('name')" id="th-name">
              Name <span class="sort-arrow"><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 0L8 5H0z" fill="currentColor"/></svg><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 5L0 0H8z" fill="currentColor"/></svg></span>
            </th>
            <th>Phone</th>
            <th>Status</th>
            <th>Groups</th>
            <th>Teacher</th>
            <th>Training start</th>
            <th class="sortable" onclick="toggleSort('balance')" id="th-balance">
              Balance <span class="sort-arrow"><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 0L8 5H0z" fill="currentColor"/></svg><svg width="8" height="5" viewBox="0 0 8 5"><path d="M4 5L0 0H8z" fill="currentColor"/></svg></span>
            </th>
            <th>Last comment</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="studentsTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Enroll Modal -->
<div class="modal-overlay" id="studentModal">
  <div class="modal" style="width:min(560px,96vw)">
    <div class="modal-header">
      <div class="modal-title" id="studentModalTitle">Enroll Student</div>
      <button class="modal-close" onclick="closeModal('studentModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editStudentId">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input type="text" id="sFirst" placeholder="John"></div>
        <div class="form-group"><label>Last Name *</label><input type="text" id="sLast" placeholder="Smith"></div>
      </div>
      <div class="form-group">
        <label>Phone Numbers <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(at least 2 required)</span></label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👤 Student</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneStudent" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👨 Father</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneFather" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👩 Mother</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneMother" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600">👥 Other</div>
            <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden" onfocusin="this.style.borderColor='var(--crimson)'" onfocusout="this.style.borderColor='var(--border)'">
              <span style="padding:9px 9px;background:var(--crimson-soft);font-size:12px;font-weight:700;color:var(--crimson);border-right:1.5px solid var(--border);user-select:none">+998</span>
              <input type="tel" oninput="fmtPhone(this)" id="sPhoneOther" placeholder="90 …" style="border:none;outline:none;flex:1;padding:9px 9px;font-size:13px;font-family:'Inter',sans-serif;background:white;min-width:0">
            </div>
          </div>
        </div>
        <div id="sPhoneError" style="color:var(--crimson);font-size:12px;margin-top:6px;display:none">⚠️ At least 2 phone numbers required.</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Level</label><select id="sLevel"><option value="">— Select level —</option>
            <option>RoundUp</option><option>Beginner</option><option>Elementary</option>
            <option>Pre-Intermediate</option><option>Intermediate</option><option>CEFR</option><option>IELTS</option>
        </select></div>
        <div class="form-group"><label>Test Result</label><input type="text" id="sExam" placeholder="Score or notes"></div>
      </div>
      <div class="form-row" id="sStatusRow" style="display:none">
        <div class="form-group"><label>Status</label>
          <select id="sStatus"><option>Active</option><option>Trial</option><option>Lead</option><option>Inactive</option></select>
        </div>
        <div class="form-group"><label>Exam Date</label><input type="date" id="sExamDate"></div>
      </div>
      <div class="form-group"><label>Comment</label><textarea id="sNotes" placeholder="Add a comment…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('studentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudent()">Save</button>
    </div>
  </div>
</div>

<!-- Archive reason modal -->
<div class="modal-overlay" id="archiveModal">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <div class="modal-title">Archive Student</div>
      <button class="modal-close" onclick="closeModal('archiveModal')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="archiveStudentName" style="font-weight:700;font-size:15px;margin-bottom:12px"></div>
      <div class="form-group">
        <label>Reason for archiving *</label>
        <textarea id="archiveReason" placeholder="e.g. Finished course, moved abroad, stopped paying…" style="height:80px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('archiveModal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmArchive()">Archive</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="shared.js"></script>
<script>
  function fmtPhone(input) {
    let v = input.value.replace(/\D/g,'').slice(0,9), o='';
    if(v.length>0) o+=v.slice(0,2);
    if(v.length>2) o+=' '+v.slice(2,5);
    if(v.length>5) o+=' '+v.slice(5,7);
    if(v.length>7) o+=' '+v.slice(7,9);
    input.value = o;
  }

  requireAuth('students');
  renderSidebar('students');

  let students = [];
  let sortCol = '', sortDir = 1;
  let selectedIds = new Set();

  const SBADGE = { Active:'badge-green', Trial:'badge-gold', Lead:'badge-blue', Inactive:'badge-grey' };

  async function load() {
    students = await apiGet('/api/students');
    renderStudents();
  }

  function toggleSort(col) {
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    ['name','balance'].forEach(c => {
      const th = document.getElementById('th-'+c);
      if (th) { th.classList.toggle('sort-asc', sortCol===c && sortDir===1); th.classList.toggle('sort-desc', sortCol===c && sortDir===-1); }
    });
    renderStudents();
  }

  function toggleAll(cb) {
    document.querySelectorAll('.row-check:not(#checkAll)').forEach(c => { c.checked = cb.checked; });
    selectedIds = cb.checked ? new Set(students.map(s=>s.id)) : new Set();
  }

  function renderStudents() {
    const q  = document.getElementById('searchInput').value.toLowerCase();
    const fs = document.getElementById('filterStatus').value;
    const fl = document.getElementById('filterLevel').value;
    let filtered = students.filter(s => {
      const name = (s.firstName+' '+s.lastName).toLowerCase();
      return (!q || name.includes(q) || (s.phone||'').includes(q))
          && (!fs || s.status === fs)
          && (!fl || s.level === fl);
    });
    if (sortCol === 'name') filtered.sort((a,b) => sortDir*(a.firstName+a.lastName).localeCompare(b.firstName+b.lastName));
    if (sortCol === 'balance') filtered.sort((a,b) => sortDir*(a.balance - b.balance));

    document.getElementById('quantityLabel').textContent = `Quantity — ${filtered.length}`;
    const tbody = document.getElementById('studentsTbody');
    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--muted)">No students found.</td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map((s, i) => {
      const name = s.firstName+' '+s.lastName;
      const col  = avatarColor(name);
      const balClass = s.balance > 0 ? 'pos' : s.balance < 0 ? 'neg' : 'zero';
      const balStr = s.balance !== 0 ? s.balance.toLocaleString() : '0';
      const groupsHTML = (s.groups||[]).map(g =>
        `<a href="group.html?id=${g.id}" onclick="event.stopPropagation()" style="text-decoration:none"><div class="group-pill"><span class="group-pill-name">${g.name}</span><span class="group-pill-sub">${g.level||''}${g.time?' ('+g.time+')':''}</span></div></a>`
      ).join('') || '<span style="color:var(--muted);font-size:12px">—</span>';
      const teachers = [...new Set((s.groups||[]).map(g=>g.teacher).filter(Boolean))];
      const teacherHTML = teachers.length ? teachers.map(t=>`<div>${t}</div>`).join('') : '<span style="color:var(--muted)">—</span>';
      const dates = (s.groups||[]).filter(g=>g.startDate).map(g => {
        const d = new Date(g.startDate);
        return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
      });
      const dateHTML = dates.length ? dates.map(d=>`<div>${d}</div>`).join('') : '<span style="color:var(--muted)">—</span>';
      const lc = s.lastComment;
      const commentHTML = lc
        ? `<div class="st-comment-text">${lc.text}</div><div class="st-comment-meta">${lc.time}${lc.actor?' • '+lc.actor:''}</div>`
        : `<span style="color:var(--muted);font-size:12px">—</span>`;
      return `<tr onclick="location.href='student-profile.html?id=${s.id}'">
        <td class="st-check" onclick="event.stopPropagation()"><input type="checkbox" class="row-check" ${selectedIds.has(s.id)?'checked':''}></td>
        <td class="st-num">${i+1}</td>
        <td><div class="st-avatar" style="background:${col}">${initials(name)}</div></td>
        <td>
          <div class="st-name"><a href="student-profile.html?id=${s.id}" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">${name}</a></div>
          ${s.level?`<div class="st-sub">${s.level}</div>`:''}
        </td>
        <td class="st-phone">${s.phone?'+998 '+s.phone:'<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="badge ${SBADGE[s.status]||'badge-grey'} st-status-badge">${s.status}</span></td>
        <td>${groupsHTML}</td>
        <td class="st-teacher">${teacherHTML}</td>
        <td class="st-dates">${dateHTML}</td>
        <td><span class="st-balance ${balClass}">${balStr}</span></td>
        <td class="st-comment">${commentHTML}</td>
        <td class="st-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="editStudent('${s.id}')">${IC.edit}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">${IC.trash}</button>
        </td>
      </tr>`;
    }).join('');
  }

  function openAdd() {
    clearForm();
    document.getElementById('studentModalTitle').textContent = 'Enroll Student';
    document.getElementById('sStatusRow').style.display = 'none';
    openModal('studentModal');
  }

  function editStudent(id) {
    const s = students.find(s=>s.id===id); if (!s) return;
    clearForm();
    document.getElementById('editStudentId').value       = id;
    document.getElementById('sFirst').value              = s.firstName;
    document.getElementById('sLast').value               = s.lastName;
    document.getElementById('sPhoneStudent').value       = s.phone||'';
    document.getElementById('sPhoneFather').value        = s.phoneParent||'';
    document.getElementById('sStatus').value             = s.status||'Active';
    document.getElementById('sLevel').value              = s.level||'';
    document.getElementById('sExam').value               = s.exam||'';
    document.getElementById('sExamDate').value           = s.examDate ? s.examDate.split('T')[0] : '';
    document.getElementById('sNotes').value              = '';
    document.getElementById('studentModalTitle').textContent = 'Edit Student';
    document.getElementById('sStatusRow').style.display = '';
    openModal('studentModal');
  }

  async function saveStudent() {
    const first = document.getElementById('sFirst').value.trim();
    const last  = document.getElementById('sLast').value.trim();
    if (!first||!last) { showToast('First and last name are required.','error'); return; }
    const id = document.getElementById('editStudentId').value;
    const phones = [
      document.getElementById('sPhoneStudent').value.trim(),
      document.getElementById('sPhoneFather').value.trim(),
      document.getElementById('sPhoneMother').value.trim(),
      document.getElementById('sPhoneOther').value.trim(),
    ];
    if (!id && phones.filter(Boolean).length < 2) {
      document.getElementById('sPhoneError').style.display = '';
      showToast('At least 2 phone numbers required.','error'); return;
    }
    document.getElementById('sPhoneError').style.display = 'none';
    const parentPhone = phones[1] || phones[2] || phones[3] || null;
    const comment = document.getElementById('sNotes').value.trim();
    const data = {
      firstName: first, lastName: last,
      phone:       phones[0] || null,
      phoneParent: parentPhone,
      status:   id ? document.getElementById('sStatus').value : 'Inactive',
      level:    document.getElementById('sLevel').value,
      exam:     document.getElementById('sExam').value.trim(),
      examDate: id ? (document.getElementById('sExamDate').value||null) : null,
    };
    try {
      if (id) {
        await apiPut('/api/students/'+id, data);
        if (comment) { const s = getSession(); await apiPost('/api/students/'+id+'/comments', { text: comment, actor: s?.name||'Unknown' }); }
        logActivity(`Updated student: ${first} ${last}`,'');
      } else {
        data.id = genId();
        await apiPost('/api/students', data);
        if (comment) { const s = getSession(); await apiPost('/api/students/'+data.id+'/comments', { text: comment, actor: s?.name||'Unknown' }); }
        logActivity(`Enrolled: ${first} ${last}`,'green');
      }
      closeModal('studentModal');
      await load();
      showToast(id ? 'Student updated!' : 'Student enrolled!');
    } catch(e) { showToast('Error saving student.','error'); }
  }

  let _archiveId = null;
  function deleteStudent(id) {
    const s = students.find(s=>s.id===id);
    _archiveId = id;
    document.getElementById('archiveStudentName').textContent = s ? s.firstName+' '+s.lastName : '';
    document.getElementById('archiveReason').value = '';
    openModal('archiveModal');
  }
  async function confirmArchive() {
    const reason = document.getElementById('archiveReason').value.trim();
    if (!reason) { showToast('Please enter a reason.','error'); return; }
    const s = students.find(s=>s.id===_archiveId);
    await apiDelete('/api/students/'+_archiveId, { reason });
    logActivity(`Archived student: ${s?.firstName} ${s?.lastName} — ${reason}`, 'red');
    closeModal('archiveModal');
    await load();
    showToast('Student archived.');
  }

  function clearForm() {
    ['editStudentId','sFirst','sLast','sPhoneStudent','sPhoneFather','sPhoneMother','sPhoneOther','sLevel','sExam','sExamDate','sNotes']
      .forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('sStatus').value = 'Active';
    document.getElementById('sPhoneError').style.display = 'none';
  }

  load();
</script>
</body>
</html>
